name: Python Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - ".github/**"
      - "python/**"
      - "crates/**/*.py"
      - "scripts/**/*.py"
      - "pyproject.toml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Hatch
        uses: pypa/hatch@install

      - name: Format Check
        run: hatch fmt --check
