name: Catalog Integration Tests

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      HATCH_ENV: "test.spark-4.1.1"
      # Coverage environment variables
      RUSTC_WORKSPACE_WRAPPER: ${{ github.workspace }}/.github/scripts/rustc-workspace-wrapper.sh
      LLVM_PROFILE_FILE: ${{ github.workspace }}/target/sail-catalog-it-%p-%m.profraw
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hatch
        uses: pypa/hatch@install

      - name: Install Rust toolchain and coverage tools
        run: |
          {
            rustup toolchain install stable
            rustup component add --toolchain stable llvm-tools-preview
          } &

      - name: Install grcov
        uses: taiki-e/install-action@grcov

      - name: Download Python Package
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: target/wheels

      - name: Set Up Hatch Environment
        run: |
          hatch run install-pysail

      - name: List Python packages
        continue-on-error: true
        run: |
          hatch run uv pip freeze || hatch run python -m pip freeze

      - name: Run Catalog Integration Tests
        run: |
          hatch run pytest -m catalog_integration --pyargs pysail.tests.spark.catalog_integration -v

      # Generate coverage report after catalog IT tests
      - name: Generate coverage report
        run: |
          # Wait for background Rust toolchain installation to complete
          wait
          BINARY_PATH=$(hatch run python -c 'import pysail._native; import os; print(os.path.dirname(pysail._native.__file__))')
          echo "Binary path: $BINARY_PATH"
          LLVM_PATH=$(.github/scripts/find-llvm-profdata.sh)
          grcov target --binary-path "$BINARY_PATH" -s . \
            --llvm-path "$LLVM_PATH" \
            -t lcov --branch --ignore-not-existing \
            -o coverage-catalog-it.info

      - name: Upload Catalog IT coverage to Codecov
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-catalog-it.info
          flags: catalog-integration-tests
          name: catalog-integration-tests
          fail_ci_if_error: true
          env_vars: OS
