# serializer version: 1
---
name: "test_correlated_subquery_adding_a_nested_subquery_stays_native_under_ansi_on"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#12@0 as k, #13@1 as s]
      ScalarSubqueryExec: subqueries=1
        SortPreservingMergeExec: [#12@0 ASC]
          SortExec: expr=[#12@0 ASC], preserve_partitioning=[true]
            ProjectionExec: expr=[#2@0 as #12, #11@1 as #13]
              HashJoinExec: mode=CollectLeft, join_type=Left, on=[(#2@0, #6@1)], projection=[#2@0, #11@1]
                ProjectionExec: expr=[column1@0 as #2]
                  DataSourceExec: partitions=1, partition_sizes=[1]
                ProjectionExec: expr=[max(inner_t.#7)@1 + scalar_subquery(<pending>) as #11, #6@0 as #6]
                  AggregateExec: mode=FinalPartitioned, gby=[#6@0 as #6], aggr=[max(inner_t.#7)]
                    RepartitionExec: partitioning=Hash([#6@0], 4), input_partitions=1
                      AggregateExec: mode=Partial, gby=[#6@0 as #6], aggr=[max(inner_t.#7)]
                        ProjectionExec: expr=[column1@0 as #6, column2@1 as #7]
                          DataSourceExec: partitions=1, partition_sizes=[1]
        ProjectionExec: expr=[min(u.#9)@0 as #10]
          AggregateExec: mode=Single, gby=[], aggr=[min(u.#9)]
            ProjectionExec: expr=[column1@0 as #9]
              DataSourceExec: partitions=1, partition_sizes=[1]
---
name: "test_plain_ansi_integer_add_keeps_the_spark_add_udf_under_ansi_on"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#2@0 as result]
      ProjectionExec: expr=[#2@0 as #2]
        SortExec: expr=[#1@1 ASC], preserve_partitioning=[false]
          ProjectionExec: expr=[spark_add(column1@0, 1) as #2, column1@0 as #1]
            DataSourceExec: partitions=1, partition_sizes=[1]
