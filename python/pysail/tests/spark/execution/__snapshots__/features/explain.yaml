# serializer version: 1
---
name: "test_explain_includes_the_distributed_execution_plan_in_localcluster_mode"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#4@0 as k, #5@1 as total]
      ProjectionExec: expr=[#2@0 as #4, sum(t.#3)@1 as #5]
        AggregateExec: mode=FinalPartitioned, gby=[#2@0 as #2], aggr=[sum(t.#3)]
          RepartitionExec: partitioning=Hash([#2@0], 4), input_partitions=1
            AggregateExec: mode=Partial, gby=[#2@0 as #2], aggr=[sum(t.#3)]
              ProjectionExec: expr=[column1@0 as #2, column2@1 as #3]
                DataSourceExec: partitions=1, partition_sizes=[1]
  
  
    == Distributed Plan ==
    === stage 0 ===
    inputs=[]
    mode=Pipelined
    partitions=1
    distribution=Hash(keys=[#2@0], channels=4)
    placement=Worker
    AggregateExec: mode=Partial, gby=[#2@0 as #2], aggr=[sum(t.#3)]
      ProjectionExec: expr=[column1@0 as #2, column2@1 as #3]
        DataSourceExec: partitions=1, partition_sizes=[1]
  
    === stage 1 ===
    inputs=[StageInput(stage=0, mode=Shuffle)]
    mode=Pipelined
    partitions=4
    distribution=RoundRobin(channels=1)
    placement=Worker
    ProjectionExec: expr=[#4@0 as k, #5@1 as total]
      ProjectionExec: expr=[#2@0 as #4, sum(t.#3)@1 as #5]
        AggregateExec: mode=FinalPartitioned, gby=[#2@0 as #2], aggr=[sum(t.#3)]
          StageInputExec: input=0, partitioning=Hash([#2@0], 4)
---
name: "test_explain_includes_the_scalar_subquery_distributed_plan_in_localcluster_mode"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#7@0 as k, #8@1 as total]
      ScalarSubqueryExec: subqueries=1
        ProjectionExec: expr=[#2@0 as #7, sum(t.#3)@1 as #8]
          AggregateExec: mode=FinalPartitioned, gby=[#2@0 as #2], aggr=[sum(t.#3)]
            RepartitionExec: partitioning=Hash([#2@0], 4), input_partitions=4
              AggregateExec: mode=Partial, gby=[#2@0 as #2], aggr=[sum(t.#3)]
                RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                  ProjectionExec: expr=[column1@0 as #2, column2@1 as #3]
                    FilterExec: column2@1 > scalar_subquery(<pending>)
                      DataSourceExec: partitions=1, partition_sizes=[1]
        ProjectionExec: expr=[max(s.#5)@0 as #6]
          AggregateExec: mode=Single, gby=[], aggr=[max(s.#5)]
            ProjectionExec: expr=[column1@0 as #5]
              DataSourceExec: partitions=1, partition_sizes=[1]
  
  
    == Distributed Plan ==
    === stage 0 ===
    inputs=[]
    mode=Pipelined
    partitions=1
    distribution=RoundRobin(channels=1)
    placement=Worker
    ProjectionExec: expr=[max(s.#5)@0 as #6]
      AggregateExec: mode=Single, gby=[], aggr=[max(s.#5)]
        ProjectionExec: expr=[column1@0 as #5]
          DataSourceExec: partitions=1, partition_sizes=[1]
  
    === stage 1 ===
    inputs=[StageInput(stage=0, mode=Broadcast)]
    mode=Pipelined
    partitions=1
    distribution=RoundRobin(channels=4)
    placement=Worker
    ScalarSubqueryExec: subqueries=1
      ProjectionExec: expr=[column1@0 as #2, column2@1 as #3]
        FilterExec: column2@1 > scalar_subquery(<pending>)
          DataSourceExec: partitions=1, partition_sizes=[1]
      StageInputExec: input=0, partitioning=UnknownPartitioning(1)
  
    === stage 2 ===
    inputs=[StageInput(stage=1, mode=Shuffle)]
    mode=Pipelined
    partitions=4
    distribution=Hash(keys=[#2@0], channels=4)
    placement=Worker
    AggregateExec: mode=Partial, gby=[#2@0 as #2], aggr=[sum(t.#3)]
      StageInputExec: input=0, partitioning=RoundRobinBatch(4)
  
    === stage 3 ===
    inputs=[StageInput(stage=2, mode=Shuffle)]
    mode=Pipelined
    partitions=4
    distribution=RoundRobin(channels=1)
    placement=Worker
    ProjectionExec: expr=[#7@0 as k, #8@1 as total]
      ProjectionExec: expr=[#2@0 as #7, sum(t.#3)@1 as #8]
        AggregateExec: mode=FinalPartitioned, gby=[#2@0 as #2], aggr=[sum(t.#3)]
          StageInputExec: input=0, partitioning=Hash([#2@0], 4)
