# serializer version: 1
---
name: "test_explain_includes_aggregate_expression_scalar_subquery_distributed_plan_in_localcluster_mode"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#7@0 as k, #8@1 as total]
      ScalarSubqueryExec: subqueries=1
        ProjectionExec: expr=[#2@0 as #7, sum(t.#3 + #6)@1 as #8]
          AggregateExec: mode=FinalPartitioned, gby=[#2@0 as #2], aggr=[sum(t.#3 + #6)]
            RepartitionExec: partitioning=Hash([#2@0], 4), input_partitions=1
              AggregateExec: mode=Partial, gby=[#2@0 as #2], aggr=[sum(t.#3 + #6)]
                ProjectionExec: expr=[column1@0 as #2, column2@1 as #3]
                  DataSourceExec: partitions=1, partition_sizes=[1]
        ProjectionExec: expr=[min(s.#5)@0 as #6]
          AggregateExec: mode=Single, gby=[], aggr=[min(s.#5)]
            ProjectionExec: expr=[column1@0 as #5]
              DataSourceExec: partitions=1, partition_sizes=[1]
  
  
    == Distributed Plan ==
    === stage 0 ===
    inputs=[]
    mode=Pipelined
    partitions=1
    distribution=RoundRobin(channels=1)
    placement=Worker
    ProjectionExec: expr=[min(s.#5)@0 as #6]
      AggregateExec: mode=Single, gby=[], aggr=[min(s.#5)]
        ProjectionExec: expr=[column1@0 as #5]
          DataSourceExec: partitions=1, partition_sizes=[1]
  
    === stage 1 ===
    inputs=[StageInput(stage=0, mode=Broadcast)]
    mode=Pipelined
    partitions=1
    distribution=Hash(keys=[#2@0], channels=4)
    placement=Worker
    ScalarSubqueryExec: subqueries=1
      AggregateExec: mode=Partial, gby=[#2@0 as #2], aggr=[sum(t.#3 + #6)]
        ProjectionExec: expr=[column1@0 as #2, column2@1 as #3]
          DataSourceExec: partitions=1, partition_sizes=[1]
      StageInputExec: input=0, partitioning=UnknownPartitioning(1)
  
    === stage 2 ===
    inputs=[StageInput(stage=1, mode=Shuffle), StageInput(stage=0, mode=Broadcast)]
    mode=Pipelined
    partitions=4
    distribution=RoundRobin(channels=1)
    placement=Worker
    ProjectionExec: expr=[#7@0 as k, #8@1 as total]
      ScalarSubqueryExec: subqueries=1
        ProjectionExec: expr=[#2@0 as #7, sum(t.#3 + #6)@1 as #8]
          AggregateExec: mode=FinalPartitioned, gby=[#2@0 as #2], aggr=[sum(t.#3 + #6)]
            StageInputExec: input=0, partitioning=Hash([#2@0], 4)
        StageInputExec: input=1, partitioning=UnknownPartitioning(1)
---
name: "test_explain_includes_correlated_scalar_subquery_distributed_plan_in_localcluster_mode"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#9@0 as k, #10@1 as v]
      SortPreservingMergeExec: [#9@0 ASC]
        SortExec: expr=[#9@0 ASC], preserve_partitioning=[true]
          ProjectionExec: expr=[#2@0 as #9, #3@1 as #10]
            HashJoinExec: mode=CollectLeft, join_type=Inner, on=[(#2@0, #6@1), (#3@1, #8@0)], projection=[#2@0, #3@1]
              ProjectionExec: expr=[column1@0 as #2, column2@1 as #3]
                DataSourceExec: partitions=1, partition_sizes=[1]
              ProjectionExec: expr=[max(inner_t.#7)@1 as #8, #6@0 as #6]
                AggregateExec: mode=FinalPartitioned, gby=[#6@0 as #6], aggr=[max(inner_t.#7)]
                  RepartitionExec: partitioning=Hash([#6@0], 4), input_partitions=1
                    AggregateExec: mode=Partial, gby=[#6@0 as #6], aggr=[max(inner_t.#7)]
                      ProjectionExec: expr=[column1@0 as #6, column2@1 as #7]
                        DataSourceExec: partitions=1, partition_sizes=[1]
  
  
    == Distributed Plan ==
    === stage 0 ===
    inputs=[]
    mode=Pipelined
    partitions=1
    distribution=Hash(keys=[#6@0], channels=4)
    placement=Worker
    AggregateExec: mode=Partial, gby=[#6@0 as #6], aggr=[max(inner_t.#7)]
      ProjectionExec: expr=[column1@0 as #6, column2@1 as #7]
        DataSourceExec: partitions=1, partition_sizes=[1]
  
    === stage 1 ===
    inputs=[StageInput(stage=0, mode=Shuffle)]
    mode=Pipelined
    partitions=4
    distribution=RoundRobin(channels=1)
    placement=Worker
    SortExec: expr=[#9@0 ASC], preserve_partitioning=[true]
      ProjectionExec: expr=[#2@0 as #9, #3@1 as #10]
        HashJoinExec: mode=CollectLeft, join_type=Inner, on=[(#2@0, #6@1), (#3@1, #8@0)], projection=[#2@0, #3@1]
          ProjectionExec: expr=[column1@0 as #2, column2@1 as #3]
            DataSourceExec: partitions=1, partition_sizes=[1]
          ProjectionExec: expr=[max(inner_t.#7)@1 as #8, #6@0 as #6]
            AggregateExec: mode=FinalPartitioned, gby=[#6@0 as #6], aggr=[max(inner_t.#7)]
              StageInputExec: input=0, partitioning=Hash([#6@0], 4)
  
    === stage 2 ===
    inputs=[StageInput(stage=1, mode=Merge)]
    mode=Pipelined
    partitions=1
    distribution=RoundRobin(channels=1)
    placement=Worker
    ProjectionExec: expr=[#9@0 as k, #10@1 as v]
      SortPreservingMergeExec: [#9@0 ASC]
        StageInputExec: input=0, partitioning=Hash([#9@0], 4)
---
