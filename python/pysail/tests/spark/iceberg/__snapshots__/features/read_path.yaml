# serializer version: 1
---
name: "test_explain_for_partitioned_table_with_metadataasdata_enabled"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#3@0 as id, #4@1 as value, #5@2 as category]
      ProjectionExec: expr=[id@0 as #3, value@1 as #4, category@2 as #5]
        IcebergScanByDataFilesExec: table_url=file://<table_url>
          IcebergDiscoveryExec: table_url=file://<table_url>, snapshot_id=<snapshot_id>, partition_scan=false
            RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
              IcebergManifestScanExec: table_url=file://<table_url>, snapshot_id=<snapshot_id>
---
name: "test_explain_select_with_default_options_uses_driver_file_scan"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#3@0 as id, #4@1 as name, #5@2 as value]
      DataSourceExec: file_groups={1 group: [[<tmp>/iceberg_read_driver/data/part-<uuid>-00000000000000000000.parquet]]}, projection=[id@0 as #3, name@1 as #4, value@2 as #5], file_type=parquet
---
name: "test_explain_select_with_metadataasdataread_true_uses_manifest_scan"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#3@0 as id, #4@1 as name, #5@2 as value]
      ProjectionExec: expr=[id@0 as #3, name@1 as #4, value@2 as #5]
        IcebergScanByDataFilesExec: table_url=file://<table_url>
          IcebergDiscoveryExec: table_url=file://<table_url>, snapshot_id=<snapshot_id>, partition_scan=false
            RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
              IcebergManifestScanExec: table_url=file://<table_url>, snapshot_id=<snapshot_id>
