                FilterExec: __sail_merge_target_row_present@5 IS NOT NULL AND (__sail_merge_source_row_present@6 IS NOT NULL AND (flag@0 = update OR flag@0 = delete) OR __sail_merge_source_row_present@6 IS NULL AND flag@0 = expire OR __sail_merge_source_row_present@6 IS NULL AND flag@0 = purge), projection=[__sail_file_path@1, __sail_file_row_index@2, __sail_iceberg_partition_spec_id@3, __sail_iceberg_partition@4]
