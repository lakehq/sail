      CoalescePartitionsExec
        UnionExec
          IcebergWriterExec(table_path=file://<tmp>/iceberg_merge_many_files_plan/)
            CoalescePartitionsExec
              IcebergMergeDataRowsExec
                UnionExec
                  ProjectionExec: expr=[id@1 as id, CASE WHEN __common_expr_1@0 THEN __sail_src_value@5 ELSE value@2 END as value, __sail_file_path@3 as __sail_file_path, CASE WHEN __sail_merge_target_row_present@4 IS NULL THEN 3 WHEN __common_expr_1@0 THEN 6 ELSE 0 END as __sail_operation_type, NULL as __sail_merge_source_metric]
                    ProjectionExec: expr=[(__sail_merge_target_row_present@3 IS NOT NULL AND __sail_merge_source_row_present@5 IS NOT NULL) IS NOT DISTINCT FROM true as __common_expr_1, id@0 as id, value@1 as value, __sail_file_path@2 as __sail_file_path, __sail_merge_target_row_present@3 as __sail_merge_target_row_present, __sail_src_value@4 as __sail_src_value]
                      FilterExec: __sail_merge_target_row_present@3 IS NOT NULL
