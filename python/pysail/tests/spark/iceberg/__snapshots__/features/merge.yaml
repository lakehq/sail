                          MergeCardinalityCheckExec: row_id=__sail_merge_target_row_id, target_present=__sail_merge_target_row_present, source_present=__sail_merge_source_row_present
                            RepartitionExec: partitioning=Hash([__sail_merge_target_row_id@6], 4), input_partitions=4
                              HashJoinExec: mode=CollectLeft, join_type=Full, on=[(__sail_src_id@0, id@0)], projection=[id@3, value@4, __sail_file_path@5, __sail_file_row_index@6, __sail_iceberg_partition_spec_id@7, __sail_iceberg_partition@8, __sail_merge_target_row_id@9, __sail_merge_target_row_present@10, __sail_src_id@0, __sail_src_value@1, __sail_merge_source_row_present@2]
                                ProjectionExec: expr=[column1@0 as __sail_src_id, column2@1 as __sail_src_value, true as __sail_merge_source_row_present]
                                  DataSourceExec: partitions=1, partition_sizes=[1]
                                RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=3
                                  ProjectionExec: expr=[id@0 as id, value@1 as value, __sail_file_path@2 as __sail_file_path, __sail_file_row_index@3 as __sail_file_row_index, __sail_iceberg_partition_spec_id@4 as __sail_iceberg_partition_spec_id, __sail_iceberg_partition@5 as __sail_iceberg_partition, __sail_merge_target_row_id@6 as __sail_merge_target_row_id, true as __sail_merge_target_row_present]
                                    MonotonicIdExec: col=__sail_merge_target_row_id
                                      ProjectionExec: expr=[id@0 as id, value@1 as value, __sail_file_path@2 as __sail_file_path, __sail_file_row_index@5 as __sail_file_row_index, __sail_iceberg_partition_spec_id@3 as __sail_iceberg_partition_spec_id, __sail_iceberg_partition@4 as __sail_iceberg_partition]
                                        IcebergMergeMetadataExec: data_file_column=__sail_file_path
                                          DataSourceExec: file_groups={3 groups: [[<tmp>/iceberg_merge_many_files_plan/data/part-<uuid>-00000000000000000000.parquet], [<tmp>/iceberg_merge_many_files_plan/data/part-<uuid>-00000000000000000001.parquet], [<tmp>/iceberg_merge_many_files_plan/data/part-<uuid>-00000000000000000002.parquet]]}, projection=[id, value, __sail_file_path, __sail_iceberg_partition_spec_id, __sail_iceberg_partition], file_type=parquet
                  ProjectionExec: expr=[NULL as id, NULL as value, NULL as __sail_file_path, 9 as __sail_operation_type, 3 as __sail_merge_source_metric]
                    PlaceholderRowExec
          IcebergPositionDeleteWriterExec(table_path=file://<tmp>/iceberg_merge_many_files_plan/)
            SortExec: expr=[__sail_file_path@0 ASC NULLS LAST, __sail_file_row_index@1 ASC NULLS LAST], preserve_partitioning=[true]
              RepartitionExec: partitioning=Hash([__sail_file_path@0], 4), input_partitions=4
                FilterExec: __sail_merge_target_row_present@4 IS NOT NULL AND __sail_merge_source_row_present@5 IS NOT NULL, projection=[__sail_file_path@0, __sail_file_row_index@1, __sail_iceberg_partition_spec_id@2, __sail_iceberg_partition@3]
                  ProjectionExec: expr=[__sail_file_path@2 as __sail_file_path, __sail_file_row_index@3 as __sail_file_row_index, __sail_iceberg_partition_spec_id@4 as __sail_iceberg_partition_spec_id, __sail_iceberg_partition@5 as __sail_iceberg_partition, __sail_merge_target_row_present@7 as __sail_merge_target_row_present, __sail_merge_source_row_present@10 as __sail_merge_source_row_present]
                    MergeCardinalityCheckExec: row_id=__sail_merge_target_row_id, target_present=__sail_merge_target_row_present, source_present=__sail_merge_source_row_present
                      RepartitionExec: partitioning=Hash([__sail_merge_target_row_id@6], 4), input_partitions=4
                        HashJoinExec: mode=CollectLeft, join_type=Full, on=[(__sail_src_id@0, id@0)], projection=[id@3, value@4, __sail_file_path@5, __sail_file_row_index@6, __sail_iceberg_partition_spec_id@7, __sail_iceberg_partition@8, __sail_merge_target_row_id@9, __sail_merge_target_row_present@10, __sail_src_id@0, __sail_src_value@1, __sail_merge_source_row_present@2]
                          ProjectionExec: expr=[column1@0 as __sail_src_id, column2@1 as __sail_src_value, true as __sail_merge_source_row_present]
                            DataSourceExec: partitions=1, partition_sizes=[1]
                          RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=3
                            ProjectionExec: expr=[id@0 as id, value@1 as value, __sail_file_path@2 as __sail_file_path, __sail_file_row_index@3 as __sail_file_row_index, __sail_iceberg_partition_spec_id@4 as __sail_iceberg_partition_spec_id, __sail_iceberg_partition@5 as __sail_iceberg_partition, __sail_merge_target_row_id@6 as __sail_merge_target_row_id, true as __sail_merge_target_row_present]
                              MonotonicIdExec: col=__sail_merge_target_row_id
                                ProjectionExec: expr=[id@0 as id, value@1 as value, __sail_file_path@2 as __sail_file_path, __sail_file_row_index@5 as __sail_file_row_index, __sail_iceberg_partition_spec_id@3 as __sail_iceberg_partition_spec_id, __sail_iceberg_partition@4 as __sail_iceberg_partition]
                                  IcebergMergeMetadataExec: data_file_column=__sail_file_path
                                    DataSourceExec: file_groups={3 groups: [[<tmp>/iceberg_merge_many_files_plan/data/part-<uuid>-00000000000000000000.parquet], [<tmp>/iceberg_merge_many_files_plan/data/part-<uuid>-00000000000000000001.parquet], [<tmp>/iceberg_merge_many_files_plan/data/part-<uuid>-00000000000000000002.parquet]]}, projection=[id, value, __sail_file_path, __sail_iceberg_partition_spec_id, __sail_iceberg_partition], file_type=parquet
