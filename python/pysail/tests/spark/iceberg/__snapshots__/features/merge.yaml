      CoalescePartitionsExec
        UnionExec
          IcebergWriterExec(table_path=file://<tmp>/iceberg_merge_plan/)
            CoalescePartitionsExec
              IcebergMergeDataRowsExec
                UnionExec
                  ProjectionExec: expr=[CASE WHEN __common_expr_1@0 THEN __sail_src_id@9 ELSE id@5 END as id, CASE WHEN __common_expr_2@1 THEN __sail_src_value@10 WHEN (__common_expr_3@2 AND __sail_merge_source_row_present@12 IS NULL AND flag@7 = expire) IS NOT DISTINCT FROM true THEN expired WHEN __common_expr_1@0 THEN __sail_src_value@10 ELSE value@6 END as value, CASE WHEN __common_expr_1@0 THEN __sail_src_flag@11 ELSE flag@7 END as flag, __sail_file_path@8 as __sail_file_path, CASE WHEN __common_expr_4@3 THEN 3 WHEN __common_expr_2@1 THEN 6 WHEN (__common_expr_5@4 AND flag@7 = delete) IS NOT DISTINCT FROM true AND NOT __common_expr_2@1 THEN 5 WHEN (__common_expr_3@2 AND __sail_merge_source_row_present@12 IS NULL AND flag@7 = expire) IS NOT DISTINCT FROM true THEN 8 WHEN (__common_expr_3@2 AND __sail_merge_source_row_present@12 IS NULL AND flag@7 = purge) IS NOT DISTINCT FROM true AND NOT (__common_expr_3@2 AND __sail_merge_source_row_present@12 IS NULL AND flag@7 = expire) IS NOT DISTINCT FROM true THEN 7 ELSE 0 END as __sail_operation_type, NULL as __sail_merge_source_metric]
                    ProjectionExec: expr=[(__common_expr_6@0 AND __sail_merge_source_row_present@10 IS NOT NULL) IS NOT DISTINCT FROM true as __common_expr_1, (__common_expr_7@1 AND flag@5 = update) IS NOT DISTINCT FROM true as __common_expr_2, __common_expr_8@2 as __common_expr_3, __common_expr_6@0 as __common_expr_4, __common_expr_7@1 as __common_expr_5, id@3 as id, value@4 as value, flag@5 as flag, __sail_file_path@6 as __sail_file_path, __sail_src_id@7 as __sail_src_id, __sail_src_value@8 as __sail_src_value, __sail_src_flag@9 as __sail_src_flag, __sail_merge_source_row_present@10 as __sail_merge_source_row_present]
                      ProjectionExec: expr=[__sail_merge_target_row_present@5 IS NULL as __common_expr_6, __common_expr_9@0 AND __sail_merge_source_row_present@9 IS NOT NULL as __common_expr_7, __common_expr_9@0 as __common_expr_8, id@1 as id, value@2 as value, flag@3 as flag, __sail_file_path@4 as __sail_file_path, __sail_src_id@6 as __sail_src_id, __sail_src_value@7 as __sail_src_value, __sail_src_flag@8 as __sail_src_flag, __sail_merge_source_row_present@9 as __sail_merge_source_row_present]
                        ProjectionExec: expr=[__sail_merge_target_row_present@4 IS NOT NULL as __common_expr_9, id@0 as id, value@1 as value, flag@2 as flag, __sail_file_path@3 as __sail_file_path, __sail_merge_target_row_present@4 as __sail_merge_target_row_present, __sail_src_id@5 as __sail_src_id, __sail_src_value@6 as __sail_src_value, __sail_src_flag@7 as __sail_src_flag, __sail_merge_source_row_present@8 as __sail_merge_source_row_present]
                          FilterExec: __sail_merge_target_row_present@4 IS NOT NULL OR __sail_merge_target_row_present@4 IS NULL AND __sail_merge_source_row_present@8 IS NOT NULL
                            ProjectionExec: expr=[id@0 as id, value@1 as value, flag@2 as flag, __sail_file_path@3 as __sail_file_path, __sail_merge_target_row_present@8 as __sail_merge_target_row_present, __sail_src_id@9 as __sail_src_id, __sail_src_value@10 as __sail_src_value, __sail_src_flag@11 as __sail_src_flag, __sail_merge_source_row_present@12 as __sail_merge_source_row_present]
                              MergeCardinalityCheckExec: row_id=__sail_merge_target_row_id, target_present=__sail_merge_target_row_present, source_present=__sail_merge_source_row_present
                                RepartitionExec: partitioning=Hash([__sail_merge_target_row_id@7], 4), input_partitions=4
                                  HashJoinExec: mode=CollectLeft, join_type=Full, on=[(__sail_src_id@0, id@0)], projection=[id@4, value@5, flag@6, __sail_file_path@7, __sail_file_row_index@8, __sail_iceberg_partition_spec_id@9, __sail_iceberg_partition@10, __sail_merge_target_row_id@11, __sail_merge_target_row_present@12, __sail_src_id@0, __sail_src_value@1, __sail_src_flag@2, __sail_merge_source_row_present@3]
                                    ProjectionExec: expr=[column1@0 as __sail_src_id, column2@1 as __sail_src_value, column3@2 as __sail_src_flag, true as __sail_merge_source_row_present]
                                      DataSourceExec: partitions=1, partition_sizes=[1]
                                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                                      ProjectionExec: expr=[id@0 as id, value@1 as value, flag@2 as flag, __sail_file_path@3 as __sail_file_path, __sail_file_row_index@4 as __sail_file_row_index, __sail_iceberg_partition_spec_id@5 as __sail_iceberg_partition_spec_id, __sail_iceberg_partition@6 as __sail_iceberg_partition, __sail_merge_target_row_id@7 as __sail_merge_target_row_id, true as __sail_merge_target_row_present]
                                        MonotonicIdExec: col=__sail_merge_target_row_id
                                          ProjectionExec: expr=[id@0 as id, value@1 as value, flag@2 as flag, __sail_file_path@3 as __sail_file_path, __sail_file_row_index@6 as __sail_file_row_index, __sail_iceberg_partition_spec_id@4 as __sail_iceberg_partition_spec_id, __sail_iceberg_partition@5 as __sail_iceberg_partition]
                                            IcebergMergeMetadataExec: data_file_column=__sail_file_path
                                              DataSourceExec: file_groups={1 group: [[<tmp>/iceberg_merge_plan/data/part-<uuid>-00000000000000000000.parquet]]}, projection=[id, value, flag, __sail_file_path, __sail_iceberg_partition_spec_id, __sail_iceberg_partition], file_type=parquet
                  ProjectionExec: expr=[NULL as id, NULL as value, NULL as flag, NULL as __sail_file_path, 9 as __sail_operation_type, 3 as __sail_merge_source_metric]
