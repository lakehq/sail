name: "test_explain_select_coalescenullifsome_date_some_date_null_shows_no_relaxedtzcastexec"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#3@0 as coalesce(nullif(some_date, some_date), NULL)]
      DataSourceExec: file_groups={1 group: [[<tmp>/repro_b/part-<id>.snappy.parquet]]}, projection=[CASE WHEN nullif(some_date@2, some_date@2) IS NOT NULL THEN nullif(some_date@2, some_date@2) END as #3], file_type=parquet
