name: "test_explain_shows_plan_for_snapshotted_data_cte_reading_from_snapshot_table"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#15@0 as id, #16@1 as name, #17@2 as some_date, #18@3 as dbt_scd_id, #19@4 as dbt_updated_at, #20@5 as dbt_valid_from, #21@6 as dbt_valid_to, #22@7 as dbt_unique_key]
      ProjectionExec: expr=[id@0 as #15, name@1 as #16, some_date@2 as #17, dbt_scd_id@3 as #18, dbt_updated_at@4 as #19, dbt_valid_from@5 as #20, dbt_valid_to@6 as #21, id@0 as #22]
        FilterExec: dbt_valid_to@6 IS NULL
          RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
            DataSourceExec: file_groups={1 group: [[<tmp>/repro_snap_d/part-<id>.snappy.parquet]]}, projection=[id, name, some_date, dbt_scd_id, dbt_updated_at, dbt_valid_from, dbt_valid_to], file_type=parquet, predicate=dbt_valid_to@6 IS NULL AND dbt_valid_to@6 IS NULL, pruning_predicate=dbt_valid_to_null_count@0 > 0 AND dbt_valid_to_null_count@0 > 0, required_guarantees=[]
