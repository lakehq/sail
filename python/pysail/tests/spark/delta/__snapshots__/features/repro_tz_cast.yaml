name: "test_explain_shows_plan_for_dbt_scd_snapshot_select_with_md5_hash_and_nullif_pattern"
data:
  |-
    == Physical Plan ==
    ProjectionExec: expr=[#6@0 as id, #7@1 as name, #8@2 as some_date, #9@3 as dbt_scd_id, #10@4 as dbt_updated_at, #11@5 as dbt_valid_from, #12@6 as dbt_valid_to]
      DataSourceExec: file_groups={1 group: [[<tmp>/repro_base_c/part-<id>.snappy.parquet]]}, projection=[id@0 as #6, name@1 as #7, some_date@2 as #8, md5(spark_concat(spark_concat(CASE WHEN CAST(id@0 AS Utf8) IS NOT NULL THEN CAST(id@0 AS Utf8) ELSE  END, |), CASE WHEN spark_to_utf8(some_date@2) IS NOT NULL THEN spark_to_utf8(some_date@2) ELSE  END)) as #9, some_date@2 as #10, some_date@2 as #11, CASE WHEN nullif(some_date@2, some_date@2) IS NOT NULL THEN nullif(some_date@2, some_date@2) END as #12], file_type=parquet
