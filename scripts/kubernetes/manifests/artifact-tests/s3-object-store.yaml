apiVersion: v1
kind: Namespace
metadata:
  name: ${SAIL_K8S_NAMESPACE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: ${SAIL_K8S_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: ${SAIL_K8S_MINIO_IMAGE}
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: "${SAIL_K8S_MINIO_USER}"
            - name: MINIO_ROOT_PASSWORD
              value: "${SAIL_K8S_MINIO_PASSWORD}"
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: ${SAIL_K8S_NAMESPACE}
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sail-spark-server
  namespace: ${SAIL_K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: sail
    app.kubernetes.io/component: spark-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sail
      app.kubernetes.io/component: spark-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sail
        app.kubernetes.io/component: spark-server
    spec:
      serviceAccountName: sail-user
      volumes:
        # This hostPath is test-only and survives server Pod recreation on the kind node.
        # Production deployments must use a PVC that also survives node replacement.
        - name: cleanup-journal
          hostPath:
            path: ${SAIL_K8S_HOST_PATH}
            type: DirectoryOrCreate
      containers:
        - name: server
          image: ${SAIL_K8S_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["sail"]
          args: ["spark", "server", "--ip", "0.0.0.0", "--port", "50051"]
          ports:
            - containerPort: 50051
          volumeMounts:
            - name: cleanup-journal
              mountPath: /tmp/sail
          env:
            - name: RUST_LOG
              value: info
            - name: SAIL_MODE
              value: "kubernetes-cluster"
            - name: SAIL_CLUSTER__DRIVER_LISTEN_HOST
              value: "0.0.0.0"
            - name: SAIL_CLUSTER__DRIVER_EXTERNAL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SAIL_KUBERNETES__IMAGE
              value: "${SAIL_K8S_IMAGE}"
            - name: SAIL_KUBERNETES__IMAGE_PULL_POLICY
              value: "IfNotPresent"
            - name: SAIL_KUBERNETES__NAMESPACE
              value: "${SAIL_K8S_NAMESPACE}"
            - name: SAIL_KUBERNETES__DRIVER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SAIL_KUBERNETES__WORKER_SERVICE_ACCOUNT_NAME
              value: sail-user
            - name: SAIL_KUBERNETES__WORKER_POD_TEMPLATE
              value: >-
                {"metadata":{"labels":{"custom-label":"sail-artifact-s3-worker","app.kubernetes.io/component":"worker"}},"spec":{"containers":[{"name":"worker","env":[{"name":"SAIL_K8S_WORKER_POD_NAME","valueFrom":{"fieldRef":{"fieldPath":"metadata.name"}}},{"name":"AWS_ACCESS_KEY_ID","value":"${SAIL_K8S_MINIO_USER}"},{"name":"AWS_SECRET_ACCESS_KEY","value":"${SAIL_K8S_MINIO_PASSWORD}"},{"name":"AWS_REGION","value":"us-east-1"},{"name":"AWS_ENDPOINT","value":"http://minio:9000"},{"name":"AWS_VIRTUAL_HOSTED_STYLE_REQUEST","value":"false"},{"name":"AWS_ALLOW_HTTP","value":"true"}]}]}}
            - name: SAIL_SPARK__ARTIFACT_ROOT
              value: "/tmp/sail-driver-artifacts"
            - name: SAIL_SPARK__ARTIFACT_INLINE_MAX_BYTES
              value: "0"
            - name: SAIL_SPARK__ARTIFACT_STORE_URI
              value: "s3://${SAIL_K8S_MINIO_BUCKET}/artifacts"
            - name: SAIL_SPARK__ARTIFACT_CLEANUP_JOURNAL_ROOT
              value: "/tmp/sail/artifact-cleanup-journal"
            - name: AWS_ACCESS_KEY_ID
              value: "${SAIL_K8S_MINIO_USER}"
            - name: AWS_SECRET_ACCESS_KEY
              value: "${SAIL_K8S_MINIO_PASSWORD}"
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_ENDPOINT
              value: "http://minio:9000"
            - name: AWS_VIRTUAL_HOSTED_STYLE_REQUEST
              value: "false"
            - name: AWS_ALLOW_HTTP
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: sail-spark-server
  namespace: ${SAIL_K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: sail
    app.kubernetes.io/component: spark-server
spec:
  selector:
    app.kubernetes.io/name: sail
    app.kubernetes.io/component: spark-server
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sail-spark-server
  namespace: ${SAIL_K8S_NAMESPACE}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["*"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sail-user
  namespace: ${SAIL_K8S_NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sail-spark-server
  namespace: ${SAIL_K8S_NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: sail-user
    namespace: ${SAIL_K8S_NAMESPACE}
roleRef:
  kind: Role
  name: sail-spark-server
  apiGroup: rbac.authorization.k8s.io
