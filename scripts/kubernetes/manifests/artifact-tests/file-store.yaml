apiVersion: v1
kind: Namespace
metadata:
  name: ${SAIL_K8S_NAMESPACE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sail-spark-server
  namespace: ${SAIL_K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: sail
    app.kubernetes.io/component: spark-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sail
      app.kubernetes.io/component: spark-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sail
        app.kubernetes.io/component: spark-server
    spec:
      serviceAccountName: sail-user
      volumes:
        # This hostPath is test-only and survives server Pod recreation on the kind node.
        # Production deployments must use a PVC that also survives node replacement.
        - name: data
          hostPath:
            path: ${SAIL_K8S_HOST_PATH}
            type: DirectoryOrCreate
        - name: pytest-data
          hostPath:
            path: ${SAIL_K8S_PYTEST_HOST_PATH}
            type: DirectoryOrCreate
      containers:
        - name: server
          image: ${SAIL_K8S_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["sail"]
          args: ["spark", "server", "--ip", "0.0.0.0", "--port", "50051"]
          ports:
            - containerPort: 50051
          volumeMounts:
            - name: data
              mountPath: /tmp/sail
            - name: pytest-data
              mountPath: /private/tmp/sail
          env:
            - name: RUST_LOG
              value: info
            - name: SAIL_MODE
              value: "kubernetes-cluster"
            - name: SAIL_CLUSTER__DRIVER_LISTEN_HOST
              value: "0.0.0.0"
            - name: SAIL_CLUSTER__DRIVER_EXTERNAL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SAIL_SPARK__ARTIFACT_ROOT
              value: /tmp/sail/artifact-root
            - name: SAIL_SPARK__ARTIFACT_INLINE_MAX_BYTES
              value: "32"
            # Bound worker shutdown and artifact cleanup within the test deadline.
            - name: SAIL_SPARK__ARTIFACT_TRANSFER_TIMEOUT_SECS
              value: "10"
            - name: SAIL_SPARK__ARTIFACT_STORE_URI
              value: file:///tmp/sail/artifact-store
            - name: SAIL_SPARK__ARTIFACT_CLEANUP_JOURNAL_ROOT
              value: /tmp/sail/artifact-cleanup-journal
            - name: SAIL_KUBERNETES__IMAGE
              value: ${SAIL_K8S_IMAGE}
            - name: SAIL_KUBERNETES__IMAGE_PULL_POLICY
              value: IfNotPresent
            - name: SAIL_KUBERNETES__NAMESPACE
              value: ${SAIL_K8S_NAMESPACE}
            - name: SAIL_KUBERNETES__DRIVER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SAIL_KUBERNETES__WORKER_SERVICE_ACCOUNT_NAME
              value: sail-user
            - name: SAIL_KUBERNETES__WORKER_POD_TEMPLATE
              value: |
                {
                  "metadata": {
                    "labels": {
                      "custom-label": "sail-worker",
                      "environment": "artifacts-test",
                      "component": "spark-worker"
                    }
                  },
                  "spec": {
                    "volumes": [
                      {
                        "name": "data",
                        "hostPath": {
                          "path": "${SAIL_K8S_HOST_PATH}",
                          "type": "DirectoryOrCreate"
                        }
                      },
                      {
                        "name": "pytest-data",
                        "hostPath": {
                          "path": "${SAIL_K8S_PYTEST_HOST_PATH}",
                          "type": "DirectoryOrCreate"
                        }
                      }
                    ],
                    "containers": [
                      {
                        "name": "worker",
                        "env": [
                          {
                            "name": "SAIL_K8S_WORKER_POD_NAME",
                            "valueFrom": {
                              "fieldRef": {
                                "fieldPath": "metadata.name"
                              }
                            }
                          }
                        ],
                        "volumeMounts": [
                          {
                            "name": "data",
                            "mountPath": "/tmp/sail"
                          },
                          {
                            "name": "pytest-data",
                            "mountPath": "/private/tmp/sail"
                          }
                        ]
                      }
                    ]
                  }
                }
---
apiVersion: v1
kind: Service
metadata:
  name: sail-spark-server
  namespace: ${SAIL_K8S_NAMESPACE}
  labels:
    app.kubernetes.io/name: sail
    app.kubernetes.io/component: spark-server
spec:
  selector:
    app.kubernetes.io/name: sail
    app.kubernetes.io/component: spark-server
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sail-spark-server
  namespace: ${SAIL_K8S_NAMESPACE}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["*"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sail-user
  namespace: ${SAIL_K8S_NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sail-spark-server
  namespace: ${SAIL_K8S_NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: sail-user
    namespace: ${SAIL_K8S_NAMESPACE}
roleRef:
  kind: Role
  name: sail-spark-server
  apiGroup: rbac.authorization.k8s.io
