  signatures:
    - "cardinality(expr)"
  description: "Returns the size of an array or a map. This function returns -1 for null input only if spark.sql.ansi.enabled is false and spark.sql.legacy.sizeOfNull is true. Otherwise, it returns null for null input. With the default settings, the function returns null for null input."
  examples: |
    > SELECT cardinality(array('b', 'd', 'c', 'a'));
     4
    > SELECT cardinality(map('a', 1, 'b', 2));
     2
  since: "2.4.0"
- name: case
  signatures:
    - "CASE expr1 WHEN expr2 THEN expr3 [WHEN expr4 THEN expr5]* [ELSE expr6] END"
  description: "When expr1 = expr2, returns expr3; when expr1 = expr4, return expr5; else return expr6."
  examples: |
    > SELECT CASE col1 WHEN 1 THEN 'one' WHEN 2 THEN 'two' ELSE '?' END FROM VALUES 1, 2, 3;
     one
     two
     ?
    > SELECT CASE col1 WHEN 1 THEN 'one' WHEN 2 THEN 'two' END FROM VALUES 1, 2, 3;
     one
     two
     NULL
  since: "1.0.1"
- name: cast
  class_name: "org.apache.spark.sql.catalyst.expressions.Cast"
