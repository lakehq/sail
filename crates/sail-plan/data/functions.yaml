  since: "2.3.0"
- name: character_length
  class_name: "org.apache.spark.sql.catalyst.expressions.Length"
  signatures:
    - "character_length(expr)"
  description: "Returns the character length of string data or number of bytes of binary data. The length of string data includes the trailing spaces. The length of binary data includes binary zeros."
  examples: |
    > SELECT character_length('Spark SQL ');
     10
    > SELECT character_length(x'537061726b2053514c');
     9
    > SELECT CHAR_LENGTH('Spark SQL ');
     10
    > SELECT CHARACTER_LENGTH('Spark SQL ');
     10
  since: "2.3.0"
- name: chr
  class_name: "org.apache.spark.sql.catalyst.expressions.Chr"
  signatures:
    - "chr(expr)"
  description: "Returns the ASCII character having the binary equivalent to expr. If n is larger than 256 the result is equivalent to chr(n % 256)"
  examples: |
    > SELECT chr(65);
     A
  since: "2.3.0"
- name: coalesce
  class_name: "org.apache.spark.sql.catalyst.expressions.Coalesce"
