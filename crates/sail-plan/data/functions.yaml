  signatures:
    - "bit_xor(expr)"
  description: "Returns the bitwise XOR of all non-null input values, or null if none."
  examples: |
    > SELECT bit_xor(col) FROM VALUES (3), (5) AS tab(col);
     6
  since: "3.0.0"
- name: bitmap_and_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.BitmapAndAgg"
  signatures:
    - "bitmap_and_agg(child)"
  description: "Returns a bitmap that is the bitwise AND of all of the bitmaps from the child expression. The input should be bitmaps created from bitmap_construct_agg()."
  examples: |
    > SELECT substring(hex(bitmap_and_agg(col)), 0, 6) FROM VALUES (X 'F0'), (X '70'), (X '30') AS tab(col);
     300000
    > SELECT substring(hex(bitmap_and_agg(col)), 0, 6) FROM VALUES (X 'FF'), (X 'FF'), (X 'FF') AS tab(col);
     FF0000
  since: "4.1.0"
- name: bitmap_bit_position
  class_name: "org.apache.spark.sql.catalyst.expressions.BitmapBitPosition"
  signatures:
    - "bitmap_bit_position(child)"
  description: "Returns the bit position for the given input child expression."
  examples: |
    > SELECT bitmap_bit_position(1);
     0
    > SELECT bitmap_bit_position(123);
     122
  since: "3.5.0"
- name: bitmap_bucket_number
  class_name: "org.apache.spark.sql.catalyst.expressions.BitmapBucketNumber"
  signatures:
    - "bitmap_bucket_number(child)"
  description: "Returns the bucket number for the given input child expression."
  examples: |
    > SELECT bitmap_bucket_number(123);
     1
    > SELECT bitmap_bucket_number(0);
     0
  since: "3.5.0"
- name: bitmap_construct_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.BitmapConstructAgg"
  signatures:
    - "bitmap_construct_agg(child)"
  description: "Returns a bitmap with the positions of the bits set from all the values from the child expression. The child expression will most likely be bitmap_bit_position()."
  examples: |
    > SELECT substring(hex(bitmap_construct_agg(bitmap_bit_position(col))), 0, 6) FROM VALUES (1), (2), (3) AS tab(col);
     070000
    > SELECT substring(hex(bitmap_construct_agg(bitmap_bit_position(col))), 0, 6) FROM VALUES (1), (1), (1) AS tab(col);
     010000
  since: "3.5.0"
- name: bitmap_count
  class_name: "org.apache.spark.sql.catalyst.expressions.BitmapCount"
  signatures:
    - "bitmap_count(child)"
  description: "Returns the number of set bits in the child bitmap."
  examples: |
    > SELECT bitmap_count(X '1010');
     2
    > SELECT bitmap_count(X 'FFFF');
     16
    > SELECT bitmap_count(X '0');
     0
  since: "3.5.0"
- name: bitmap_or_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.BitmapOrAgg"
  signatures:
    - "bitmap_or_agg(child)"
  description: "Returns a bitmap that is the bitwise OR of all of the bitmaps from the child expression. The input should be bitmaps created from bitmap_construct_agg()."
  examples: |
    > SELECT substring(hex(bitmap_or_agg(col)), 0, 6) FROM VALUES (X '10'), (X '20'), (X '40') AS tab(col);
     700000
    > SELECT substring(hex(bitmap_or_agg(col)), 0, 6) FROM VALUES (X '10'), (X '10'), (X '10') AS tab(col);
     100000
  since: "3.5.0"
