  signatures:
    - "element_at(array, index)"
  description: "Returns element of array at given (1-based) index. If Index is 0, Spark will throw an error. If index < 0, accesses elements from the last to the first. The function returns NULL if the index exceeds the length of the array and spark.sql.ansi.enabled is set to false. If spark.sql.ansi.enabled is set to true, it throws ArrayIndexOutOfBoundsException for invalid indices."
- name: elt
  signatures:
    - "elt(n, input1, input2, ...)"
  description: "Returns the n-th input, e.g., returns input2 when n is 2. The function returns NULL if the index exceeds the length of the array and spark.sql.ansi.enabled is set to false. If spark.sql.ansi.enabled is set to true, it throws ArrayIndexOutOfBoundsException for invalid indices."
- name: encode
  signatures:
    - "encode(str, charset)"
  description: "Encodes the first argument using the second argument character set. If either argument is null, the result will also be null."
- name: endswith
  signatures:
    - "endswith(left, right)"
  description: "Returns a boolean. The value is True if left ends with right. Returns NULL if either input expression is NULL. Otherwise, returns False. Both left or right must be of STRING or BINARY type."
- name: equal_null
  signatures:
    - "equal_null(expr1, expr2)"
  description: "Returns same result as the EQUAL(=) operator for non-null operands, but returns true if both are null, false if one of the them is null."
- name: every
  signatures:
    - "every(expr)"
  description: "Returns true if all values of expr are true."
- name: exists
  signatures:
    - "exists(expr, pred)"
  description: "Tests whether a predicate holds for one or more elements in the array."
- name: exp
  signatures:
    - "exp(expr)"
  description: "Returns e to the power of expr."
- name: explode
  signatures:
    - "explode(expr)"
  description: "Separates the elements of array expr into multiple rows, or the elements of map expr into multiple rows and columns. Unless specified otherwise, uses the default column name col for elements of the array or key and value for the elements of the map."
- name: explode_outer
  signatures:
    - "explode_outer(expr)"
  description: "Separates the elements of array expr into multiple rows, or the elements of map expr into multiple rows and columns. Unless specified otherwise, uses the default column name col for elements of the array or key and value for the elements of the map."
- name: expm1
  signatures:
    - "expm1(expr)"
  description: "Returns exp(expr) - 1."
- name: extract
  signatures:
    - "extract(field FROM source)"
  description: "Extracts a part of the date or timestamp or time or interval source."
- name: factorial
  signatures:
    - "factorial(expr)"
  description: "Returns the factorial of expr. expr is [0..20]. Otherwise, null."
- name: filter
  signatures:
    - "filter(expr, func)"
  description: "Filters the input array using the given predicate."
- name: find_in_set
  signatures:
    - "find_in_set(str, str_array)"
  description: "Returns the index (1-based) of the given string (str) in the comma-delimited list (str_array). Returns 0, if the string was not found or if the given string (str) contains a comma."
- name: first
  signatures:
    - "first(expr[, isIgnoreNull])"
  description: "Returns the first value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values."
- name: first_value
  signatures:
    - "first_value(expr[, isIgnoreNull])"
  description: "Returns the first value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values."
- name: flatten
  signatures:
    - "flatten(arrayOfArrays)"
  description: "Transforms an array of arrays into a single array."
- name: float
  signatures:
    - "float(expr)"
  description: "Casts the value expr to the target data type float."
- name: floor
  signatures:
    - "floor(expr[, scale])"
  description: "Returns the largest number after rounding down that is not greater than expr. An optional scale parameter can be specified to control the rounding behavior."
- name: forall
  signatures:
    - "forall(expr, pred)"
  description: "Tests whether a predicate holds for all elements in the array."
- name: format_number
  signatures:
    - "format_number(expr1, expr2)"
  description: "Formats the number expr1 like '#,###,###.##', rounded to expr2 decimal places. If expr2 is 0, the result has no decimal point or fractional part. expr2 also accept a user specified format. This is supposed to function like MySQL's FORMAT."
- name: format_string
  signatures:
    - "format_string(strfmt, obj, ...)"
  description: "Returns a formatted string from printf-style format strings."
- name: from_avro
  signatures:
    - "from_avro(child, jsonFormatSchema, options)"
  description: "Converts a binary Avro value into a Catalyst value."
- name: from_csv
  signatures:
    - "from_csv(csvStr, schema[, options])"
  description: "Returns a struct value with the given csvStr and schema."
- name: from_json
  signatures:
    - "from_json(jsonStr, schema[, options])"
  description: "Returns a struct value with the given jsonStr and schema."
- name: from_protobuf
  signatures:
    - "from_protobuf(data, messageName, descFilePath, options)"
  description: "Converts a binary Protobuf value into a Catalyst value."
- name: from_unixtime
  signatures:
    - "from_unixtime(unix_time[, fmt])"
  description: "Returns unix_time in the specified fmt."
- name: from_utc_timestamp
  signatures:
    - "from_utc_timestamp(timestamp, timezone)"
  description: "Given a timestamp like '2017-07-14 02:40:00.0', interprets it as a time in UTC, and renders that time as a timestamp in the given time zone. For example, 'GMT+1' would yield '2017-07-14 03:40:00.0'."
- name: from_xml
  signatures:
    - "from_xml(xmlStr, schema[, options])"
  description: "Returns a struct value with the given xmlStr and schema."
- name: get
  signatures:
    - "get(array, index)"
  description: "Returns element of array at given (0-based) index. If the index points outside of the array boundaries, then this function returns NULL."
- name: get_json_object
  signatures:
    - "get_json_object(json_txt, path)"
  description: "Extracts a json object from path."
- name: getbit
  signatures:
    - "getbit(expr, pos)"
  description: "Returns the value of the bit (0 or 1) at the specified position. The positions are numbered from right to left, starting at zero. The position argument cannot be negative."
- name: greatest
  signatures:
    - "greatest(expr, ...)"
  description: "Returns the greatest value of all parameters, skipping null values."
- name: grouping
  signatures:
    - "grouping(col)"
  description: "indicates whether a specified column in a GROUP BY is aggregated or not, returns 1 for aggregated or 0 for not aggregated in the result set.\","
- name: grouping_id
  signatures:
    - "grouping_id([col1[, col2 ..]])"
  description: "returns the level of grouping, equals to (grouping(c1) << (n-1)) + (grouping(c2) << (n-2)) + ... + grouping(cn)"
- name: hash
  signatures:
    - "hash(expr1, expr2, ...)"
  description: "Returns a hash value of the arguments."
- name: hex
  signatures:
    - "hex(expr)"
  description: "Converts expr to hexadecimal."
- name: histogram_numeric
  signatures:
    - "histogram_numeric(expr, nb)"
  description: "Computes a histogram on numeric 'expr' using nb bins. The return value is an array of (x,y) pairs representing the centers of the histogram's bins. As the value of 'nb' is increased, the histogram approximation gets finer-grained, but may yield artifacts around outliers. In practice, 20-40 histogram bins appear to work well, with more bins being required for skewed or smaller datasets. Note that this function creates a histogram with non-uniform bin widths. It offers no guarantees in terms of the mean-squared-error of the histogram, but in practice is comparable to the histograms produced by the R/S-Plus statistical computing packages. Note: the output type of the 'x' field in the return value is propagated from the input value consumed in the aggregate function."
- name: hll_sketch_agg
  signatures:
    - "hll_sketch_agg(expr, lgConfigK)"
  description: "Returns the HllSketch's updatable binary representation. lgConfigK (optional) the log-base-2 of K, with K is the number of buckets or slots for the HllSketch."
- name: hll_sketch_estimate
  signatures:
    - "hll_sketch_estimate(expr)"
  description: "Returns the estimated number of unique values given the binary representation of a Datasketches HllSketch."
- name: hll_union
  signatures:
    - "hll_union(first, second, allowDifferentLgConfigK)"
  description: "Merges two binary representations of Datasketches HllSketch objects, using a Datasketches Union object. Set allowDifferentLgConfigK to true to allow unions of sketches with different lgConfigK values (defaults to false)."
- name: hll_union_agg
  signatures:
    - "hll_union_agg(expr, allowDifferentLgConfigK)"
  description: "Returns the estimated number of unique values. allowDifferentLgConfigK (optional) Allow sketches with different lgConfigK values to be unioned (defaults to false)."
- name: hour
  signatures:
    - "hour(expr)"
  description: "Returns the hour component of the given expression."
- name: hypot
  signatures:
    - "hypot(expr1, expr2)"
  description: "Returns sqrt(expr1² + expr2²)."
- name: if
  signatures:
    - "if(expr1, expr2, expr3)"
  description: "If expr1 evaluates to true, then returns expr2; otherwise returns expr3."
- name: ifnull
  signatures:
    - "ifnull(expr1, expr2)"
  description: "Returns expr2 if expr1 is null, or expr1 otherwise."
- name: ilike
  signatures:
    - "str ilike pattern[ ESCAPE escape]"
  description: "Returns true if str matches pattern with escape case-insensitively, null if any arguments are null, false otherwise."
- name: in
  signatures:
    - "expr1 in(expr2, expr3, ...)"
  description: "Returns true if expr equals to any valN."
- name: initcap
  signatures:
    - "initcap(str)"
  description: "Returns str with the first letter of each word in uppercase. All other letters are in lowercase. Words are delimited by white space."
- name: inline
  signatures:
    - "inline(expr)"
  description: "Explodes an array of structs into a table. Uses column names col1, col2, etc. by default unless specified otherwise."
- name: inline_outer
  signatures:
    - "inline_outer(expr)"
  description: "Explodes an array of structs into a table. Uses column names col1, col2, etc. by default unless specified otherwise."
- name: input_file_block_length
  signatures:
    - "input_file_block_length()"
  description: "Returns the length of the block being read, or -1 if not available."
- name: input_file_block_start
  signatures:
    - "input_file_block_start()"
  description: "Returns the start offset of the block being read, or -1 if not available."
- name: input_file_name
  signatures:
    - "input_file_name()"
  description: "Returns the name of the file being read, or empty string if not available."
- name: instr
  signatures:
    - "instr(str, substr)"
  description: "Returns the (1-based) index of the first occurrence of substr in str."
- name: int
  signatures:
    - "int(expr)"
  description: "Casts the value expr to the target data type int."
- name: is_valid_utf8
  signatures:
    - "is_valid_utf8(str)"
  description: "Returns true if str is a valid UTF-8 string, otherwise returns false."
- name: is_variant_null
  signatures:
    - "is_variant_null(expr)"
  description: "Check if a variant value is a variant null. Returns true if and only if the input is a variant null and false otherwise (including in the case of SQL NULL)."
- name: isnan
  signatures:
    - "isnan(expr)"
  description: "Returns true if expr is NaN, or false otherwise."
- name: isnotnull
  signatures:
    - "isnotnull(expr)"
  description: "Returns true if expr is not null, or false otherwise."
- name: isnull
  signatures:
    - "isnull(expr)"
  description: "Returns true if expr is null, or false otherwise."
- name: java_method
  signatures:
    - "java_method(class, method[, arg1[, arg2 ..]])"
  description: "Calls a method with reflection."
- name: json_array_length
  signatures:
    - "json_array_length(jsonArray)"
  description: "Returns the number of elements in the outermost JSON array."
- name: json_object_keys
  signatures:
    - "json_object_keys(json_object)"
  description: "Returns all the keys of the outermost JSON object as an array."
- name: json_tuple
  signatures:
    - "json_tuple(jsonStr, p1, p2, ..., pn)"
  description: "Returns a tuple like the function get_json_object, but it takes multiple names. All the input parameters and output column types are string."
- name: kurtosis
  signatures:
    - "kurtosis(expr)"
  description: "Returns the kurtosis value calculated from values of a group."
- name: lag
  signatures:
    - "lag(input[, offset[, default]])"
  description: "Returns the value of input at the offsetth row before the current row in the window. The default value of offset is 1 and the default value of default is null. If the value of input at the offsetth row is null, null is returned. If there is no such offset row (e.g., when the offset is 1, the first row of the window does not have any previous row), default is returned."
- name: last
  signatures:
    - "last(expr[, isIgnoreNull])"
  description: "Returns the last value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values"
- name: last_day
  signatures:
    - "last_day(date)"
  description: "Returns the last day of the month which the date belongs to."
- name: last_value
  signatures:
    - "last_value(expr[, isIgnoreNull])"
  description: "Returns the last value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values"
- name: lcase
  signatures:
    - "lcase(str)"
  description: "Returns str with all characters changed to lowercase."
- name: lead
  signatures:
    - "lead(input[, offset[, default]])"
  description: "Returns the value of input at the offsetth row after the current row in the window. The default value of offset is 1 and the default value of default is null. If the value of input at the offsetth row is null, null is returned. If there is no such an offset row (e.g., when the offset is 1, the last row of the window does not have any subsequent row), default is returned."
- name: least
  signatures:
    - "least(expr, ...)"
  description: "Returns the least value of all parameters, skipping null values."
- name: left
  signatures:
    - "left(str, len)"
  description: "Returns the leftmost len(len can be string type) characters from the string str,if len is less or equal than 0 the result is an empty string."
- name: len
  signatures:
    - "len(expr)"
  description: "Returns the character length of string data or number of bytes of binary data. The length of string data includes the trailing spaces. The length of binary data includes binary zeros."
- name: length
  signatures:
    - "length(expr)"
  description: "Returns the character length of string data or number of bytes of binary data. The length of string data includes the trailing spaces. The length of binary data includes binary zeros."
- name: levenshtein
  signatures:
    - "levenshtein(str1, str2[, threshold])"
  description: "Returns the Levenshtein distance between the two given strings. If threshold is set and distance more than it, return -1."
- name: like
  signatures:
    - "str like pattern[ ESCAPE escape]"
  description: "Returns true if str matches pattern with escape, null if any arguments are null, false otherwise."
- name: listagg
  signatures:
    - "listagg(expr[, delimiter])[ WITHIN GROUP (ORDER BY key [ASC | DESC] [,...])]"
  description: "Returns the concatenation of non-NULL input values, separated by the delimiter ordered by key. If all values are NULL, NULL is returned."
- name: ln
  signatures:
    - "ln(expr)"
  description: "Returns the natural logarithm (base e) of expr."
- name: localtimestamp
  signatures:
    - "localtimestamp()"
  description: "Returns the current timestamp without time zone at the start of query evaluation. All calls of localtimestamp within the same query return the same value."
- name: locate
  signatures:
    - "locate(substr, str[, pos])"
  description: "Returns the position of the first occurrence of substr in str after position pos. The given pos and return value are 1-based."
- name: log
  signatures:
    - "log(base, expr)"
  description: "Returns the logarithm of expr with base."
- name: log10
  signatures:
    - "log10(expr)"
  description: "Returns the logarithm of expr with base 10."
- name: log1p
  signatures:
    - "log1p(expr)"
  description: "Returns log(1 + expr)."
- name: log2
  signatures:
    - "log2(expr)"
  description: "Returns the logarithm of expr with base 2."
- name: lower
  signatures:
    - "lower(str)"
  description: "Returns str with all characters changed to lowercase."
- name: lpad
  signatures:
    - "lpad(str, len[, pad])"
  description: "Returns str, left-padded with pad to a length of len. If str is longer than len, the return value is shortened to len characters or bytes. If pad is not specified, str will be padded to the left with space characters if it is a character string, and with zeros if it is a byte sequence."
- name: ltrim
  signatures:
    - "ltrim(str)"
  description: "Removes the leading space characters from str."
- name: luhn_check
  signatures:
    - "luhn_check(str )"
  description: "Checks that a string of digits is valid according to the Luhn algorithm. This checksum function is widely applied on credit card numbers and government identification numbers to distinguish valid numbers from mistyped, incorrect numbers."
- name: make_date
  signatures:
    - "make_date(year, month, day)"
  description: "Create date from year, month and day fields. If the configuration spark.sql.ansi.enabled is false, the function returns NULL on invalid inputs. Otherwise, it will throw an error instead."
- name: make_dt_interval
  signatures:
    - "make_dt_interval([days[, hours[, mins[, secs]]]])"
  description: "Make DayTimeIntervalType duration from days, hours, mins and secs."
- name: make_interval
  signatures:
    - "make_interval([years[, months[, weeks[, days[, hours[, mins[, secs]]]]]]])"
  description: "Make interval from years, months, weeks, days, hours, mins and secs."
- name: make_time
  signatures:
    - "make_time(hour, minute, second)"
  description: "Create time from hour, minute and second fields. For invalid inputs it will throw an error."
- name: make_timestamp
  signatures:
    - "make_timestamp(year, month, day, hour, min, sec[, timezone])"
  description: "Create the current timestamp with local time zone from year, month, day, hour, min, sec and timezone fields. If the configuration spark.sql.ansi.enabled is false, the function returns NULL on invalid inputs. Otherwise, it will throw an error instead."
- name: make_timestamp_ltz
  signatures:
    - "make_timestamp_ltz(year, month, day, hour, min, sec[, timezone])"
  description: "Create the current timestamp with local time zone from year, month, day, hour, min, sec and (optional) timezone fields. If the configuration spark.sql.ansi.enabled is false, the function returns NULL on invalid inputs. Otherwise, it will throw an error instead."
- name: make_timestamp_ntz
  signatures:
    - "make_timestamp_ntz(year, month, day, hour, min, sec)"
  description: "Create local date-time from year, month, day, hour, min, sec fields. If the configuration spark.sql.ansi.enabled is false, the function returns NULL on invalid inputs. Otherwise, it will throw an error instead."
- name: make_valid_utf8
  signatures:
    - "make_valid_utf8(str)"
  description: "Returns the original string if str is a valid UTF-8 string, otherwise returns a new string whose invalid UTF8 byte sequences are replaced using the UNICODE replacement character U+FFFD."
- name: make_ym_interval
  signatures:
    - "make_ym_interval([years[, months]])"
  description: "Make year-month interval from years, months."
- name: map
  signatures:
    - "map(key0, value0, key1, value1, ...)"
  description: "Creates a map with the given key/value pairs."
- name: map_concat
  signatures:
    - "map_concat(map, ...)"
  description: "Returns the union of all the given maps"
- name: map_contains_key
  signatures:
    - "map_contains_key(map, key)"
  description: "Returns true if the map contains the key."
- name: map_entries
  signatures:
    - "map_entries(map)"
  description: "Returns an unordered array of all entries in the given map."
- name: map_filter
  signatures:
    - "map_filter(expr, func)"
  description: "Filters entries in a map using the function."
- name: map_from_arrays
  signatures:
    - "map_from_arrays(keys, values)"
  description: "Creates a map with a pair of the given key/value arrays. All elements in keys should not be null"
- name: map_from_entries
  signatures:
    - "map_from_entries(arrayOfEntries)"
  description: "Returns a map created from the given array of entries."
- name: map_keys
  signatures:
    - "map_keys(map)"
  description: "Returns an unordered array containing the keys of the map."
- name: map_values
  signatures:
    - "map_values(map)"
  description: "Returns an unordered array containing the values of the map."
- name: map_zip_with
  signatures:
    - "map_zip_with(map1, map2, function)"
  description: "Merges two given maps into a single map by applying function to the pair of values with the same key. For keys only presented in one map, NULL will be passed as the value for the missing key. If an input map contains duplicated keys, only the first entry of the duplicated key is passed into the lambda function."
- name: mask
  signatures:
    - "mask(input[, upperChar, lowerChar, digitChar, otherChar])"
  description: "masks the given string value. The function replaces characters with 'X' or 'x', and numbers with 'n'. This can be useful for creating copies of tables with sensitive information removed."
- name: max
  signatures:
    - "max(expr)"
  description: "Returns the maximum value of expr."
- name: max_by
  signatures:
    - "max_by(x, y)"
  description: "Returns the value of x associated with the maximum value of y."
- name: md5
  signatures:
    - "md5(expr)"
  description: "Returns an MD5 128-bit checksum as a hex string of expr."
- name: mean
  signatures:
    - "mean(expr)"
  description: "Returns the mean calculated from values of a group."
- name: median
  signatures:
    - "median(col)"
  description: "Returns the median of numeric or ANSI interval column col."
- name: min
  signatures:
    - "min(expr)"
  description: "Returns the minimum value of expr."
- name: min_by
  signatures:
    - "min_by(x, y)"
  description: "Returns the value of x associated with the minimum value of y."
- name: minute
  signatures:
    - "minute(expr)"
  description: "Returns the minute component of the given expression."
- name: mod
  signatures:
    - "expr1 % expr2, or mod(expr1, expr2)"
  description: "Returns the remainder after expr1/expr2."
- name: mode
  signatures:
    - "mode(col[, deterministic])"
  description: "Returns the most frequent value for the values within col. NULL values are ignored. If all the values are NULL, or there are 0 rows, returns NULL. When multiple values have the same greatest frequency then either any of values is returned if deterministic is false or is not defined, or the lowest value is returned if deterministic is true. mode() WITHIN GROUP (ORDER BY col) - Returns the most frequent value for the values within col (specified in ORDER BY clause). NULL values are ignored. If all the values are NULL, or there are 0 rows, returns NULL. When multiple values have the same greatest frequency only one value will be returned. The value will be chosen based on sort direction. Return the smallest value if sort direction is asc or the largest value if sort direction is desc from multiple values with the same frequency."
- name: monotonically_increasing_id
  signatures:
    - "monotonically_increasing_id()"
  description: "Returns monotonically increasing 64-bit integers. The generated ID is guaranteed to be monotonically increasing and unique, but not consecutive. The current implementation puts the partition ID in the upper 31 bits, and the lower 33 bits represent the record number within each partition. The assumption is that the data frame has less than 1 billion partitions, and each partition has less than 8 billion records. The function is non-deterministic because its result depends on partition IDs."
- name: month
  signatures:
    - "month(date)"
  description: "Returns the month component of the date/timestamp."
- name: monthname
  signatures:
    - "monthname(date)"
  description: "Returns the three-letter abbreviated month name from the given date."
- name: months_between
  signatures:
    - "months_between(timestamp1, timestamp2[, roundOff])"
  description: "If timestamp1 is later than timestamp2, then the result is positive. If timestamp1 and timestamp2 are on the same day of month, or both are the last day of month, time of day will be ignored. Otherwise, the difference is calculated based on 31 days per month, and rounded to 8 digits unless roundOff=false."
- name: named_struct
  signatures:
    - "named_struct(name1, val1, name2, val2, ...)"
  description: "Creates a struct with the given field names and values."
- name: nanvl
  signatures:
    - "nanvl(expr1, expr2)"
  description: "Returns expr1 if it's not NaN, or expr2 otherwise."
- name: negative
  signatures:
    - "negative(expr)"
  description: "Returns the negated value of expr."
- name: next_day
  signatures:
    - "next_day(start_date, day_of_week)"
  description: "Returns the first date which is later than start_date and named as indicated. The function returns NULL if at least one of the input parameters is NULL. When both of the input parameters are not NULL and day_of_week is an invalid input, the function throws SparkIllegalArgumentException if spark.sql.ansi.enabled is set to true, otherwise NULL."
- name: not
  signatures:
    - "not expr"
  description: "Logical not."
- name: now
  signatures:
    - "now()"
  description: "Returns the current timestamp at the start of query evaluation."
- name: nth_value
  signatures:
    - "nth_value(input[, offset])"
  description: "Returns the value of input at the row that is the offsetth row from beginning of the window frame. Offset starts at 1. If ignoreNulls=true, we will skip nulls when finding the offsetth row. Otherwise, every row counts for the offset. If there is no such an offsetth row (e.g., when the offset is 10, size of the window frame is less than 10), null is returned."
- name: ntile
  signatures:
    - "ntile(n)"
  description: "Divides the rows for each window partition into n buckets ranging from 1 to at most n."
- name: nullif
  signatures:
    - "nullif(expr1, expr2)"
  description: "Returns null if expr1 equals to expr2, or expr1 otherwise."
- name: nullifzero
  signatures:
    - "nullifzero(expr)"
  description: "Returns null if expr is equal to zero, or expr otherwise."
- name: nvl
  signatures:
    - "nvl(expr1, expr2)"
  description: "Returns expr2 if expr1 is null, or expr1 otherwise."
- name: nvl2
