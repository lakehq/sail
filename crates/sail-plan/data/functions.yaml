  since: "2.0.1"
- name: bit_and
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BitAndAgg"
  signatures:
    - "bit_and(expr)"
  description: "Returns the bitwise AND of all non-null input values, or null if none."
