     0.0
  since: "1.4.0"
- name: atan2
  class_name: "org.apache.spark.sql.catalyst.expressions.Atan2"
  signatures:
    - "atan2(exprY, exprX)"
  description: "Returns the angle in radians between the positive x-axis of a plane and the point given by the coordinates (exprX, exprY), as if computed by java.lang.Math.atan2."
  examples: |
    > SELECT atan2(0, 0);
     0.0
  since: "1.4.0"
- name: atanh
  class_name: "org.apache.spark.sql.catalyst.expressions.Atanh"
  signatures:
    - "atanh(expr)"
  description: "Returns inverse hyperbolic tangent of expr."
  examples: |
    > SELECT atanh(0);
     0.0
    > SELECT atanh(2);
     NaN
  since: "3.0.0"
- name: avg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Average"
