- name: substr
  class_name: "org.apache.spark.sql.catalyst.expressions.Substring"
  signatures:
    - "substr(str, pos[, len])"
  description: "Returns the substring of str that starts at pos and is of length len, or the slice of byte array that starts at pos and is of length len."
  examples: |
    > SELECT substr('Spark SQL', 5);
     k SQL
    > SELECT substr('Spark SQL', -3);
     SQL
    > SELECT substr('Spark SQL', 5, 1);
     k
    > SELECT substr('Spark SQL' FROM 5);
     k SQL
    > SELECT substr('Spark SQL' FROM -3);
     SQL
    > SELECT substr('Spark SQL' FROM 5 FOR 1);
     k
    > SELECT substr(encode('Spark SQL', 'utf-8'), 5);
     k SQL
  since: "1.5.0"
- name: substring
  class_name: "org.apache.spark.sql.catalyst.expressions.Substring"
  signatures:
    - "substring(str, pos[, len])"
  description: "Returns the substring of str that starts at pos and is of length len, or the slice of byte array that starts at pos and is of length len."
  examples: |
    > SELECT substring('Spark SQL', 5);
     k SQL
    > SELECT substring('Spark SQL', -3);
     SQL
    > SELECT substring('Spark SQL', 5, 1);
     k
    > SELECT substring('Spark SQL' FROM 5);
     k SQL
    > SELECT substring('Spark SQL' FROM -3);
     SQL
    > SELECT substring('Spark SQL' FROM 5 FOR 1);
     k
    > SELECT substring(encode('Spark SQL', 'utf-8'), 5);
     k SQL
  since: "1.5.0"
- name: substring_index
  class_name: "org.apache.spark.sql.catalyst.expressions.SubstringIndex"
  signatures:
    - "substring_index(str, delim, count)"
  description: "Returns the substring from str before count occurrences of the delimiter delim. If count is positive, everything to the left of the final delimiter (counting from the left) is returned. If count is negative, everything to the right of the final delimiter (counting from the right) is returned. The function substring_index performs a case-sensitive match when searching for delim."
  examples: |
    > SELECT substring_index('www.apache.org', '.', 2);
     www.apache
  since: "1.5.0"
- name: sum
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Sum"
