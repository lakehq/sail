  signatures:
    - "stack(n, expr1, ..., exprk)"
  description: "Separates expr1, ..., exprk into n rows. Uses column names col0, col1, etc. by default unless specified otherwise."
  examples: |
    > SELECT stack(2, 1, 2, 3);
     1  2
     3  NULL
