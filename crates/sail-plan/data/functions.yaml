  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.RegrSYY"
  signatures:
    - "regr_syy(y, x)"
  description: "Returns REGR_COUNT(y, x) * VAR_POP(y) for non-null pairs in a group, where y is the dependent variable and x is the independent variable."
  examples: |
    > SELECT regr_syy(y, x) FROM VALUES (1, 2), (2, 2), (2, 3), (2, 4) AS tab(y, x);
     0.75
    > SELECT regr_syy(y, x) FROM VALUES (1, null) AS tab(y, x);
     NULL
    > SELECT regr_syy(y, x) FROM VALUES (null, 1) AS tab(y, x);
     NULL
    > SELECT regr_syy(y, x) FROM VALUES (1, 2), (2, null), (2, 3), (2, 4) AS tab(y, x);
     0.6666666666666666
    > SELECT regr_syy(y, x) FROM VALUES (1, 2), (2, null), (null, 3), (2, 4) AS tab(y, x);
     0.5
  since: "3.4.0"
- name: repeat
  class_name: "org.apache.spark.sql.catalyst.expressions.StringRepeat"
  signatures:
    - "repeat(str, n)"
  description: "Returns the string which repeats the given string value n times."
  examples: |
    > SELECT repeat('123', 2);
     123123
  since: "1.5.0"
- name: replace
  class_name: "org.apache.spark.sql.catalyst.expressions.StringReplace"
  signatures:
    - "replace(str, search[, replace])"
  description: "Replaces all occurrences of search with replace."
  examples: |
    > SELECT replace('ABCabc', 'abc', 'DEF');
     ABCDEF
  since: "2.3.0"
- name: reverse
  class_name: "org.apache.spark.sql.catalyst.expressions.Reverse"
  signatures:
    - "reverse(array)"
  description: "Returns a reversed string or an array with reverse order of elements."
  examples: |
    > SELECT reverse('Spark SQL');
     LQS krapS
    > SELECT reverse(array(2, 1, 4, 3));
     [3,4,1,2]
  note: "Reverse logic for arrays is available since 2.4.0."
  since: "1.5.0"
- name: right
  class_name: "org.apache.spark.sql.catalyst.expressions.Right"
  signatures:
    - "right(str, len)"
  description: "Returns the rightmost len(len can be string type) characters from the string str,if len is less or equal than 0 the result is an empty string."
  examples: |
    > SELECT right('Spark SQL', 3);
     SQL
  since: "2.3.0"
- name: rint
  class_name: "org.apache.spark.sql.catalyst.expressions.Rint"
  signatures:
    - "rint(expr)"
  description: "Returns the double value that is closest in value to the argument and is equal to a mathematical integer."
  examples: |
    > SELECT rint(12.3456);
     12.0
  since: "1.4.0"
- name: rlike
  class_name: "org.apache.spark.sql.catalyst.expressions.RLike"
  signatures:
    - "rlike(str, regexp)"
  description: "Returns true if str matches regexp, or false otherwise."
  examples: |
    > SET spark.sql.parser.escapedStringLiterals=true;
    spark.sql.parser.escapedStringLiterals  true
    > SELECT rlike('%SystemDrive%\Users\John', '%SystemDrive%\\Users.*');
    true
    > SET spark.sql.parser.escapedStringLiterals=false;
    spark.sql.parser.escapedStringLiterals  false
    > SELECT rlike('%SystemDrive%\\Users\\John', '%SystemDrive%\\\\Users.*');
    true
    > SELECT rlike('%SystemDrive%\\Users\\John', r'%SystemDrive%\\Users.*');
    true
  note: "Use LIKE to match with simple string pattern."
  since: "1.0.0"
- name: round
  class_name: "org.apache.spark.sql.catalyst.expressions.Round"
  signatures:
    - "round(expr, d)"
  description: "Returns expr rounded to d decimal places using HALF_UP rounding mode."
  examples: |
    > SELECT round(2.5, 0);
     3
  since: "1.5.0"
- name: row_number
  class_name: "org.apache.spark.sql.catalyst.expressions.RowNumber"
  signatures:
    - "row_number()"
  description: "Assigns a unique, sequential number to each row, starting with one, according to the ordering of rows within the window partition."
  examples: |
    > SELECT a, b, row_number() OVER (PARTITION BY a ORDER BY b) FROM VALUES ('A1', 2), ('A1', 1), ('A2', 3), ('A1', 1) tab(a, b);
     A1 1   1
     A1 1   2
     A1 2   3
     A2 3   1
  since: "2.0.0"
- name: rpad
  class_name: "org.apache.spark.sql.catalyst.expressions.RPadExpressionBuilder"
  signatures:
    - "rpad(str, len[, pad])"
  description: "Returns str, right-padded with pad to a length of len. If str is longer than len, the return value is shortened to len characters. If pad is not specified, str will be padded to the right with space characters if it is a character string, and with zeros if it is a binary string."
  examples: |
    > SELECT rpad('hi', 5, '??');
     hi???
    > SELECT rpad('hi', 1, '??');
     h
    > SELECT rpad('hi', 5);
     hi
    > SELECT hex(rpad(unhex('aabb'), 5));
     AABB000000
    > SELECT hex(rpad(unhex('aabb'), 5, unhex('1122')));
     AABB112211
  since: "1.5.0"
- name: rtrim
  class_name: "org.apache.spark.sql.catalyst.expressions.StringTrimRight"
  signatures:
    - "rtrim(str)"
  description: "Removes the trailing space characters from str."
  examples: |
    > SELECT rtrim('    SparkSQL   ');
     SparkSQL
  since: "1.5.0"
- name: schema_of_avro
  class_name: "org.apache.spark.sql.catalyst.expressions.SchemaOfAvro"
  signatures:
    - "schema_of_avro(jsonFormatSchema, options)"
  description: "Returns schema in the DDL format of the avro schema in JSON string format."
  examples: |
    > SELECT schema_of_avro('{"type": "record", "name": "struct", "fields": [{"name": "u", "type": ["int", "string"]}]}', map());
     STRUCT<u: STRUCT<member0: INT, member1: STRING> NOT NULL>
  since: "4.0.0"
- name: schema_of_csv
  class_name: "org.apache.spark.sql.catalyst.expressions.SchemaOfCsv"
  signatures:
    - "schema_of_csv(csv[, options])"
  description: "Returns schema in the DDL format of CSV string."
  examples: |
    > SELECT schema_of_csv('1,abc');
     STRUCT<_c0: INT, _c1: STRING>
  since: "3.0.0"
- name: schema_of_json
  class_name: "org.apache.spark.sql.catalyst.expressions.SchemaOfJson"
  signatures:
    - "schema_of_json(json[, options])"
  description: "Returns schema in the DDL format of JSON string."
  examples: |
    > SELECT schema_of_json('[{"col":0}]');
     ARRAY<STRUCT<col: BIGINT>>
    > SELECT schema_of_json('[{"col":01}]', map('allowNumericLeadingZeros', 'true'));
     ARRAY<STRUCT<col: BIGINT>>
  since: "2.4.0"
- name: schema_of_variant
  class_name: "org.apache.spark.sql.catalyst.expressions.variant.SchemaOfVariant"
  signatures:
    - "schema_of_variant(v)"
  description: "Returns schema in the SQL format of a variant."
  examples: |
    > SELECT schema_of_variant(parse_json('null'));
     VOID
    > SELECT schema_of_variant(parse_json('[{"b":true,"a":0}]'));
     ARRAY<OBJECT<a: BIGINT, b: BOOLEAN>>
  since: "4.0.0"
- name: schema_of_variant_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.variant.SchemaOfVariantAgg"
  signatures:
    - "schema_of_variant_agg(v)"
  description: "Returns the merged schema in the SQL format of a variant column."
  examples: |
    > SELECT schema_of_variant_agg(parse_json(j)) FROM VALUES ('1'), ('2'), ('3') AS tab(j);
     BIGINT
    > SELECT schema_of_variant_agg(parse_json(j)) FROM VALUES ('{"a": 1}'), ('{"b": true}'), ('{"c": 1.23}') AS tab(j);
     OBJECT<a: BIGINT, b: BOOLEAN, c: DECIMAL(3,2)>
  since: "4.0.0"
- name: schema_of_xml
  class_name: "org.apache.spark.sql.catalyst.expressions.SchemaOfXml"
  signatures:
    - "schema_of_xml(xml[, options])"
  description: "Returns schema in the DDL format of XML string."
  examples: |
    > SELECT schema_of_xml('<p><a>1</a></p>');
     STRUCT<a: BIGINT>
    > SELECT schema_of_xml('<p><a attr="2">1</a><a>3</a></p>', map('excludeAttribute', 'true'));
     STRUCT<a: ARRAY<BIGINT>>
  since: "4.0.0"
- name: sec
  class_name: "org.apache.spark.sql.catalyst.expressions.Sec"
  signatures:
    - "sec(expr)"
  description: "Returns the secant of expr, as if computed by 1/java.lang.Math.cos."
  examples: |
    > SELECT sec(0);
     1.0
  since: "3.3.0"
- name: second
  class_name: "org.apache.spark.sql.catalyst.expressions.SecondExpressionBuilder"
  signatures:
    - "second(expr)"
  description: "Returns the second component of the given expression."
  examples: |
    > SELECT second('2018-02-14 12:58:59');
     59
    > SELECT second(TIME'13:25:59.999999');
     59
  since: "1.5.0"
- name: sentences
  class_name: "org.apache.spark.sql.catalyst.expressions.Sentences"
  signatures:
    - "sentences(str[, lang[, country]])"
  description: "Splits str into an array of array of words."
  examples: |
    > SELECT sentences('Hi there! Good morning.');
     [["Hi","there"],["Good","morning"]]
    > SELECT sentences('Hi there! Good morning.', 'en');
     [["Hi","there"],["Good","morning"]]
    > SELECT sentences('Hi there! Good morning.', 'en', 'US');
     [["Hi","there"],["Good","morning"]]
  since: "2.0.0"
- name: sequence
  class_name: "org.apache.spark.sql.catalyst.expressions.Sequence"
  signatures:
    - "sequence(start, stop, step)"
  description: "Generates an array of elements from start to stop (inclusive), incrementing by step. The type of the returned elements is the same as the type of argument expressions."
  examples: |
    > SELECT sequence(1, 5);
     [1,2,3,4,5]
    > SELECT sequence(5, 1);
     [5,4,3,2,1]
    > SELECT sequence(to_date('2018-01-01'), to_date('2018-03-01'), interval 1 month);
     [2018-01-01,2018-02-01,2018-03-01]
    > SELECT sequence(to_date('2018-01-01'), to_date('2018-03-01'), interval '0-1' year to month);
     [2018-01-01,2018-02-01,2018-03-01]
  since: "2.4.0"
- name: session_user
  class_name: "org.apache.spark.sql.catalyst.expressions.CurrentUser"
  signatures:
    - "session_user()"
  description: "user name of current execution context."
  examples: |
    > SELECT session_user();
     mockingjay
  since: "4.0.0"
- name: session_window
  class_name: "org.apache.spark.sql.catalyst.expressions.SessionWindow"
  signatures:
    - "session_window(time_column, gap_duration)"
  description: "Generates session window given a timestamp specifying column and gap duration. See 'Types of time windows' in Structured Streaming guide doc for detailed explanation and examples."
  examples: |
    > SELECT a, session_window.start, session_window.end, count(*) as cnt FROM VALUES ('A1', '2021-01-01 00:00:00'), ('A1', '2021-01-01 00:04:30'), ('A1', '2021-01-01 00:10:00'), ('A2', '2021-01-01 00:01:00') AS tab(a, b) GROUP by a, session_window(b, '5 minutes') ORDER BY a, start;
      A1    2021-01-01 00:00:00 2021-01-01 00:09:30 2
      A1    2021-01-01 00:10:00 2021-01-01 00:15:00 1
      A2    2021-01-01 00:01:00 2021-01-01 00:06:00 1
    > SELECT a, session_window.start, session_window.end, count(*) as cnt FROM VALUES ('A1', '2021-01-01 00:00:00'), ('A1', '2021-01-01 00:04:30'), ('A1', '2021-01-01 00:10:00'), ('A2', '2021-01-01 00:01:00'), ('A2', '2021-01-01 00:04:30') AS tab(a, b) GROUP by a, session_window(b, CASE WHEN a = 'A1' THEN '5 minutes' WHEN a = 'A2' THEN '1 minute' ELSE '10 minutes' END) ORDER BY a, start;
      A1    2021-01-01 00:00:00 2021-01-01 00:09:30 2
      A1    2021-01-01 00:10:00 2021-01-01 00:15:00 1
      A2    2021-01-01 00:01:00 2021-01-01 00:02:00 1
      A2    2021-01-01 00:04:30 2021-01-01 00:05:30 1
  since: "3.2.0"
- name: sha
  class_name: "org.apache.spark.sql.catalyst.expressions.Sha1"
  signatures:
    - "sha(expr)"
  description: "Returns a sha1 hash value as a hex string of the expr."
  examples: |
    > SELECT sha('Spark');
     85f5955f4b27a9a4c2aab6ffe5d7189fc298b92c
  since: "1.5.0"
- name: sha1
  class_name: "org.apache.spark.sql.catalyst.expressions.Sha1"
  signatures:
    - "sha1(expr)"
  description: "Returns a sha1 hash value as a hex string of the expr."
  examples: |
    > SELECT sha1('Spark');
     85f5955f4b27a9a4c2aab6ffe5d7189fc298b92c
  since: "1.5.0"
- name: sha2
  class_name: "org.apache.spark.sql.catalyst.expressions.Sha2"
  signatures:
    - "sha2(expr, bitLength)"
  description: "Returns a checksum of SHA-2 family as a hex string of expr. SHA-224, SHA-256, SHA-384, and SHA-512 are supported. Bit length of 0 is equivalent to 256."
  examples: |
    > SELECT sha2('Spark', 256);
     529bc3b07127ecb7e53a4dcf1991d9152c24537d919178022b2c42657f79a26b
  since: "1.5.0"
- name: shiftleft
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftLeft"
  signatures:
    - "base shiftleft exp"
  description: "Bitwise left shift."
  examples: |
    > SELECT shiftleft(2, 1);
     4
    > SELECT 2 << 1;
     4
  note: "<< operator is added in Spark 4.0.0 as an alias for shiftleft."
  since: "1.5.0"
- name: shiftright
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftRight"
  signatures:
    - "base shiftright expr"
  description: "Bitwise (signed) right shift."
  examples: |
    > SELECT shiftright(4, 1);
     2
    > SELECT 4 >> 1;
     2
  note: ">> operator is added in Spark 4.0.0 as an alias for shiftright."
  since: "1.5.0"
- name: shiftrightunsigned
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftRightUnsigned"
  signatures:
    - "base shiftrightunsigned expr"
  description: "Bitwise unsigned right shift."
  examples: |
    > SELECT shiftrightunsigned(4, 1);
     2
    > SELECT 4 >>> 1;
     2
  note: ">>> operator is added in Spark 4.0.0 as an alias for shiftrightunsigned."
  since: "1.5.0"
- name: shuffle
  class_name: "org.apache.spark.sql.catalyst.expressions.Shuffle"
  signatures:
    - "shuffle(array)"
  description: "Returns a random permutation of the given array."
  examples: |
    > SELECT shuffle(array(1, 20, 3, 5));
     [3,1,5,20]
    > SELECT shuffle(array(1, 20, null, 3));
     [20,null,3,1]
  note: "The function is non-deterministic."
  since: "2.4.0"
- name: sign
  class_name: "org.apache.spark.sql.catalyst.expressions.Signum"
  signatures:
    - "sign(expr)"
  description: "Returns -1.0, 0.0 or 1.0 as expr is negative, 0 or positive."
  examples: |
    > SELECT sign(40);
     1.0
    > SELECT sign(INTERVAL -'100' YEAR);
     -1.0
  since: "1.4.0"
- name: signum
  class_name: "org.apache.spark.sql.catalyst.expressions.Signum"
  signatures:
    - "signum(expr)"
  description: "Returns -1.0, 0.0 or 1.0 as expr is negative, 0 or positive."
  examples: |
    > SELECT signum(40);
     1.0
    > SELECT signum(INTERVAL -'100' YEAR);
     -1.0
  since: "1.4.0"
- name: sin
  class_name: "org.apache.spark.sql.catalyst.expressions.Sin"
  signatures:
    - "sin(expr)"
  description: "Returns the sine of expr, as if computed by java.lang.Math.sin."
  examples: |
    > SELECT sin(0);
     0.0
  since: "1.4.0"
- name: sinh
  class_name: "org.apache.spark.sql.catalyst.expressions.Sinh"
  signatures:
    - "sinh(expr)"
  description: "Returns hyperbolic sine of expr, as if computed by java.lang.Math.sinh."
  examples: |
    > SELECT sinh(0);
     0.0
  since: "1.4.0"
- name: size
  class_name: "org.apache.spark.sql.catalyst.expressions.Size"
  signatures:
    - "size(expr)"
  description: "Returns the size of an array or a map. This function returns -1 for null input only if spark.sql.ansi.enabled is false and spark.sql.legacy.sizeOfNull is true. Otherwise, it returns null for null input. With the default settings, the function returns null for null input."
  examples: |
    > SELECT size(array('b', 'd', 'c', 'a'));
     4
    > SELECT size(map('a', 1, 'b', 2));
     2
  since: "1.5.0"
- name: skewness
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Skewness"
  signatures:
    - "skewness(expr)"
  description: "Returns the skewness value calculated from values of a group."
  examples: |
    > SELECT skewness(col) FROM VALUES (-10), (-20), (100), (1000) AS tab(col);
     1.1135657469022011
    > SELECT skewness(col) FROM VALUES (-1000), (-100), (10), (20) AS tab(col);
     -1.1135657469022011
  since: "1.6.0"
- name: slice
  class_name: "org.apache.spark.sql.catalyst.expressions.Slice"
  signatures:
    - "slice(x, start, length)"
  description: "Subsets array x starting from index start (array indices start at 1, or starting from the end if start is negative) with the specified length."
  examples: |
    > SELECT slice(array(1, 2, 3, 4), 2, 2);
     [2,3]
    > SELECT slice(array(1, 2, 3, 4), -2, 2);
     [3,4]
  since: "2.4.0"
- name: smallint
  class_name: "org.apache.spark.sql.catalyst.expressions.Cast"
  signatures:
    - "smallint(expr)"
  description: "Casts the value expr to the target data type smallint."
  since: "2.0.1"
- name: some
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BoolOr"
  signatures:
    - "some(expr)"
  description: "Returns true if at least one value of expr is true."
  examples: |
    > SELECT some(col) FROM VALUES (true), (false), (false) AS tab(col);
     true
    > SELECT some(col) FROM VALUES (NULL), (true), (false) AS tab(col);
     true
    > SELECT some(col) FROM VALUES (false), (false), (NULL) AS tab(col);
     false
  since: "3.0.0"
- name: sort_array
  class_name: "org.apache.spark.sql.catalyst.expressions.SortArray"
  signatures:
    - "sort_array(array[, ascendingOrder])"
  description: "Sorts the input array in ascending or descending order according to the natural ordering of the array elements. NaN is greater than any non-NaN elements for double/float type. Null elements will be placed at the beginning of the returned array in ascending order or at the end of the returned array in descending order."
  examples: |
    > SELECT sort_array(array('b', 'd', null, 'c', 'a'), true);
     [null,"a","b","c","d"]
    > SELECT sort_array(array('b', 'd', null, 'c', 'a'), false);
     ["d","c","b","a",null]
  since: "1.5.0"
- name: soundex
  class_name: "org.apache.spark.sql.catalyst.expressions.SoundEx"
  signatures:
    - "soundex(str)"
  description: "Returns Soundex code of the string."
  examples: |
    > SELECT soundex('Miller');
     M460
  since: "1.5.0"
- name: space
  class_name: "org.apache.spark.sql.catalyst.expressions.StringSpace"
  signatures:
    - "space(n)"
  description: "Returns a string consisting of n spaces."
  examples: |
    > SELECT concat(space(2), '1');
       1
  since: "1.5.0"
- name: spark_partition_id
  class_name: "org.apache.spark.sql.catalyst.expressions.SparkPartitionID"
  signatures:
    - "spark_partition_id()"
  description: "Returns the current partition id."
  examples: |
    > SELECT spark_partition_id();
     0
  since: "1.4.0"
- name: split
  class_name: "org.apache.spark.sql.catalyst.expressions.StringSplit"
  signatures:
    - "split(str, regex, limit)"
  description: "Splits str around occurrences that match regex and returns an array with a length of at most limit"
  examples: |
    > SELECT split('oneAtwoBthreeC', '[ABC]');
     ["one","two","three",""]
    > SELECT split('oneAtwoBthreeC', '[ABC]', -1);
     ["one","two","three",""]
    > SELECT split('oneAtwoBthreeC', '[ABC]', 2);
     ["one","twoBthreeC"]
  since: "1.5.0"
- name: split_part
  class_name: "org.apache.spark.sql.catalyst.expressions.SplitPart"
  signatures:
    - "split_part(str, delimiter, partNum)"
  description: "Splits str by delimiter and return requested part of the split (1-based). If any input is null, returns null. if partNum is out of range of split parts, returns empty string. If partNum is 0, throws an error. If partNum is negative, the parts are counted backward from the end of the string. If the delimiter is an empty string, the str is not split."
  examples: |
    > SELECT split_part('11.12.13', '.', 3);
     13
  since: "3.3.0"
- name: sqrt
  class_name: "org.apache.spark.sql.catalyst.expressions.Sqrt"
  signatures:
    - "sqrt(expr)"
  description: "Returns the square root of expr."
  examples: |
    > SELECT sqrt(4);
     2.0
  since: "1.1.1"
- name: st_asbinary
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_AsBinary"
  signatures:
    - "st_asbinary(geo)"
  description: "Returns the geospatial value (value of type GEOGRAPHY or GEOMETRY) in WKB format."
  examples: |
    > SELECT hex(st_asbinary(st_geogfromwkb(X'0101000000000000000000F03F0000000000000040')));
     0101000000000000000000F03F0000000000000040
    > SELECT hex(st_asbinary(st_geomfromwkb(X'0101000000000000000000F03F0000000000000040')));
     0101000000000000000000F03F0000000000000040
  since: "4.1.0"
- name: st_geogfromwkb
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_GeogFromWKB"
  signatures:
    - "st_geogfromwkb(wkb)"
  description: "Parses the WKB description of a geography and returns the corresponding GEOGRAPHY value."
  examples: |
    > SELECT hex(st_asbinary(st_geogfromwkb(X'0101000000000000000000F03F0000000000000040')));
     0101000000000000000000F03F0000000000000040
  since: "4.1.0"
- name: st_geomfromwkb
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_GeomFromWKB"
  signatures:
    - "st_geomfromwkb(wkb)"
  description: "Parses the WKB description of a geometry and returns the corresponding GEOMETRY value."
  examples: |
    > SELECT hex(st_asbinary(st_geomfromwkb(X'0101000000000000000000F03F0000000000000040')));
     0101000000000000000000F03F0000000000000040
  since: "4.1.0"
- name: st_setsrid
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_SetSrid"
  signatures:
    - "st_setsrid(geo, srid)"
  description: "Returns a new GEOGRAPHY or GEOMETRY value whose SRID is the specified SRID value."
  examples: |
    > SELECT st_srid(st_setsrid(ST_GeogFromWKB(X'0101000000000000000000F03F0000000000000040'), 4326));
     4326
    > SELECT st_srid(st_setsrid(ST_GeomFromWKB(X'0101000000000000000000F03F0000000000000040'), 3857));
     3857
  since: "4.1.0"
- name: st_srid
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_Srid"
  signatures:
    - "st_srid(geo)"
  description: "Returns the SRID of the input GEOGRAPHY or GEOMETRY value."
  examples: |
    > SELECT st_srid(st_geogfromwkb(X'0101000000000000000000F03F0000000000000040'));
     4326
    > SELECT st_srid(st_geomfromwkb(X'0101000000000000000000F03F0000000000000040'));
     0
    > SELECT st_srid(NULL);
     NULL
  since: "4.1.0"
- name: stack
