  since: "4.0.0"
- name: collect_list
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CollectList"
  signatures:
    - "collect_list(expr)"
  description: "Collects and returns a list of non-unique elements."
  examples: |
    > SELECT collect_list(col) FROM VALUES (1), (2), (1) AS tab(col);
     [1,2,1]
  note: |
    The function is non-deterministic because the order of collected results depends
    on the order of the rows which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: collect_set
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CollectSet"
  signatures:
    - "collect_set(expr)"
  description: "Collects and returns a set of unique elements."
  examples: |
    > SELECT collect_set(col) FROM VALUES (1), (2), (1) AS tab(col);
     [1,2]
  note: |
    The function is non-deterministic because the order of collected results depends
    on the order of the rows which may be non-deterministic after a shuffle.
