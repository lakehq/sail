- name: startswith
  class_name: "org.apache.spark.sql.catalyst.expressions.StartsWithExpressionBuilder"
  signatures:
    - "startswith(left, right)"
  description: "Returns a boolean. The value is True if left starts with right. Returns NULL if either input expression is NULL. Otherwise, returns False. Both left or right must be of STRING or BINARY type."
  examples: |
    > SELECT startswith('Spark SQL', 'Spark');
     true
    > SELECT startswith('Spark SQL', 'SQL');
     false
    > SELECT startswith('Spark SQL', null);
     NULL
    > SELECT startswith(x'537061726b2053514c', x'537061726b');
     true
    > SELECT startswith(x'537061726b2053514c', x'53514c');
     false
  since: "3.3.0"
