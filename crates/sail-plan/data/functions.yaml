- name: theta_difference
  class_name: "org.apache.spark.sql.catalyst.expressions.ThetaDifference"
  signatures:
    - "theta_difference(first, second)"
  description: "Subtracts two binary representations of Datasketches ThetaSketch objects from two input columns using a ThetaSketch AnotB object."
  examples: |
    > SELECT theta_sketch_estimate(theta_difference(theta_sketch_agg(col1), theta_sketch_agg(col2))) FROM VALUES (5, 4), (1, 4), (2, 5), (2, 5), (3, 1) tab(col1, col2);
     2
  since: "4.1.0"
- name: theta_intersection
  class_name: "org.apache.spark.sql.catalyst.expressions.ThetaIntersection"
  signatures:
    - "theta_intersection(first, second)"
  description: "Intersects two binary representations of Datasketches ThetaSketch objects from two input columns using a ThetaSketch Intersect object."
  examples: |
    > SELECT theta_sketch_estimate(theta_intersection(theta_sketch_agg(col1), theta_sketch_agg(col2))) FROM VALUES (5, 4), (1, 4), (2, 5), (2, 5), (3, 1) tab(col1, col2);
     2
  since: "4.1.0"
- name: theta_intersection_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ThetaIntersectionAgg"
  signatures:
    - "theta_intersection_agg(expr)"
  description: "Returns the ThetaSketch's Compact binary representation by intersecting all the Theta sketches in the input column."
  examples: |
    > SELECT theta_sketch_estimate(theta_intersection_agg(sketch)) FROM (SELECT theta_sketch_agg(col) as sketch FROM VALUES (1) tab(col) UNION ALL SELECT theta_sketch_agg(col, 20) as sketch FROM VALUES (1) tab(col));
     1
  since: "4.1.0"
- name: theta_sketch_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ThetaSketchAgg"
  signatures:
    - "theta_sketch_agg(expr, lgNomEntries)"
  description: "Returns the ThetaSketch compact binary representation. lgNomEntries (optional) is the log-base-2 of nominal entries, with nominal entries deciding the number buckets or slots for the ThetaSketch."
  examples: |
    > SELECT theta_sketch_estimate(theta_sketch_agg(col, 12)) FROM VALUES (1), (1), (2), (2), (3) tab(col);
     3
  since: "4.1.0"
- name: theta_sketch_estimate
  class_name: "org.apache.spark.sql.catalyst.expressions.ThetaSketchEstimate"
  signatures:
    - "theta_sketch_estimate(expr)"
  description: "Returns the estimated number of unique values given the binary representation of a Datasketches ThetaSketch."
  examples: |
    > SELECT theta_sketch_estimate(theta_sketch_agg(col)) FROM VALUES (1), (1), (2), (2), (3) tab(col);
     3
  since: "4.1.0"
- name: theta_union
  class_name: "org.apache.spark.sql.catalyst.expressions.ThetaUnion"
  signatures:
    - "theta_union(first, second, lgNomEntries)"
  description: "Merges two binary representations of Datasketches ThetaSketch objects using a ThetaSketch Union object. Users can set lgNomEntries to a value between 4 and 26 to find the union of sketches with different union buffer size values (defaults to 12)."
  examples: |
    > SELECT theta_sketch_estimate(theta_union(theta_sketch_agg(col1), theta_sketch_agg(col2))) FROM VALUES (1, 4), (1, 4), (2, 5), (2, 5), (3, 6) tab(col1, col2);
     6
  since: "4.1.0"
- name: theta_union_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ThetaUnionAgg"
  signatures:
    - "theta_union_agg(expr, lgNomEntries)"
  description: "Returns the ThetaSketch's Compact binary representation. lgNomEntries (optional) the log-base-2 of Nominal Entries, with Nominal Entries deciding the number buckets or slots for the ThetaSketch."
  examples: |
    > SELECT theta_sketch_estimate(theta_union_agg(sketch)) FROM (SELECT theta_sketch_agg(col) as sketch FROM VALUES (1) tab(col) UNION ALL SELECT theta_sketch_agg(col, 20) as sketch FROM VALUES (1) tab(col));
     1
  since: "4.1.0"
