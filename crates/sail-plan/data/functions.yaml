- name: "!"
  class_name: "org.apache.spark.sql.catalyst.expressions.Not"
  signatures:
    - "! expr"
  description: "Logical not."
  examples: |
    > SELECT ! true;
     false
    > SELECT ! false;
     true
    > SELECT ! NULL;
     NULL
  since: "1.0.0"
- name: "!="
  signatures:
    - "expr1 != expr2"
  description: "Returns true if expr1 is not equal to expr2, or false otherwise."
  examples: |
    > SELECT 1 != 2;
     true
    > SELECT 1 != '2';
     true
    > SELECT true != NULL;
     NULL
    > SELECT NULL != NULL;
     NULL
  since: "1.0.0"
- name: "%"
  class_name: "org.apache.spark.sql.catalyst.expressions.Remainder"
  signatures:
    - "expr1 % expr2, or mod(expr1, expr2)"
  description: "Returns the remainder after expr1/expr2."
  examples: |
    > SELECT 2 % 1.8;
     0.2
    > SELECT MOD(2, 1.8);
     0.2
  since: "1.0.0"
- name: "&"
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseAnd"
  signatures:
    - "expr1 & expr2"
  description: "Returns the result of bitwise AND of expr1 and expr2."
  examples: |
    > SELECT 3 & 5;
     1
  since: "1.4.0"
- name: "*"
  class_name: "org.apache.spark.sql.catalyst.expressions.Multiply"
  signatures:
    - "expr1 * expr2"
  description: "Returns expr1*expr2."
  examples: |
    > SELECT 2 * 3;
     6
  since: "1.0.0"
- name: "+"
  class_name: "org.apache.spark.sql.catalyst.expressions.Add"
  signatures:
    - "expr1 + expr2"
  description: "Returns expr1+expr2."
  examples: |
    > SELECT 1 + 2;
     3
  since: "1.0.0"
- name: "-"
  class_name: "org.apache.spark.sql.catalyst.expressions.Subtract"
  signatures:
    - "expr1 - expr2"
  description: "Returns expr1-expr2."
  examples: |
    > SELECT 2 - 1;
     1
  since: "1.0.0"
- name: "/"
  class_name: "org.apache.spark.sql.catalyst.expressions.Divide"
  signatures:
    - "expr1 / expr2"
  description: "Returns expr1/expr2. It always performs floating point division."
  examples: |
    > SELECT 3 / 2;
     1.5
    > SELECT 2L / 2L;
     1.0
  since: "1.0.0"
- name: "<"
  class_name: "org.apache.spark.sql.catalyst.expressions.LessThan"
  signatures:
    - "expr1 < expr2"
  description: "Returns true if expr1 is less than expr2."
  examples: |
    > SELECT 1 < 2;
     true
    > SELECT 1.1 < '1';
     false
    > SELECT to_date('2009-07-30 04:17:52') < to_date('2009-07-30 04:17:52');
     false
    > SELECT to_date('2009-07-30 04:17:52') < to_date('2009-08-01 04:17:52');
     true
    > SELECT 1 < NULL;
     NULL
  since: "1.0.0"
- name: "<<"
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftLeft"
  signatures:
    - "base << exp"
  description: "Bitwise left shift."
  examples: |
    > SELECT shiftleft(2, 1);
     4
    > SELECT 2 << 1;
     4
  note: "<< operator is added in Spark 4.0.0 as an alias for shiftleft."
  since: "4.0.0"
- name: "<="
  class_name: "org.apache.spark.sql.catalyst.expressions.LessThanOrEqual"
  signatures:
    - "expr1 <= expr2"
  description: "Returns true if expr1 is less than or equal to expr2."
  examples: |
    > SELECT 2 <= 2;
     true
    > SELECT 1.0 <= '1';
     true
    > SELECT to_date('2009-07-30 04:17:52') <= to_date('2009-07-30 04:17:52');
     true
    > SELECT to_date('2009-07-30 04:17:52') <= to_date('2009-08-01 04:17:52');
     true
    > SELECT 1 <= NULL;
     NULL
  since: "1.0.0"
- name: "<=>"
  class_name: "org.apache.spark.sql.catalyst.expressions.EqualNullSafe"
  signatures:
    - "expr1 <=> expr2"
  description: "Returns same result as the EQUAL(=) operator for non-null operands, but returns true if both are null, false if one of the them is null."
  examples: |
    > SELECT 2 <=> 2;
     true
    > SELECT 1 <=> '1';
     true
    > SELECT true <=> NULL;
     false
    > SELECT NULL <=> NULL;
     true
  since: "1.1.0"
- name: "<>"
  signatures:
    - "expr1 != expr2"
  description: "Returns true if expr1 is not equal to expr2, or false otherwise."
  examples: |
    > SELECT 1 != 2;
     true
    > SELECT 1 != '2';
     true
    > SELECT true != NULL;
     NULL
    > SELECT NULL != NULL;
     NULL
  since: "1.0.0"
- name: "="
  class_name: "org.apache.spark.sql.catalyst.expressions.EqualTo"
  signatures:
    - "expr1 = expr2"
  description: "Returns true if expr1 equals expr2, or false otherwise."
  examples: |
    > SELECT 2 = 2;
     true
    > SELECT 1 = '1';
     true
    > SELECT true = NULL;
     NULL
    > SELECT NULL = NULL;
     NULL
  since: "1.0.0"
- name: "=="
  class_name: "org.apache.spark.sql.catalyst.expressions.EqualTo"
  signatures:
    - "expr1 == expr2"
  description: "Returns true if expr1 equals expr2, or false otherwise."
  examples: |
    > SELECT 2 == 2;
     true
    > SELECT 1 == '1';
     true
    > SELECT true == NULL;
     NULL
    > SELECT NULL == NULL;
     NULL
  since: "1.0.0"
- name: ">"
  class_name: "org.apache.spark.sql.catalyst.expressions.GreaterThan"
  signatures:
    - "expr1 > expr2"
  description: "Returns true if expr1 is greater than expr2."
  examples: |
    > SELECT 2 > 1;
     true
    > SELECT 2 > 1.1;
     true
    > SELECT to_date('2009-07-30 04:17:52') > to_date('2009-07-30 04:17:52');
     false
    > SELECT to_date('2009-07-30 04:17:52') > to_date('2009-08-01 04:17:52');
     false
    > SELECT 1 > NULL;
     NULL
  since: "1.0.0"
- name: ">="
  class_name: "org.apache.spark.sql.catalyst.expressions.GreaterThanOrEqual"
  signatures:
    - "expr1 >= expr2"
  description: "Returns true if expr1 is greater than or equal to expr2."
  examples: |
    > SELECT 2 >= 1;
     true
    > SELECT 2.0 >= '2.1';
     false
    > SELECT to_date('2009-07-30 04:17:52') >= to_date('2009-07-30 04:17:52');
     true
    > SELECT to_date('2009-07-30 04:17:52') >= to_date('2009-08-01 04:17:52');
     false
    > SELECT 1 >= NULL;
     NULL
  since: "1.0.0"
- name: ">>"
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftRight"
  signatures:
    - "base >> expr"
  description: "Bitwise (signed) right shift."
  examples: |
    > SELECT shiftright(4, 1);
     2
    > SELECT 4 >> 1;
     2
  note: ">> operator is added in Spark 4.0.0 as an alias for shiftright."
  since: "4.0.0"
- name: ">>>"
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftRightUnsigned"
  signatures:
    - "base >>> expr"
  description: "Bitwise unsigned right shift."
  examples: |
    > SELECT shiftrightunsigned(4, 1);
     2
    > SELECT 4 >>> 1;
     2
  note: ">>> operator is added in Spark 4.0.0 as an alias for shiftrightunsigned."
  since: "4.0.0"
- name: "^"
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseXor"
  signatures:
    - "expr1 ^ expr2"
  description: "Returns the result of bitwise exclusive OR of expr1 and expr2."
  examples: |
    > SELECT 3 ^ 5;
     6
  since: "1.4.0"
- name: abs
  class_name: "org.apache.spark.sql.catalyst.expressions.Abs"
  signatures:
    - "abs(expr)"
  description: "Returns the absolute value of the numeric or interval value."
  examples: |
    > SELECT abs(-1);
     1
    > SELECT abs(INTERVAL -'1-1' YEAR TO MONTH);
     1-1
  since: "1.2.0"
- name: acos
  class_name: "org.apache.spark.sql.catalyst.expressions.Acos"
  signatures:
    - "acos(expr)"
  description: "Returns the inverse cosine (a.k.a. arc cosine) of expr, as if computed by java.lang.Math.acos."
  examples: |
    > SELECT acos(1);
     0.0
    > SELECT acos(2);
     NaN
  since: "1.4.0"
- name: acosh
  class_name: "org.apache.spark.sql.catalyst.expressions.Acosh"
  signatures:
    - "acosh(expr)"
  description: "Returns inverse hyperbolic cosine of expr."
  examples: |
    > SELECT acosh(1);
     0.0
    > SELECT acosh(0);
     NaN
  since: "3.0.0"
- name: add_days
  signatures:
    - "add_days(start_date, num_days)"
  description: "Returns the date that is num_days after start_date."
- name: add_months
  class_name: "org.apache.spark.sql.catalyst.expressions.AddMonths"
  signatures:
    - "add_months(start_date, num_months)"
  description: "Returns the date that is num_months after start_date."
  examples: |
    > SELECT add_months('2016-08-31', 1);
     2016-09-30
  since: "1.5.0"
- name: add_years
  signatures:
    - "add_years(start_date, num_years)"
  description: "Returns the date that is num_years after start_date."
- name: aes_decrypt
  class_name: "org.apache.spark.sql.catalyst.expressions.AesDecrypt"
  signatures:
    - "aes_decrypt(expr, key[, mode[, padding[, aad]]])"
  description: "Returns a decrypted value of expr using AES in mode with padding. Key lengths of 16, 24 and 32 bits are supported. Supported combinations of (mode, padding) are ('ECB', 'PKCS'), ('GCM', 'NONE') and ('CBC', 'PKCS'). Optional additional authenticated data (AAD) is only supported for GCM. If provided for encryption, the identical AAD value must be provided for decryption. The default mode is GCM."
  examples: |
    > SELECT aes_decrypt(unhex('83F16B2AA704794132802D248E6BFD4E380078182D1544813898AC97E709B28A94'), '0000111122223333');
     Spark
    > SELECT aes_decrypt(unhex('6E7CA17BBB468D3084B5744BCA729FB7B2B7BCB8E4472847D02670489D95FA97DBBA7D3210'), '0000111122223333', 'GCM');
     Spark SQL
    > SELECT aes_decrypt(unbase64('3lmwu+Mw0H3fi5NDvcu9lg=='), '1234567890abcdef', 'ECB', 'PKCS');
     Spark SQL
    > SELECT aes_decrypt(unbase64('2NYmDCjgXTbbxGA3/SnJEfFC/JQ7olk2VQWReIAAFKo='), '1234567890abcdef', 'CBC');
     Apache Spark
    > SELECT aes_decrypt(unbase64('AAAAAAAAAAAAAAAAAAAAAPSd4mWyMZ5mhvjiAPQJnfg='), 'abcdefghijklmnop12345678ABCDEFGH', 'CBC', 'DEFAULT');
     Spark
    > SELECT aes_decrypt(unbase64('AAAAAAAAAAAAAAAAQiYi+sTLm7KD9UcZ2nlRdYDe/PX4'), 'abcdefghijklmnop12345678ABCDEFGH', 'GCM', 'DEFAULT', 'This is an AAD mixed into the input');
     Spark
  since: "3.3.0"
- name: aes_encrypt
  class_name: "org.apache.spark.sql.catalyst.expressions.AesEncrypt"
  signatures:
    - "aes_encrypt(expr, key[, mode[, padding[, iv[, aad]]]])"
  description: "Returns an encrypted value of expr using AES in given mode with the specified padding. Key lengths of 16, 24 and 32 bits are supported. Supported combinations of (mode, padding) are ('ECB', 'PKCS'), ('GCM', 'NONE') and ('CBC', 'PKCS'). Optional initialization vectors (IVs) are only supported for CBC and GCM modes. These must be 16 bytes for CBC and 12 bytes for GCM. If not provided, a random vector will be generated and prepended to the output. Optional additional authenticated data (AAD) is only supported for GCM. If provided for encryption, the identical AAD value must be provided for decryption. The default mode is GCM."
  examples: |
    > SELECT hex(aes_encrypt('Spark', '0000111122223333'));
     83F16B2AA704794132802D248E6BFD4E380078182D1544813898AC97E709B28A94
    > SELECT hex(aes_encrypt('Spark SQL', '0000111122223333', 'GCM'));
     6E7CA17BBB468D3084B5744BCA729FB7B2B7BCB8E4472847D02670489D95FA97DBBA7D3210
    > SELECT base64(aes_encrypt('Spark SQL', '1234567890abcdef', 'ECB', 'PKCS'));
     3lmwu+Mw0H3fi5NDvcu9lg==
    > SELECT base64(aes_encrypt('Apache Spark', '1234567890abcdef', 'CBC', 'DEFAULT'));
     2NYmDCjgXTbbxGA3/SnJEfFC/JQ7olk2VQWReIAAFKo=
    > SELECT base64(aes_encrypt('Spark', 'abcdefghijklmnop12345678ABCDEFGH', 'CBC', 'DEFAULT', unhex('00000000000000000000000000000000')));
     AAAAAAAAAAAAAAAAAAAAAPSd4mWyMZ5mhvjiAPQJnfg=
    > SELECT base64(aes_encrypt('Spark', 'abcdefghijklmnop12345678ABCDEFGH', 'GCM', 'DEFAULT', unhex('000000000000000000000000'), 'This is an AAD mixed into the input'));
     AAAAAAAAAAAAAAAAQiYi+sTLm7KD9UcZ2nlRdYDe/PX4
  since: "3.3.0"
- name: aggregate
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayAggregate"
  signatures:
    - "aggregate(expr, start, merge, finish)"
  description: "Applies a binary operator to an initial state and all elements in the array, and reduces this to a single state. The final state is converted into the final result by applying a finish function."
  examples: |
    > SELECT aggregate(array(1, 2, 3), 0, (acc, x) -> acc + x);
     6
    > SELECT aggregate(array(1, 2, 3), 0, (acc, x) -> acc + x, acc -> acc * 10);
     60
  since: "2.4.0"
- name: and
  class_name: "org.apache.spark.sql.catalyst.expressions.And"
  signatures:
    - "expr1 and expr2"
  description: "Logical AND."
  examples: |
    > SELECT true and true;
     true
    > SELECT true and false;
     false
    > SELECT true and NULL;
     NULL
    > SELECT false and NULL;
     false
  since: "1.0.0"
- name: any
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BoolOr"
  signatures:
    - "any(expr)"
  description: "Returns true if at least one value of expr is true."
  examples: |
    > SELECT any(col) FROM VALUES (true), (false), (false) AS tab(col);
     true
    > SELECT any(col) FROM VALUES (NULL), (true), (false) AS tab(col);
     true
    > SELECT any(col) FROM VALUES (false), (false), (NULL) AS tab(col);
     false
  since: "3.0.0"
- name: any_value
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.AnyValue"
  signatures:
    - "any_value(expr[, isIgnoreNull])"
  description: "Returns some value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values."
  examples: |
    > SELECT any_value(col) FROM VALUES (10), (5), (20) AS tab(col);
     10
    > SELECT any_value(col) FROM VALUES (NULL), (5), (20) AS tab(col);
     NULL
    > SELECT any_value(col, true) FROM VALUES (NULL), (5), (20) AS tab(col);
     5
  note: "The function is non-deterministic."
  since: "3.4.0"
- name: approx_count_distinct
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.HyperLogLogPlusPlus"
  signatures:
    - "approx_count_distinct(expr[, relativeSD])"
  description: "Returns the estimated cardinality by HyperLogLog++. relativeSD defines the maximum relative standard deviation allowed."
  examples: |
    > SELECT approx_count_distinct(col1) FROM VALUES (1), (1), (2), (2), (3) tab(col1);
     3
  since: "1.6.0"
- name: approx_percentile
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ApproximatePercentile"
  signatures:
    - "approx_percentile(col, percentage [, accuracy])"
  description: "Returns the approximate percentile of the numeric or ansi interval column col which is the smallest value in the ordered col values (sorted from least to greatest) such that no more than percentage of col values is less than the value or equal to that value. The value of percentage must be between 0.0 and 1.0. The accuracy parameter (default: 10000) is a positive numeric literal which controls approximation accuracy at the cost of memory. Higher value of accuracy yields better accuracy, 1.0/accuracy is the relative error of the approximation. When percentage is an array, each value of the percentage array must be between 0.0 and 1.0. In this case, returns the approximate percentile array of column col at the given percentage array."
  examples: |
    > SELECT approx_percentile(col, array(0.5, 0.4, 0.1), 100) FROM VALUES (0), (1), (2), (10) AS tab(col);
     [1,1,0]
    > SELECT approx_percentile(col, 0.5, 100) FROM VALUES (0), (6), (7), (9), (10) AS tab(col);
     7
    > SELECT approx_percentile(col, 0.5, 100) FROM VALUES (INTERVAL '0' MONTH), (INTERVAL '1' MONTH), (INTERVAL '2' MONTH), (INTERVAL '10' MONTH) AS tab(col);
     0-1
    > SELECT approx_percentile(col, array(0.5, 0.7), 100) FROM VALUES (INTERVAL '0' SECOND), (INTERVAL '1' SECOND), (INTERVAL '2' SECOND), (INTERVAL '10' SECOND) AS tab(col);
     [0 00:00:01.000000000,0 00:00:02.000000000]
  since: "2.1.0"
- name: array
  class_name: "org.apache.spark.sql.catalyst.expressions.CreateArray"
  signatures:
    - "array(expr, ...)"
  description: "Returns an array with the given elements."
  examples: |
    > SELECT array(1, 2, 3);
     [1,2,3]
  since: "1.1.0"
- name: array_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CollectList"
  signatures:
    - "array_agg(expr)"
  description: "Collects and returns a list of non-unique elements."
  examples: |
    > SELECT array_agg(col) FROM VALUES (1), (2), (1) AS tab(col);
     [1,2,1]
  note: |
    The function is non-deterministic because the order of collected results depends
    on the order of the rows which may be non-deterministic after a shuffle.
  since: "3.3.0"
- name: array_append
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayAppend"
  signatures:
    - "array_append(array, element)"
  description: "Add the element at the end of the array passed as first argument. Type of element should be similar to type of the elements of the array. Null element is also appended into the array. But if the array passed, is NULL output is NULL"
  examples: |
    > SELECT array_append(array('b', 'd', 'c', 'a'), 'd');
     ["b","d","c","a","d"]
    > SELECT array_append(array(1, 2, 3, null), null);
     [1,2,3,null,null]
    > SELECT array_append(CAST(null as Array<Int>), 2);
     NULL
  since: "3.4.0"
- name: array_compact
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayCompact"
  signatures:
    - "array_compact(array)"
  description: "Removes null values from the array."
  examples: |
    > SELECT array_compact(array(1, 2, 3, null));
     [1,2,3]
    > SELECT array_compact(array("a", "b", "c"));
     ["a","b","c"]
  since: "3.4.0"
- name: array_concat
  signatures:
    - "array_concat(array, ...)"
  description: "Concatenates input arrays and returns the resulting array."
- name: array_contains
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayContains"
  signatures:
    - "array_contains(array, value)"
  description: "Returns true if the array contains the value."
  examples: |
    > SELECT array_contains(array(1, 2, 3), 2);
     true
  since: "1.5.0"
- name: array_contains_all
  signatures:
    - "array_contains_all(array, values)"
  description: "Returns true if array contains every element in values."
- name: array_distinct
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayDistinct"
  signatures:
    - "array_distinct(array)"
  description: "Removes duplicate values from the array."
  examples: |
    > SELECT array_distinct(array(1, 2, 3, null, 3));
     [1,2,3,null]
  since: "2.4.0"
- name: array_except
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayExcept"
  signatures:
    - "array_except(array1, array2)"
  description: "Returns an array of the elements in array1 but not in array2, without duplicates."
  examples: |
    > SELECT array_except(array(1, 2, 3), array(1, 3, 5));
     [2]
  since: "2.4.0"
- name: array_insert
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayInsert"
  signatures:
    - "array_insert(x, pos, val)"
  description: "Places val into index pos of array x. Array indices start at 1. The maximum negative index is -1 for which the function inserts new element after the current last element. Index above array size appends the array, or prepends the array if index is negative, with 'null' elements."
  examples: |
    > SELECT array_insert(array(1, 2, 3, 4), 5, 5);
     [1,2,3,4,5]
    > SELECT array_insert(array(5, 4, 3, 2), -1, 1);
     [5,4,3,2,1]
    > SELECT array_insert(array(5, 3, 2, 1), -4, 4);
     [5,4,3,2,1]
  since: "3.4.0"
- name: array_intersect
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayIntersect"
  signatures:
    - "array_intersect(array1, array2)"
  description: "Returns an array of the elements in the intersection of array1 and array2, without duplicates."
  examples: |
    > SELECT array_intersect(array(1, 2, 3), array(1, 3, 5));
     [1,3]
  since: "2.4.0"
- name: array_join
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayJoin"
  signatures:
    - "array_join(array, delimiter[, nullReplacement])"
  description: "Concatenates the elements of the given array using the delimiter and an optional string to replace nulls. If no value is set for nullReplacement, any null value is filtered."
  examples: |
    > SELECT array_join(array('hello', 'world'), ' ');
     hello world
    > SELECT array_join(array('hello', null ,'world'), ' ');
     hello world
    > SELECT array_join(array('hello', null ,'world'), ' ', ',');
     hello , world
  since: "2.4.0"
- name: array_max
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayMax"
  signatures:
    - "array_max(array)"
  description: "Returns the maximum value in the array. NaN is greater than any non-NaN elements for double/float type. NULL elements are skipped."
  examples: |
    > SELECT array_max(array(1, 20, null, 3));
     20
  since: "2.4.0"
- name: array_min
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayMin"
  signatures:
    - "array_min(array)"
  description: "Returns the minimum value in the array. NaN is greater than any non-NaN elements for double/float type. NULL elements are skipped."
  examples: |
    > SELECT array_min(array(1, 20, null, 3));
     1
  since: "2.4.0"
- name: array_position
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayPosition"
  signatures:
    - "array_position(array, element)"
  description: "Returns the (1-based) index of the first matching element of the array as long, or 0 if no match is found."
  examples: |
    > SELECT array_position(array(312, 773, 708, 708), 708);
     3
    > SELECT array_position(array(312, 773, 708, 708), 414);
     0
  since: "2.4.0"
- name: array_prepend
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayPrepend"
  signatures:
    - "array_prepend(array, element)"
  description: "Add the element at the beginning of the array passed as first argument. Type of element should be the same as the type of the elements of the array. Null element is also prepended to the array. But if the array passed is NULL output is NULL"
  examples: |
    > SELECT array_prepend(array('b', 'd', 'c', 'a'), 'd');
     ["d","b","d","c","a"]
    > SELECT array_prepend(array(1, 2, 3, null), null);
     [null,1,2,3,null]
    > SELECT array_prepend(CAST(null as Array<Int>), 2);
     NULL
  since: "3.5.0"
- name: array_remove
