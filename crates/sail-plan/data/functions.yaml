- name: aes_decrypt
  signatures:
    - "aes_decrypt(expr, key[, mode[, padding[, aad]]])"
  description: "Returns a decrypted value of expr using AES in mode with padding. Key lengths of 16, 24 and 32 bits are supported. Supported combinations of (mode, padding) are ('ECB', 'PKCS'), ('GCM', 'NONE') and ('CBC', 'PKCS'). Optional additional authenticated data (AAD) is only supported for GCM. If provided for encryption, the identical AAD value must be provided for decryption. The default mode is GCM."
- name: aes_encrypt
  signatures:
    - "aes_encrypt(expr, key[, mode[, padding[, iv[, aad]]]])"
  description: "Returns an encrypted value of expr using AES in given mode with the specified padding. Key lengths of 16, 24 and 32 bits are supported. Supported combinations of (mode, padding) are ('ECB', 'PKCS'), ('GCM', 'NONE') and ('CBC', 'PKCS'). Optional initialization vectors (IVs) are only supported for CBC and GCM modes. These must be 16 bytes for CBC and 12 bytes for GCM. If not provided, a random vector will be generated and prepended to the output. Optional additional authenticated data (AAD) is only supported for GCM. If provided for encryption, the identical AAD value must be provided for decryption. The default mode is GCM."
- name: aggregate
  signatures:
    - "aggregate(expr, start, merge, finish)"
  description: "Applies a binary operator to an initial state and all elements in the array, and reduces this to a single state. The final state is converted into the final result by applying a finish function."
- name: and
  signatures:
    - "expr1 and expr2"
  description: "Logical AND."
- name: any
  signatures:
    - "any(expr)"
  description: "Returns true if at least one value of expr is true."
- name: any_value
  signatures:
    - "any_value(expr[, isIgnoreNull])"
  description: "Returns some value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values."
- name: approx_count_distinct
  signatures:
    - "approx_count_distinct(expr[, relativeSD])"
  description: "Returns the estimated cardinality by HyperLogLog++. relativeSD defines the maximum relative standard deviation allowed."
- name: approx_percentile
  signatures:
    - "approx_percentile(col, percentage [, accuracy])"
  description: "Returns the approximate percentile of the numeric or ansi interval column col which is the smallest value in the ordered col values (sorted from least to greatest) such that no more than percentage of col values is less than the value or equal to that value. The value of percentage must be between 0.0 and 1.0. The accuracy parameter (default: 10000) is a positive numeric literal which controls approximation accuracy at the cost of memory. Higher value of accuracy yields better accuracy, 1.0/accuracy is the relative error of the approximation. When percentage is an array, each value of the percentage array must be between 0.0 and 1.0. In this case, returns the approximate percentile array of column col at the given percentage array."
- name: array
  signatures:
    - "array(expr, ...)"
  description: "Returns an array with the given elements."
- name: array_agg
  signatures:
    - "array_agg(expr)"
  description: "Collects and returns a list of non-unique elements."
- name: array_append
  signatures:
    - "array_append(array, element)"
  description: "Add the element at the end of the array passed as first argument. Type of element should be similar to type of the elements of the array. Null element is also appended into the array. But if the array passed, is NULL output is NULL"
- name: array_compact
  signatures:
    - "array_compact(array)"
  description: "Removes null values from the array."
- name: array_concat
  signatures:
    - "array_concat(array, ...)"
  description: "Concatenates input arrays and returns the resulting array."
- name: array_contains
  signatures:
    - "array_contains(array, value)"
  description: "Returns true if the array contains the value."
- name: array_contains_all
  signatures:
    - "array_contains_all(array, values)"
  description: "Returns true if array contains every element in values."
- name: array_distinct
  signatures:
    - "array_distinct(array)"
  description: "Removes duplicate values from the array."
- name: array_except
  signatures:
    - "array_except(array1, array2)"
  description: "Returns an array of the elements in array1 but not in array2, without duplicates."
- name: array_insert
  signatures:
    - "array_insert(x, pos, val)"
  description: "Places val into index pos of array x. Array indices start at 1. The maximum negative index is -1 for which the function inserts new element after the current last element. Index above array size appends the array, or prepends the array if index is negative, with 'null' elements."
- name: array_intersect
  signatures:
    - "array_intersect(array1, array2)"
  description: "Returns an array of the elements in the intersection of array1 and array2, without duplicates."
- name: array_join
  signatures:
    - "array_join(array, delimiter[, nullReplacement])"
  description: "Concatenates the elements of the given array using the delimiter and an optional string to replace nulls. If no value is set for nullReplacement, any null value is filtered."
- name: array_max
  signatures:
    - "array_max(array)"
  description: "Returns the maximum value in the array. NaN is greater than any non-NaN elements for double/float type. NULL elements are skipped."
- name: array_min
  signatures:
    - "array_min(array)"
  description: "Returns the minimum value in the array. NaN is greater than any non-NaN elements for double/float type. NULL elements are skipped."
- name: array_position
  signatures:
    - "array_position(array, element)"
  description: "Returns the (1-based) index of the first matching element of the array as long, or 0 if no match is found."
- name: array_prepend
  signatures:
    - "array_prepend(array, element)"
  description: "Add the element at the beginning of the array passed as first argument. Type of element should be the same as the type of the elements of the array. Null element is also prepended to the array. But if the array passed is NULL output is NULL"
- name: array_remove
  signatures:
    - "array_remove(array, element)"
  description: "Remove all elements that equal to element from array."
- name: array_repeat
  signatures:
    - "array_repeat(element, count)"
  description: "Returns the array containing element count times."
- name: array_size
  signatures:
    - "array_size(expr)"
  description: "Returns the size of an array. The function returns null for null input."
- name: array_sort
  signatures:
    - "array_sort(expr, func)"
  description: "Sorts the input array. If func is omitted, sort in ascending order. The elements of the input array must be orderable. NaN is greater than any non-NaN elements for double/float type. Null elements will be placed at the end of the returned array. Since 3.0.0 this function also sorts and returns the array based on the given comparator function. The comparator will take two arguments representing two elements of the array. It returns a negative integer, 0, or a positive integer as the first element is less than, equal to, or greater than the second element. If the comparator function returns null, the function will fail and raise an error."
- name: array_union
  signatures:
    - "array_union(array1, array2)"
  description: "Returns an array of the elements in the union of array1 and array2, without duplicates."
- name: arrays_overlap
  signatures:
    - "arrays_overlap(a1, a2)"
  description: "Returns true if a1 contains at least a non-null element present also in a2. If the arrays have no common element and they are both non-empty and either of them contains a null element null is returned, false otherwise."
- name: arrays_zip
  signatures:
    - "arrays_zip(a1, a2, ...)"
  description: "Returns a merged array of structs in which the N-th struct contains all N-th values of input arrays."
- name: ascii
