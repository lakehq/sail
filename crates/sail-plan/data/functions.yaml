  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseGet"
  signatures:
    - "bit_get(expr, pos)"
  description: "Returns the value of the bit (0 or 1) at the specified position. The positions are numbered from right to left, starting at zero. The position argument cannot be negative."
  examples: |
    > SELECT bit_get(11, 0);
     1
    > SELECT bit_get(11, 2);
     0
  since: "3.2.0"
- name: bit_length
  class_name: "org.apache.spark.sql.catalyst.expressions.BitLength"
