  description: "Returns e to the power of expr."
  examples: |
    > SELECT exp(0);
     1.0
  since: "1.4.0"
- name: explode
  class_name: "org.apache.spark.sql.catalyst.expressions.ExplodeExpressionBuilder"
  signatures:
    - "explode(expr)"
  description: "Separates the elements of array expr into multiple rows, or the elements of map expr into multiple rows and columns. Unless specified otherwise, uses the default column name col for elements of the array or key and value for the elements of the map."
  examples: |
    > SELECT * FROM explode(array(10, 20));
     10
     20
    > SELECT * FROM explode(collection => array(10, 20));
     10
     20
  since: "3.4.0"
- name: explode_outer
  class_name: "org.apache.spark.sql.catalyst.expressions.ExplodeExpressionBuilder"
  signatures:
    - "explode_outer(expr)"
  description: "Separates the elements of array expr into multiple rows, or the elements of map expr into multiple rows and columns. Unless specified otherwise, uses the default column name col for elements of the array or key and value for the elements of the map."
  examples: |
    > SELECT * FROM explode_outer(array(10, 20));
     10
     20
    > SELECT * FROM explode_outer(collection => array(10, 20));
     10
     20
  since: "3.4.0"
- name: expm1
  class_name: "org.apache.spark.sql.catalyst.expressions.Expm1"
  signatures:
    - "expm1(expr)"
  description: "Returns exp(expr) - 1."
  examples: |
    > SELECT expm1(0);
     0.0
  since: "1.4.0"
- name: extract
  class_name: "org.apache.spark.sql.catalyst.expressions.Extract"
  signatures:
    - "extract(field FROM source)"
  description: "Extracts a part of the date or timestamp or time or interval source."
  examples: |
    > SELECT extract(YEAR FROM TIMESTAMP '2019-08-12 01:00:00.123456');
     2019
    > SELECT extract(week FROM timestamp'2019-08-12 01:00:00.123456');
     33
    > SELECT extract(doy FROM DATE'2019-08-12');
     224
    > SELECT extract(SECONDS FROM timestamp'2019-10-01 00:00:01.000001');
     1.000001
    > SELECT extract(days FROM interval 5 days 3 hours 7 minutes);
     5
    > SELECT extract(seconds FROM interval 5 hours 30 seconds 1 milliseconds 1 microseconds);
     30.001001
    > SELECT extract(MONTH FROM INTERVAL '2021-11' YEAR TO MONTH);
     11
    > SELECT extract(MINUTE FROM INTERVAL '123 23:55:59.002001' DAY TO SECOND);
     55
    > SELECT extract(HOUR FROM time '09:08:01.000001');
     9
    > SELECT extract(MINUTE FROM time '09:08:01.000001');
     8
    > SELECT extract(SECOND FROM time '09:08:01.000001');
     1.000001
  note: "The extract function is equivalent to date_part(field, source)."
  since: "3.0.0"
- name: factorial
  class_name: "org.apache.spark.sql.catalyst.expressions.Factorial"
  signatures:
    - "factorial(expr)"
  description: "Returns the factorial of expr. expr is [0..20]. Otherwise, null."
  examples: |
    > SELECT factorial(5);
     120
  since: "1.5.0"
- name: filter
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayFilter"
  signatures:
    - "filter(expr, func)"
  description: "Filters the input array using the given predicate."
  examples: |
    > SELECT filter(array(1, 2, 3), x -> x % 2 == 1);
     [1,3]
    > SELECT filter(array(0, 2, 3), (x, i) -> x > i);
     [2,3]
    > SELECT filter(array(0, null, 2, 3, null), x -> x IS NOT NULL);
     [0,2,3]
  note: "The inner function may use the index argument since 3.0.0."
  since: "2.4.0"
- name: find_in_set
  class_name: "org.apache.spark.sql.catalyst.expressions.FindInSet"
  signatures:
    - "find_in_set(str, str_array)"
  description: "Returns the index (1-based) of the given string (str) in the comma-delimited list (str_array). Returns 0, if the string was not found or if the given string (str) contains a comma."
  examples: |
    > SELECT find_in_set('ab','abc,b,ab,c,def');
     3
  since: "1.5.0"
- name: first
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.First"
  signatures:
    - "first(expr[, isIgnoreNull])"
  description: "Returns the first value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values."
  examples: |
    > SELECT first(col) FROM VALUES (10), (5), (20) AS tab(col);
     10
    > SELECT first(col) FROM VALUES (NULL), (5), (20) AS tab(col);
     NULL
    > SELECT first(col, true) FROM VALUES (NULL), (5), (20) AS tab(col);
     5
  note: |
    The function is non-deterministic because its results depends on the order of the rows
    which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: first_value
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.First"
  signatures:
    - "first_value(expr[, isIgnoreNull])"
  description: "Returns the first value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values."
  examples: |
    > SELECT first_value(col) FROM VALUES (10), (5), (20) AS tab(col);
     10
    > SELECT first_value(col) FROM VALUES (NULL), (5), (20) AS tab(col);
     NULL
    > SELECT first_value(col, true) FROM VALUES (NULL), (5), (20) AS tab(col);
     5
  note: |
    The function is non-deterministic because its results depends on the order of the rows
    which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: flatten
  class_name: "org.apache.spark.sql.catalyst.expressions.Flatten"
  signatures:
    - "flatten(arrayOfArrays)"
  description: "Transforms an array of arrays into a single array."
  examples: |
    > SELECT flatten(array(array(1, 2), array(3, 4)));
     [1,2,3,4]
  since: "2.4.0"
- name: float
  class_name: "org.apache.spark.sql.catalyst.expressions.Cast"
  signatures:
    - "float(expr)"
  description: "Casts the value expr to the target data type float."
  since: "2.0.1"
- name: floor
  class_name: "org.apache.spark.sql.catalyst.expressions.FloorExpressionBuilder"
  signatures:
    - "floor(expr[, scale])"
  description: "Returns the largest number after rounding down that is not greater than expr. An optional scale parameter can be specified to control the rounding behavior."
  examples: |
    > SELECT floor(-0.1);
     -1
    > SELECT floor(5);
     5
    > SELECT floor(3.1411, 3);
     3.141
    > SELECT floor(3.1411, -3);
     0
  since: "3.3.0"
- name: forall
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayForAll"
  signatures:
    - "forall(expr, pred)"
  description: "Tests whether a predicate holds for all elements in the array."
  examples: |
    > SELECT forall(array(1, 2, 3), x -> x % 2 == 0);
     false
    > SELECT forall(array(2, 4, 8), x -> x % 2 == 0);
     true
    > SELECT forall(array(1, null, 3), x -> x % 2 == 0);
     false
    > SELECT forall(array(2, null, 8), x -> x % 2 == 0);
     NULL
  since: "3.0.0"
- name: format_number
  class_name: "org.apache.spark.sql.catalyst.expressions.FormatNumber"
  signatures:
    - "format_number(expr1, expr2)"
  description: "Formats the number expr1 like '#,###,###.##', rounded to expr2 decimal places. If expr2 is 0, the result has no decimal point or fractional part. expr2 also accept a user specified format. This is supposed to function like MySQL's FORMAT."
  examples: |
    > SELECT format_number(12332.123456, 4);
     12,332.1235
    > SELECT format_number(12332.123456, '##################.###');
     12332.123
  since: "1.5.0"
- name: format_string
  class_name: "org.apache.spark.sql.catalyst.expressions.FormatString"
  signatures:
    - "format_string(strfmt, obj, ...)"
  description: "Returns a formatted string from printf-style format strings."
  examples: |
    > SELECT format_string("Hello World %d %s", 100, "days");
     Hello World 100 days
  since: "1.5.0"
- name: from_avro
  class_name: "org.apache.spark.sql.catalyst.expressions.FromAvro"
  signatures:
    - "from_avro(child, jsonFormatSchema, options)"
  description: "Converts a binary Avro value into a Catalyst value."
  examples: |
    > SELECT from_avro(s, '{"type": "record", "name": "struct", "fields": [{ "name": "u", "type": ["int","string"] }]}', map()) IS NULL AS result FROM (SELECT NAMED_STRUCT('u', NAMED_STRUCT('member0', member0, 'member1', member1)) AS s FROM VALUES (1, NULL), (NULL,  'a') tab(member0, member1));
     [false]
  note: |
    The specified schema must match actual schema of the read data, otherwise the behavior
    is undefined: it may fail or return arbitrary result.
    To deserialize the data with a compatible and evolved schema, the expected Avro schema can be
    set via the corresponding option.
  since: "4.0.0"
- name: from_csv
  class_name: "org.apache.spark.sql.catalyst.expressions.CsvToStructs"
  signatures:
    - "from_csv(csvStr, schema[, options])"
  description: "Returns a struct value with the given csvStr and schema."
  examples: |
    > SELECT from_csv('1, 0.8', 'a INT, b DOUBLE');
     {"a":1,"b":0.8}
    > SELECT from_csv('26/08/2015', 'time Timestamp', map('timestampFormat', 'dd/MM/yyyy'));
     {"time":2015-08-26 00:00:00}
  since: "3.0.0"
- name: from_json
  class_name: "org.apache.spark.sql.catalyst.expressions.JsonToStructs"
  signatures:
    - "from_json(jsonStr, schema[, options])"
  description: "Returns a struct value with the given jsonStr and schema."
  examples: |
    > SELECT from_json('{"a":1, "b":0.8}', 'a INT, b DOUBLE');
     {"a":1,"b":0.8}
    > SELECT from_json('{"time":"26/08/2015"}', 'time Timestamp', map('timestampFormat', 'dd/MM/yyyy'));
     {"time":2015-08-26 00:00:00}
    > SELECT from_json('{"teacher": "Alice", "student": [{"name": "Bob", "rank": 1}, {"name": "Charlie", "rank": 2}]}', 'STRUCT<teacher: STRING, student: ARRAY<STRUCT<name: STRING, rank: INT>>>');
     {"teacher":"Alice","student":[{"name":"Bob","rank":1},{"name":"Charlie","rank":2}]}
  since: "2.2.0"
- name: from_protobuf
  class_name: "org.apache.spark.sql.catalyst.expressions.FromProtobuf"
  signatures:
    - "from_protobuf(data, messageName, descFilePath, options)"
  description: "Converts a binary Protobuf value into a Catalyst value."
  examples: |
    > SELECT from_protobuf(s, 'Person', '/path/to/descriptor.desc', map()) IS NULL AS result FROM (SELECT NAMED_STRUCT('name', name, 'id', id) AS s FROM VALUES ('John Doe', 1), (NULL,  2) tab(name, id));
     [false]
  note: |
    The specified Protobuf schema must match actual schema of the read data, otherwise the behavior
    is undefined: it may fail or return arbitrary result.
    To deserialize the data with a compatible and evolved schema, the expected Protobuf schema can be
    set via the corresponding option.
  since: "4.0.0"
- name: from_unixtime
  class_name: "org.apache.spark.sql.catalyst.expressions.FromUnixTime"
  signatures:
    - "from_unixtime(unix_time[, fmt])"
  description: "Returns unix_time in the specified fmt."
  examples: |
    > SELECT from_unixtime(0, 'yyyy-MM-dd HH:mm:ss');
     1969-12-31 16:00:00

    > SELECT from_unixtime(0);
     1969-12-31 16:00:00
  since: "1.5.0"
- name: from_utc_timestamp
  class_name: "org.apache.spark.sql.catalyst.expressions.FromUTCTimestamp"
  signatures:
    - "from_utc_timestamp(timestamp, timezone)"
  description: "Given a timestamp like '2017-07-14 02:40:00.0', interprets it as a time in UTC, and renders that time as a timestamp in the given time zone. For example, 'GMT+1' would yield '2017-07-14 03:40:00.0'."
  examples: |
    > SELECT from_utc_timestamp('2016-08-31', 'Asia/Seoul');
     2016-08-31 09:00:00
  since: "1.5.0"
- name: from_xml
  class_name: "org.apache.spark.sql.catalyst.expressions.XmlToStructs"
  signatures:
    - "from_xml(xmlStr, schema[, options])"
  description: "Returns a struct value with the given xmlStr and schema."
  examples: |
    > SELECT from_xml('<p><a>1</a><b>0.8</b></p>', 'a INT, b DOUBLE');
     {"a":1,"b":0.8}
    > SELECT from_xml('<p><time>26/08/2015</time></p>', 'time Timestamp', map('timestampFormat', 'dd/MM/yyyy'));
     {"time":2015-08-26 00:00:00}
    > SELECT from_xml('<p><teacher>Alice</teacher><student><name>Bob</name><rank>1</rank></student><student><name>Charlie</name><rank>2</rank></student></p>', 'STRUCT<teacher: STRING, student: ARRAY<STRUCT<name: STRING, rank: INT>>>');
     {"teacher":"Alice","student":[{"name":"Bob","rank":1},{"name":"Charlie","rank":2}]}
  since: "4.0.0"
- name: get
  class_name: "org.apache.spark.sql.catalyst.expressions.Get"
  signatures:
    - "get(array, index)"
  description: "Returns element of array at given (0-based) index. If the index points outside of the array boundaries, then this function returns NULL."
  examples: |
    > SELECT get(array(1, 2, 3), 0);
     1
    > SELECT get(array(1, 2, 3), 3);
     NULL
    > SELECT get(array(1, 2, 3), -1);
     NULL
  since: "3.4.0"
- name: get_json_object
  class_name: "org.apache.spark.sql.catalyst.expressions.GetJsonObject"
  signatures:
    - "get_json_object(json_txt, path)"
  description: "Extracts a json object from path."
  examples: |
    > SELECT get_json_object('{"a":"b"}', '$.a');
     b
    > SELECT get_json_object('[{"a":"b"},{"a":"c"}]', '$[0].a');
     b
    > SELECT get_json_object('[{"a":"b"},{"a":"c"}]', '$[*].a');
     ["b","c"]
  since: "1.5.0"
- name: getbit
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseGet"
  signatures:
    - "getbit(expr, pos)"
  description: "Returns the value of the bit (0 or 1) at the specified position. The positions are numbered from right to left, starting at zero. The position argument cannot be negative."
  examples: |
    > SELECT getbit(11, 0);
     1
    > SELECT getbit(11, 2);
     0
  since: "3.2.0"
- name: greatest
  class_name: "org.apache.spark.sql.catalyst.expressions.Greatest"
  signatures:
    - "greatest(expr, ...)"
  description: "Returns the greatest value of all parameters, skipping null values."
  examples: |
    > SELECT greatest(10, 9, 2, 4, 3);
     10
  since: "1.5.0"
- name: grouping
  class_name: "org.apache.spark.sql.catalyst.expressions.Grouping"
  signatures:
    - "grouping(col)"
  description: "indicates whether a specified column in a GROUP BY is aggregated or not, returns 1 for aggregated or 0 for not aggregated in the result set.\","
  examples: |
    > SELECT name, grouping(name), sum(age) FROM VALUES (2, 'Alice'), (5, 'Bob') people(age, name) GROUP BY cube(name);
      Alice 0   2
      Bob   0   5
      NULL  1   7
  since: "2.0.0"
- name: grouping_id
  class_name: "org.apache.spark.sql.catalyst.expressions.GroupingID"
  signatures:
    - "grouping_id([col1[, col2 ..]])"
  description: "returns the level of grouping, equals to (grouping(c1) << (n-1)) + (grouping(c2) << (n-2)) + ... + grouping(cn)"
  examples: |
    > SELECT name, grouping_id(), sum(age), avg(height) FROM VALUES (2, 'Alice', 165), (5, 'Bob', 180) people(age, name, height) GROUP BY cube(name, height);
      Alice 0   2   165.0
      Alice 1   2   165.0
      NULL  3   7   172.5
      Bob   0   5   180.0
      Bob   1   5   180.0
      NULL  2   2   165.0
      NULL  2   5   180.0
  note: |
    Input columns should match with grouping columns exactly, or empty (means all the grouping
    columns).
  since: "2.0.0"
- name: hash
  class_name: "org.apache.spark.sql.catalyst.expressions.Murmur3Hash"
  signatures:
    - "hash(expr1, expr2, ...)"
  description: "Returns a hash value of the arguments."
  examples: |
    > SELECT hash('Spark', array(123), 2);
     -1321691492
  since: "2.0.0"
- name: hex
  class_name: "org.apache.spark.sql.catalyst.expressions.Hex"
  signatures:
    - "hex(expr)"
  description: "Converts expr to hexadecimal."
  examples: |
    > SELECT hex(17);
     11
    > SELECT hex('Spark SQL');
     537061726B2053514C
  since: "1.5.0"
- name: histogram_numeric
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.HistogramNumeric"
  signatures:
    - "histogram_numeric(expr, nb)"
  description: "Computes a histogram on numeric 'expr' using nb bins. The return value is an array of (x,y) pairs representing the centers of the histogram's bins. As the value of 'nb' is increased, the histogram approximation gets finer-grained, but may yield artifacts around outliers. In practice, 20-40 histogram bins appear to work well, with more bins being required for skewed or smaller datasets. Note that this function creates a histogram with non-uniform bin widths. It offers no guarantees in terms of the mean-squared-error of the histogram, but in practice is comparable to the histograms produced by the R/S-Plus statistical computing packages. Note: the output type of the 'x' field in the return value is propagated from the input value consumed in the aggregate function."
  examples: |
    > SELECT histogram_numeric(col, 5) FROM VALUES (0), (1), (2), (10) AS tab(col);
     [{"x":0,"y":1.0},{"x":1,"y":1.0},{"x":2,"y":1.0},{"x":10,"y":1.0}]
  since: "3.3.0"
- name: hll_sketch_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.HllSketchAgg"
  signatures:
    - "hll_sketch_agg(expr, lgConfigK)"
  description: "Returns the HllSketch's updatable binary representation. lgConfigK (optional) the log-base-2 of K, with K is the number of buckets or slots for the HllSketch."
  examples: |
    > SELECT hll_sketch_estimate(hll_sketch_agg(col, 12)) FROM VALUES (1), (1), (2), (2), (3) tab(col);
     3
  since: "3.5.0"
- name: hll_sketch_estimate
  class_name: "org.apache.spark.sql.catalyst.expressions.HllSketchEstimate"
  signatures:
    - "hll_sketch_estimate(expr)"
  description: "Returns the estimated number of unique values given the binary representation of a Datasketches HllSketch."
  examples: |
    > SELECT hll_sketch_estimate(hll_sketch_agg(col)) FROM VALUES (1), (1), (2), (2), (3) tab(col);
     3
  since: "3.5.0"
- name: hll_union
  class_name: "org.apache.spark.sql.catalyst.expressions.HllUnion"
  signatures:
    - "hll_union(first, second, allowDifferentLgConfigK)"
  description: "Merges two binary representations of Datasketches HllSketch objects, using a Datasketches Union object. Set allowDifferentLgConfigK to true to allow unions of sketches with different lgConfigK values (defaults to false)."
  examples: |
    > SELECT hll_sketch_estimate(hll_union(hll_sketch_agg(col1), hll_sketch_agg(col2))) FROM VALUES (1, 4), (1, 4), (2, 5), (2, 5), (3, 6) tab(col1, col2);
     6
  since: "3.5.0"
- name: hll_union_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.HllUnionAgg"
  signatures:
    - "hll_union_agg(expr, allowDifferentLgConfigK)"
  description: "Returns the estimated number of unique values. allowDifferentLgConfigK (optional) Allow sketches with different lgConfigK values to be unioned (defaults to false)."
  examples: |
    > SELECT hll_sketch_estimate(hll_union_agg(sketch, true)) FROM (SELECT hll_sketch_agg(col) as sketch FROM VALUES (1) tab(col) UNION ALL SELECT hll_sketch_agg(col, 20) as sketch FROM VALUES (1) tab(col));
     1
  since: "3.5.0"
- name: hour
  class_name: "org.apache.spark.sql.catalyst.expressions.HourExpressionBuilder"
  signatures:
    - "hour(expr)"
  description: "Returns the hour component of the given expression."
  examples: |
    > SELECT hour('2018-02-14 12:58:59');
     12
    > SELECT hour(TIME'13:59:59.999999');
     13
  since: "1.5.0"
- name: hypot
  class_name: "org.apache.spark.sql.catalyst.expressions.Hypot"
  signatures:
    - "hypot(expr1, expr2)"
  description: "Returns sqrt(expr1\u00b2 + expr2\u00b2)."
  examples: |
    > SELECT hypot(3, 4);
     5.0
  since: "1.4.0"
- name: if
  class_name: "org.apache.spark.sql.catalyst.expressions.If"
  signatures:
    - "if(expr1, expr2, expr3)"
  description: "If expr1 evaluates to true, then returns expr2; otherwise returns expr3."
  examples: |
    > SELECT if(1 < 2, 'a', 'b');
     a
  since: "1.0.0"
- name: ifnull
  class_name: "org.apache.spark.sql.catalyst.expressions.Nvl"
  signatures:
    - "ifnull(expr1, expr2)"
  description: "Returns expr2 if expr1 is null, or expr1 otherwise."
  examples: |
    > SELECT ifnull(NULL, array('2'));
     ["2"]
  since: "2.0.0"
- name: ilike
  class_name: "org.apache.spark.sql.catalyst.expressions.ILike"
  signatures:
    - "str ilike pattern[ ESCAPE escape]"
  description: "Returns true if str matches pattern with escape case-insensitively, null if any arguments are null, false otherwise."
  examples: |
    > SELECT ilike('Spark', '_Park');
    true
    > SELECT '\\abc' AS S, S ilike r'\\abc', S ilike '\\\\abc';
    \abc    true    true
    > SET spark.sql.parser.escapedStringLiterals=true;
    spark.sql.parser.escapedStringLiterals  true
    > SELECT '%SystemDrive%\Users\John' ilike '\%SystemDrive\%\\users%';
    true
    > SET spark.sql.parser.escapedStringLiterals=false;
    spark.sql.parser.escapedStringLiterals  false
    > SELECT '%SystemDrive%\\USERS\\John' ilike r'%SystemDrive%\\Users%';
    true
    > SELECT '%SystemDrive%/Users/John' ilike '/%SYSTEMDrive/%//Users%' ESCAPE '/';
    true
  note: "Use RLIKE to match with standard regular expressions."
  since: "3.3.0"
- name: in
  class_name: "org.apache.spark.sql.catalyst.expressions.In"
  signatures:
    - "expr1 in(expr2, expr3, ...)"
  description: "Returns true if expr equals to any valN."
  examples: |
    > SELECT 1 in(1, 2, 3);
     true
    > SELECT 1 in(2, 3, 4);
     false
    > SELECT named_struct('a', 1, 'b', 2) in(named_struct('a', 1, 'b', 1), named_struct('a', 1, 'b', 3));
     false
    > SELECT named_struct('a', 1, 'b', 2) in(named_struct('a', 1, 'b', 2), named_struct('a', 1, 'b', 3));
     true
  since: "1.0.0"
- name: initcap
  class_name: "org.apache.spark.sql.catalyst.expressions.InitCap"
  signatures:
    - "initcap(str)"
  description: "Returns str with the first letter of each word in uppercase. All other letters are in lowercase. Words are delimited by white space."
  examples: |
    > SELECT initcap('sPark sql');
     Spark Sql
  since: "1.5.0"
- name: inline
  class_name: "org.apache.spark.sql.catalyst.expressions.InlineExpressionBuilder"
  signatures:
    - "inline(expr)"
  description: "Explodes an array of structs into a table. Uses column names col1, col2, etc. by default unless specified otherwise."
  examples: |
    > SELECT inline(array(struct(1, 'a'), struct(2, 'b')));
     1  a
     2  b
    > SELECT inline(input => array(struct(1, 'a'), struct(2, 'b')));
     1  a
     2  b
  since: "2.0.0"
- name: inline_outer
  class_name: "org.apache.spark.sql.catalyst.expressions.InlineExpressionBuilder"
  signatures:
    - "inline_outer(expr)"
  description: "Explodes an array of structs into a table. Uses column names col1, col2, etc. by default unless specified otherwise."
  examples: |
    > SELECT * FROM inline_outer(array(struct(1, 'a'), struct(2, 'b')));
     1  a
     2  b
    > SELECT * FROM inline_outer(input => array(struct(1, 'a'), struct(2, 'b')));
     1  a
