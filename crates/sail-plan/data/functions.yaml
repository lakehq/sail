  signatures:
    - "to_char(expr, format)"
  description: "Convert expr to a string based on the format. Throws an exception if the conversion fails. The format can consist of the following characters, case insensitive: '0' or '9': Specifies an expected digit between 0 and 9. A sequence of 0 or 9 in the format string matches a sequence of digits in the input value, generating a result string of the same length as the corresponding sequence in the format string. The result string is left-padded with zeros if the 0/9 sequence comprises more digits than the matching part of the decimal value, starts with 0, and is before the decimal point. Otherwise, it is padded with spaces. '.' or 'D': Specifies the position of the decimal point (optional, only allowed once). ',' or 'G': Specifies the position of the grouping (thousands) separator (,). There must be a 0 or 9 to the left and right of each grouping separator. '$': Specifies the location of the $ currency sign. This character may only be specified once. 'S' or 'MI': Specifies the position of a '-' or '+' sign (optional, only allowed once at the beginning or end of the format string). Note that 'S' prints '+' for positive values but 'MI' prints a space. 'PR': Only allowed at the end of the format string; specifies that the result string will be wrapped by angle brackets if the input value is negative. ('<1>'). If expr is a datetime, format shall be a valid datetime pattern, see Datetime Patterns. If expr is a binary, it is converted to a string in one of the formats: 'base64': a base 64 string. 'hex': a string in the hexadecimal format. 'utf-8': the input binary is decoded to UTF-8 string."
- name: to_csv
  signatures:
    - "to_csv(expr[, options])"
  description: "Returns a CSV string with a given struct value"
- name: to_date
  signatures:
    - "to_date(date_str[, fmt])"
  description: "Parses the date_str expression with the fmt expression to a date. Returns null with invalid input. By default, it follows casting rules to a date if the fmt is omitted."
- name: to_json
  signatures:
    - "to_json(expr[, options])"
  description: "Returns a JSON string with a given struct value"
- name: to_number
  signatures:
    - "to_number(expr, fmt)"
  description: "Convert string 'expr' to a number based on the string format 'fmt'. Throws an exception if the conversion fails. The format can consist of the following characters, case insensitive: '0' or '9': Specifies an expected digit between 0 and 9. A sequence of 0 or 9 in the format string matches a sequence of digits in the input string. If the 0/9 sequence starts with 0 and is before the decimal point, it can only match a digit sequence of the same size. Otherwise, if the sequence starts with 9 or is after the decimal point, it can match a digit sequence that has the same or smaller size. '.' or 'D': Specifies the position of the decimal point (optional, only allowed once). ',' or 'G': Specifies the position of the grouping (thousands) separator (,). There must be a 0 or 9 to the left and right of each grouping separator. 'expr' must match the grouping separator relevant for the size of the number. '$': Specifies the location of the $ currency sign. This character may only be specified once. 'S' or 'MI': Specifies the position of a '-' or '+' sign (optional, only allowed once at the beginning or end of the format string). Note that 'S' allows '-' but 'MI' does not. 'PR': Only allowed at the end of the format string; specifies that 'expr' indicates a negative number with wrapping angled brackets. ('<1>')."
- name: to_protobuf
  signatures:
    - "to_protobuf(child, messageName, descFilePath, options)"
  description: "Converts a Catalyst binary input value into its corresponding Protobuf format result."
- name: to_time
  signatures:
    - "to_time(str[, format])"
  description: "Parses the str expression with the format expression to a time. If format is malformed or its application does not result in a well formed time, the function raises an error. By default, it follows casting rules to a time if the format is omitted."
- name: to_timestamp
  signatures:
    - "to_timestamp(timestamp_str[, fmt])"
  description: "Parses the timestamp_str expression with the fmt expression to a timestamp. Returns null with invalid input. By default, it follows casting rules to a timestamp if the fmt is omitted. The result data type is consistent with the value of configuration spark.sql.timestampType."
- name: to_timestamp_ltz
  signatures:
    - "to_timestamp_ltz(timestamp_str[, fmt])"
  description: "Parses the timestamp_str expression with the fmt expression to a timestamp with local time zone. Returns null with invalid input. By default, it follows casting rules to a timestamp if the fmt is omitted."
- name: to_timestamp_ntz
  signatures:
    - "to_timestamp_ntz(timestamp_str[, fmt])"
  description: "Parses the timestamp_str expression with the fmt expression to a timestamp without time zone. Returns null with invalid input. By default, it follows casting rules to a timestamp if the fmt is omitted."
- name: to_unix_timestamp
  signatures:
    - "to_unix_timestamp(timeExp[, fmt])"
  description: "Returns the UNIX timestamp of the given time."
- name: to_utc_timestamp
  signatures:
    - "to_utc_timestamp(timestamp, timezone)"
  description: "Given a timestamp like '2017-07-14 02:40:00.0', interprets it as a time in the given time zone, and renders that time as a timestamp in UTC. For example, 'GMT+1' would yield '2017-07-14 01:40:00.0'."
- name: to_varchar
  signatures:
    - "to_varchar(expr, format)"
  description: "Convert expr to a string based on the format. Throws an exception if the conversion fails. The format can consist of the following characters, case insensitive: '0' or '9': Specifies an expected digit between 0 and 9. A sequence of 0 or 9 in the format string matches a sequence of digits in the input value, generating a result string of the same length as the corresponding sequence in the format string. The result string is left-padded with zeros if the 0/9 sequence comprises more digits than the matching part of the decimal value, starts with 0, and is before the decimal point. Otherwise, it is padded with spaces. '.' or 'D': Specifies the position of the decimal point (optional, only allowed once). ',' or 'G': Specifies the position of the grouping (thousands) separator (,). There must be a 0 or 9 to the left and right of each grouping separator. '$': Specifies the location of the $ currency sign. This character may only be specified once. 'S' or 'MI': Specifies the position of a '-' or '+' sign (optional, only allowed once at the beginning or end of the format string). Note that 'S' prints '+' for positive values but 'MI' prints a space. 'PR': Only allowed at the end of the format string; specifies that the result string will be wrapped by angle brackets if the input value is negative. ('<1>'). If expr is a datetime, format shall be a valid datetime pattern, see Datetime Patterns. If expr is a binary, it is converted to a string in one of the formats: 'base64': a base 64 string. 'hex': a string in the hexadecimal format. 'utf-8': the input binary is decoded to UTF-8 string."
- name: to_variant_object
  signatures:
    - "to_variant_object(expr)"
  description: "Convert a nested input (array/map/struct) into a variant where maps and structs are converted to variant objects which are unordered unlike SQL structs. Input maps can only have string keys."
- name: to_xml
  signatures:
    - "to_xml(expr[, options])"
  description: "Returns a XML string with a given struct value"
- name: transform
  signatures:
    - "transform(expr, func)"
  description: "Transforms elements in an array using the function."
- name: transform_keys
  signatures:
    - "transform_keys(expr, func)"
  description: "Transforms elements in a map using the function."
- name: transform_values
  signatures:
    - "transform_values(expr, func)"
  description: "Transforms values in the map using the function."
- name: translate
  signatures:
    - "translate(input, from, to)"
  description: "Translates the input string by replacing the characters present in the from string with the corresponding characters in the to string."
- name: trim
  signatures:
    - "trim(str)"
  description: "Removes the leading and trailing space characters from str."
- name: trunc
  signatures:
    - "trunc(date, fmt)"
  description: "Returns date with the time portion of the day truncated to the unit specified by the format model fmt."
- name: try_add
  signatures:
    - "try_add(expr1, expr2)"
  description: "Returns the sum of expr1and expr2 and the result is null on overflow. The acceptable input types are the same with the + operator."
- name: try_aes_decrypt
  signatures:
    - "try_aes_decrypt(expr, key[, mode[, padding[, aad]]])"
  description: "This is a special version of aes_decrypt that performs the same operation, but returns a NULL value instead of raising an error if the decryption cannot be performed."
- name: try_aes_encrypt
  signatures:
    - "try_aes_encrypt(expr, key[, mode[, padding[, iv[, aad]]]])"
  description: "This is a special version of aes_encrypt that performs the same operation, but returns a NULL value instead of raising an error if encryption cannot be performed."
- name: try_avg
  signatures:
    - "try_avg(expr)"
  description: "Returns the mean calculated from values of a group and the result is null on overflow."
- name: try_divide
  signatures:
    - "try_divide(dividend, divisor)"
  description: "Returns dividend/divisor. It always performs floating point division. Its result is always null if expr2 is 0. dividend must be a numeric or an interval. divisor must be a numeric."
- name: try_element_at
  signatures:
    - "try_element_at(array, index)"
  description: "Returns element of array at given (1-based) index. If Index is 0, Spark will throw an error. If index < 0, accesses elements from the last to the first. The function always returns NULL if the index exceeds the length of the array."
- name: try_make_interval
  signatures:
    - "try_make_interval([years[, months[, weeks[, days[, hours[, mins[, secs]]]]]]])"
  description: "This is a special version of make_interval that performs the same operation, but returns NULL when an overflow occurs."
- name: try_make_timestamp
  signatures:
    - "try_make_timestamp(year, month, day, hour, min, sec[, timezone])"
  description: "Try to create a timestamp from year, month, day, hour, min, sec and timezone fields. The result data type is consistent with the value of configuration spark.sql.timestampType. The function returns NULL on invalid inputs."
- name: try_make_timestamp_ltz
  signatures:
    - "try_make_timestamp_ltz(year, month, day, hour, min, sec[, timezone])"
  description: "Try to create the current timestamp with local time zone from year, month, day, hour, min, sec and (optional) timezone fields. The function returns NULL on invalid inputs."
- name: try_make_timestamp_ntz
  signatures:
    - "try_make_timestamp_ntz(year, month, day, hour, min, sec)"
  description: "Try to create local date-time from year, month, day, hour, min, sec fields. The function returns NULL on invalid inputs."
- name: try_mod
  signatures:
    - "try_mod(dividend, divisor)"
  description: "Returns the remainder after expr1/expr2. dividend must be a numeric. divisor must be a numeric."
- name: try_multiply
  signatures:
    - "try_multiply(expr1, expr2)"
  description: "Returns expr1*expr2 and the result is null on overflow. The acceptable input types are the same with the * operator."
- name: try_parse_json
  signatures:
    - "try_parse_json(jsonStr)"
  description: "Parse a JSON string as a Variant value. Return NULL when the string is not valid JSON value."
- name: try_parse_url
  signatures:
    - "try_parse_url(url, partToExtract[, key])"
  description: "This is a special version of parse_url that performs the same operation, but returns a NULL value instead of raising an error if the parsing cannot be performed."
- name: try_reflect
  signatures:
    - "try_reflect(class, method[, arg1[, arg2 ..]])"
  description: "This is a special version of reflect that performs the same operation, but returns a NULL value instead of raising an error if the invoke method thrown exception."
- name: try_subtract
  signatures:
    - "try_subtract(expr1, expr2)"
  description: "Returns expr1-expr2 and the result is null on overflow. The acceptable input types are the same with the - operator."
- name: try_sum
  signatures:
    - "try_sum(expr)"
  description: "Returns the sum calculated from values of a group and the result is null on overflow."
- name: try_to_binary
  signatures:
    - "try_to_binary(str[, fmt])"
  description: "This is a special version of to_binary that performs the same operation, but returns a NULL value instead of raising an error if the conversion cannot be performed."
- name: try_to_number
  signatures:
    - "try_to_number(expr, fmt)"
  description: "Convert string 'expr' to a number based on the string format fmt. Returns NULL if the string 'expr' does not match the expected format. The format follows the same semantics as the to_number function."
- name: try_to_timestamp
  signatures:
    - "try_to_timestamp(timestamp_str[, fmt])"
  description: "Parses the timestamp_str expression with the fmt expression to a timestamp. The function always returns null on an invalid input with/without ANSI SQL mode enabled. By default, it follows casting rules to a timestamp if the fmt is omitted. The result data type is consistent with the value of configuration spark.sql.timestampType."
- name: try_url_decode
  signatures:
    - "try_url_decode(str)"
  description: "This is a special version of url_decode that performs the same operation, but returns a NULL value instead of raising an error if the decoding cannot be performed."
- name: try_validate_utf8
  signatures:
    - "try_validate_utf8(str)"
  description: "Returns the original string if str is a valid UTF-8 string, otherwise returns NULL."
- name: try_variant_get
  signatures:
    - "try_variant_get(v, path[, type])"
  description: "Extracts a sub-variant from v according to path, and then cast the sub-variant to type. When type is omitted, it is default to variant. Returns null if the path does not exist or the cast fails."
- name: typeof
  signatures:
    - "typeof(expr)"
  description: "Return DDL-formatted type string for the data type of the input."
- name: ucase
  signatures:
    - "ucase(str)"
  description: "Returns str with all characters changed to uppercase."
- name: unbase64
  signatures:
    - "unbase64(str)"
  description: "Converts the argument from a base 64 string str to a binary."
- name: unhex
  signatures:
    - "unhex(expr)"
  description: "Converts hexadecimal expr to binary."
- name: uniform
  signatures:
    - "uniform(min, max[, seed])"
  description: "Returns a random value with independent and identically distributed (i.i.d.) values with the specified range of numbers. The random seed is optional. The provided numbers specifying the minimum and maximum values of the range must be constant. If both of these numbers are integers, then the result will also be an integer. Otherwise if one or both of these are floating-point numbers, then the result will also be a floating-point number."
- name: unix_date
  signatures:
    - "unix_date(date)"
  description: "Returns the number of days since 1970-01-01."
- name: unix_micros
  signatures:
    - "unix_micros(timestamp)"
  description: "Returns the number of microseconds since 1970-01-01 00:00:00 UTC."
- name: unix_millis
  signatures:
    - "unix_millis(timestamp)"
  description: "Returns the number of milliseconds since 1970-01-01 00:00:00 UTC. Truncates higher levels of precision."
- name: unix_seconds
  signatures:
    - "unix_seconds(timestamp)"
  description: "Returns the number of seconds since 1970-01-01 00:00:00 UTC. Truncates higher levels of precision."
- name: unix_timestamp
  signatures:
    - "unix_timestamp([timeExp[, fmt]])"
  description: "Returns the UNIX timestamp of current or specified time."
- name: upper
  signatures:
    - "upper(str)"
  description: "Returns str with all characters changed to uppercase."
- name: url_decode
  signatures:
    - "url_decode(str)"
  description: "Decodes a str in 'application/x-www-form-urlencoded' format using a specific encoding scheme."
- name: url_encode
  signatures:
    - "url_encode(str)"
  description: "Translates a string into 'application/x-www-form-urlencoded' format using a specific encoding scheme."
- name: user
  signatures:
    - "user()"
  description: "user name of current execution context."
- name: uuid
  signatures:
    - "uuid()"
  description: "Returns an universally unique identifier (UUID) string. The value is returned as a canonical UUID 36-character string."
- name: validate_utf8
  signatures:
    - "validate_utf8(str)"
  description: "Returns the original string if str is a valid UTF-8 string, otherwise throws an exception."
- name: var_pop
  signatures:
    - "var_pop(expr)"
  description: "Returns the population variance calculated from values of a group."
- name: var_samp
  signatures:
    - "var_samp(expr)"
  description: "Returns the sample variance calculated from values of a group."
- name: variance
  signatures:
    - "variance(expr)"
  description: "Returns the sample variance calculated from values of a group."
- name: variant_explode
  signatures:
    - "variant_explode(expr)"
  description: "It separates a variant object/array into multiple rows containing its fields/elements. Its result schema is struct<pos int, key string, value variant>. pos is the position of the field/element in its parent object/array, and value is the field/element value. key is the field name when exploding a variant object, or is NULL when exploding a variant array. It ignores any input that is not a variant array/object, including SQL NULL, variant null, and any other variant values."
- name: variant_explode_outer
  signatures:
    - "variant_explode_outer(expr)"
  description: "It separates a variant object/array into multiple rows containing its fields/elements. Its result schema is struct<pos int, key string, value variant>. pos is the position of the field/element in its parent object/array, and value is the field/element value. key is the field name when exploding a variant object, or is NULL when exploding a variant array. It ignores any input that is not a variant array/object, including SQL NULL, variant null, and any other variant values."
- name: variant_get
  signatures:
    - "variant_get(v, path[, type])"
  description: "Extracts a sub-variant from v according to path, and then cast the sub-variant to type. When type is omitted, it is default to variant. Returns null if the path does not exist. Throws an exception if the cast fails."
- name: variant_to_json
  signatures:
    - "variant_to_json(expr)"
    - "variant_to_json(expr, options)"
  description: "Returns a JSON string representation of a VARIANT expression."
- name: version
  signatures:
    - "version()"
  description: "Returns the Spark version. The string contains 2 fields, the first being a release version and the second being a git revision."
- name: weekday
  signatures:
    - "weekday(date)"
  description: "Returns the day of the week for date/timestamp (0 = Monday, 1 = Tuesday, ..., 6 = Sunday)."
- name: weekofyear
  signatures:
    - "weekofyear(date)"
  description: "Returns the week of the year of the given date. A week is considered to start on a Monday and week 1 is the first week with >3 days."
- name: when
  signatures:
    - "CASE WHEN expr1 THEN expr2 [WHEN expr3 THEN expr4]* [ELSE expr5] END"
  description: "When expr1 = true, returns expr2; else when expr3 = true, returns expr4; else returns expr5."
- name: width_bucket
  signatures:
    - "width_bucket(value, min_value, max_value, num_bucket)"
  description: "Returns the bucket number to which value would be assigned in an equiwidth histogram with num_bucket buckets, in the range min_value to max_value.\""
- name: window
  signatures:
    - "window(time_column, window_duration[, slide_duration[, start_time]])"
  description: "Bucketize rows into one or more time windows given a timestamp specifying column. Window starts are inclusive but the window ends are exclusive, e.g. 12:05 will be in the window [12:05,12:10) but not in [12:00,12:05). Windows can support microsecond precision. Windows in the order of months are not supported. See 'Window Operations on Event Time' in Structured Streaming guide doc for detailed explanation and examples."
- name: window_time
  signatures:
    - "window_time(window_column)"
  description: "Extract the time value from time/session window column which can be used for event time value of window. The extracted time is (window.end - 1) which reflects the fact that the aggregating windows have exclusive upper bound - [start, end) See 'Window Operations on Event Time' in Structured Streaming guide doc for detailed explanation and examples."
- name: xpath
  signatures:
    - "xpath(xml, xpath)"
  description: "Returns a string array of values within the nodes of xml that match the XPath expression."
- name: xpath_boolean
  signatures:
    - "xpath_boolean(xml, xpath)"
  description: "Returns true if the XPath expression evaluates to true, or if a matching node is found."
- name: xpath_double
  signatures:
    - "xpath_double(xml, xpath)"
  description: "Returns a double value, the value zero if no match is found, or NaN if a match is found but the value is non-numeric."
- name: xpath_float
  signatures:
    - "xpath_float(xml, xpath)"
  description: "Returns a float value, the value zero if no match is found, or NaN if a match is found but the value is non-numeric."
- name: xpath_int
  signatures:
    - "xpath_int(xml, xpath)"
  description: "Returns an integer value, or the value zero if no match is found, or a match is found but the value is non-numeric."
- name: xpath_long
  signatures:
    - "xpath_long(xml, xpath)"
  description: "Returns a long integer value, or the value zero if no match is found, or a match is found but the value is non-numeric."
- name: xpath_number
  signatures:
    - "xpath_number(xml, xpath)"
  description: "Returns a double value, the value zero if no match is found, or NaN if a match is found but the value is non-numeric."
- name: xpath_short
  signatures:
    - "xpath_short(xml, xpath)"
  description: "Returns a short integer value, or the value zero if no match is found, or a match is found but the value is non-numeric."
- name: xpath_string
  signatures:
    - "xpath_string(xml, xpath)"
  description: "Returns the text contents of the first xml node that matches the XPath expression."
- name: xxhash64
  signatures:
    - "xxhash64(expr1, expr2, ...)"
  description: "Returns a 64-bit hash value of the arguments. Hash seed is 42."
- name: year
  signatures:
    - "year(date)"
  description: "Returns the year component of the date/timestamp."
- name: years
  signatures:
    - "years(date)"
  description: "Returns the year component of the date/timestamp."
- name: zeroifnull
  signatures:
    - "zeroifnull(expr)"
  description: "Returns zero if expr is equal to null, or expr otherwise."
- name: zip_with
  signatures:
    - "zip_with(left, right, func)"
  description: "Merges the two given arrays, element-wise, into a single array using function. If one array is shorter, nulls are appended at the end to match the length of the longer array, before applying function."
- name: "|"
  signatures:
    - "expr1 | expr2"
  description: "Returns the result of bitwise OR of expr1 and expr2."
- name: "||"
  signatures:
    - "expr1 || expr2"
  description: "Returns the concatenation of expr1 and expr2."
- name: "~"
  signatures:
    - "~ expr"
  description: "Returns the result of bitwise NOT of expr."
