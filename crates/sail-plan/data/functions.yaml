- name: decode
  class_name: "org.apache.spark.sql.catalyst.expressions.Decode"
  signatures:
    - "decode(bin, charset)"
  description: "Decodes the first argument using the second argument character set. If either argument is null, the result will also be null."
  examples: |
    > SELECT decode(encode('abc', 'utf-8'), 'utf-8');
     abc
    > SELECT decode(2, 1, 'Southlake', 2, 'San Francisco', 3, 'New Jersey', 4, 'Seattle', 'Non domestic');
     San Francisco
    > SELECT decode(6, 1, 'Southlake', 2, 'San Francisco', 3, 'New Jersey', 4, 'Seattle', 'Non domestic');
     Non domestic
    > SELECT decode(6, 1, 'Southlake', 2, 'San Francisco', 3, 'New Jersey', 4, 'Seattle');
     NULL
    > SELECT decode(null, 6, 'Spark', NULL, 'SQL', 4, 'rocks');
     SQL
  note: "decode(expr, search, result [, search, result ] ... [, default]) is supported since 3.2.0"
  since: "1.5.0"
