- name: str_to_map
  class_name: "org.apache.spark.sql.catalyst.expressions.StringToMap"
  signatures:
    - "str_to_map(text[, pairDelim[, keyValueDelim]])"
  description: "Creates a map after splitting the text into key/value pairs using delimiters. Default delimiters are ',' for pairDelim and ':' for keyValueDelim. Both pairDelim and keyValueDelim are treated as regular expressions."
  examples: |
    > SELECT str_to_map('a:1,b:2,c:3', ',', ':');
     {"a":"1","b":"2","c":"3"}
    > SELECT str_to_map('a');
     {"a":null}
  since: "2.0.1"
- name: string
  class_name: "org.apache.spark.sql.catalyst.expressions.Cast"
  signatures:
    - "string(expr)"
  description: "Casts the value expr to the target data type string."
  since: "2.0.1"
- name: string_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ListAgg"
  signatures:
    - "string_agg(expr[, delimiter])[ WITHIN GROUP (ORDER BY key [ASC | DESC] [,...])]"
  description: "Returns the concatenation of non-NULL input values, separated by the delimiter ordered by key. If all values are NULL, NULL is returned."
  examples: |
    > SELECT string_agg(col) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     abc
    > SELECT string_agg(col) WITHIN GROUP (ORDER BY col DESC) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     cba
    > SELECT string_agg(col) FROM VALUES ('a'), (NULL), ('b') AS tab(col);
     ab
    > SELECT string_agg(col) FROM VALUES ('a'), ('a') AS tab(col);
     aa
    > SELECT string_agg(DISTINCT col) FROM VALUES ('a'), ('a'), ('b') AS tab(col);
     ab
    > SELECT string_agg(col, ', ') FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     a, b, c
    > SELECT string_agg(col) FROM VALUES (NULL), (NULL) AS tab(col);
     NULL
  note: |
    If the order is not specified, the function is non-deterministic because
    the order of the rows may be non-deterministic after a shuffle.
    If DISTINCT is specified, then expr and key must be the same expression.
  since: "4.0.0"
- name: strpos
  signatures:
    - "strpos(str, substr)"
  description: "Returns the 1-based position of substr in str, or 0 if substr is not found."
- name: struct
  signatures:
    - "struct(col1, col2, col3, ...)"
  description: "Creates a struct with the given field values."
