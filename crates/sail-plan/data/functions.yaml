  description: "Returns the bitwise NOT of expr."
- name: bool_and
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BoolAnd"
  signatures:
    - "bool_and(expr)"
  description: "Returns true if all values of expr are true."
  examples: |
    > SELECT bool_and(col) FROM VALUES (true), (true), (true) AS tab(col);
     true
    > SELECT bool_and(col) FROM VALUES (NULL), (true), (true) AS tab(col);
     true
    > SELECT bool_and(col) FROM VALUES (true), (false), (true) AS tab(col);
     false
  since: "3.0.0"
- name: bool_or
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BoolOr"
  signatures:
    - "bool_or(expr)"
  description: "Returns true if at least one value of expr is true."
  examples: |
    > SELECT bool_or(col) FROM VALUES (true), (false), (false) AS tab(col);
     true
    > SELECT bool_or(col) FROM VALUES (NULL), (true), (false) AS tab(col);
     true
    > SELECT bool_or(col) FROM VALUES (false), (false), (NULL) AS tab(col);
     false
  since: "3.0.0"
- name: boolean
  class_name: "org.apache.spark.sql.catalyst.expressions.Cast"
  signatures:
    - "boolean(expr)"
  description: "Casts the value expr to the target data type boolean."
  since: "2.0.1"
- name: bround
  class_name: "org.apache.spark.sql.catalyst.expressions.BRound"
