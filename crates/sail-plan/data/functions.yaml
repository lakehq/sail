- name: kurtosis
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Kurtosis"
  signatures:
    - "kurtosis(expr)"
  description: "Returns the kurtosis value calculated from values of a group."
  examples: |
    > SELECT kurtosis(col) FROM VALUES (-10), (-20), (100), (1000) AS tab(col);
     -0.7014368047529627
    > SELECT kurtosis(col) FROM VALUES (1), (10), (100), (10), (1) as tab(col);
     0.19432323191699075
  since: "1.6.0"
- name: lag
  class_name: "org.apache.spark.sql.catalyst.expressions.Lag"
  signatures:
    - "lag(input[, offset[, default]])"
  description: "Returns the value of input at the offsetth row before the current row in the window. The default value of offset is 1 and the default value of default is null. If the value of input at the offsetth row is null, null is returned. If there is no such offset row (e.g., when the offset is 1, the first row of the window does not have any previous row), default is returned."
  examples: |
    > SELECT a, b, lag(b) OVER (PARTITION BY a ORDER BY b) FROM VALUES ('A1', 2), ('A1', 1), ('A2', 3), ('A1', 1) tab(a, b);
     A1 1   NULL
     A1 1   1
     A1 2   1
     A2 3   NULL
  since: "2.0.0"
- name: last
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Last"
  signatures:
    - "last(expr[, isIgnoreNull])"
  description: "Returns the last value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values"
  examples: |
    > SELECT last(col) FROM VALUES (10), (5), (20) AS tab(col);
     20
    > SELECT last(col) FROM VALUES (10), (5), (NULL) AS tab(col);
     NULL
    > SELECT last(col, true) FROM VALUES (10), (5), (NULL) AS tab(col);
     5
  note: |
    The function is non-deterministic because its results depends on the order of the rows
    which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: last_day
  class_name: "org.apache.spark.sql.catalyst.expressions.LastDay"
  signatures:
    - "last_day(date)"
  description: "Returns the last day of the month which the date belongs to."
  examples: |
    > SELECT last_day('2009-01-12');
     2009-01-31
  since: "1.5.0"
- name: last_value
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Last"
  signatures:
    - "last_value(expr[, isIgnoreNull])"
  description: "Returns the last value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values"
  examples: |
    > SELECT last_value(col) FROM VALUES (10), (5), (20) AS tab(col);
     20
    > SELECT last_value(col) FROM VALUES (10), (5), (NULL) AS tab(col);
     NULL
    > SELECT last_value(col, true) FROM VALUES (10), (5), (NULL) AS tab(col);
     5
  note: |
    The function is non-deterministic because its results depends on the order of the rows
    which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: lcase
  class_name: "org.apache.spark.sql.catalyst.expressions.Lower"
  signatures:
    - "lcase(str)"
  description: "Returns str with all characters changed to lowercase."
  examples: |
    > SELECT lcase('SparkSql');
     sparksql
  since: "1.0.1"
- name: lead
  class_name: "org.apache.spark.sql.catalyst.expressions.Lead"
  signatures:
    - "lead(input[, offset[, default]])"
  description: "Returns the value of input at the offsetth row after the current row in the window. The default value of offset is 1 and the default value of default is null. If the value of input at the offsetth row is null, null is returned. If there is no such an offset row (e.g., when the offset is 1, the last row of the window does not have any subsequent row), default is returned."
  examples: |
    > SELECT a, b, lead(b) OVER (PARTITION BY a ORDER BY b) FROM VALUES ('A1', 2), ('A1', 1), ('A2', 3), ('A1', 1) tab(a, b);
     A1 1   1
     A1 1   2
     A1 2   NULL
     A2 3   NULL
  since: "2.0.0"
- name: least
  class_name: "org.apache.spark.sql.catalyst.expressions.Least"
  signatures:
    - "least(expr, ...)"
  description: "Returns the least value of all parameters, skipping null values."
  examples: |
    > SELECT least(10, 9, 2, 4, 3);
     2
  since: "1.5.0"
- name: left
  class_name: "org.apache.spark.sql.catalyst.expressions.Left"
  signatures:
    - "left(str, len)"
  description: "Returns the leftmost len(len can be string type) characters from the string str,if len is less or equal than 0 the result is an empty string."
  examples: |
    > SELECT left('Spark SQL', 3);
     Spa
    > SELECT left(encode('Spark SQL', 'utf-8'), 3);
     Spa
  since: "2.3.0"
- name: len
  class_name: "org.apache.spark.sql.catalyst.expressions.Length"
  signatures:
    - "len(expr)"
  description: "Returns the character length of string data or number of bytes of binary data. The length of string data includes the trailing spaces. The length of binary data includes binary zeros."
  examples: |
    > SELECT len('Spark SQL ');
     10
    > SELECT len(x'537061726b2053514c');
     9
    > SELECT CHAR_LENGTH('Spark SQL ');
     10
    > SELECT CHARACTER_LENGTH('Spark SQL ');
     10
  since: "3.4.0"
- name: length
  class_name: "org.apache.spark.sql.catalyst.expressions.Length"
  signatures:
    - "length(expr)"
  description: "Returns the character length of string data or number of bytes of binary data. The length of string data includes the trailing spaces. The length of binary data includes binary zeros."
  examples: |
    > SELECT length('Spark SQL ');
     10
    > SELECT length(x'537061726b2053514c');
     9
    > SELECT CHAR_LENGTH('Spark SQL ');
     10
    > SELECT CHARACTER_LENGTH('Spark SQL ');
     10
  since: "1.5.0"
- name: levenshtein
  class_name: "org.apache.spark.sql.catalyst.expressions.Levenshtein"
  signatures:
    - "levenshtein(str1, str2[, threshold])"
  description: "Returns the Levenshtein distance between the two given strings. If threshold is set and distance more than it, return -1."
  examples: |
    > SELECT levenshtein('kitten', 'sitting');
     3
    > SELECT levenshtein('kitten', 'sitting', 2);
     -1
  since: "1.5.0"
- name: like
  class_name: "org.apache.spark.sql.catalyst.expressions.Like"
  signatures:
    - "str like pattern[ ESCAPE escape]"
  description: "Returns true if str matches pattern with escape, null if any arguments are null, false otherwise."
  examples: |
    > SELECT like('Spark', '_park');
    true
    > SELECT '\\abc' AS S, S like r'\\abc', S like '\\\\abc';
    \abc    true    true
    > SET spark.sql.parser.escapedStringLiterals=true;
    spark.sql.parser.escapedStringLiterals  true
    > SELECT '%SystemDrive%\Users\John' like '\%SystemDrive\%\\Users%';
    true
    > SET spark.sql.parser.escapedStringLiterals=false;
    spark.sql.parser.escapedStringLiterals  false
    > SELECT '%SystemDrive%\\Users\\John' like r'%SystemDrive%\\Users%';
    true
    > SELECT '%SystemDrive%/Users/John' like '/%SystemDrive/%//Users%' ESCAPE '/';
    true
  note: "Use RLIKE to match with standard regular expressions."
  since: "1.0.0"
- name: listagg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ListAgg"
  signatures:
    - "listagg(expr[, delimiter])[ WITHIN GROUP (ORDER BY key [ASC | DESC] [,...])]"
  description: "Returns the concatenation of non-NULL input values, separated by the delimiter ordered by key. If all values are NULL, NULL is returned."
  examples: |
    > SELECT listagg(col) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     abc
    > SELECT listagg(col) WITHIN GROUP (ORDER BY col DESC) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     cba
    > SELECT listagg(col) FROM VALUES ('a'), (NULL), ('b') AS tab(col);
     ab
    > SELECT listagg(col) FROM VALUES ('a'), ('a') AS tab(col);
     aa
    > SELECT listagg(DISTINCT col) FROM VALUES ('a'), ('a'), ('b') AS tab(col);
     ab
    > SELECT listagg(col, ', ') FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     a, b, c
    > SELECT listagg(col) FROM VALUES (NULL), (NULL) AS tab(col);
     NULL
  note: |
    If the order is not specified, the function is non-deterministic because
    the order of the rows may be non-deterministic after a shuffle.
    If DISTINCT is specified, then expr and key must be the same expression.
  since: "4.0.0"
- name: ln
  class_name: "org.apache.spark.sql.catalyst.expressions.Log"
  signatures:
    - "ln(expr)"
  description: "Returns the natural logarithm (base e) of expr."
  examples: |
    > SELECT ln(1);
     0.0
  since: "1.4.0"
- name: localtimestamp
  class_name: "org.apache.spark.sql.catalyst.expressions.LocalTimestamp"
  signatures:
    - "localtimestamp()"
  description: "Returns the current timestamp without time zone at the start of query evaluation. All calls of localtimestamp within the same query return the same value."
  examples: |
    > SELECT localtimestamp();
     2020-04-25 15:49:11.914
  since: "3.4.0"
- name: locate
  class_name: "org.apache.spark.sql.catalyst.expressions.StringLocate"
  signatures:
    - "locate(substr, str[, pos])"
  description: "Returns the position of the first occurrence of substr in str after position pos. The given pos and return value are 1-based."
  examples: |
    > SELECT locate('bar', 'foobarbar');
     4
    > SELECT locate('bar', 'foobarbar', 5);
     7
    > SELECT POSITION('bar' IN 'foobarbar');
     4
  since: "1.5.0"
- name: log
  class_name: "org.apache.spark.sql.catalyst.expressions.Logarithm"
  signatures:
    - "log(base, expr)"
  description: "Returns the logarithm of expr with base."
  examples: |
    > SELECT log(10, 100);
     2.0
  since: "1.5.0"
- name: log10
  class_name: "org.apache.spark.sql.catalyst.expressions.Log10"
  signatures:
    - "log10(expr)"
  description: "Returns the logarithm of expr with base 10."
  examples: |
    > SELECT log10(10);
     1.0
  since: "1.4.0"
- name: log1p
  class_name: "org.apache.spark.sql.catalyst.expressions.Log1p"
  signatures:
    - "log1p(expr)"
  description: "Returns log(1 + expr)."
  examples: |
    > SELECT log1p(0);
     0.0
  since: "1.4.0"
- name: log2
  class_name: "org.apache.spark.sql.catalyst.expressions.Log2"
  signatures:
    - "log2(expr)"
  description: "Returns the logarithm of expr with base 2."
  examples: |
    > SELECT log2(2);
     1.0
  since: "1.4.0"
- name: lower
  class_name: "org.apache.spark.sql.catalyst.expressions.Lower"
  signatures:
    - "lower(str)"
  description: "Returns str with all characters changed to lowercase."
  examples: |
    > SELECT lower('SparkSql');
     sparksql
  since: "1.0.1"
- name: lpad
  class_name: "org.apache.spark.sql.catalyst.expressions.LPadExpressionBuilder"
  signatures:
    - "lpad(str, len[, pad])"
  description: "Returns str, left-padded with pad to a length of len. If str is longer than len, the return value is shortened to len characters or bytes. If pad is not specified, str will be padded to the left with space characters if it is a character string, and with zeros if it is a byte sequence."
  examples: |
    > SELECT lpad('hi', 5, '??');
     ???hi
    > SELECT lpad('hi', 1, '??');
     h
    > SELECT lpad('hi', 5);
        hi
    > SELECT hex(lpad(unhex('aabb'), 5));
     000000AABB
    > SELECT hex(lpad(unhex('aabb'), 5, unhex('1122')));
     112211AABB
  since: "1.5.0"
- name: ltrim
  class_name: "org.apache.spark.sql.catalyst.expressions.StringTrimLeft"
  signatures:
    - "ltrim(str)"
  description: "Removes the leading space characters from str."
  examples: |
    > SELECT ltrim('    SparkSQL   ');
     SparkSQL
  since: "1.5.0"
- name: luhn_check
  class_name: "org.apache.spark.sql.catalyst.expressions.Luhncheck"
  signatures:
    - "luhn_check(str )"
  description: "Checks that a string of digits is valid according to the Luhn algorithm. This checksum function is widely applied on credit card numbers and government identification numbers to distinguish valid numbers from mistyped, incorrect numbers."
  examples: |
    > SELECT luhn_check('8112189876');
     true
    > SELECT luhn_check('79927398713');
     true
    > SELECT luhn_check('79927398714');
     false
  since: "3.5.0"
- name: make_date
  class_name: "org.apache.spark.sql.catalyst.expressions.MakeDate"
  signatures:
    - "make_date(year, month, day)"
  description: "Create date from year, month and day fields. If the configuration spark.sql.ansi.enabled is false, the function returns NULL on invalid inputs. Otherwise, it will throw an error instead."
  examples: |
    > SELECT make_date(2013, 7, 15);
     2013-07-15
    > SELECT make_date(2019, 7, NULL);
     NULL
  since: "3.0.0"
- name: make_dt_interval
  class_name: "org.apache.spark.sql.catalyst.expressions.MakeDTInterval"
  signatures:
    - "make_dt_interval([days[, hours[, mins[, secs]]]])"
  description: "Make DayTimeIntervalType duration from days, hours, mins and secs."
  examples: |
    > SELECT make_dt_interval(1, 12, 30, 01.001001);
     1 12:30:01.001001000
    > SELECT make_dt_interval(2);
     2 00:00:00.000000000
    > SELECT make_dt_interval(100, null, 3);
     NULL
  since: "3.2.0"
- name: make_interval
  class_name: "org.apache.spark.sql.catalyst.expressions.MakeInterval"
  signatures:
    - "make_interval([years[, months[, weeks[, days[, hours[, mins[, secs]]]]]]])"
  description: "Make interval from years, months, weeks, days, hours, mins and secs."
  examples: |
    > SELECT make_interval(100, 11, 1, 1, 12, 30, 01.001001);
     100 years 11 months 8 days 12 hours 30 minutes 1.001001 seconds
    > SELECT make_interval(100, null, 3);
     NULL
    > SELECT make_interval(0, 1, 0, 1, 0, 0, 100.000001);
     1 months 1 days 1 minutes 40.000001 seconds
  since: "3.0.0"
- name: make_time
  class_name: "org.apache.spark.sql.catalyst.expressions.MakeTime"
  signatures:
    - "make_time(hour, minute, second)"
  description: "Create time from hour, minute and second fields. For invalid inputs it will throw an error."
  examples: |
    > SELECT make_time(6, 30, 45.887);
     06:30:45.887
    > SELECT make_time(NULL, 30, 0);
     NULL
  since: "4.1.0"
- name: make_timestamp
  class_name: "org.apache.spark.sql.catalyst.expressions.MakeTimestampExpressionBuilder"
  signatures:
    - "make_timestamp(year, month, day, hour, min, sec[, timezone])"
  description: "Create the current timestamp with local time zone from year, month, day, hour, min, sec and timezone fields. If the configuration spark.sql.ansi.enabled is false, the function returns NULL on invalid inputs. Otherwise, it will throw an error instead."
  examples: |
    > SELECT make_timestamp(2014, 12, 28, 6, 30, 45.887);
     2014-12-28 06:30:45.887
    > SELECT make_timestamp(2014, 12, 28, 6, 30, 45.887, 'CET');
     2014-12-27 21:30:45.887
    > SELECT make_timestamp(DATE'2014-12-28');
     2014-12-28 00:00:00
    > SELECT make_timestamp(DATE'2014-12-28', TIME'6:30:45.887');
     2014-12-28 06:30:45.887
    > SELECT make_timestamp(DATE'2014-12-28', TIME'6:30:45.887', 'CET');
     2014-12-27 21:30:45.887
  since: "3.0.0"
- name: make_timestamp_ltz
  class_name: "org.apache.spark.sql.catalyst.expressions.MakeTimestampLTZExpressionBuilder"
  signatures:
    - "make_timestamp_ltz(year, month, day, hour, min, sec[, timezone])"
  description: "Create the current timestamp with local time zone from year, month, day, hour, min, sec and (optional) timezone fields. If the configuration spark.sql.ansi.enabled is false, the function returns NULL on invalid inputs. Otherwise, it will throw an error instead."
  examples: |
    > SELECT make_timestamp_ltz(2014, 12, 28, 6, 30, 45.887);
     2014-12-28 06:30:45.887
    > SELECT make_timestamp_ltz(2014, 12, 28, 6, 30, 45.887, 'CET');
     2014-12-27 21:30:45.887
    > SELECT make_timestamp_ltz(2019, 6, 30, 23, 59, 60);
     2019-07-01 00:00:00
    > SELECT make_timestamp_ltz(null, 7, 22, 15, 30, 0);
     NULL
    > SELECT make_timestamp_ltz(DATE'2014-12-28', TIME'6:30:45.887');
     2014-12-28 06:30:45.887
    > SELECT make_timestamp_ltz(DATE'2014-12-28', TIME'6:30:45.887', 'CET');
     2014-12-27 21:30:45.887
  since: "3.4.0"
- name: make_timestamp_ntz
  class_name: "org.apache.spark.sql.catalyst.expressions.MakeTimestampNTZExpressionBuilder"
  signatures:
    - "make_timestamp_ntz(year, month, day, hour, min, sec)"
  description: "Create local date-time from year, month, day, hour, min, sec fields. If the configuration spark.sql.ansi.enabled is false, the function returns NULL on invalid inputs. Otherwise, it will throw an error instead."
  examples: |
    > SELECT make_timestamp_ntz(2014, 12, 28, 6, 30, 45.887);
     2014-12-28 06:30:45.887
    > SELECT make_timestamp_ntz(2019, 6, 30, 23, 59, 60);
     2019-07-01 00:00:00
    > SELECT make_timestamp_ntz(null, 7, 22, 15, 30, 0);
     NULL
    > SELECT make_timestamp_ntz(DATE'2014-12-28', TIME'6:30:45.887');
     2014-12-28 06:30:45.887
  since: "3.4.0"
- name: make_valid_utf8
  class_name: "org.apache.spark.sql.catalyst.expressions.MakeValidUTF8"
  signatures:
    - "make_valid_utf8(str)"
  description: "Returns the original string if str is a valid UTF-8 string, otherwise returns a new string whose invalid UTF8 byte sequences are replaced using the UNICODE replacement character U+FFFD."
  examples: |
    > SELECT make_valid_utf8('Spark');
     Spark
    > SELECT make_valid_utf8(x'61');
     a
    > SELECT make_valid_utf8(x'80');
     �
    > SELECT make_valid_utf8(x'61C262');
     a�b
  since: "4.0.0"
- name: make_ym_interval
  class_name: "org.apache.spark.sql.catalyst.expressions.MakeYMInterval"
  signatures:
    - "make_ym_interval([years[, months]])"
  description: "Make year-month interval from years, months."
  examples: |
    > SELECT make_ym_interval(1, 2);
     1-2
    > SELECT make_ym_interval(1, 0);
     1-0
    > SELECT make_ym_interval(-1, 1);
     -0-11
    > SELECT make_ym_interval(2);
     2-0
  since: "3.2.0"
- name: map
  class_name: "org.apache.spark.sql.catalyst.expressions.CreateMap"
  signatures:
    - "map(key0, value0, key1, value1, ...)"
  description: "Creates a map with the given key/value pairs."
  examples: |
    > SELECT map(1.0, '2', 3.0, '4');
     {1.0:"2",3.0:"4"}
  since: "2.0.0"
- name: map_concat
  class_name: "org.apache.spark.sql.catalyst.expressions.MapConcat"
  signatures:
    - "map_concat(map, ...)"
  description: "Returns the union of all the given maps"
  examples: |
    > SELECT map_concat(map(1, 'a', 2, 'b'), map(3, 'c'));
     {1:"a",2:"b",3:"c"}
  since: "2.4.0"
- name: map_contains_key
  class_name: "org.apache.spark.sql.catalyst.expressions.MapContainsKey"
  signatures:
    - "map_contains_key(map, key)"
  description: "Returns true if the map contains the key."
  examples: |
    > SELECT map_contains_key(map(1, 'a', 2, 'b'), 1);
     true
    > SELECT map_contains_key(map(1, 'a', 2, 'b'), 3);
     false
  since: "3.3.0"
- name: map_entries
  class_name: "org.apache.spark.sql.catalyst.expressions.MapEntries"
  signatures:
    - "map_entries(map)"
  description: "Returns an unordered array of all entries in the given map."
  examples: |
    > SELECT map_entries(map(1, 'a', 2, 'b'));
     [{"key":1,"value":"a"},{"key":2,"value":"b"}]
  since: "3.0.0"
- name: map_filter
  class_name: "org.apache.spark.sql.catalyst.expressions.MapFilter"
  signatures:
    - "map_filter(expr, func)"
  description: "Filters entries in a map using the function."
  examples: |
    > SELECT map_filter(map(1, 0, 2, 2, 3, -1), (k, v) -> k > v);
     {1:0,3:-1}
  since: "3.0.0"
- name: map_from_arrays
  class_name: "org.apache.spark.sql.catalyst.expressions.MapFromArrays"
  signatures:
    - "map_from_arrays(keys, values)"
  description: "Creates a map with a pair of the given key/value arrays. All elements in keys should not be null"
  examples: |
    > SELECT map_from_arrays(array(1.0, 3.0), array('2', '4'));
     {1.0:"2",3.0:"4"}
  since: "2.4.0"
- name: map_from_entries
  class_name: "org.apache.spark.sql.catalyst.expressions.MapFromEntries"
  signatures:
    - "map_from_entries(arrayOfEntries)"
  description: "Returns a map created from the given array of entries."
  examples: |
    > SELECT map_from_entries(array(struct(1, 'a'), struct(2, 'b')));
     {1:"a",2:"b"}
  since: "2.4.0"
- name: map_keys
  class_name: "org.apache.spark.sql.catalyst.expressions.MapKeys"
  signatures:
    - "map_keys(map)"
  description: "Returns an unordered array containing the keys of the map."
  examples: |
    > SELECT map_keys(map(1, 'a', 2, 'b'));
     [1,2]
  since: "2.0.0"
- name: map_values
  class_name: "org.apache.spark.sql.catalyst.expressions.MapValues"
  signatures:
    - "map_values(map)"
  description: "Returns an unordered array containing the values of the map."
  examples: |
    > SELECT map_values(map(1, 'a', 2, 'b'));
     ["a","b"]
  since: "2.0.0"
- name: map_zip_with
  class_name: "org.apache.spark.sql.catalyst.expressions.MapZipWith"
  signatures:
    - "map_zip_with(map1, map2, function)"
  description: "Merges two given maps into a single map by applying function to the pair of values with the same key. For keys only presented in one map, NULL will be passed as the value for the missing key. If an input map contains duplicated keys, only the first entry of the duplicated key is passed into the lambda function."
  examples: |
    > SELECT map_zip_with(map(1, 'a', 2, 'b'), map(1, 'x', 2, 'y'), (k, v1, v2) -> concat(v1, v2));
     {1:"ax",2:"by"}
    > SELECT map_zip_with(map('a', 1, 'b', 2), map('b', 3, 'c', 4), (k, v1, v2) -> coalesce(v1, 0) + coalesce(v2, 0));
     {"a":1,"b":5,"c":4}
  since: "3.0.0"
- name: mask
  class_name: "org.apache.spark.sql.catalyst.expressions.MaskExpressionBuilder"
  signatures:
    - "mask(input[, upperChar, lowerChar, digitChar, otherChar])"
  description: "masks the given string value. The function replaces characters with 'X' or 'x', and numbers with 'n'. This can be useful for creating copies of tables with sensitive information removed."
  examples: |
    > SELECT mask('abcd-EFGH-8765-4321');
      xxxx-XXXX-nnnn-nnnn
    > SELECT mask('abcd-EFGH-8765-4321', 'Q');
      xxxx-QQQQ-nnnn-nnnn
    > SELECT mask('AbCD123-@$#', 'Q', 'q');
      QqQQnnn-@$#
    > SELECT mask('AbCD123-@$#');
      XxXXnnn-@$#
    > SELECT mask('AbCD123-@$#', 'Q');
      QxQQnnn-@$#
    > SELECT mask('AbCD123-@$#', 'Q', 'q');
      QqQQnnn-@$#
    > SELECT mask('AbCD123-@$#', 'Q', 'q', 'd');
      QqQQddd-@$#
    > SELECT mask('AbCD123-@$#', 'Q', 'q', 'd', 'o');
      QqQQdddoooo
    > SELECT mask('AbCD123-@$#', NULL, 'q', 'd', 'o');
      AqCDdddoooo
    > SELECT mask('AbCD123-@$#', NULL, NULL, 'd', 'o');
      AbCDdddoooo
    > SELECT mask('AbCD123-@$#', NULL, NULL, NULL, 'o');
      AbCD123oooo
    > SELECT mask(NULL, NULL, NULL, NULL, 'o');
      NULL
    > SELECT mask(NULL);
      NULL
    > SELECT mask('AbCD123-@$#', NULL, NULL, NULL, NULL);
      AbCD123-@$#
  since: "3.4.0"
- name: max
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Max"
  signatures:
    - "max(expr)"
  description: "Returns the maximum value of expr."
  examples: |
    > SELECT max(col) FROM VALUES (10), (50), (20) AS tab(col);
     50
  since: "1.0.0"
- name: max_by
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.MaxBy"
  signatures:
    - "max_by(x, y)"
  description: "Returns the value of x associated with the maximum value of y."
  examples: |
    > SELECT max_by(x, y) FROM VALUES ('a', 10), ('b', 50), ('c', 20) AS tab(x, y);
     b
  note: |
    The function is non-deterministic so the output order can be different for
    those associated the same values of x.
  since: "3.0.0"
- name: md5
  class_name: "org.apache.spark.sql.catalyst.expressions.Md5"
  signatures:
    - "md5(expr)"
  description: "Returns an MD5 128-bit checksum as a hex string of expr."
  examples: |
    > SELECT md5('Spark');
     8cde774d6f7333752ed72cacddb05126
  since: "1.5.0"
- name: mean
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Average"
  signatures:
    - "mean(expr)"
  description: "Returns the mean calculated from values of a group."
  examples: |
    > SELECT mean(col) FROM VALUES (1), (2), (3) AS tab(col);
     2.0
    > SELECT mean(col) FROM VALUES (1), (2), (NULL) AS tab(col);
     1.5
  since: "1.0.0"
- name: median
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Median"
  signatures:
    - "median(col)"
  description: "Returns the median of numeric or ANSI interval column col."
  examples: |
    > SELECT median(col) FROM VALUES (0), (10) AS tab(col);
     5.0
    > SELECT median(col) FROM VALUES (INTERVAL '0' MONTH), (INTERVAL '10' MONTH) AS tab(col);
     0-5
  since: "3.4.0"
- name: min
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Min"
  signatures:
    - "min(expr)"
  description: "Returns the minimum value of expr."
  examples: |
    > SELECT min(col) FROM VALUES (10), (-1), (20) AS tab(col);
     -1
  since: "1.0.0"
- name: min_by
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.MinBy"
  signatures:
    - "min_by(x, y)"
  description: "Returns the value of x associated with the minimum value of y."
  examples: |
    > SELECT min_by(x, y) FROM VALUES ('a', 10), ('b', 50), ('c', 20) AS tab(x, y);
     a
  note: |
    The function is non-deterministic so the output order can be different for
    those associated the same values of x.
  since: "3.0.0"
- name: minute
  class_name: "org.apache.spark.sql.catalyst.expressions.MinuteExpressionBuilder"
  signatures:
    - "minute(expr)"
  description: "Returns the minute component of the given expression."
  examples: |
    > SELECT minute('2009-07-30 12:58:59');
     58
    > SELECT minute(TIME'23:59:59.999999');
     59
  since: "1.5.0"
- name: mod
  class_name: "org.apache.spark.sql.catalyst.expressions.Remainder"
  signatures:
    - "expr1 % expr2, or mod(expr1, expr2)"
  description: "Returns the remainder after expr1/expr2."
  examples: |
    > SELECT 2 % 1.8;
     0.2
    > SELECT MOD(2, 1.8);
     0.2
  since: "2.3.0"
- name: mode
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ModeBuilder"
  signatures:
    - "mode(col[, deterministic])"
  description: "Returns the most frequent value for the values within col. NULL values are ignored. If all the values are NULL, or there are 0 rows, returns NULL. When multiple values have the same greatest frequency then either any of values is returned if deterministic is false or is not defined, or the lowest value is returned if deterministic is true. mode() WITHIN GROUP (ORDER BY col) - Returns the most frequent value for the values within col (specified in ORDER BY clause). NULL values are ignored. If all the values are NULL, or there are 0 rows, returns NULL. When multiple values have the same greatest frequency only one value will be returned. The value will be chosen based on sort direction. Return the smallest value if sort direction is asc or the largest value if sort direction is desc from multiple values with the same frequency."
  examples: |
    > SELECT mode(col) FROM VALUES (0), (10), (10) AS tab(col);
     10
    > SELECT mode(col) FROM VALUES (INTERVAL '0' MONTH), (INTERVAL '10' MONTH), (INTERVAL '10' MONTH) AS tab(col);
     0-10
    > SELECT mode(col) FROM VALUES (0), (10), (10), (null), (null), (null) AS tab(col);
     10
    > SELECT mode(col, false) FROM VALUES (-10), (0), (10) AS tab(col);
     0
    > SELECT mode(col, true) FROM VALUES (-10), (0), (10) AS tab(col);
     -10
    > SELECT mode() WITHIN GROUP (ORDER BY col) FROM VALUES (0), (10), (10) AS tab(col);
     10
    > SELECT mode() WITHIN GROUP (ORDER BY col) FROM VALUES (0), (10), (10), (20), (20) AS tab(col);
     10
    > SELECT mode() WITHIN GROUP (ORDER BY col DESC) FROM VALUES (0), (10), (10), (20), (20) AS tab(col);
     20
  since: "3.4.0"
- name: monotonically_increasing_id
  class_name: "org.apache.spark.sql.catalyst.expressions.MonotonicallyIncreasingID"
  signatures:
    - "monotonically_increasing_id()"
  description: "Returns monotonically increasing 64-bit integers. The generated ID is guaranteed to be monotonically increasing and unique, but not consecutive. The current implementation puts the partition ID in the upper 31 bits, and the lower 33 bits represent the record number within each partition. The assumption is that the data frame has less than 1 billion partitions, and each partition has less than 8 billion records. The function is non-deterministic because its result depends on partition IDs."
  examples: |
    > SELECT monotonically_increasing_id();
     0
  since: "1.4.0"
- name: month
  class_name: "org.apache.spark.sql.catalyst.expressions.Month"
  signatures:
    - "month(date)"
  description: "Returns the month component of the date/timestamp."
  examples: |
    > SELECT month('2016-07-30');
     7
  since: "1.5.0"
- name: monthname
  class_name: "org.apache.spark.sql.catalyst.expressions.MonthName"
  signatures:
    - "monthname(date)"
  description: "Returns the three-letter abbreviated month name from the given date."
  examples: |
    > SELECT monthname('2008-02-20');
     Feb
  since: "4.0.0"
- name: months_between
  class_name: "org.apache.spark.sql.catalyst.expressions.MonthsBetween"
  signatures:
    - "months_between(timestamp1, timestamp2[, roundOff])"
  description: "If timestamp1 is later than timestamp2, then the result is positive. If timestamp1 and timestamp2 are on the same day of month, or both are the last day of month, time of day will be ignored. Otherwise, the difference is calculated based on 31 days per month, and rounded to 8 digits unless roundOff=false."
  examples: |
    > SELECT months_between('1997-02-28 10:30:00', '1996-10-30');
     3.94959677
    > SELECT months_between('1997-02-28 10:30:00', '1996-10-30', false);
     3.9495967741935485
  since: "1.5.0"
- name: named_struct
  class_name: "org.apache.spark.sql.catalyst.expressions.CreateNamedStruct"
  signatures:
    - "named_struct(name1, val1, name2, val2, ...)"
  description: "Creates a struct with the given field names and values."
  examples: |
    > SELECT named_struct("a", 1, "b", 2, "c", 3);
     {"a":1,"b":2,"c":3}
  since: "1.5.0"
- name: nanvl
  class_name: "org.apache.spark.sql.catalyst.expressions.NaNvl"
  signatures:
    - "nanvl(expr1, expr2)"
  description: "Returns expr1 if it's not NaN, or expr2 otherwise."
  examples: |
    > SELECT nanvl(cast('NaN' as double), 123);
     123.0
  since: "1.5.0"
- name: negative
  class_name: "org.apache.spark.sql.catalyst.expressions.UnaryMinus"
  signatures:
    - "negative(expr)"
  description: "Returns the negated value of expr."
  examples: |
    > SELECT negative(1);
     -1
  since: "1.0.0"
- name: next_day
  class_name: "org.apache.spark.sql.catalyst.expressions.NextDay"
  signatures:
    - "next_day(start_date, day_of_week)"
  description: "Returns the first date which is later than start_date and named as indicated. The function returns NULL if at least one of the input parameters is NULL. When both of the input parameters are not NULL and day_of_week is an invalid input, the function throws SparkIllegalArgumentException if spark.sql.ansi.enabled is set to true, otherwise NULL."
  examples: |
    > SELECT next_day('2015-01-14', 'TU');
     2015-01-20
  since: "1.5.0"
- name: not
  class_name: "org.apache.spark.sql.catalyst.expressions.Not"
  signatures:
    - "not expr"
  description: "Logical not."
  examples: |
    > SELECT not true;
     false
    > SELECT not false;
     true
    > SELECT not NULL;
     NULL
  since: "1.0.0"
- name: now
  class_name: "org.apache.spark.sql.catalyst.expressions.Now"
  signatures:
    - "now()"
  description: "Returns the current timestamp at the start of query evaluation."
  examples: |
    > SELECT now();
     2020-04-25 15:49:11.914
  since: "1.6.0"
- name: nth_value
  class_name: "org.apache.spark.sql.catalyst.expressions.NthValue"
  signatures:
    - "nth_value(input[, offset])"
  description: "Returns the value of input at the row that is the offsetth row from beginning of the window frame. Offset starts at 1. If ignoreNulls=true, we will skip nulls when finding the offsetth row. Otherwise, every row counts for the offset. If there is no such an offsetth row (e.g., when the offset is 10, size of the window frame is less than 10), null is returned."
  examples: |
    > SELECT a, b, nth_value(b, 2) OVER (PARTITION BY a ORDER BY b) FROM VALUES ('A1', 2), ('A1', 1), ('A2', 3), ('A1', 1) tab(a, b);
     A1 1   1
     A1 1   1
     A1 2   1
     A2 3   NULL
  since: "3.1.0"
- name: ntile
  class_name: "org.apache.spark.sql.catalyst.expressions.NTile"
  signatures:
    - "ntile(n)"
  description: "Divides the rows for each window partition into n buckets ranging from 1 to at most n."
  examples: |
    > SELECT a, b, ntile(2) OVER (PARTITION BY a ORDER BY b) FROM VALUES ('A1', 2), ('A1', 1), ('A2', 3), ('A1', 1) tab(a, b);
     A1 1   1
     A1 1   1
     A1 2   2
     A2 3   1
  since: "2.0.0"
- name: nullif
  class_name: "org.apache.spark.sql.catalyst.expressions.NullIf"
  signatures:
    - "nullif(expr1, expr2)"
  description: "Returns null if expr1 equals to expr2, or expr1 otherwise."
  examples: |
    > SELECT nullif(2, 2);
     NULL
  since: "2.0.0"
- name: nullifzero
  class_name: "org.apache.spark.sql.catalyst.expressions.NullIfZero"
  signatures:
    - "nullifzero(expr)"
  description: "Returns null if expr is equal to zero, or expr otherwise."
  examples: |
    > SELECT nullifzero(0);
     NULL
    > SELECT nullifzero(2);
     2
  since: "4.0.0"
- name: nvl
  class_name: "org.apache.spark.sql.catalyst.expressions.Nvl"
  signatures:
    - "nvl(expr1, expr2)"
  description: "Returns expr2 if expr1 is null, or expr1 otherwise."
  examples: |
    > SELECT nvl(NULL, array('2'));
     ["2"]
  since: "2.0.0"
- name: nvl2
  class_name: "org.apache.spark.sql.catalyst.expressions.Nvl2"
  signatures:
    - "nvl2(expr1, expr2, expr3)"
  description: "Returns expr2 if expr1 is not null, or expr3 otherwise."
  examples: |
    > SELECT nvl2(NULL, 2, 1);
     1
  since: "2.0.0"
- name: octet_length
  class_name: "org.apache.spark.sql.catalyst.expressions.OctetLength"
  signatures:
    - "octet_length(expr)"
  description: "Returns the byte length of string data or number of bytes of binary data."
  examples: |
    > SELECT octet_length('Spark SQL');
     9
    > SELECT octet_length(x'537061726b2053514c');
     9
  since: "2.3.0"
- name: or
  class_name: "org.apache.spark.sql.catalyst.expressions.Or"
  signatures:
    - "expr1 or expr2"
  description: "Logical OR."
  examples: |
    > SELECT true or false;
     true
    > SELECT false or false;
     false
    > SELECT true or NULL;
     true
    > SELECT false or NULL;
     NULL
  since: "1.0.0"
- name: overlay
  class_name: "org.apache.spark.sql.catalyst.expressions.Overlay"
  signatures:
    - "overlay(input, replace, pos[, len])"
  description: "Replace input with replace that starts at pos and is of length len."
  examples: |
    > SELECT overlay('Spark SQL' PLACING '_' FROM 6);
     Spark_SQL
    > SELECT overlay('Spark SQL' PLACING 'CORE' FROM 7);
     Spark CORE
    > SELECT overlay('Spark SQL' PLACING 'ANSI ' FROM 7 FOR 0);
     Spark ANSI SQL
    > SELECT overlay('Spark SQL' PLACING 'tructured' FROM 2 FOR 4);
     Structured SQL
    > SELECT overlay(encode('Spark SQL', 'utf-8') PLACING encode('_', 'utf-8') FROM 6);
     Spark_SQL
    > SELECT overlay(encode('Spark SQL', 'utf-8') PLACING encode('CORE', 'utf-8') FROM 7);
     Spark CORE
    > SELECT overlay(encode('Spark SQL', 'utf-8') PLACING encode('ANSI ', 'utf-8') FROM 7 FOR 0);
     Spark ANSI SQL
    > SELECT overlay(encode('Spark SQL', 'utf-8') PLACING encode('tructured', 'utf-8') FROM 2 FOR 4);
     Structured SQL
  since: "3.0.0"
- name: parse_json
  class_name: "org.apache.spark.sql.catalyst.expressions.variant.ParseJsonExpressionBuilder"
  signatures:
    - "parse_json(jsonStr)"
  description: "Parse a JSON string as a Variant value. Throw an exception when the string is not valid JSON value."
  examples: |
    > SELECT parse_json('{"a":1,"b":0.8}');
     {"a":1,"b":0.8}
  since: "4.0.0"
- name: parse_url
  class_name: "org.apache.spark.sql.catalyst.expressions.ParseUrl"
  signatures:
    - "parse_url(url, partToExtract[, key])"
  description: "Extracts a part from a URL."
  examples: |
    > SELECT parse_url('http://spark.apache.org/path?query=1', 'HOST');
     spark.apache.org
    > SELECT parse_url('http://spark.apache.org/path?query=1', 'QUERY');
     query=1
    > SELECT parse_url('http://spark.apache.org/path?query=1', 'QUERY', 'query');
     1
  since: "2.0.0"
- name: percent_rank
  class_name: "org.apache.spark.sql.catalyst.expressions.PercentRank"
  signatures:
    - "percent_rank()"
  description: "Computes the percentage ranking of a value in a group of values."
  examples: |
    > SELECT a, b, percent_rank(b) OVER (PARTITION BY a ORDER BY b) FROM VALUES ('A1', 2), ('A1', 1), ('A2', 3), ('A1', 1) tab(a, b);
     A1 1   0.0
     A1 1   0.0
     A1 2   1.0
     A2 3   0.0
  since: "2.0.0"
- name: percentile
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Percentile"
  signatures:
    - "percentile(col, percentage [, frequency])"
  description: "Returns the exact percentile value of numeric or ANSI interval column col at the given percentage. The value of percentage must be between 0.0 and 1.0. The value of frequency should be positive integral"
  examples: |
    > SELECT percentile(col, 0.3) FROM VALUES (0), (10) AS tab(col);
     3.0
    > SELECT percentile(col, array(0.25, 0.75)) FROM VALUES (0), (10) AS tab(col);
     [2.5,7.5]
    > SELECT percentile(col, 0.5) FROM VALUES (INTERVAL '0' MONTH), (INTERVAL '10' MONTH) AS tab(col);
     0-5
    > SELECT percentile(col, array(0.2, 0.5)) FROM VALUES (INTERVAL '0' SECOND), (INTERVAL '10' SECOND) AS tab(col);
     [0 00:00:02.000000000,0 00:00:05.000000000]
  since: "2.1.0"
- name: percentile_approx
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ApproximatePercentile"
  signatures:
    - "percentile_approx(col, percentage [, accuracy])"
  description: "Returns the approximate percentile of the numeric or ansi interval column col which is the smallest value in the ordered col values (sorted from least to greatest) such that no more than percentage of col values is less than the value or equal to that value. The value of percentage must be between 0.0 and 1.0. The accuracy parameter (default: 10000) is a positive numeric literal which controls approximation accuracy at the cost of memory. Higher value of accuracy yields better accuracy, 1.0/accuracy is the relative error of the approximation. When percentage is an array, each value of the percentage array must be between 0.0 and 1.0. In this case, returns the approximate percentile array of column col at the given percentage array."
  examples: |
    > SELECT percentile_approx(col, array(0.5, 0.4, 0.1), 100) FROM VALUES (0), (1), (2), (10) AS tab(col);
     [1,1,0]
    > SELECT percentile_approx(col, 0.5, 100) FROM VALUES (0), (6), (7), (9), (10) AS tab(col);
     7
