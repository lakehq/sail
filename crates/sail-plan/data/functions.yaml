     1
  since: "1.0.0"
- name: collate
  class_name: "org.apache.spark.sql.catalyst.expressions.CollateExpressionBuilder"
  signatures:
    - "collate(expr, collationName)"
  description: "Marks a given expression with the specified collation."
  examples: |
    > SELECT COLLATION('Spark SQL' collate UTF8_LCASE);
    SYSTEM.BUILTIN.UTF8_LCASE
  since: "4.0.0"
- name: collation
  class_name: "org.apache.spark.sql.catalyst.expressions.Collation"
  signatures:
    - "collation(expr)"
  description: "Returns the collation name of a given expression."
  examples: |
    > SELECT collation('Spark SQL');
