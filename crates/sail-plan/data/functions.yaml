- name: to_avro
  class_name: "org.apache.spark.sql.catalyst.expressions.ToAvro"
  signatures:
    - "to_avro(child[, jsonFormatSchema])"
  description: "Converts a Catalyst binary input value into its corresponding Avro format result."
  examples: |
    > SELECT to_avro(s, '{"type": "record", "name": "struct", "fields": [{ "name": "u", "type": ["int","string"] }]}') IS NULL FROM (SELECT NULL AS s);
     [true]
    > SELECT to_avro(s) IS NULL FROM (SELECT NULL AS s);
     [true]
  since: "4.0.0"
- name: to_binary
  class_name: "org.apache.spark.sql.catalyst.expressions.ToBinary"
  signatures:
    - "to_binary(str[, fmt])"
  description: "Converts the input str to a binary value based on the supplied fmt. fmt can be a case-insensitive string literal of \"hex\", \"utf-8\", \"utf8\", or \"base64\". By default, the binary format for conversion is \"hex\" if fmt is omitted. The function returns NULL if at least one of the input parameters is NULL."
  examples: |
    > SELECT to_binary('abc', 'utf-8');
     abc
  since: "3.3.0"
- name: to_char
  class_name: "org.apache.spark.sql.catalyst.expressions.ToCharacterBuilder"
  signatures:
    - "to_char(expr, format)"
  description: "Convert expr to a string based on the format. Throws an exception if the conversion fails. The format can consist of the following characters, case insensitive: '0' or '9': Specifies an expected digit between 0 and 9. A sequence of 0 or 9 in the format string matches a sequence of digits in the input value, generating a result string of the same length as the corresponding sequence in the format string. The result string is left-padded with zeros if the 0/9 sequence comprises more digits than the matching part of the decimal value, starts with 0, and is before the decimal point. Otherwise, it is padded with spaces. '.' or 'D': Specifies the position of the decimal point (optional, only allowed once). ',' or 'G': Specifies the position of the grouping (thousands) separator (,). There must be a 0 or 9 to the left and right of each grouping separator. '$': Specifies the location of the $ currency sign. This character may only be specified once. 'S' or 'MI': Specifies the position of a '-' or '+' sign (optional, only allowed once at the beginning or end of the format string). Note that 'S' prints '+' for positive values but 'MI' prints a space. 'PR': Only allowed at the end of the format string; specifies that the result string will be wrapped by angle brackets if the input value is negative. ('<1>'). If expr is a datetime, format shall be a valid datetime pattern, see Datetime Patterns. If expr is a binary, it is converted to a string in one of the formats: 'base64': a base 64 string. 'hex': a string in the hexadecimal format. 'utf-8': the input binary is decoded to UTF-8 string."
  examples: |
    > SELECT to_char(454, '999');
     454
    > SELECT to_char(454.00, '000D00');
     454.00
    > SELECT to_char(12454, '99G999');
     12,454
    > SELECT to_char(78.12, '$99.99');
     $78.12
    > SELECT to_char(-12454.8, '99G999D9S');
     12,454.8-
    > SELECT to_char(date'2016-04-08', 'y');
     2016
    > SELECT to_char(x'537061726b2053514c', 'base64');
     U3BhcmsgU1FM
    > SELECT to_char(x'537061726b2053514c', 'hex');
     537061726B2053514C
    > SELECT to_char(encode('abc', 'utf-8'), 'utf-8');
     abc
  since: "3.4.0"
- name: to_csv
  class_name: "org.apache.spark.sql.catalyst.expressions.StructsToCsv"
  signatures:
    - "to_csv(expr[, options])"
  description: "Returns a CSV string with a given struct value"
  examples: |
    > SELECT to_csv(named_struct('a', 1, 'b', 2));
     1,2
    > SELECT to_csv(named_struct('time', to_timestamp('2015-08-26', 'yyyy-MM-dd')), map('timestampFormat', 'dd/MM/yyyy'));
     26/08/2015
  since: "3.0.0"
- name: to_date
  class_name: "org.apache.spark.sql.catalyst.expressions.ParseToDate"
  signatures:
    - "to_date(date_str[, fmt])"
  description: "Parses the date_str expression with the fmt expression to a date. Returns null with invalid input. By default, it follows casting rules to a date if the fmt is omitted."
  examples: |
    > SELECT to_date('2009-07-30 04:17:52');
     2009-07-30
    > SELECT to_date('2016-12-31', 'yyyy-MM-dd');
     2016-12-31
  since: "1.5.0"
- name: to_json
  class_name: "org.apache.spark.sql.catalyst.expressions.StructsToJson"
  signatures:
    - "to_json(expr[, options])"
  description: "Returns a JSON string with a given struct value"
  examples: |
    > SELECT to_json(named_struct('a', 1, 'b', 2));
     {"a":1,"b":2}
    > SELECT to_json(named_struct('time', to_timestamp('2015-08-26', 'yyyy-MM-dd')), map('timestampFormat', 'dd/MM/yyyy'));
     {"time":"26/08/2015"}
    > SELECT to_json(array(named_struct('a', 1, 'b', 2)));
     [{"a":1,"b":2}]
    > SELECT to_json(map('a', named_struct('b', 1)));
     {"a":{"b":1}}
    > SELECT to_json(map(named_struct('a', 1),named_struct('b', 2)));
     {"[1]":{"b":2}}
    > SELECT to_json(map('a', 1));
     {"a":1}
    > SELECT to_json(array(map('a', 1)));
     [{"a":1}]
  since: "2.2.0"
- name: to_number
  class_name: "org.apache.spark.sql.catalyst.expressions.ToNumber"
  signatures:
    - "to_number(expr, fmt)"
  description: "Convert string 'expr' to a number based on the string format 'fmt'. Throws an exception if the conversion fails. The format can consist of the following characters, case insensitive: '0' or '9': Specifies an expected digit between 0 and 9. A sequence of 0 or 9 in the format string matches a sequence of digits in the input string. If the 0/9 sequence starts with 0 and is before the decimal point, it can only match a digit sequence of the same size. Otherwise, if the sequence starts with 9 or is after the decimal point, it can match a digit sequence that has the same or smaller size. '.' or 'D': Specifies the position of the decimal point (optional, only allowed once). ',' or 'G': Specifies the position of the grouping (thousands) separator (,). There must be a 0 or 9 to the left and right of each grouping separator. 'expr' must match the grouping separator relevant for the size of the number. '$': Specifies the location of the $ currency sign. This character may only be specified once. 'S' or 'MI': Specifies the position of a '-' or '+' sign (optional, only allowed once at the beginning or end of the format string). Note that 'S' allows '-' but 'MI' does not. 'PR': Only allowed at the end of the format string; specifies that 'expr' indicates a negative number with wrapping angled brackets. ('<1>')."
  examples: |
    > SELECT to_number('454', '999');
     454
    > SELECT to_number('454.00', '000.00');
     454.00
    > SELECT to_number('12,454', '99,999');
     12454
    > SELECT to_number('$78.12', '$99.99');
     78.12
    > SELECT to_number('12,454.8-', '99,999.9S');
     -12454.8
  since: "3.3.0"
- name: to_protobuf
  class_name: "org.apache.spark.sql.catalyst.expressions.ToProtobuf"
  signatures:
    - "to_protobuf(child, messageName, descFilePath, options)"
  description: "Converts a Catalyst binary input value into its corresponding Protobuf format result."
  examples: |
    > SELECT to_protobuf(s, 'Person', '/path/to/descriptor.desc', map('emitDefaultValues', 'true')) IS NULL FROM (SELECT NULL AS s);
     [true]
  since: "4.0.0"
- name: to_time
  class_name: "org.apache.spark.sql.catalyst.expressions.ToTime"
  signatures:
    - "to_time(str[, format])"
  description: "Parses the str expression with the format expression to a time. If format is malformed or its application does not result in a well formed time, the function raises an error. By default, it follows casting rules to a time if the format is omitted."
  examples: |
    > SELECT to_time('00:12:00');
     00:12:00
    > SELECT to_time('12.10.05', 'HH.mm.ss');
     12:10:05
  since: "4.1.0"
- name: to_timestamp
  class_name: "org.apache.spark.sql.catalyst.expressions.ParseToTimestamp"
  signatures:
    - "to_timestamp(timestamp_str[, fmt])"
  description: "Parses the timestamp_str expression with the fmt expression to a timestamp. Returns null with invalid input. By default, it follows casting rules to a timestamp if the fmt is omitted. The result data type is consistent with the value of configuration spark.sql.timestampType."
  examples: |
    > SELECT to_timestamp('2016-12-31 00:12:00');
     2016-12-31 00:12:00
    > SELECT to_timestamp('2016-12-31', 'yyyy-MM-dd');
     2016-12-31 00:00:00
  since: "2.2.0"
- name: to_timestamp_ltz
  class_name: "org.apache.spark.sql.catalyst.expressions.ParseToTimestampLTZExpressionBuilder"
  signatures:
    - "to_timestamp_ltz(timestamp_str[, fmt])"
  description: "Parses the timestamp_str expression with the fmt expression to a timestamp with local time zone. Returns null with invalid input. By default, it follows casting rules to a timestamp if the fmt is omitted."
  examples: |
    > SELECT to_timestamp_ltz('2016-12-31 00:12:00');
     2016-12-31 00:12:00
    > SELECT to_timestamp_ltz('2016-12-31', 'yyyy-MM-dd');
     2016-12-31 00:00:00
  since: "3.4.0"
- name: to_timestamp_ntz
  class_name: "org.apache.spark.sql.catalyst.expressions.ParseToTimestampNTZExpressionBuilder"
  signatures:
    - "to_timestamp_ntz(timestamp_str[, fmt])"
  description: "Parses the timestamp_str expression with the fmt expression to a timestamp without time zone. Returns null with invalid input. By default, it follows casting rules to a timestamp if the fmt is omitted."
  examples: |
    > SELECT to_timestamp_ntz('2016-12-31 00:12:00');
     2016-12-31 00:12:00
    > SELECT to_timestamp_ntz('2016-12-31', 'yyyy-MM-dd');
     2016-12-31 00:00:00
  since: "3.4.0"
- name: to_unix_timestamp
  class_name: "org.apache.spark.sql.catalyst.expressions.ToUnixTimestamp"
  signatures:
    - "to_unix_timestamp(timeExp[, fmt])"
  description: "Returns the UNIX timestamp of the given time."
  examples: |
    > SELECT to_unix_timestamp('2016-04-08', 'yyyy-MM-dd');
     1460098800
  since: "1.6.0"
- name: to_utc_timestamp
  class_name: "org.apache.spark.sql.catalyst.expressions.ToUTCTimestamp"
  signatures:
    - "to_utc_timestamp(timestamp, timezone)"
  description: "Given a timestamp like '2017-07-14 02:40:00.0', interprets it as a time in the given time zone, and renders that time as a timestamp in UTC. For example, 'GMT+1' would yield '2017-07-14 01:40:00.0'."
  examples: |
    > SELECT to_utc_timestamp('2016-08-31', 'Asia/Seoul');
     2016-08-30 15:00:00
  since: "1.5.0"
- name: to_varchar
  class_name: "org.apache.spark.sql.catalyst.expressions.ToCharacterBuilder"
  signatures:
    - "to_varchar(expr, format)"
  description: "Convert expr to a string based on the format. Throws an exception if the conversion fails. The format can consist of the following characters, case insensitive: '0' or '9': Specifies an expected digit between 0 and 9. A sequence of 0 or 9 in the format string matches a sequence of digits in the input value, generating a result string of the same length as the corresponding sequence in the format string. The result string is left-padded with zeros if the 0/9 sequence comprises more digits than the matching part of the decimal value, starts with 0, and is before the decimal point. Otherwise, it is padded with spaces. '.' or 'D': Specifies the position of the decimal point (optional, only allowed once). ',' or 'G': Specifies the position of the grouping (thousands) separator (,). There must be a 0 or 9 to the left and right of each grouping separator. '$': Specifies the location of the $ currency sign. This character may only be specified once. 'S' or 'MI': Specifies the position of a '-' or '+' sign (optional, only allowed once at the beginning or end of the format string). Note that 'S' prints '+' for positive values but 'MI' prints a space. 'PR': Only allowed at the end of the format string; specifies that the result string will be wrapped by angle brackets if the input value is negative. ('<1>'). If expr is a datetime, format shall be a valid datetime pattern, see Datetime Patterns. If expr is a binary, it is converted to a string in one of the formats: 'base64': a base 64 string. 'hex': a string in the hexadecimal format. 'utf-8': the input binary is decoded to UTF-8 string."
  examples: |
    > SELECT to_varchar(454, '999');
     454
    > SELECT to_varchar(454.00, '000D00');
     454.00
    > SELECT to_varchar(12454, '99G999');
     12,454
    > SELECT to_varchar(78.12, '$99.99');
     $78.12
    > SELECT to_varchar(-12454.8, '99G999D9S');
     12,454.8-
    > SELECT to_varchar(date'2016-04-08', 'y');
     2016
    > SELECT to_varchar(x'537061726b2053514c', 'base64');
     U3BhcmsgU1FM
    > SELECT to_varchar(x'537061726b2053514c', 'hex');
     537061726B2053514C
    > SELECT to_varchar(encode('abc', 'utf-8'), 'utf-8');
     abc
  since: "3.5.0"
- name: to_variant_object
  class_name: "org.apache.spark.sql.catalyst.expressions.variant.ToVariantObject"
  signatures:
    - "to_variant_object(expr)"
  description: "Convert a nested input (array/map/struct) into a variant where maps and structs are converted to variant objects which are unordered unlike SQL structs. Input maps can only have string keys."
  examples: |
    > SELECT to_variant_object(named_struct('a', 1, 'b', 2));
     {"a":1,"b":2}
    > SELECT to_variant_object(array(1, 2, 3));
     [1,2,3]
    > SELECT to_variant_object(array(named_struct('a', 1)));
     [{"a":1}]
    > SELECT to_variant_object(array(map("a", 2)));
     [{"a":2}]
  since: "4.0.0"
- name: to_xml
  class_name: "org.apache.spark.sql.catalyst.expressions.StructsToXml"
  signatures:
    - "to_xml(expr[, options])"
  description: "Returns a XML string with a given struct value"
  examples: |
    > SELECT to_xml(named_struct('a', 1, 'b', 2));
     <ROW>
         <a>1</a>
         <b>2</b>
     </ROW>
    > SELECT to_xml(named_struct('time', to_timestamp('2015-08-26', 'yyyy-MM-dd')), map('timestampFormat', 'dd/MM/yyyy'));
     <ROW>
         <time>26/08/2015</time>
     </ROW>
  since: "4.0.0"
- name: transform
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayTransform"
  signatures:
    - "transform(expr, func)"
  description: "Transforms elements in an array using the function."
  examples: |
    > SELECT transform(array(1, 2, 3), x -> x + 1);
     [2,3,4]
    > SELECT transform(array(1, 2, 3), (x, i) -> x + i);
     [1,3,5]
  since: "2.4.0"
- name: transform_keys
  class_name: "org.apache.spark.sql.catalyst.expressions.TransformKeys"
  signatures:
    - "transform_keys(expr, func)"
  description: "Transforms elements in a map using the function."
  examples: |
    > SELECT transform_keys(map_from_arrays(array(1, 2, 3), array(1, 2, 3)), (k, v) -> k + 1);
     {2:1,3:2,4:3}
    > SELECT transform_keys(map_from_arrays(array(1, 2, 3), array(1, 2, 3)), (k, v) -> k + v);
     {2:1,4:2,6:3}
  since: "3.0.0"
- name: transform_values
  class_name: "org.apache.spark.sql.catalyst.expressions.TransformValues"
  signatures:
    - "transform_values(expr, func)"
  description: "Transforms values in the map using the function."
  examples: |
    > SELECT transform_values(map_from_arrays(array(1, 2, 3), array(1, 2, 3)), (k, v) -> v + 1);
     {1:2,2:3,3:4}
    > SELECT transform_values(map_from_arrays(array(1, 2, 3), array(1, 2, 3)), (k, v) -> k + v);
     {1:2,2:4,3:6}
  since: "3.0.0"
- name: translate
  class_name: "org.apache.spark.sql.catalyst.expressions.StringTranslate"
  signatures:
    - "translate(input, from, to)"
  description: "Translates the input string by replacing the characters present in the from string with the corresponding characters in the to string."
  examples: |
    > SELECT translate('AaBbCc', 'abc', '123');
     A1B2C3
  since: "1.5.0"
- name: trim
  class_name: "org.apache.spark.sql.catalyst.expressions.StringTrim"
  signatures:
    - "trim(str)"
  description: "Removes the leading and trailing space characters from str."
  examples: |
    > SELECT trim('    SparkSQL   ');
     SparkSQL
    > SELECT trim(BOTH FROM '    SparkSQL   ');
     SparkSQL
    > SELECT trim(LEADING FROM '    SparkSQL   ');
     SparkSQL
    > SELECT trim(TRAILING FROM '    SparkSQL   ');
         SparkSQL
    > SELECT trim('SL' FROM 'SSparkSQLS');
     parkSQ
    > SELECT trim(BOTH 'SL' FROM 'SSparkSQLS');
     parkSQ
    > SELECT trim(LEADING 'SL' FROM 'SSparkSQLS');
     parkSQLS
    > SELECT trim(TRAILING 'SL' FROM 'SSparkSQLS');
     SSparkSQ
  since: "1.5.0"
- name: trunc
  class_name: "org.apache.spark.sql.catalyst.expressions.TruncDate"
  signatures:
    - "trunc(date, fmt)"
  description: "Returns date with the time portion of the day truncated to the unit specified by the format model fmt."
  examples: |
    > SELECT trunc('2019-08-04', 'week');
     2019-07-29
    > SELECT trunc('2019-08-04', 'quarter');
     2019-07-01
    > SELECT trunc('2009-02-12', 'MM');
     2009-02-01
    > SELECT trunc('2015-10-27', 'YEAR');
     2015-01-01
  since: "1.5.0"
- name: try_add
  class_name: "org.apache.spark.sql.catalyst.expressions.TryAdd"
  signatures:
    - "try_add(expr1, expr2)"
  description: "Returns the sum of expr1and expr2 and the result is null on overflow. The acceptable input types are the same with the + operator."
  examples: |
    > SELECT try_add(1, 2);
     3
    > SELECT try_add(2147483647, 1);
     NULL
    > SELECT try_add(date'2021-01-01', 1);
     2021-01-02
    > SELECT try_add(date'2021-01-01', interval 1 year);
     2022-01-01
    > SELECT try_add(timestamp'2021-01-01 00:00:00', interval 1 day);
     2021-01-02 00:00:00
    > SELECT try_add(interval 1 year, interval 2 year);
     3-0
  since: "3.2.0"
- name: try_aes_decrypt
  class_name: "org.apache.spark.sql.catalyst.expressions.TryAesDecrypt"
  signatures:
    - "try_aes_decrypt(expr, key[, mode[, padding[, aad]]])"
  description: "This is a special version of aes_decrypt that performs the same operation, but returns a NULL value instead of raising an error if the decryption cannot be performed."
  examples: |
    > SELECT try_aes_decrypt(unhex('6E7CA17BBB468D3084B5744BCA729FB7B2B7BCB8E4472847D02670489D95FA97DBBA7D3210'), '0000111122223333', 'GCM');
     Spark SQL
    > SELECT try_aes_decrypt(unhex('----------468D3084B5744BCA729FB7B2B7BCB8E4472847D02670489D95FA97DBBA7D3210'), '0000111122223333', 'GCM');
     NULL
  since: "3.5.0"
- name: try_aes_encrypt
  signatures:
    - "try_aes_encrypt(expr, key[, mode[, padding[, iv[, aad]]]])"
  description: "This is a special version of aes_encrypt that performs the same operation, but returns a NULL value instead of raising an error if encryption cannot be performed."
- name: try_avg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.TryAverageExpressionBuilder"
  signatures:
    - "try_avg(expr)"
  description: "Returns the mean calculated from values of a group and the result is null on overflow."
  examples: |
    > SELECT try_avg(col) FROM VALUES (1), (2), (3) AS tab(col);
     2.0
    > SELECT try_avg(col) FROM VALUES (1), (2), (NULL) AS tab(col);
     1.5
    > SELECT try_avg(col) FROM VALUES (interval '2147483647 months'), (interval '1 months') AS tab(col);
     NULL
  since: "3.3.0"
- name: try_divide
  class_name: "org.apache.spark.sql.catalyst.expressions.TryDivide"
  signatures:
    - "try_divide(dividend, divisor)"
  description: "Returns dividend/divisor. It always performs floating point division. Its result is always null if expr2 is 0. dividend must be a numeric or an interval. divisor must be a numeric."
  examples: |
    > SELECT try_divide(3, 2);
     1.5
    > SELECT try_divide(2L, 2L);
     1.0
    > SELECT try_divide(1, 0);
     NULL
    > SELECT try_divide(interval 2 month, 2);
     0-1
    > SELECT try_divide(interval 2 month, 0);
     NULL
  since: "3.2.0"
- name: try_element_at
  class_name: "org.apache.spark.sql.catalyst.expressions.TryElementAt"
  signatures:
    - "try_element_at(array, index)"
  description: "Returns element of array at given (1-based) index. If Index is 0, Spark will throw an error. If index < 0, accesses elements from the last to the first. The function always returns NULL if the index exceeds the length of the array."
  examples: |
    > SELECT try_element_at(array(1, 2, 3), 2);
     2
    > SELECT try_element_at(map(1, 'a', 2, 'b'), 2);
     b
  since: "3.3.0"
- name: try_make_interval
  class_name: "org.apache.spark.sql.catalyst.expressions.TryMakeInterval"
  signatures:
    - "try_make_interval([years[, months[, weeks[, days[, hours[, mins[, secs]]]]]]])"
  description: "This is a special version of make_interval that performs the same operation, but returns NULL when an overflow occurs."
  examples: |
    > SELECT try_make_interval(100, 11, 1, 1, 12, 30, 01.001001);
     100 years 11 months 8 days 12 hours 30 minutes 1.001001 seconds
    > SELECT try_make_interval(100, null, 3);
     NULL
    > SELECT try_make_interval(0, 1, 0, 1, 0, 0, 100.000001);
     1 months 1 days 1 minutes 40.000001 seconds
    > SELECT try_make_interval(2147483647);
     NULL
  since: "4.0.0"
- name: try_make_timestamp
  class_name: "org.apache.spark.sql.catalyst.expressions.TryMakeTimestampExpressionBuilder"
  signatures:
    - "try_make_timestamp(year, month, day, hour, min, sec[, timezone])"
  description: "Try to create a timestamp from year, month, day, hour, min, sec and timezone fields. The result data type is consistent with the value of configuration spark.sql.timestampType. The function returns NULL on invalid inputs."
  examples: |
    > SELECT try_make_timestamp(2014, 12, 28, 6, 30, 45.887);
     2014-12-28 06:30:45.887
    > SELECT try_make_timestamp(2014, 12, 28, 6, 30, 45.887, 'CET');
     2014-12-27 21:30:45.887
    > SELECT try_make_timestamp(DATE'2014-12-28');
     2014-12-28 00:00:00
    > SELECT try_make_timestamp(DATE'2014-12-28', TIME'6:30:45.887');
     2014-12-28 06:30:45.887
    > SELECT try_make_timestamp(DATE'2014-12-28', TIME'6:30:45.887', 'CET');
     2014-12-27 21:30:45.887
    > SELECT try_make_timestamp(2019, 6, 30, 23, 59, 60);
     2019-07-01 00:00:00
    > SELECT try_make_timestamp(2019, 6, 30, 23, 59, 1);
     2019-06-30 23:59:01
    > SELECT try_make_timestamp(null, 7, 22, 15, 30, 0);
     NULL
    > SELECT try_make_timestamp(2024, 13, 22, 15, 30, 0);
     NULL
  since: "4.0.0"
- name: try_make_timestamp_ltz
  class_name: "org.apache.spark.sql.catalyst.expressions.TryMakeTimestampLTZExpressionBuilder"
  signatures:
    - "try_make_timestamp_ltz(year, month, day, hour, min, sec[, timezone])"
  description: "Try to create the current timestamp with local time zone from year, month, day, hour, min, sec and (optional) timezone fields. The function returns NULL on invalid inputs."
  examples: |
    > SELECT try_make_timestamp_ltz(2014, 12, 28, 6, 30, 45.887);
     2014-12-28 06:30:45.887
    > SELECT try_make_timestamp_ltz(2014, 12, 28, 6, 30, 45.887, 'CET');
     2014-12-27 21:30:45.887
    > SELECT try_make_timestamp_ltz(2019, 6, 30, 23, 59, 60);
     2019-07-01 00:00:00
    > SELECT try_make_timestamp_ltz(null, 7, 22, 15, 30, 0);
     NULL
    > SELECT try_make_timestamp_ltz(2024, 13, 22, 15, 30, 0);
     NULL
    > SELECT try_make_timestamp_ltz(DATE'2014-12-28', TIME'6:30:45.887');
     2014-12-28 06:30:45.887
    > SELECT try_make_timestamp_ltz(DATE'2014-12-28', TIME'6:30:45.887', 'CET');
     2014-12-27 21:30:45.887
  since: "4.0.0"
- name: try_make_timestamp_ntz
  class_name: "org.apache.spark.sql.catalyst.expressions.TryMakeTimestampNTZExpressionBuilder"
  signatures:
    - "try_make_timestamp_ntz(year, month, day, hour, min, sec)"
  description: "Try to create local date-time from year, month, day, hour, min, sec fields. The function returns NULL on invalid inputs."
  examples: |
    > SELECT try_make_timestamp_ntz(2014, 12, 28, 6, 30, 45.887);
     2014-12-28 06:30:45.887
    > SELECT try_make_timestamp_ntz(2019, 6, 30, 23, 59, 60);
     2019-07-01 00:00:00
    > SELECT try_make_timestamp_ntz(null, 7, 22, 15, 30, 0);
     NULL
    > SELECT try_make_timestamp_ntz(2024, 13, 22, 15, 30, 0);
     NULL
    > SELECT try_make_timestamp_ntz(DATE'2014-12-28', TIME'6:30:45.887');
     2014-12-28 06:30:45.887
  since: "4.0.0"
- name: try_mod
  class_name: "org.apache.spark.sql.catalyst.expressions.TryMod"
  signatures:
    - "try_mod(dividend, divisor)"
  description: "Returns the remainder after expr1/expr2. dividend must be a numeric. divisor must be a numeric."
  examples: |
    > SELECT try_mod(3, 2);
     1
    > SELECT try_mod(2L, 2L);
     0
    > SELECT try_mod(3.0, 2.0);
     1.0
    > SELECT try_mod(1, 0);
     NULL
  since: "4.0.0"
- name: try_multiply
  class_name: "org.apache.spark.sql.catalyst.expressions.TryMultiply"
  signatures:
    - "try_multiply(expr1, expr2)"
  description: "Returns expr1*expr2 and the result is null on overflow. The acceptable input types are the same with the * operator."
  examples: |
    > SELECT try_multiply(2, 3);
     6
    > SELECT try_multiply(-2147483648, 10);
     NULL
    > SELECT try_multiply(interval 2 year, 3);
     6-0
  since: "3.3.0"
- name: try_parse_json
  class_name: "org.apache.spark.sql.catalyst.expressions.variant.TryParseJsonExpressionBuilder"
  signatures:
    - "try_parse_json(jsonStr)"
  description: "Parse a JSON string as a Variant value. Return NULL when the string is not valid JSON value."
  examples: |
    > SELECT try_parse_json('{"a":1,"b":0.8}');
     {"a":1,"b":0.8}
    > SELECT try_parse_json('{"a":1,');
     NULL
  since: "4.0.0"
- name: try_parse_url
  class_name: "org.apache.spark.sql.catalyst.expressions.TryParseUrl"
  signatures:
    - "try_parse_url(url, partToExtract[, key])"
  description: "This is a special version of parse_url that performs the same operation, but returns a NULL value instead of raising an error if the parsing cannot be performed."
  examples: |
    > SELECT try_parse_url('http://spark.apache.org/path?query=1', 'HOST');
     spark.apache.org
    > SELECT try_parse_url('http://spark.apache.org/path?query=1', 'QUERY');
     query=1
    > SELECT try_parse_url('inva lid://spark.apache.org/path?query=1', 'QUERY');
     NULL
    > SELECT try_parse_url('http://spark.apache.org/path?query=1', 'QUERY', 'query');
     1
  since: "4.0.0"
- name: try_reflect
  class_name: "org.apache.spark.sql.catalyst.expressions.TryReflect"
  signatures:
    - "try_reflect(class, method[, arg1[, arg2 ..]])"
  description: "This is a special version of reflect that performs the same operation, but returns a NULL value instead of raising an error if the invoke method thrown exception."
  examples: |
    > SELECT try_reflect('java.util.UUID', 'randomUUID');
     c33fb387-8500-4bfa-81d2-6e0e3e930df2
    > SELECT try_reflect('java.util.UUID', 'fromString', 'a5cf6c42-0c85-418f-af6c-3e4e5b1328f2');
     a5cf6c42-0c85-418f-af6c-3e4e5b1328f2
    > SELECT try_reflect('java.net.URLDecoder', 'decode', '%');
     NULL
  since: "4.0.0"
- name: try_subtract
  class_name: "org.apache.spark.sql.catalyst.expressions.TrySubtract"
  signatures:
    - "try_subtract(expr1, expr2)"
  description: "Returns expr1-expr2 and the result is null on overflow. The acceptable input types are the same with the - operator."
  examples: |
    > SELECT try_subtract(2, 1);
     1
    > SELECT try_subtract(-2147483648, 1);
     NULL
    > SELECT try_subtract(date'2021-01-02', 1);
     2021-01-01
    > SELECT try_subtract(date'2021-01-01', interval 1 year);
     2020-01-01
    > SELECT try_subtract(timestamp'2021-01-02 00:00:00', interval 1 day);
     2021-01-01 00:00:00
    > SELECT try_subtract(interval 2 year, interval 1 year);
     1-0
  since: "3.3.0"
- name: try_sum
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.TrySumExpressionBuilder"
  signatures:
    - "try_sum(expr)"
  description: "Returns the sum calculated from values of a group and the result is null on overflow."
  examples: |
    > SELECT try_sum(col) FROM VALUES (5), (10), (15) AS tab(col);
     30
    > SELECT try_sum(col) FROM VALUES (NULL), (10), (15) AS tab(col);
     25
    > SELECT try_sum(col) FROM VALUES (NULL), (NULL) AS tab(col);
     NULL
    > SELECT try_sum(col) FROM VALUES (9223372036854775807L), (1L) AS tab(col);
     NULL
  since: "3.3.0"
- name: try_to_binary
  class_name: "org.apache.spark.sql.catalyst.expressions.TryToBinary"
  signatures:
    - "try_to_binary(str[, fmt])"
  description: "This is a special version of to_binary that performs the same operation, but returns a NULL value instead of raising an error if the conversion cannot be performed."
  examples: |
    > SELECT try_to_binary('abc', 'utf-8');
     abc
    > select try_to_binary('a!', 'base64');
     NULL
    > select try_to_binary('abc', 'invalidFormat');
     NULL
  since: "3.3.0"
- name: try_to_number
  class_name: "org.apache.spark.sql.catalyst.expressions.TryToNumber"
  signatures:
    - "try_to_number(expr, fmt)"
  description: "Convert string 'expr' to a number based on the string format fmt. Returns NULL if the string 'expr' does not match the expected format. The format follows the same semantics as the to_number function."
  examples: |
    > SELECT try_to_number('454', '999');
     454
    > SELECT try_to_number('454.00', '000.00');
     454.00
    > SELECT try_to_number('12,454', '99,999');
     12454
    > SELECT try_to_number('$78.12', '$99.99');
     78.12
    > SELECT try_to_number('12,454.8-', '99,999.9S');
     -12454.8
  since: "3.3.0"
- name: try_to_timestamp
  class_name: "org.apache.spark.sql.catalyst.expressions.TryToTimestampExpressionBuilder"
  signatures:
    - "try_to_timestamp(timestamp_str[, fmt])"
  description: "Parses the timestamp_str expression with the fmt expression to a timestamp. The function always returns null on an invalid input with/without ANSI SQL mode enabled. By default, it follows casting rules to a timestamp if the fmt is omitted. The result data type is consistent with the value of configuration spark.sql.timestampType."
  examples: |
    > SELECT try_to_timestamp('2016-12-31 00:12:00');
     2016-12-31 00:12:00
    > SELECT try_to_timestamp('2016-12-31', 'yyyy-MM-dd');
     2016-12-31 00:00:00
    > SELECT try_to_timestamp('foo', 'yyyy-MM-dd');
     NULL
  since: "3.4.0"
- name: try_url_decode
  class_name: "org.apache.spark.sql.catalyst.expressions.TryUrlDecode"
  signatures:
    - "try_url_decode(str)"
  description: "This is a special version of url_decode that performs the same operation, but returns a NULL value instead of raising an error if the decoding cannot be performed."
  examples: |
    > SELECT try_url_decode('https%3A%2F%2Fspark.apache.org');
     https://spark.apache.org
