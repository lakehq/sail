- name: e
  class_name: "org.apache.spark.sql.catalyst.expressions.EulerNumber"
  signatures:
    - "e()"
  description: "Returns Euler's number, e."
  examples: |
    > SELECT e();
     2.718281828459045
  since: "1.5.0"
- name: element_at
  class_name: "org.apache.spark.sql.catalyst.expressions.ElementAt"
  signatures:
    - "element_at(array, index)"
  description: "Returns element of array at given (1-based) index. If Index is 0, Spark will throw an error. If index < 0, accesses elements from the last to the first. The function returns NULL if the index exceeds the length of the array and spark.sql.ansi.enabled is set to false. If spark.sql.ansi.enabled is set to true, it throws ArrayIndexOutOfBoundsException for invalid indices."
  examples: |
    > SELECT element_at(array(1, 2, 3), 2);
     2
    > SELECT element_at(map(1, 'a', 2, 'b'), 2);
     b
  since: "2.4.0"
- name: elt
  class_name: "org.apache.spark.sql.catalyst.expressions.Elt"
  signatures:
    - "elt(n, input1, input2, ...)"
  description: "Returns the n-th input, e.g., returns input2 when n is 2. The function returns NULL if the index exceeds the length of the array and spark.sql.ansi.enabled is set to false. If spark.sql.ansi.enabled is set to true, it throws ArrayIndexOutOfBoundsException for invalid indices."
  examples: |
    > SELECT elt(1, 'scala', 'java');
     scala
    > SELECT elt(2, 'a', 1);
     1
  since: "2.0.0"
- name: encode
  class_name: "org.apache.spark.sql.catalyst.expressions.Encode"
  signatures:
    - "encode(str, charset)"
  description: "Encodes the first argument using the second argument character set. If either argument is null, the result will also be null."
  examples: |
    > SELECT encode('abc', 'utf-8');
     abc
  since: "1.5.0"
- name: endswith
  class_name: "org.apache.spark.sql.catalyst.expressions.EndsWithExpressionBuilder"
  signatures:
    - "endswith(left, right)"
  description: "Returns a boolean. The value is True if left ends with right. Returns NULL if either input expression is NULL. Otherwise, returns False. Both left or right must be of STRING or BINARY type."
  examples: |
    > SELECT endswith('Spark SQL', 'SQL');
     true
    > SELECT endswith('Spark SQL', 'Spark');
     false
    > SELECT endswith('Spark SQL', null);
     NULL
    > SELECT endswith(x'537061726b2053514c', x'537061726b');
     false
    > SELECT endswith(x'537061726b2053514c', x'53514c');
     true
  since: "3.3.0"
- name: equal_null
  class_name: "org.apache.spark.sql.catalyst.expressions.EqualNull"
  signatures:
    - "equal_null(expr1, expr2)"
  description: "Returns same result as the EQUAL(=) operator for non-null operands, but returns true if both are null, false if one of the them is null."
  examples: |
    > SELECT equal_null(3, 3);
     true
    > SELECT equal_null(1, '11');
     false
    > SELECT equal_null(true, NULL);
     false
    > SELECT equal_null(NULL, 'abc');
     false
    > SELECT equal_null(NULL, NULL);
     true
  since: "3.4.0"
- name: every
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BoolAnd"
  signatures:
    - "every(expr)"
  description: "Returns true if all values of expr are true."
  examples: |
    > SELECT every(col) FROM VALUES (true), (true), (true) AS tab(col);
     true
    > SELECT every(col) FROM VALUES (NULL), (true), (true) AS tab(col);
     true
    > SELECT every(col) FROM VALUES (true), (false), (true) AS tab(col);
     false
  since: "3.0.0"
- name: exists
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayExists"
  signatures:
    - "exists(expr, pred)"
  description: "Tests whether a predicate holds for one or more elements in the array."
  examples: |
    > SELECT exists(array(1, 2, 3), x -> x % 2 == 0);
     true
    > SELECT exists(array(1, 2, 3), x -> x % 2 == 10);
     false
    > SELECT exists(array(1, null, 3), x -> x % 2 == 0);
     NULL
    > SELECT exists(array(0, null, 2, 3, null), x -> x IS NULL);
     true
    > SELECT exists(array(1, 2, 3), x -> x IS NULL);
     false
  since: "2.4.0"
- name: exp
  class_name: "org.apache.spark.sql.catalyst.expressions.Exp"
