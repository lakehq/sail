- name: any
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BoolOr"
  signatures:
    - "any(expr)"
  description: "Returns true if at least one value of expr is true."
  examples: |
    > SELECT any(col) FROM VALUES (true), (false), (false) AS tab(col);
     true
    > SELECT any(col) FROM VALUES (NULL), (true), (false) AS tab(col);
     true
    > SELECT any(col) FROM VALUES (false), (false), (NULL) AS tab(col);
     false
  since: "3.0.0"
- name: any_value
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.AnyValue"
  signatures:
    - "any_value(expr[, isIgnoreNull])"
  description: "Returns some value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values."
  examples: |
    > SELECT any_value(col) FROM VALUES (10), (5), (20) AS tab(col);
     10
    > SELECT any_value(col) FROM VALUES (NULL), (5), (20) AS tab(col);
     NULL
    > SELECT any_value(col, true) FROM VALUES (NULL), (5), (20) AS tab(col);
     5
  note: "The function is non-deterministic."
  since: "3.4.0"
- name: approx_count_distinct
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.HyperLogLogPlusPlus"
  signatures:
    - "approx_count_distinct(expr[, relativeSD])"
  description: "Returns the estimated cardinality by HyperLogLog++. relativeSD defines the maximum relative standard deviation allowed."
  examples: |
    > SELECT approx_count_distinct(col1) FROM VALUES (1), (1), (2), (2), (3) tab(col1);
     3
  since: "1.6.0"
- name: approx_percentile
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ApproximatePercentile"
  signatures:
    - "approx_percentile(col, percentage [, accuracy])"
  description: "Returns the approximate percentile of the numeric or ansi interval column col which is the smallest value in the ordered col values (sorted from least to greatest) such that no more than percentage of col values is less than the value or equal to that value. The value of percentage must be between 0.0 and 1.0. The accuracy parameter (default: 10000) is a positive numeric literal which controls approximation accuracy at the cost of memory. Higher value of accuracy yields better accuracy, 1.0/accuracy is the relative error of the approximation. When percentage is an array, each value of the percentage array must be between 0.0 and 1.0. In this case, returns the approximate percentile array of column col at the given percentage array."
  examples: |
    > SELECT approx_percentile(col, array(0.5, 0.4, 0.1), 100) FROM VALUES (0), (1), (2), (10) AS tab(col);
     [1,1,0]
    > SELECT approx_percentile(col, 0.5, 100) FROM VALUES (0), (6), (7), (9), (10) AS tab(col);
     7
    > SELECT approx_percentile(col, 0.5, 100) FROM VALUES (INTERVAL '0' MONTH), (INTERVAL '1' MONTH), (INTERVAL '2' MONTH), (INTERVAL '10' MONTH) AS tab(col);
     0-1
    > SELECT approx_percentile(col, array(0.5, 0.7), 100) FROM VALUES (INTERVAL '0' SECOND), (INTERVAL '1' SECOND), (INTERVAL '2' SECOND), (INTERVAL '10' SECOND) AS tab(col);
     [0 00:00:01.000000000,0 00:00:02.000000000]
  since: "2.1.0"
- name: array_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CollectList"
  signatures:
    - "array_agg(expr)"
  description: "Collects and returns a list of non-unique elements."
  examples: |
    > SELECT array_agg(col) FROM VALUES (1), (2), (1) AS tab(col);
     [1,2,1]
  note: |
    The function is non-deterministic because the order of collected results depends
    on the order of the rows which may be non-deterministic after a shuffle.
  since: "3.3.0"
- name: avg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Average"
  signatures:
    - "avg(expr)"
  description: "Returns the mean calculated from values of a group."
  examples: |
    > SELECT avg(col) FROM VALUES (1), (2), (3) AS tab(col);
     2.0
    > SELECT avg(col) FROM VALUES (1), (2), (NULL) AS tab(col);
     1.5
  since: "1.0.0"
- name: bit_and
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BitAndAgg"
  signatures:
    - "bit_and(expr)"
  description: "Returns the bitwise AND of all non-null input values, or null if none."
  examples: |
    > SELECT bit_and(col) FROM VALUES (3), (5) AS tab(col);
     1
  since: "3.0.0"
- name: bit_or
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BitOrAgg"
  signatures:
    - "bit_or(expr)"
  description: "Returns the bitwise OR of all non-null input values, or null if none."
  examples: |
    > SELECT bit_or(col) FROM VALUES (3), (5) AS tab(col);
     7
  since: "3.0.0"
- name: bit_xor
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BitXorAgg"
  signatures:
    - "bit_xor(expr)"
  description: "Returns the bitwise XOR of all non-null input values, or null if none."
  examples: |
    > SELECT bit_xor(col) FROM VALUES (3), (5) AS tab(col);
     6
  since: "3.0.0"
- name: bitmap_and_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.BitmapAndAgg"
  signatures:
    - "bitmap_and_agg(child)"
  description: "Returns a bitmap that is the bitwise AND of all of the bitmaps from the child expression. The input should be bitmaps created from bitmap_construct_agg()."
  examples: |
    > SELECT substring(hex(bitmap_and_agg(col)), 0, 6) FROM VALUES (X 'F0'), (X '70'), (X '30') AS tab(col);
     300000
    > SELECT substring(hex(bitmap_and_agg(col)), 0, 6) FROM VALUES (X 'FF'), (X 'FF'), (X 'FF') AS tab(col);
     FF0000
  since: "4.1.0"
- name: bitmap_construct_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.BitmapConstructAgg"
  signatures:
    - "bitmap_construct_agg(child)"
  description: "Returns a bitmap with the positions of the bits set from all the values from the child expression. The child expression will most likely be bitmap_bit_position()."
  examples: |
    > SELECT substring(hex(bitmap_construct_agg(bitmap_bit_position(col))), 0, 6) FROM VALUES (1), (2), (3) AS tab(col);
     070000
    > SELECT substring(hex(bitmap_construct_agg(bitmap_bit_position(col))), 0, 6) FROM VALUES (1), (1), (1) AS tab(col);
     010000
  since: "3.5.0"
- name: bitmap_or_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.BitmapOrAgg"
  signatures:
    - "bitmap_or_agg(child)"
  description: "Returns a bitmap that is the bitwise OR of all of the bitmaps from the child expression. The input should be bitmaps created from bitmap_construct_agg()."
  examples: |
    > SELECT substring(hex(bitmap_or_agg(col)), 0, 6) FROM VALUES (X '10'), (X '20'), (X '40') AS tab(col);
     700000
    > SELECT substring(hex(bitmap_or_agg(col)), 0, 6) FROM VALUES (X '10'), (X '10'), (X '10') AS tab(col);
     100000
  since: "3.5.0"
- name: bool_and
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BoolAnd"
  signatures:
    - "bool_and(expr)"
  description: "Returns true if all values of expr are true."
  examples: |
    > SELECT bool_and(col) FROM VALUES (true), (true), (true) AS tab(col);
     true
    > SELECT bool_and(col) FROM VALUES (NULL), (true), (true) AS tab(col);
     true
    > SELECT bool_and(col) FROM VALUES (true), (false), (true) AS tab(col);
     false
  since: "3.0.0"
- name: bool_or
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BoolOr"
  signatures:
    - "bool_or(expr)"
  description: "Returns true if at least one value of expr is true."
  examples: |
    > SELECT bool_or(col) FROM VALUES (true), (false), (false) AS tab(col);
     true
    > SELECT bool_or(col) FROM VALUES (NULL), (true), (false) AS tab(col);
     true
    > SELECT bool_or(col) FROM VALUES (false), (false), (NULL) AS tab(col);
     false
  since: "3.0.0"
- name: collect_list
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CollectList"
  signatures:
    - "collect_list(expr)"
  description: "Collects and returns a list of non-unique elements."
  examples: |
    > SELECT collect_list(col) FROM VALUES (1), (2), (1) AS tab(col);
     [1,2,1]
  note: |
    The function is non-deterministic because the order of collected results depends
    on the order of the rows which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: collect_set
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CollectSet"
  signatures:
    - "collect_set(expr)"
  description: "Collects and returns a set of unique elements."
  examples: |
    > SELECT collect_set(col) FROM VALUES (1), (2), (1) AS tab(col);
     [1,2]
  note: |
    The function is non-deterministic because the order of collected results depends
    on the order of the rows which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: corr
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Corr"
  signatures:
    - "corr(expr1, expr2)"
  description: "Returns Pearson coefficient of correlation between a set of number pairs."
  examples: |
    > SELECT corr(c1, c2) FROM VALUES (3, 2), (3, 3), (6, 4) as tab(c1, c2);
     0.8660254037844387
  since: "1.6.0"
- name: count
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Count"
  signatures:
    - "count(*)"
  description: "Returns the total number of retrieved rows, including rows containing null."
  examples: |
    > SELECT count(*) FROM VALUES (NULL), (5), (5), (20) AS tab(col);
     4
    > SELECT count(col) FROM VALUES (NULL), (5), (5), (20) AS tab(col);
     3
    > SELECT count(DISTINCT col) FROM VALUES (NULL), (5), (5), (10) AS tab(col);
     2
  since: "1.0.0"
- name: count_if
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CountIf"
  signatures:
    - "count_if(expr)"
  description: "Returns the number of TRUE values for the expression."
  examples: |
    > SELECT count_if(col % 2 = 0) FROM VALUES (NULL), (0), (1), (2), (3) AS tab(col);
     2
    > SELECT count_if(col IS NULL) FROM VALUES (NULL), (0), (1), (2), (3) AS tab(col);
     1
  since: "3.0.0"
- name: count_min_sketch
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CountMinSketchAggExpressionBuilder"
  signatures:
    - "count_min_sketch(col, eps, confidence, seed)"
  description: "Returns a count-min sketch of a column with the given esp, confidence and seed. The result is an array of bytes, which can be deserialized to a CountMinSketch before usage. Count-min sketch is a probabilistic data structure used for cardinality estimation using sub-linear space."
  examples: |
    > SELECT hex(count_min_sketch(col, 0.5d, 0.5d, 1)) FROM VALUES (1), (2), (1) AS tab(col);
     0000000100000000000000030000000100000004000000005D8D6AB90000000000000000000000000000000200000000000000010000000000000000
  since: "2.2.0"
- name: covar_pop
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CovPopulation"
  signatures:
    - "covar_pop(expr1, expr2)"
  description: "Returns the population covariance of a set of number pairs."
  examples: |
    > SELECT covar_pop(c1, c2) FROM VALUES (1,1), (2,2), (3,3) AS tab(c1, c2);
     0.6666666666666666
  since: "2.0.0"
- name: covar_samp
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.CovSample"
  signatures:
    - "covar_samp(expr1, expr2)"
  description: "Returns the sample covariance of a set of number pairs."
  examples: |
    > SELECT covar_samp(c1, c2) FROM VALUES (1,1), (2,2), (3,3) AS tab(c1, c2);
     1.0
  since: "2.0.0"
- name: every
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.BoolAnd"
  signatures:
    - "every(expr)"
  description: "Returns true if all values of expr are true."
  examples: |
    > SELECT every(col) FROM VALUES (true), (true), (true) AS tab(col);
     true
    > SELECT every(col) FROM VALUES (NULL), (true), (true) AS tab(col);
     true
    > SELECT every(col) FROM VALUES (true), (false), (true) AS tab(col);
     false
  since: "3.0.0"
- name: first
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.First"
  signatures:
    - "first(expr[, isIgnoreNull])"
  description: "Returns the first value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values."
  examples: |
    > SELECT first(col) FROM VALUES (10), (5), (20) AS tab(col);
     10
    > SELECT first(col) FROM VALUES (NULL), (5), (20) AS tab(col);
     NULL
    > SELECT first(col, true) FROM VALUES (NULL), (5), (20) AS tab(col);
     5
  note: |
    The function is non-deterministic because its results depends on the order of the rows
    which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: first_value
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.First"
  signatures:
    - "first_value(expr[, isIgnoreNull])"
  description: "Returns the first value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values."
  examples: |
    > SELECT first_value(col) FROM VALUES (10), (5), (20) AS tab(col);
     10
    > SELECT first_value(col) FROM VALUES (NULL), (5), (20) AS tab(col);
     NULL
    > SELECT first_value(col, true) FROM VALUES (NULL), (5), (20) AS tab(col);
     5
  note: |
    The function is non-deterministic because its results depends on the order of the rows
    which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: grouping
  class_name: "org.apache.spark.sql.catalyst.expressions.Grouping"
  signatures:
    - "grouping(col)"
  description: "indicates whether a specified column in a GROUP BY is aggregated or not, returns 1 for aggregated or 0 for not aggregated in the result set.\","
  examples: |
    > SELECT name, grouping(name), sum(age) FROM VALUES (2, 'Alice'), (5, 'Bob') people(age, name) GROUP BY cube(name);
      Alice 0   2
      Bob   0   5
      NULL  1   7
  since: "2.0.0"
- name: grouping_id
  class_name: "org.apache.spark.sql.catalyst.expressions.GroupingID"
  signatures:
    - "grouping_id([col1[, col2 ..]])"
  description: "returns the level of grouping, equals to (grouping(c1) << (n-1)) + (grouping(c2) << (n-2)) + ... + grouping(cn)"
  examples: |
    > SELECT name, grouping_id(), sum(age), avg(height) FROM VALUES (2, 'Alice', 165), (5, 'Bob', 180) people(age, name, height) GROUP BY cube(name, height);
      Alice 0   2   165.0
      Alice 1   2   165.0
      NULL  3   7   172.5
      Bob   0   5   180.0
      Bob   1   5   180.0
      NULL  2   2   165.0
      NULL  2   5   180.0
  note: |
    Input columns should match with grouping columns exactly, or empty (means all the grouping
    columns).
  since: "2.0.0"
- name: histogram_numeric
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.HistogramNumeric"
  signatures:
    - "histogram_numeric(expr, nb)"
  description: "Computes a histogram on numeric 'expr' using nb bins. The return value is an array of (x,y) pairs representing the centers of the histogram's bins. As the value of 'nb' is increased, the histogram approximation gets finer-grained, but may yield artifacts around outliers. In practice, 20-40 histogram bins appear to work well, with more bins being required for skewed or smaller datasets. Note that this function creates a histogram with non-uniform bin widths. It offers no guarantees in terms of the mean-squared-error of the histogram, but in practice is comparable to the histograms produced by the R/S-Plus statistical computing packages. Note: the output type of the 'x' field in the return value is propagated from the input value consumed in the aggregate function."
  examples: |
    > SELECT histogram_numeric(col, 5) FROM VALUES (0), (1), (2), (10) AS tab(col);
     [{"x":0,"y":1.0},{"x":1,"y":1.0},{"x":2,"y":1.0},{"x":10,"y":1.0}]
  since: "3.3.0"
- name: hll_sketch_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.HllSketchAgg"
  signatures:
    - "hll_sketch_agg(expr, lgConfigK)"
  description: "Returns the HllSketch's updatable binary representation. lgConfigK (optional) the log-base-2 of K, with K is the number of buckets or slots for the HllSketch."
  examples: |
    > SELECT hll_sketch_estimate(hll_sketch_agg(col, 12)) FROM VALUES (1), (1), (2), (2), (3) tab(col);
     3
  since: "3.5.0"
- name: hll_union_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.HllUnionAgg"
  signatures:
    - "hll_union_agg(expr, allowDifferentLgConfigK)"
  description: "Returns the estimated number of unique values. allowDifferentLgConfigK (optional) Allow sketches with different lgConfigK values to be unioned (defaults to false)."
  examples: |
    > SELECT hll_sketch_estimate(hll_union_agg(sketch, true)) FROM (SELECT hll_sketch_agg(col) as sketch FROM VALUES (1) tab(col) UNION ALL SELECT hll_sketch_agg(col, 20) as sketch FROM VALUES (1) tab(col));
     1
  since: "3.5.0"
- name: kurtosis
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Kurtosis"
  signatures:
    - "kurtosis(expr)"
  description: "Returns the kurtosis value calculated from values of a group."
  examples: |
    > SELECT kurtosis(col) FROM VALUES (-10), (-20), (100), (1000) AS tab(col);
     -0.7014368047529627
    > SELECT kurtosis(col) FROM VALUES (1), (10), (100), (10), (1) as tab(col);
     0.19432323191699075
  since: "1.6.0"
- name: last
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Last"
  signatures:
    - "last(expr[, isIgnoreNull])"
  description: "Returns the last value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values"
  examples: |
    > SELECT last(col) FROM VALUES (10), (5), (20) AS tab(col);
     20
    > SELECT last(col) FROM VALUES (10), (5), (NULL) AS tab(col);
     NULL
    > SELECT last(col, true) FROM VALUES (10), (5), (NULL) AS tab(col);
     5
  note: |
    The function is non-deterministic because its results depends on the order of the rows
    which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: last_value
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Last"
  signatures:
    - "last_value(expr[, isIgnoreNull])"
  description: "Returns the last value of expr for a group of rows. If isIgnoreNull is true, returns only non-null values"
  examples: |
    > SELECT last_value(col) FROM VALUES (10), (5), (20) AS tab(col);
     20
    > SELECT last_value(col) FROM VALUES (10), (5), (NULL) AS tab(col);
     NULL
    > SELECT last_value(col, true) FROM VALUES (10), (5), (NULL) AS tab(col);
     5
  note: |
    The function is non-deterministic because its results depends on the order of the rows
    which may be non-deterministic after a shuffle.
  since: "2.0.0"
- name: listagg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ListAgg"
  signatures:
    - "listagg(expr[, delimiter])[ WITHIN GROUP (ORDER BY key [ASC | DESC] [,...])]"
  description: "Returns the concatenation of non-NULL input values, separated by the delimiter ordered by key. If all values are NULL, NULL is returned."
  examples: |
    > SELECT listagg(col) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     abc
    > SELECT listagg(col) WITHIN GROUP (ORDER BY col DESC) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     cba
    > SELECT listagg(col) FROM VALUES ('a'), (NULL), ('b') AS tab(col);
     ab
    > SELECT listagg(col) FROM VALUES ('a'), ('a') AS tab(col);
     aa
    > SELECT listagg(DISTINCT col) FROM VALUES ('a'), ('a'), ('b') AS tab(col);
     ab
    > SELECT listagg(col, ', ') FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     a, b, c
    > SELECT listagg(col) FROM VALUES (NULL), (NULL) AS tab(col);
     NULL
  note: |
    If the order is not specified, the function is non-deterministic because
    the order of the rows may be non-deterministic after a shuffle.
    If DISTINCT is specified, then expr and key must be the same expression.
  since: "4.0.0"
- name: max
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Max"
  signatures:
    - "max(expr)"
  description: "Returns the maximum value of expr."
  examples: |
    > SELECT max(col) FROM VALUES (10), (50), (20) AS tab(col);
     50
  since: "1.0.0"
- name: max_by
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.MaxBy"
  signatures:
    - "max_by(x, y)"
  description: "Returns the value of x associated with the maximum value of y."
  examples: |
    > SELECT max_by(x, y) FROM VALUES ('a', 10), ('b', 50), ('c', 20) AS tab(x, y);
     b
  note: |
    The function is non-deterministic so the output order can be different for
    those associated the same values of x.
  since: "3.0.0"
- name: mean
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Average"
  signatures:
    - "mean(expr)"
  description: "Returns the mean calculated from values of a group."
  examples: |
    > SELECT mean(col) FROM VALUES (1), (2), (3) AS tab(col);
     2.0
    > SELECT mean(col) FROM VALUES (1), (2), (NULL) AS tab(col);
     1.5
  since: "1.0.0"
- name: median
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Median"
  signatures:
    - "median(col)"
  description: "Returns the median of numeric or ANSI interval column col."
  examples: |
    > SELECT median(col) FROM VALUES (0), (10) AS tab(col);
     5.0
    > SELECT median(col) FROM VALUES (INTERVAL '0' MONTH), (INTERVAL '10' MONTH) AS tab(col);
     0-5
  since: "3.4.0"
- name: min
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Min"
  signatures:
    - "min(expr)"
  description: "Returns the minimum value of expr."
  examples: |
    > SELECT min(col) FROM VALUES (10), (-1), (20) AS tab(col);
     -1
  since: "1.0.0"
- name: min_by
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.MinBy"
  signatures:
    - "min_by(x, y)"
  description: "Returns the value of x associated with the minimum value of y."
  examples: |
    > SELECT min_by(x, y) FROM VALUES ('a', 10), ('b', 50), ('c', 20) AS tab(x, y);
     a
  note: |
    The function is non-deterministic so the output order can be different for
    those associated the same values of x.
  since: "3.0.0"
- name: mode
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ModeBuilder"
  signatures:
    - "mode(col[, deterministic])"
  description: "Returns the most frequent value for the values within col. NULL values are ignored. If all the values are NULL, or there are 0 rows, returns NULL. When multiple values have the same greatest frequency then either any of values is returned if deterministic is false or is not defined, or the lowest value is returned if deterministic is true. mode() WITHIN GROUP (ORDER BY col) - Returns the most frequent value for the values within col (specified in ORDER BY clause). NULL values are ignored. If all the values are NULL, or there are 0 rows, returns NULL. When multiple values have the same greatest frequency only one value will be returned. The value will be chosen based on sort direction. Return the smallest value if sort direction is asc or the largest value if sort direction is desc from multiple values with the same frequency."
  examples: |
    > SELECT mode(col) FROM VALUES (0), (10), (10) AS tab(col);
     10
    > SELECT mode(col) FROM VALUES (INTERVAL '0' MONTH), (INTERVAL '10' MONTH), (INTERVAL '10' MONTH) AS tab(col);
     0-10
    > SELECT mode(col) FROM VALUES (0), (10), (10), (null), (null), (null) AS tab(col);
     10
    > SELECT mode(col, false) FROM VALUES (-10), (0), (10) AS tab(col);
     0
    > SELECT mode(col, true) FROM VALUES (-10), (0), (10) AS tab(col);
     -10
    > SELECT mode() WITHIN GROUP (ORDER BY col) FROM VALUES (0), (10), (10) AS tab(col);
     10
    > SELECT mode() WITHIN GROUP (ORDER BY col) FROM VALUES (0), (10), (10), (20), (20) AS tab(col);
     10
    > SELECT mode() WITHIN GROUP (ORDER BY col DESC) FROM VALUES (0), (10), (10), (20), (20) AS tab(col);
     20
  since: "3.4.0"
- name: percentile
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Percentile"
  signatures:
    - "percentile(col, percentage [, frequency])"
  description: "Returns the exact percentile value of numeric or ANSI interval column col at the given percentage. The value of percentage must be between 0.0 and 1.0. The value of frequency should be positive integral"
  examples: |
    > SELECT percentile(col, 0.3) FROM VALUES (0), (10) AS tab(col);
     3.0
    > SELECT percentile(col, array(0.25, 0.75)) FROM VALUES (0), (10) AS tab(col);
     [2.5,7.5]
    > SELECT percentile(col, 0.5) FROM VALUES (INTERVAL '0' MONTH), (INTERVAL '10' MONTH) AS tab(col);
     0-5
    > SELECT percentile(col, array(0.2, 0.5)) FROM VALUES (INTERVAL '0' SECOND), (INTERVAL '10' SECOND) AS tab(col);
     [0 00:00:02.000000000,0 00:00:05.000000000]
  since: "2.1.0"
- name: percentile_approx
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ApproximatePercentile"
  signatures:
    - "percentile_approx(col, percentage [, accuracy])"
  description: "Returns the approximate percentile of the numeric or ansi interval column col which is the smallest value in the ordered col values (sorted from least to greatest) such that no more than percentage of col values is less than the value or equal to that value. The value of percentage must be between 0.0 and 1.0. The accuracy parameter (default: 10000) is a positive numeric literal which controls approximation accuracy at the cost of memory. Higher value of accuracy yields better accuracy, 1.0/accuracy is the relative error of the approximation. When percentage is an array, each value of the percentage array must be between 0.0 and 1.0. In this case, returns the approximate percentile array of column col at the given percentage array."
  examples: |
    > SELECT percentile_approx(col, array(0.5, 0.4, 0.1), 100) FROM VALUES (0), (1), (2), (10) AS tab(col);
     [1,1,0]
    > SELECT percentile_approx(col, 0.5, 100) FROM VALUES (0), (6), (7), (9), (10) AS tab(col);
     7
    > SELECT percentile_approx(col, 0.5, 100) FROM VALUES (INTERVAL '0' MONTH), (INTERVAL '1' MONTH), (INTERVAL '2' MONTH), (INTERVAL '10' MONTH) AS tab(col);
     0-1
    > SELECT percentile_approx(col, array(0.5, 0.7), 100) FROM VALUES (INTERVAL '0' SECOND), (INTERVAL '1' SECOND), (INTERVAL '2' SECOND), (INTERVAL '10' SECOND) AS tab(col);
     [0 00:00:01.000000000,0 00:00:02.000000000]
  since: "2.1.0"
