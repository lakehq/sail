          slots for the HllSketch. 
  examples: |2-
    
        Examples:
          > SELECT hll_sketch_estimate(hll_sketch_agg(col, 12)) FROM VALUES (1), (1), (2), (2), (3) tab(col);
           3
      
  since: "3.5.0"

- name: "hll_union_agg"
  scope: "sql_builtin"
