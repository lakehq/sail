- name: "string_agg"
  scope: "sql_builtin"
  group: "agg_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ListAgg"
  signatures:
    - "string_agg(expr[, delimiter])[ WITHIN GROUP (ORDER BY key [ASC | DESC] [,...])]"
  usage: |2-
    
        string_agg(expr[, delimiter])[ WITHIN GROUP (ORDER BY key [ASC | DESC] [,...])] - Returns
        the concatenation of non-NULL input values, separated by the delimiter ordered by key.
        If all values are NULL, NULL is returned.
        
  arguments: |2-
    
        Arguments:
          * expr - a string or binary expression to be concatenated.
          * delimiter - an optional string or binary foldable expression used to separate the input values.
            If NULL, the concatenation will be performed without a delimiter. Default is NULL.
          * key - an optional expression for ordering the input values. Multiple keys can be specified.
            If none are specified, the order of the rows in the result is non-deterministic.
      
  examples: |2-
    
        Examples:
          > SELECT string_agg(col) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
           abc
          > SELECT string_agg(col) WITHIN GROUP (ORDER BY col DESC) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
           cba
          > SELECT string_agg(col) FROM VALUES ('a'), (NULL), ('b') AS tab(col);
           ab
          > SELECT string_agg(col) FROM VALUES ('a'), ('a') AS tab(col);
           aa
          > SELECT string_agg(DISTINCT col) FROM VALUES ('a'), ('a'), ('b') AS tab(col);
           ab
          > SELECT string_agg(col, ', ') FROM VALUES ('a'), ('b'), ('c') AS tab(col);
           a, b, c
          > SELECT string_agg(col) FROM VALUES (NULL), (NULL) AS tab(col);
           NULL
      
  note: |2-
    
        * If the order is not specified, the function is non-deterministic because
        the order of the rows may be non-deterministic after a shuffle.
        * If DISTINCT is specified, then expr and key must be the same expression.
      
  since: "4.0.0"

