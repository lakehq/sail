  since: "1.6.0"

- name: "last"
  scope: "sql_builtin"
  group: "agg_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.Last"
  signatures:
    - "last(expr[, isIgnoreNull])"
  usage: |2-
    
        last(expr[, isIgnoreNull]) - Returns the last value of `expr` for a group of rows.
          If `isIgnoreNull` is true, returns only non-null values
  examples: |2-
    
        Examples:
          > SELECT last(col) FROM VALUES (10), (5), (20) AS tab(col);
           20
          > SELECT last(col) FROM VALUES (10), (5), (NULL) AS tab(col);
           NULL
          > SELECT last(col, true) FROM VALUES (10), (5), (NULL) AS tab(col);
           5
      
  note: |2-
    
        The function is non-deterministic because its results depends on the order of the rows
        which may be non-deterministic after a shuffle.
      
  since: "2.0.0"

