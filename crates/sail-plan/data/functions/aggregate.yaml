  usage: "kurtosis(expr) - Returns the kurtosis value calculated from values of a group."
  examples: |2-
    
        Examples:
          > SELECT kurtosis(col) FROM VALUES (-10), (-20), (100), (1000) AS tab(col);
           -0.7014368047529627
