- name: string_agg
  class_name: "org.apache.spark.sql.catalyst.expressions.aggregate.ListAgg"
  signatures:
    - "string_agg(expr[, delimiter])[ WITHIN GROUP (ORDER BY key [ASC | DESC] [,...])]"
  description: "Returns the concatenation of non-NULL input values, separated by the delimiter ordered by key. If all values are NULL, NULL is returned."
  examples: |
    > SELECT string_agg(col) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     abc
    > SELECT string_agg(col) WITHIN GROUP (ORDER BY col DESC) FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     cba
    > SELECT string_agg(col) FROM VALUES ('a'), (NULL), ('b') AS tab(col);
     ab
    > SELECT string_agg(col) FROM VALUES ('a'), ('a') AS tab(col);
     aa
    > SELECT string_agg(DISTINCT col) FROM VALUES ('a'), ('a'), ('b') AS tab(col);
     ab
    > SELECT string_agg(col, ', ') FROM VALUES ('a'), ('b'), ('c') AS tab(col);
     a, b, c
    > SELECT string_agg(col) FROM VALUES (NULL), (NULL) AS tab(col);
     NULL
  note: |
    If the order is not specified, the function is non-deterministic because
    the order of the rows may be non-deterministic after a shuffle.
    If DISTINCT is specified, then expr and key must be the same expression.
  since: "4.0.0"
