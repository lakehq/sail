- name: "from_avro"
  scope: "sql_builtin"
  group: "misc_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.FromAvro"
  signatures:
    - "from_avro(child, jsonFormatSchema, options)"
  usage: |2-
    
        from_avro(child, jsonFormatSchema, options) - Converts a binary Avro value into a Catalyst value.
        
  examples: |2-
    
        Examples:
          > SELECT from_avro(s, '{"type": "record", "name": "struct", "fields": [{ "name": "u", "type": ["int","string"] }]}', map()) IS NULL AS result FROM (SELECT NAMED_STRUCT('u', NAMED_STRUCT('member0', member0, 'member1', member1)) AS s FROM VALUES (1, NULL), (NULL,  'a') tab(member0, member1));
           [false]
      
  note: |2-
    
        The specified schema must match actual schema of the read data, otherwise the behavior
        is undefined: it may fail or return arbitrary result.
        To deserialize the data with a compatible and evolved schema, the expected Avro schema can be
        set via the corresponding option.
      
  since: "4.0.0"

