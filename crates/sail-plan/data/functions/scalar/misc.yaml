  signatures:
    - "try_reflect(class, method[, arg1[, arg2 ..]])"
  description: "This is a special version of reflect that performs the same operation, but returns a NULL value instead of raising an error if the invoke method thrown exception."
  examples: |
    > SELECT try_reflect('java.util.UUID', 'randomUUID');
     c33fb387-8500-4bfa-81d2-6e0e3e930df2
    > SELECT try_reflect('java.util.UUID', 'fromString', 'a5cf6c42-0c85-418f-af6c-3e4e5b1328f2');
     a5cf6c42-0c85-418f-af6c-3e4e5b1328f2
    > SELECT try_reflect('java.net.URLDecoder', 'decode', '%');
     NULL
  since: "4.0.0"
