- name: from_avro
  class_name: "org.apache.spark.sql.catalyst.expressions.FromAvro"
  signatures:
    - "from_avro(child, jsonFormatSchema, options)"
  description: "Converts a binary Avro value into a Catalyst value."
  examples: |
    > SELECT from_avro(s, '{"type": "record", "name": "struct", "fields": [{ "name": "u", "type": ["int","string"] }]}', map()) IS NULL AS result FROM (SELECT NAMED_STRUCT('u', NAMED_STRUCT('member0', member0, 'member1', member1)) AS s FROM VALUES (1, NULL), (NULL,  'a') tab(member0, member1));
     [false]
  note: |
    The specified schema must match actual schema of the read data, otherwise the behavior
    is undefined: it may fail or return arbitrary result.
    To deserialize the data with a compatible and evolved schema, the expected Avro schema can be
    set via the corresponding option.
  since: "4.0.0"
- name: from_protobuf
  class_name: "org.apache.spark.sql.catalyst.expressions.FromProtobuf"
  signatures:
    - "from_protobuf(data, messageName, descFilePath, options)"
  description: "Converts a binary Protobuf value into a Catalyst value."
  examples: |
    > SELECT from_protobuf(s, 'Person', '/path/to/descriptor.desc', map()) IS NULL AS result FROM (SELECT NAMED_STRUCT('name', name, 'id', id) AS s FROM VALUES ('John Doe', 1), (NULL,  2) tab(name, id));
     [false]
  note: |
    The specified Protobuf schema must match actual schema of the read data, otherwise the behavior
    is undefined: it may fail or return arbitrary result.
    To deserialize the data with a compatible and evolved schema, the expected Protobuf schema can be
    set via the corresponding option.
  since: "4.0.0"
- name: hll_sketch_estimate
  class_name: "org.apache.spark.sql.catalyst.expressions.HllSketchEstimate"
  signatures:
    - "hll_sketch_estimate(expr)"
  description: "Returns the estimated number of unique values given the binary representation of a Datasketches HllSketch."
  examples: |
    > SELECT hll_sketch_estimate(hll_sketch_agg(col)) FROM VALUES (1), (1), (2), (2), (3) tab(col);
     3
  since: "3.5.0"
- name: hll_union
  class_name: "org.apache.spark.sql.catalyst.expressions.HllUnion"
  signatures:
    - "hll_union(first, second, allowDifferentLgConfigK)"
  description: "Merges two binary representations of Datasketches HllSketch objects, using a Datasketches Union object. Set allowDifferentLgConfigK to true to allow unions of sketches with different lgConfigK values (defaults to false)."
  examples: |
    > SELECT hll_sketch_estimate(hll_union(hll_sketch_agg(col1), hll_sketch_agg(col2))) FROM VALUES (1, 4), (1, 4), (2, 5), (2, 5), (3, 6) tab(col1, col2);
     6
  since: "3.5.0"
