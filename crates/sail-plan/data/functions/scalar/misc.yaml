- name: theta_union
  class_name: "org.apache.spark.sql.catalyst.expressions.ThetaUnion"
  signatures:
    - "theta_union(first, second, lgNomEntries)"
  description: "Merges two binary representations of Datasketches ThetaSketch objects using a ThetaSketch Union object. Users can set lgNomEntries to a value between 4 and 26 to find the union of sketches with different union buffer size values (defaults to 12)."
  examples: |
    > SELECT theta_sketch_estimate(theta_union(theta_sketch_agg(col1), theta_sketch_agg(col2))) FROM VALUES (1, 4), (1, 4), (2, 5), (2, 5), (3, 6) tab(col1, col2);
