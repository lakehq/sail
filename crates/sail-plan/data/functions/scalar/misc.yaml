- name: try_aes_decrypt
  class_name: "org.apache.spark.sql.catalyst.expressions.TryAesDecrypt"
  signatures:
    - "try_aes_decrypt(expr, key[, mode[, padding[, aad]]])"
  description: "This is a special version of aes_decrypt that performs the same operation, but returns a NULL value instead of raising an error if the decryption cannot be performed."
  examples: |
    > SELECT try_aes_decrypt(unhex('6E7CA17BBB468D3084B5744BCA729FB7B2B7BCB8E4472847D02670489D95FA97DBBA7D3210'), '0000111122223333', 'GCM');
     Spark SQL
    > SELECT try_aes_decrypt(unhex('----------468D3084B5744BCA729FB7B2B7BCB8E4472847D02670489D95FA97DBBA7D3210'), '0000111122223333', 'GCM');
     NULL
  since: "3.5.0"
