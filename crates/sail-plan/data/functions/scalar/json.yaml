- name: from_json
  class_name: "org.apache.spark.sql.catalyst.expressions.JsonToStructs"
  signatures:
    - "from_json(jsonStr, schema[, options])"
  description: "Returns a struct value with the given jsonStr and schema."
  examples: |
    > SELECT from_json('{"a":1, "b":0.8}', 'a INT, b DOUBLE');
     {"a":1,"b":0.8}
    > SELECT from_json('{"time":"26/08/2015"}', 'time Timestamp', map('timestampFormat', 'dd/MM/yyyy'));
     {"time":2015-08-26 00:00:00}
    > SELECT from_json('{"teacher": "Alice", "student": [{"name": "Bob", "rank": 1}, {"name": "Charlie", "rank": 2}]}', 'STRUCT<teacher: STRING, student: ARRAY<STRUCT<name: STRING, rank: INT>>>');
     {"teacher":"Alice","student":[{"name":"Bob","rank":1},{"name":"Charlie","rank":2}]}
  since: "2.2.0"
- name: get_json_object
  class_name: "org.apache.spark.sql.catalyst.expressions.GetJsonObject"
  signatures:
    - "get_json_object(json_txt, path)"
  description: "Extracts a json object from path."
  examples: |
    > SELECT get_json_object('{"a":"b"}', '$.a');
     b
    > SELECT get_json_object('[{"a":"b"},{"a":"c"}]', '$[0].a');
     b
    > SELECT get_json_object('[{"a":"b"},{"a":"c"}]', '$[*].a');
     ["b","c"]
  since: "1.5.0"
- name: json_array_length
  class_name: "org.apache.spark.sql.catalyst.expressions.LengthOfJsonArray"
  signatures:
    - "json_array_length(jsonArray)"
  description: "Returns the number of elements in the outermost JSON array."
  examples: |
    > SELECT json_array_length('[1,2,3,4]');
      4
    > SELECT json_array_length('[1,2,3,{"f1":1,"f2":[5,6]},4]');
      5
    > SELECT json_array_length('[1,2');
      NULL
  since: "3.1.0"
- name: json_object_keys
  class_name: "org.apache.spark.sql.catalyst.expressions.JsonObjectKeys"
  signatures:
    - "json_object_keys(json_object)"
  description: "Returns all the keys of the outermost JSON object as an array."
  examples: |
    > SELECT json_object_keys('{}');
      []
    > SELECT json_object_keys('{"key": "value"}');
      ["key"]
    > SELECT json_object_keys('{"f1":"abc","f2":{"f3":"a", "f4":"b"}}');
      ["f1","f2"]
  since: "3.1.0"
- name: json_tuple
  class_name: "org.apache.spark.sql.catalyst.expressions.JsonTuple"
  signatures:
    - "json_tuple(jsonStr, p1, p2, ..., pn)"
  description: "Returns a tuple like the function get_json_object, but it takes multiple names. All the input parameters and output column types are string."
  examples: |
    > SELECT json_tuple('{"a":1, "b":2}', 'a', 'b');
     1  2
  since: "1.6.0"
- name: schema_of_json
  class_name: "org.apache.spark.sql.catalyst.expressions.SchemaOfJson"
  signatures:
    - "schema_of_json(json[, options])"
  description: "Returns schema in the DDL format of JSON string."
  examples: |
    > SELECT schema_of_json('[{"col":0}]');
     ARRAY<STRUCT<col: BIGINT>>
    > SELECT schema_of_json('[{"col":01}]', map('allowNumericLeadingZeros', 'true'));
     ARRAY<STRUCT<col: BIGINT>>
  since: "2.4.0"
- name: to_json
  class_name: "org.apache.spark.sql.catalyst.expressions.StructsToJson"
  signatures:
    - "to_json(expr[, options])"
  description: "Returns a JSON string with a given struct value"
  examples: |
    > SELECT to_json(named_struct('a', 1, 'b', 2));
     {"a":1,"b":2}
    > SELECT to_json(named_struct('time', to_timestamp('2015-08-26', 'yyyy-MM-dd')), map('timestampFormat', 'dd/MM/yyyy'));
     {"time":"26/08/2015"}
    > SELECT to_json(array(named_struct('a', 1, 'b', 2)));
     [{"a":1,"b":2}]
    > SELECT to_json(map('a', named_struct('b', 1)));
     {"a":{"b":1}}
    > SELECT to_json(map(named_struct('a', 1),named_struct('b', 2)));
     {"[1]":{"b":2}}
    > SELECT to_json(map('a', 1));
     {"a":1}
    > SELECT to_json(array(map('a', 1)));
     [{"a":1}]
  since: "2.2.0"
