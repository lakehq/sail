- name: "transform_keys"
  scope: "sql_builtin"
  group: "lambda_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.TransformKeys"
  signatures:
    - "transform_keys(expr, func)"
  usage: "transform_keys(expr, func) - Transforms elements in a map using the function."
  examples: |2-
    
        Examples:
          > SELECT transform_keys(map_from_arrays(array(1, 2, 3), array(1, 2, 3)), (k, v) -> k + 1);
           {2:1,3:2,4:3}
          > SELECT transform_keys(map_from_arrays(array(1, 2, 3), array(1, 2, 3)), (k, v) -> k + v);
           {2:1,4:2,6:3}
      
  since: "3.0.0"

