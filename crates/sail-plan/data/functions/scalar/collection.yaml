  examples: |2-
    
        Examples:
          > SELECT try_element_at(array(1, 2, 3), 2);
           2
          > SELECT try_element_at(map(1, 'a', 2, 'b'), 2);
           b
      
  since: "3.3.0"

- name: "zip_with"
  scope: "sql_builtin"
  group: "lambda_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ZipWith"
  signatures:
    - "zip_with(left, right, func)"
  usage: "zip_with(left, right, func) - Merges the two given arrays, element-wise, into a single array using function. If one array is shorter, nulls are appended at the end to match the length of the longer array, before applying function."
  examples: |2-
    
        Examples:
          > SELECT zip_with(array(1, 2, 3), array('a', 'b', 'c'), (x, y) -> (y, x));
           [{"y":"a","x":1},{"y":"b","x":2},{"y":"c","x":3}]
          > SELECT zip_with(array(1, 2), array(3, 4), (x, y) -> x + y);
           [4,6]
          > SELECT zip_with(array('a', 'b', 'c'), array('d', 'e', 'f'), (x, y) -> concat(x, y));
           ["ad","be","cf"]
      
  since: "2.4.0"

- name: "||"
