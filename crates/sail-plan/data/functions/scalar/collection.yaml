- name: "aggregate"
  scope: "sql_builtin"
  group: "lambda_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayAggregate"
  signatures:
    - "aggregate(expr, start, merge, finish)"
  usage: |2-
    
          aggregate(expr, start, merge, finish) - Applies a binary operator to an initial state and all
          elements in the array, and reduces this to a single state. The final state is converted
          into the final result by applying a finish function.
        
  examples: |2-
    
        Examples:
          > SELECT aggregate(array(1, 2, 3), 0, (acc, x) -> acc + x);
           6
          > SELECT aggregate(array(1, 2, 3), 0, (acc, x) -> acc + x, acc -> acc * 10);
           60
      
  since: "2.4.0"

- name: "array_sort"
  scope: "sql_builtin"
  group: "lambda_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ArraySort"
  signatures:
    - "array_sort(expr, func)"
  usage: |2-
    array_sort(expr, func) - Sorts the input array. If func is omitted, sort
        in ascending order. The elements of the input array must be orderable.
        NaN is greater than any non-NaN elements for double/float type.
        Null elements will be placed at the end of the returned array.
        Since 3.0.0 this function also sorts and returns the array based on the
        given comparator function. The comparator will take two arguments representing
        two elements of the array.
        It returns a negative integer, 0, or a positive integer as the first element is less than,
        equal to, or greater than the second element. If the comparator function returns null,
        the function will fail and raise an error.
        
  examples: |2-
    
        Examples:
          > SELECT array_sort(array(5, 6, 1), (left, right) -> case when left < right then -1 when left > right then 1 else 0 end);
           [1,5,6]
          > SELECT array_sort(array('bc', 'ab', 'dc'), (left, right) -> case when left is null and right is null then 0 when left is null then -1 when right is null then 1 when left < right then 1 when left > right then -1 else 0 end);
           ["dc","bc","ab"]
          > SELECT array_sort(array('b', 'd', null, 'c', 'a'));
           ["a","b","c","d",null]
      
  since: "2.4.0"

- name: "cardinality"
  scope: "sql_builtin"
  group: "collection_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Size"
  signatures:
    - "cardinality(expr)"
  usage: |2-
    
        cardinality(expr) - Returns the size of an array or a map.
        This function returns -1 for null input only if spark.sql.ansi.enabled is false and
        spark.sql.legacy.sizeOfNull is true. Otherwise, it returns null for null input.
        With the default settings, the function returns null for null input.
      
  examples: |2-
    
        Examples:
          > SELECT cardinality(array('b', 'd', 'c', 'a'));
           4
          > SELECT cardinality(map('a', 1, 'b', 2));
           2
      
  since: "2.4.0"

- name: "concat"
  scope: "sql_builtin"
  group: "collection_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Concat"
  signatures:
    - "concat(col1, col2, ..., colN)"
  usage: "concat(col1, col2, ..., colN) - Returns the concatenation of col1, col2, ..., colN."
  examples: |2-
    
        Examples:
          > SELECT concat('Spark', 'SQL');
           SparkSQL
          > SELECT concat(array(1, 2, 3), array(4, 5), array(6));
           [1,2,3,4,5,6]
      
  note: |2-
    
        Concat logic for arrays is available since 2.4.0.
      
  since: "1.5.0"

- name: "deep_size"
  scope: "sail_extension"
  signatures:
    - "deep_size(expr)"
  usage: "deep_size(expr) - Returns the number of elements in an array or map."

- name: "element_at"
  scope: "sql_builtin"
  group: "collection_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ElementAt"
  signatures:
    - "element_at(array, index)"
    - "element_at(map, key)"
  usage: |2-
    
        element_at(array, index) - Returns element of array at given (1-based) index. If Index is 0,
          Spark will throw an error. If index < 0, accesses elements from the last to the first.
          The function returns NULL if the index exceeds the length of the array and
          `spark.sql.ansi.enabled` is set to false.
          If `spark.sql.ansi.enabled` is set to true, it throws ArrayIndexOutOfBoundsException
          for invalid indices.
    
        element_at(map, key) - Returns value for given key. The function returns NULL if the key is not
           contained in the map.
      
  examples: |2-
    
        Examples:
          > SELECT element_at(array(1, 2, 3), 2);
           2
          > SELECT element_at(map(1, 'a', 2, 'b'), 2);
           b
      
  since: "2.4.0"

- name: "exists"
  scope: "sql_builtin"
  group: "lambda_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayExists"
  signatures:
    - "exists(expr, pred)"
  usage: "exists(expr, pred) - Tests whether a predicate holds for one or more elements in the array."
  examples: |2-
    
        Examples:
          > SELECT exists(array(1, 2, 3), x -> x % 2 == 0);
           true
          > SELECT exists(array(1, 2, 3), x -> x % 2 == 10);
           false
          > SELECT exists(array(1, null, 3), x -> x % 2 == 0);
           NULL
          > SELECT exists(array(0, null, 2, 3, null), x -> x IS NULL);
           true
          > SELECT exists(array(1, 2, 3), x -> x IS NULL);
           false
      
  since: "2.4.0"

- name: "filter"
  scope: "sql_builtin"
  group: "lambda_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayFilter"
  signatures:
    - "filter(expr, func)"
  usage: "filter(expr, func) - Filters the input array using the given predicate."
  examples: |2-
    
        Examples:
          > SELECT filter(array(1, 2, 3), x -> x % 2 == 1);
           [1,3]
          > SELECT filter(array(0, 2, 3), (x, i) -> x > i);
           [2,3]
          > SELECT filter(array(0, null, 2, 3, null), x -> x IS NOT NULL);
           [0,2,3]
      
  note: |2-
    
        The inner function may use the index argument since 3.0.0.
      
  since: "2.4.0"

- name: "forall"
  scope: "sql_builtin"
  group: "lambda_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayForAll"
  signatures:
    - "forall(expr, pred)"
  usage: "forall(expr, pred) - Tests whether a predicate holds for all elements in the array."
  examples: |2-
    
        Examples:
          > SELECT forall(array(1, 2, 3), x -> x % 2 == 0);
           false
          > SELECT forall(array(2, 4, 8), x -> x % 2 == 0);
           true
          > SELECT forall(array(1, null, 3), x -> x % 2 == 0);
           false
          > SELECT forall(array(2, null, 8), x -> x % 2 == 0);
           NULL
      
  since: "3.0.0"

- name: "map_filter"
  scope: "sql_builtin"
  group: "lambda_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.MapFilter"
  signatures:
    - "map_filter(expr, func)"
  usage: "map_filter(expr, func) - Filters entries in a map using the function."
  examples: |2-
    
        Examples:
          > SELECT map_filter(map(1, 0, 2, 2, 3, -1), (k, v) -> k > v);
           {1:0,3:-1}
      
