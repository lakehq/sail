  source: "built-in"
  signatures:
    - "expr1 || expr2"
  usage: "expr1 || expr2 - Returns the concatenation of `expr1` and `expr2`."
  examples: |2-
    
        Examples:
          > SELECT 'Spark' || 'SQL';
           SparkSQL
          > SELECT array(1, 2, 3) || array(4, 5) || array(6);
           [1,2,3,4,5,6]
  note: |2
    
        || for arrays is available since 2.4.0.
  since: "2.3.0"

