- name: array
  class_name: "org.apache.spark.sql.catalyst.expressions.CreateArray"
  signatures:
    - "array(expr, ...)"
  description: "Returns an array with the given elements."
  examples: |
    > SELECT array(1, 2, 3);
     [1,2,3]
  since: "1.1.0"
- name: array_append
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayAppend"
  signatures:
    - "array_append(array, element)"
  description: "Add the element at the end of the array passed as first argument. Type of element should be similar to type of the elements of the array. Null element is also appended into the array. But if the array passed, is NULL output is NULL"
  examples: |
    > SELECT array_append(array('b', 'd', 'c', 'a'), 'd');
     ["b","d","c","a","d"]
    > SELECT array_append(array(1, 2, 3, null), null);
     [1,2,3,null,null]
    > SELECT array_append(CAST(null as Array<Int>), 2);
     NULL
  since: "3.4.0"
- name: array_compact
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayCompact"
  signatures:
    - "array_compact(array)"
  description: "Removes null values from the array."
  examples: |
    > SELECT array_compact(array(1, 2, 3, null));
     [1,2,3]
    > SELECT array_compact(array("a", "b", "c"));
     ["a","b","c"]
  since: "3.4.0"
- name: array_concat
  signatures:
    - "array_concat(array, ...)"
  description: "Concatenates input arrays and returns the resulting array."
- name: array_contains
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayContains"
  signatures:
    - "array_contains(array, value)"
  description: "Returns true if the array contains the value."
  examples: |
    > SELECT array_contains(array(1, 2, 3), 2);
     true
  since: "1.5.0"
- name: array_contains_all
  signatures:
    - "array_contains_all(array, values)"
  description: "Returns true if array contains every element in values."
- name: array_distinct
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayDistinct"
  signatures:
    - "array_distinct(array)"
  description: "Removes duplicate values from the array."
  examples: |
    > SELECT array_distinct(array(1, 2, 3, null, 3));
     [1,2,3,null]
  since: "2.4.0"
- name: array_except
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayExcept"
  signatures:
    - "array_except(array1, array2)"
  description: "Returns an array of the elements in array1 but not in array2, without duplicates."
  examples: |
    > SELECT array_except(array(1, 2, 3), array(1, 3, 5));
     [2]
  since: "2.4.0"
- name: array_insert
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayInsert"
  signatures:
    - "array_insert(x, pos, val)"
  description: "Places val into index pos of array x. Array indices start at 1. The maximum negative index is -1 for which the function inserts new element after the current last element. Index above array size appends the array, or prepends the array if index is negative, with 'null' elements."
  examples: |
    > SELECT array_insert(array(1, 2, 3, 4), 5, 5);
     [1,2,3,4,5]
    > SELECT array_insert(array(5, 4, 3, 2), -1, 1);
     [5,4,3,2,1]
    > SELECT array_insert(array(5, 3, 2, 1), -4, 4);
     [5,4,3,2,1]
  since: "3.4.0"
- name: array_intersect
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayIntersect"
  signatures:
    - "array_intersect(array1, array2)"
  description: "Returns an array of the elements in the intersection of array1 and array2, without duplicates."
  examples: |
    > SELECT array_intersect(array(1, 2, 3), array(1, 3, 5));
     [1,3]
  since: "2.4.0"
- name: array_join
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayJoin"
  signatures:
    - "array_join(array, delimiter[, nullReplacement])"
  description: "Concatenates the elements of the given array using the delimiter and an optional string to replace nulls. If no value is set for nullReplacement, any null value is filtered."
  examples: |
    > SELECT array_join(array('hello', 'world'), ' ');
     hello world
    > SELECT array_join(array('hello', null ,'world'), ' ');
     hello world
    > SELECT array_join(array('hello', null ,'world'), ' ', ',');
     hello , world
  since: "2.4.0"
- name: array_max
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayMax"
  signatures:
    - "array_max(array)"
  description: "Returns the maximum value in the array. NaN is greater than any non-NaN elements for double/float type. NULL elements are skipped."
  examples: |
    > SELECT array_max(array(1, 20, null, 3));
     20
  since: "2.4.0"
- name: array_min
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayMin"
  signatures:
    - "array_min(array)"
  description: "Returns the minimum value in the array. NaN is greater than any non-NaN elements for double/float type. NULL elements are skipped."
  examples: |
    > SELECT array_min(array(1, 20, null, 3));
     1
  since: "2.4.0"
- name: array_position
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayPosition"
  signatures:
    - "array_position(array, element)"
  description: "Returns the (1-based) index of the first matching element of the array as long, or 0 if no match is found."
  examples: |
    > SELECT array_position(array(312, 773, 708, 708), 708);
     3
    > SELECT array_position(array(312, 773, 708, 708), 414);
     0
  since: "2.4.0"
- name: array_prepend
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayPrepend"
  signatures:
    - "array_prepend(array, element)"
  description: "Add the element at the beginning of the array passed as first argument. Type of element should be the same as the type of the elements of the array. Null element is also prepended to the array. But if the array passed is NULL output is NULL"
  examples: |
    > SELECT array_prepend(array('b', 'd', 'c', 'a'), 'd');
     ["d","b","d","c","a"]
    > SELECT array_prepend(array(1, 2, 3, null), null);
     [null,1,2,3,null]
    > SELECT array_prepend(CAST(null as Array<Int>), 2);
     NULL
  since: "3.5.0"
- name: array_remove
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayRemove"
  signatures:
    - "array_remove(array, element)"
  description: "Remove all elements that equal to element from array."
  examples: |
    > SELECT array_remove(array(1, 2, 3, null, 3), 3);
     [1,2,null]
  since: "2.4.0"
- name: array_repeat
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayRepeat"
  signatures:
    - "array_repeat(element, count)"
  description: "Returns the array containing element count times."
  examples: |
    > SELECT array_repeat('123', 2);
     ["123","123"]
  since: "2.4.0"
- name: array_size
  class_name: "org.apache.spark.sql.catalyst.expressions.ArraySize"
  signatures:
    - "array_size(expr)"
  description: "Returns the size of an array. The function returns null for null input."
  examples: |
    > SELECT array_size(array('b', 'd', 'c', 'a'));
     4
  since: "3.3.0"
- name: array_union
  class_name: "org.apache.spark.sql.catalyst.expressions.ArrayUnion"
  signatures:
    - "array_union(array1, array2)"
  description: "Returns an array of the elements in the union of array1 and array2, without duplicates."
  examples: |
    > SELECT array_union(array(1, 2, 3), array(1, 3, 5));
     [1,2,3,5]
  since: "2.4.0"
- name: arrays_overlap
  class_name: "org.apache.spark.sql.catalyst.expressions.ArraysOverlap"
  signatures:
    - "arrays_overlap(a1, a2)"
  description: "Returns true if a1 contains at least a non-null element present also in a2. If the arrays have no common element and they are both non-empty and either of them contains a null element null is returned, false otherwise."
  examples: |
    > SELECT arrays_overlap(array(1, 2, 3), array(3, 4, 5));
     true
  since: "2.4.0"
- name: arrays_zip
  class_name: "org.apache.spark.sql.catalyst.expressions.ArraysZip"
  signatures:
    - "arrays_zip(a1, a2, ...)"
  description: "Returns a merged array of structs in which the N-th struct contains all N-th values of input arrays."
  examples: |
    > SELECT arrays_zip(array(1, 2, 3), array(2, 3, 4));
     [{"0":1,"1":2},{"0":2,"1":3},{"0":3,"1":4}]
    > SELECT arrays_zip(array(1, 2), array(2, 3), array(3, 4));
     [{"0":1,"1":2,"2":3},{"0":2,"1":3,"2":4}]
  since: "2.4.0"
- name: flatten
  class_name: "org.apache.spark.sql.catalyst.expressions.Flatten"
  signatures:
    - "flatten(arrayOfArrays)"
  description: "Transforms an array of arrays into a single array."
  examples: |
    > SELECT flatten(array(array(1, 2), array(3, 4)));
     [1,2,3,4]
  since: "2.4.0"
- name: get
  class_name: "org.apache.spark.sql.catalyst.expressions.Get"
  signatures:
    - "get(array, index)"
  description: "Returns element of array at given (0-based) index. If the index points outside of the array boundaries, then this function returns NULL."
  examples: |
    > SELECT get(array(1, 2, 3), 0);
     1
    > SELECT get(array(1, 2, 3), 3);
     NULL
    > SELECT get(array(1, 2, 3), -1);
     NULL
  since: "3.4.0"
- name: sequence
  class_name: "org.apache.spark.sql.catalyst.expressions.Sequence"
  signatures:
    - "sequence(start, stop, step)"
  description: "Generates an array of elements from start to stop (inclusive), incrementing by step. The type of the returned elements is the same as the type of argument expressions."
  examples: |
    > SELECT sequence(1, 5);
     [1,2,3,4,5]
    > SELECT sequence(5, 1);
     [5,4,3,2,1]
    > SELECT sequence(to_date('2018-01-01'), to_date('2018-03-01'), interval 1 month);
     [2018-01-01,2018-02-01,2018-03-01]
    > SELECT sequence(to_date('2018-01-01'), to_date('2018-03-01'), interval '0-1' year to month);
     [2018-01-01,2018-02-01,2018-03-01]
  since: "2.4.0"
- name: shuffle
  class_name: "org.apache.spark.sql.catalyst.expressions.Shuffle"
  signatures:
    - "shuffle(array)"
  description: "Returns a random permutation of the given array."
  examples: |
    > SELECT shuffle(array(1, 20, 3, 5));
     [3,1,5,20]
    > SELECT shuffle(array(1, 20, null, 3));
     [20,null,3,1]
  note: "The function is non-deterministic."
  since: "2.4.0"
- name: slice
  class_name: "org.apache.spark.sql.catalyst.expressions.Slice"
  signatures:
    - "slice(x, start, length)"
  description: "Subsets array x starting from index start (array indices start at 1, or starting from the end if start is negative) with the specified length."
  examples: |
    > SELECT slice(array(1, 2, 3, 4), 2, 2);
     [2,3]
    > SELECT slice(array(1, 2, 3, 4), -2, 2);
     [3,4]
  since: "2.4.0"
- name: sort_array
  class_name: "org.apache.spark.sql.catalyst.expressions.SortArray"
  signatures:
    - "sort_array(array[, ascendingOrder])"
  description: "Sorts the input array in ascending or descending order according to the natural ordering of the array elements. NaN is greater than any non-NaN elements for double/float type. Null elements will be placed at the beginning of the returned array in ascending order or at the end of the returned array in descending order."
  examples: |
    > SELECT sort_array(array('b', 'd', null, 'c', 'a'), true);
     [null,"a","b","c","d"]
    > SELECT sort_array(array('b', 'd', null, 'c', 'a'), false);
     ["d","c","b","a",null]
  since: "1.5.0"
