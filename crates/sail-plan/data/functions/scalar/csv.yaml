- name: from_csv
  class_name: "org.apache.spark.sql.catalyst.expressions.CsvToStructs"
  signatures:
    - "from_csv(csvStr, schema[, options])"
  description: "Returns a struct value with the given csvStr and schema."
  examples: |
    > SELECT from_csv('1, 0.8', 'a INT, b DOUBLE');
     {"a":1,"b":0.8}
    > SELECT from_csv('26/08/2015', 'time Timestamp', map('timestampFormat', 'dd/MM/yyyy'));
     {"time":2015-08-26 00:00:00}
  since: "3.0.0"
- name: schema_of_csv
  class_name: "org.apache.spark.sql.catalyst.expressions.SchemaOfCsv"
  signatures:
    - "schema_of_csv(csv[, options])"
  description: "Returns schema in the DDL format of CSV string."
  examples: |
    > SELECT schema_of_csv('1,abc');
     STRUCT<_c0: INT, _c1: STRING>
  since: "3.0.0"
- name: to_csv
  class_name: "org.apache.spark.sql.catalyst.expressions.StructsToCsv"
  signatures:
    - "to_csv(expr[, options])"
  description: "Returns a CSV string with a given struct value"
  examples: |
    > SELECT to_csv(named_struct('a', 1, 'b', 2));
     1,2
    > SELECT to_csv(named_struct('time', to_timestamp('2015-08-26', 'yyyy-MM-dd')), map('timestampFormat', 'dd/MM/yyyy'));
     26/08/2015
  since: "3.0.0"
