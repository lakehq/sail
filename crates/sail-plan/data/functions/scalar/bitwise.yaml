- name: "&"
  scope: "sql_builtin"
  group: "bitwise_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseAnd"
  signatures:
    - "expr1 & expr2"
  usage: "expr1 & expr2 - Returns the result of bitwise AND of `expr1` and `expr2`."
  examples: |2-
    
        Examples:
          > SELECT 3 & 5;
           1
      
  since: "1.4.0"

- name: "<<"
  scope: "sql_builtin"
  group: "bitwise_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftLeft"
  signatures:
    - "base << exp"
  usage: "base << exp - Bitwise left shift."
  examples: |2-
    
        Examples:
          > SELECT shiftleft(2, 1);
           4
          > SELECT 2 << 1;
           4
      
  note: |2-
    
          `<<` operator is added in Spark 4.0.0 as an alias for `shiftleft`.
        
  since: "4.0.0"

