- name: "bit_count"
  scope: "sql_builtin"
  group: "bitwise_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseCount"
  signatures:
    - "bit_count(expr)"
  usage: "bit_count(expr) - Returns the number of bits that are set in the argument expr as an unsigned 64-bit integer, or NULL if the argument is NULL."
  examples: |2-
    
        Examples:
          > SELECT bit_count(0);
           0
      
  since: "3.0.0"

- name: "bit_get"
  scope: "sql_builtin"
  group: "bitwise_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseGet"
  signatures:
    - "bit_get(expr, pos)"
  usage: |2-
    
        bit_get(expr, pos) - Returns the value of the bit (0 or 1) at the specified position.
          The positions are numbered from right to left, starting at zero.
          The position argument cannot be negative.
      
  examples: |2-
    
        Examples:
          > SELECT bit_get(11, 0);
           1
          > SELECT bit_get(11, 2);
           0
      
  since: "3.2.0"

- name: "bitwise_not"
  scope: "sail_extension"
  signatures:
    - "bitwise_not(expr)"
  usage: "bitwise_not(expr) - Returns the bitwise NOT of expr."

