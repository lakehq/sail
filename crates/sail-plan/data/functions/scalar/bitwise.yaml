- name: "&"
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseAnd"
  signatures:
    - "expr1 & expr2"
  description: "Returns the result of bitwise AND of expr1 and expr2."
  examples: |
    > SELECT 3 & 5;
     1
  since: "1.4.0"
- name: "<<"
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftLeft"
  signatures:
    - "base << exp"
  description: "Bitwise left shift."
  examples: |
    > SELECT shiftleft(2, 1);
     4
    > SELECT 2 << 1;
     4
  note: "<< operator is added in Spark 4.0.0 as an alias for shiftleft."
  since: "4.0.0"
- name: ">>"
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftRight"
  signatures:
    - "base >> expr"
  description: "Bitwise (signed) right shift."
  examples: |
    > SELECT shiftright(4, 1);
     2
    > SELECT 4 >> 1;
     2
  note: ">> operator is added in Spark 4.0.0 as an alias for shiftright."
  since: "4.0.0"
- name: ">>>"
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftRightUnsigned"
  signatures:
    - "base >>> expr"
  description: "Bitwise unsigned right shift."
  examples: |
    > SELECT shiftrightunsigned(4, 1);
     2
    > SELECT 4 >>> 1;
     2
  note: ">>> operator is added in Spark 4.0.0 as an alias for shiftrightunsigned."
  since: "4.0.0"
- name: "^"
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseXor"
  signatures:
    - "expr1 ^ expr2"
  description: "Returns the result of bitwise exclusive OR of expr1 and expr2."
  examples: |
    > SELECT 3 ^ 5;
     6
  since: "1.4.0"
- name: bit_count
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseCount"
  signatures:
    - "bit_count(expr)"
  description: "Returns the number of bits that are set in the argument expr as an unsigned 64-bit integer, or NULL if the argument is NULL."
  examples: |
    > SELECT bit_count(0);
     0
  since: "3.0.0"
- name: bit_get
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseGet"
  signatures:
    - "bit_get(expr, pos)"
  description: "Returns the value of the bit (0 or 1) at the specified position. The positions are numbered from right to left, starting at zero. The position argument cannot be negative."
  examples: |
    > SELECT bit_get(11, 0);
     1
    > SELECT bit_get(11, 2);
     0
  since: "3.2.0"
- name: bitwise_not
  signatures:
    - "bitwise_not(expr)"
  description: "Returns the bitwise NOT of expr."
- name: getbit
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseGet"
  signatures:
    - "getbit(expr, pos)"
  description: "Returns the value of the bit (0 or 1) at the specified position. The positions are numbered from right to left, starting at zero. The position argument cannot be negative."
  examples: |
    > SELECT getbit(11, 0);
     1
    > SELECT getbit(11, 2);
     0
  since: "3.2.0"
- name: shiftleft
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftLeft"
  signatures:
    - "base shiftleft exp"
  description: "Bitwise left shift."
  examples: |
    > SELECT shiftleft(2, 1);
     4
    > SELECT 2 << 1;
     4
  note: "<< operator is added in Spark 4.0.0 as an alias for shiftleft."
  since: "1.5.0"
- name: shiftright
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftRight"
  signatures:
    - "base shiftright expr"
  description: "Bitwise (signed) right shift."
  examples: |
    > SELECT shiftright(4, 1);
     2
    > SELECT 4 >> 1;
     2
  note: ">> operator is added in Spark 4.0.0 as an alias for shiftright."
  since: "1.5.0"
- name: shiftrightunsigned
  class_name: "org.apache.spark.sql.catalyst.expressions.ShiftRightUnsigned"
  signatures:
    - "base shiftrightunsigned expr"
  description: "Bitwise unsigned right shift."
  examples: |
    > SELECT shiftrightunsigned(4, 1);
     2
    > SELECT 4 >>> 1;
     2
  note: ">>> operator is added in Spark 4.0.0 as an alias for shiftrightunsigned."
  since: "1.5.0"
- name: "|"
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseOr"
  signatures:
    - "expr1 | expr2"
  description: "Returns the result of bitwise OR of expr1 and expr2."
  examples: |
    > SELECT 3 | 5;
     7
  since: "1.4.0"
- name: "~"
  class_name: "org.apache.spark.sql.catalyst.expressions.BitwiseNot"
  signatures:
    - "~ expr"
  description: "Returns the result of bitwise NOT of expr."
  examples: |
    > SELECT ~ 0;
     -1
  since: "1.4.0"
