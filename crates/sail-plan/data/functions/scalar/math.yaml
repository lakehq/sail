- name: rand
  class_name: "org.apache.spark.sql.catalyst.expressions.Rand"
  signatures:
    - "rand([seed])"
  description: "Returns a random value with independent and identically distributed (i.i.d.) uniformly distributed values in [0, 1)."
  examples: |
    > SELECT rand();
     0.9629742951434543
    > SELECT rand(0);
     0.7604953758285915
    > SELECT rand(null);
     0.7604953758285915
  note: "The function is non-deterministic in general case."
  since: "1.5.0"
- name: randn
  class_name: "org.apache.spark.sql.catalyst.expressions.Randn"
  signatures:
    - "randn([seed])"
  description: "Returns a random value with independent and identically distributed (i.i.d.) values drawn from the standard normal distribution."
  examples: |
    > SELECT randn();
     -0.3254147983080288
    > SELECT randn(0);
     1.6034991609278433
    > SELECT randn(null);
     1.6034991609278433
  note: "The function is non-deterministic in general case."
  since: "1.5.0"
- name: random
  class_name: "org.apache.spark.sql.catalyst.expressions.Rand"
  signatures:
    - "random([seed])"
  description: "Returns a random value with independent and identically distributed (i.i.d.) uniformly distributed values in [0, 1)."
  examples: |
    > SELECT random();
     0.9629742951434543
    > SELECT random(0);
     0.7604953758285915
    > SELECT random(null);
     0.7604953758285915
  note: "The function is non-deterministic in general case."
  since: "3.0.0"
- name: random_poisson
