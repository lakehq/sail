- name: "uniform"
  scope: "sql_builtin"
  group: "math_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Uniform"
  signatures:
    - "uniform(min, max[, seed])"
  usage: |2-
    
        uniform(min, max[, seed]) - Returns a random value with independent and identically
          distributed (i.i.d.) values with the specified range of numbers. The random seed is optional.
          The provided numbers specifying the minimum and maximum values of the range must be constant.
          If both of these numbers are integers, then the result will also be an integer. Otherwise if
          one or both of these are floating-point numbers, then the result will also be a floating-point
          number.
      
  examples: |2-
    
        Examples:
          > SELECT uniform(10, 20, 0) > 0 AS result;
          true
      
  since: "4.0.0"

- name: "width_bucket"
  scope: "sql_builtin"
  group: "math_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.WidthBucket"
  signatures:
    - "width_bucket(value, min_value, max_value, num_bucket)"
  usage: |2-
    
        width_bucket(value, min_value, max_value, num_bucket) - Returns the bucket number to which
          `value` would be assigned in an equiwidth histogram with `num_bucket` buckets,
          in the range `min_value` to `max_value`."
      
  examples: |2-
    
        Examples:
          > SELECT width_bucket(5.3, 0.2, 10.6, 5);
           3
          > SELECT width_bucket(-2.1, 1.3, 3.4, 3);
           0
          > SELECT width_bucket(8.1, 0.0, 5.7, 4);
           5
          > SELECT width_bucket(-0.9, 5.2, 0.5, 2);
           3
          > SELECT width_bucket(INTERVAL '0' YEAR, INTERVAL '0' YEAR, INTERVAL '10' YEAR, 10);
           1
          > SELECT width_bucket(INTERVAL '1' YEAR, INTERVAL '0' YEAR, INTERVAL '10' YEAR, 10);
           2
          > SELECT width_bucket(INTERVAL '0' DAY, INTERVAL '0' DAY, INTERVAL '10' DAY, 10);
           1
          > SELECT width_bucket(INTERVAL '1' DAY, INTERVAL '0' DAY, INTERVAL '10' DAY, 10);
           2
      
  since: "3.1.0"

