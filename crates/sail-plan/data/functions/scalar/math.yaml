- name: tan
  class_name: "org.apache.spark.sql.catalyst.expressions.Tan"
  signatures:
    - "tan(expr)"
  description: "Returns the tangent of expr, as if computed by java.lang.Math.tan."
  examples: |
    > SELECT tan(0);
     0.0
  since: "1.4.0"
- name: tanh
  class_name: "org.apache.spark.sql.catalyst.expressions.Tanh"
  signatures:
    - "tanh(expr)"
  description: "Returns the hyperbolic tangent of expr, as if computed by java.lang.Math.tanh."
  examples: |
    > SELECT tanh(0);
     0.0
  since: "1.4.0"
- name: try_add
  class_name: "org.apache.spark.sql.catalyst.expressions.TryAdd"
  signatures:
    - "try_add(expr1, expr2)"
  description: "Returns the sum of expr1and expr2 and the result is null on overflow. The acceptable input types are the same with the + operator."
  examples: |
    > SELECT try_add(1, 2);
     3
    > SELECT try_add(2147483647, 1);
     NULL
    > SELECT try_add(date'2021-01-01', 1);
     2021-01-02
    > SELECT try_add(date'2021-01-01', interval 1 year);
     2022-01-01
    > SELECT try_add(timestamp'2021-01-01 00:00:00', interval 1 day);
     2021-01-02 00:00:00
    > SELECT try_add(interval 1 year, interval 2 year);
     3-0
  since: "3.2.0"
- name: try_divide
  class_name: "org.apache.spark.sql.catalyst.expressions.TryDivide"
  signatures:
    - "try_divide(dividend, divisor)"
  description: "Returns dividend/divisor. It always performs floating point division. Its result is always null if expr2 is 0. dividend must be a numeric or an interval. divisor must be a numeric."
  examples: |
    > SELECT try_divide(3, 2);
     1.5
    > SELECT try_divide(2L, 2L);
     1.0
    > SELECT try_divide(1, 0);
     NULL
    > SELECT try_divide(interval 2 month, 2);
     0-1
    > SELECT try_divide(interval 2 month, 0);
     NULL
  since: "3.2.0"
- name: try_mod
  class_name: "org.apache.spark.sql.catalyst.expressions.TryMod"
  signatures:
    - "try_mod(dividend, divisor)"
  description: "Returns the remainder after expr1/expr2. dividend must be a numeric. divisor must be a numeric."
  examples: |
    > SELECT try_mod(3, 2);
     1
    > SELECT try_mod(2L, 2L);
     0
    > SELECT try_mod(3.0, 2.0);
     1.0
    > SELECT try_mod(1, 0);
     NULL
  since: "4.0.0"
- name: try_multiply
  class_name: "org.apache.spark.sql.catalyst.expressions.TryMultiply"
  signatures:
    - "try_multiply(expr1, expr2)"
  description: "Returns expr1*expr2 and the result is null on overflow. The acceptable input types are the same with the * operator."
  examples: |
    > SELECT try_multiply(2, 3);
     6
    > SELECT try_multiply(-2147483648, 10);
     NULL
    > SELECT try_multiply(interval 2 year, 3);
     6-0
  since: "3.3.0"
- name: try_subtract
  class_name: "org.apache.spark.sql.catalyst.expressions.TrySubtract"
  signatures:
    - "try_subtract(expr1, expr2)"
  description: "Returns expr1-expr2 and the result is null on overflow. The acceptable input types are the same with the - operator."
  examples: |
    > SELECT try_subtract(2, 1);
     1
    > SELECT try_subtract(-2147483648, 1);
     NULL
    > SELECT try_subtract(date'2021-01-02', 1);
     2021-01-01
    > SELECT try_subtract(date'2021-01-01', interval 1 year);
     2020-01-01
    > SELECT try_subtract(timestamp'2021-01-02 00:00:00', interval 1 day);
     2021-01-01 00:00:00
    > SELECT try_subtract(interval 2 year, interval 1 year);
     1-0
  since: "3.3.0"
- name: unhex
  class_name: "org.apache.spark.sql.catalyst.expressions.Unhex"
  signatures:
    - "unhex(expr)"
  description: "Converts hexadecimal expr to binary."
  examples: |
    > SELECT decode(unhex('537061726B2053514C'), 'UTF-8');
     Spark SQL
  since: "1.5.0"
- name: uniform
  class_name: "org.apache.spark.sql.catalyst.expressions.Uniform"
  signatures:
    - "uniform(min, max[, seed])"
  description: "Returns a random value with independent and identically distributed (i.i.d.) values with the specified range of numbers. The random seed is optional. The provided numbers specifying the minimum and maximum values of the range must be constant. If both of these numbers are integers, then the result will also be an integer. Otherwise if one or both of these are floating-point numbers, then the result will also be a floating-point number."
  examples: |
    > SELECT uniform(10, 20, 0) > 0 AS result;
    true
  since: "4.0.0"
- name: width_bucket
  class_name: "org.apache.spark.sql.catalyst.expressions.WidthBucket"
  signatures:
    - "width_bucket(value, min_value, max_value, num_bucket)"
  description: "Returns the bucket number to which value would be assigned in an equiwidth histogram with num_bucket buckets, in the range min_value to max_value.\""
  examples: |
    > SELECT width_bucket(5.3, 0.2, 10.6, 5);
     3
    > SELECT width_bucket(-2.1, 1.3, 3.4, 3);
     0
    > SELECT width_bucket(8.1, 0.0, 5.7, 4);
     5
    > SELECT width_bucket(-0.9, 5.2, 0.5, 2);
     3
    > SELECT width_bucket(INTERVAL '0' YEAR, INTERVAL '0' YEAR, INTERVAL '10' YEAR, 10);
     1
    > SELECT width_bucket(INTERVAL '1' YEAR, INTERVAL '0' YEAR, INTERVAL '10' YEAR, 10);
     2
    > SELECT width_bucket(INTERVAL '0' DAY, INTERVAL '0' DAY, INTERVAL '10' DAY, 10);
     1
    > SELECT width_bucket(INTERVAL '1' DAY, INTERVAL '0' DAY, INTERVAL '10' DAY, 10);
     2
  since: "3.1.0"
