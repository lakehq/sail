- name: "%"
  class_name: "org.apache.spark.sql.catalyst.expressions.Remainder"
  signatures:
    - "expr1 % expr2, or mod(expr1, expr2)"
  description: "Returns the remainder after expr1/expr2."
  examples: |
    > SELECT 2 % 1.8;
     0.2
    > SELECT MOD(2, 1.8);
     0.2
  since: "1.0.0"
- name: "*"
  class_name: "org.apache.spark.sql.catalyst.expressions.Multiply"
  signatures:
    - "expr1 * expr2"
  description: "Returns expr1*expr2."
  examples: |
    > SELECT 2 * 3;
     6
  since: "1.0.0"
- name: "+"
  class_name: "org.apache.spark.sql.catalyst.expressions.Add"
  signatures:
    - "expr1 + expr2"
  description: "Returns expr1+expr2."
  examples: |
    > SELECT 1 + 2;
     3
  since: "1.0.0"
- name: "-"
  class_name: "org.apache.spark.sql.catalyst.expressions.Subtract"
  signatures:
    - "expr1 - expr2"
  description: "Returns expr1-expr2."
  examples: |
    > SELECT 2 - 1;
     1
  since: "1.0.0"
- name: "/"
  class_name: "org.apache.spark.sql.catalyst.expressions.Divide"
  signatures:
    - "expr1 / expr2"
  description: "Returns expr1/expr2. It always performs floating point division."
  examples: |
    > SELECT 3 / 2;
     1.5
    > SELECT 2L / 2L;
     1.0
  since: "1.0.0"
- name: abs
  class_name: "org.apache.spark.sql.catalyst.expressions.Abs"
  signatures:
    - "abs(expr)"
  description: "Returns the absolute value of the numeric or interval value."
  examples: |
    > SELECT abs(-1);
     1
    > SELECT abs(INTERVAL -'1-1' YEAR TO MONTH);
     1-1
  since: "1.2.0"
- name: acos
  class_name: "org.apache.spark.sql.catalyst.expressions.Acos"
  signatures:
    - "acos(expr)"
  description: "Returns the inverse cosine (a.k.a. arc cosine) of expr, as if computed by java.lang.Math.acos."
  examples: |
    > SELECT acos(1);
     0.0
    > SELECT acos(2);
     NaN
  since: "1.4.0"
- name: acosh
  class_name: "org.apache.spark.sql.catalyst.expressions.Acosh"
  signatures:
    - "acosh(expr)"
  description: "Returns inverse hyperbolic cosine of expr."
  examples: |
    > SELECT acosh(1);
     0.0
    > SELECT acosh(0);
     NaN
  since: "3.0.0"
- name: asin
  class_name: "org.apache.spark.sql.catalyst.expressions.Asin"
  signatures:
    - "asin(expr)"
  description: "Returns the inverse sine (a.k.a. arc sine) the arc sin of expr, as if computed by java.lang.Math.asin."
  examples: |
    > SELECT asin(0);
     0.0
    > SELECT asin(2);
     NaN
  since: "1.4.0"
- name: asinh
  class_name: "org.apache.spark.sql.catalyst.expressions.Asinh"
  signatures:
    - "asinh(expr)"
  description: "Returns inverse hyperbolic sine of expr."
  examples: |
    > SELECT asinh(0);
     0.0
  since: "3.0.0"
- name: atan
  class_name: "org.apache.spark.sql.catalyst.expressions.Atan"
  signatures:
    - "atan(expr)"
  description: "Returns the inverse tangent (a.k.a. arc tangent) of expr, as if computed by java.lang.Math.atan"
  examples: |
    > SELECT atan(0);
     0.0
  since: "1.4.0"
- name: atan2
  class_name: "org.apache.spark.sql.catalyst.expressions.Atan2"
  signatures:
    - "atan2(exprY, exprX)"
  description: "Returns the angle in radians between the positive x-axis of a plane and the point given by the coordinates (exprX, exprY), as if computed by java.lang.Math.atan2."
  examples: |
    > SELECT atan2(0, 0);
     0.0
  since: "1.4.0"
- name: atanh
  class_name: "org.apache.spark.sql.catalyst.expressions.Atanh"
  signatures:
    - "atanh(expr)"
  description: "Returns inverse hyperbolic tangent of expr."
  examples: |
    > SELECT atanh(0);
     0.0
    > SELECT atanh(2);
     NaN
  since: "3.0.0"
- name: bin
  class_name: "org.apache.spark.sql.catalyst.expressions.Bin"
  signatures:
    - "bin(expr)"
  description: "Returns the string representation of the long value expr represented in binary."
  examples: |
    > SELECT bin(13);
     1101
    > SELECT bin(-13);
     1111111111111111111111111111111111111111111111111111111111110011
    > SELECT bin(13.3);
     1101
  since: "1.5.0"
- name: bround
  class_name: "org.apache.spark.sql.catalyst.expressions.BRound"
  signatures:
    - "bround(expr, d)"
  description: "Returns expr rounded to d decimal places using HALF_EVEN rounding mode."
  examples: |
    > SELECT bround(2.5, 0);
     2
    > SELECT bround(25, -1);
     20
  since: "2.0.0"
- name: cbrt
  class_name: "org.apache.spark.sql.catalyst.expressions.Cbrt"
  signatures:
    - "cbrt(expr)"
  description: "Returns the cube root of expr."
  examples: |
    > SELECT cbrt(27.0);
     3.0
  since: "1.4.0"
- name: ceil
  class_name: "org.apache.spark.sql.catalyst.expressions.CeilExpressionBuilder"
  signatures:
    - "ceil(expr[, scale])"
  description: "Returns the smallest number after rounding up that is not smaller than expr. An optional scale parameter can be specified to control the rounding behavior."
  examples: |
    > SELECT ceil(-0.1);
     0
    > SELECT ceil(5);
     5
    > SELECT ceil(3.1411, 3);
     3.142
    > SELECT ceil(3.1411, -3);
     1000
  since: "3.3.0"
- name: ceiling
  class_name: "org.apache.spark.sql.catalyst.expressions.CeilExpressionBuilder"
  signatures:
    - "ceiling(expr[, scale])"
  description: "Returns the smallest number after rounding up that is not smaller than expr. An optional scale parameter can be specified to control the rounding behavior."
  examples: |
    > SELECT ceiling(-0.1);
     0
    > SELECT ceiling(5);
     5
    > SELECT ceiling(3.1411, 3);
     3.142
    > SELECT ceiling(3.1411, -3);
     1000
  since: "3.3.0"
