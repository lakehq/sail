- name: floor
  class_name: "org.apache.spark.sql.catalyst.expressions.FloorExpressionBuilder"
  signatures:
    - "floor(expr[, scale])"
  description: "Returns the largest number after rounding down that is not greater than expr. An optional scale parameter can be specified to control the rounding behavior."
  examples: |
    > SELECT floor(-0.1);
     -1
    > SELECT floor(5);
     5
    > SELECT floor(3.1411, 3);
     3.141
    > SELECT floor(3.1411, -3);
     0
  since: "3.3.0"
- name: greatest
  class_name: "org.apache.spark.sql.catalyst.expressions.Greatest"
  signatures:
    - "greatest(expr, ...)"
  description: "Returns the greatest value of all parameters, skipping null values."
  examples: |
    > SELECT greatest(10, 9, 2, 4, 3);
