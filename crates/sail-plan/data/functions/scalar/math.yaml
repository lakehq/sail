- name: cos
  class_name: "org.apache.spark.sql.catalyst.expressions.Cos"
  signatures:
    - "cos(expr)"
  description: "Returns the cosine of expr, as if computed by java.lang.Math.cos."
  examples: |
    > SELECT cos(0);
     1.0
  since: "1.4.0"
- name: cosh
  class_name: "org.apache.spark.sql.catalyst.expressions.Cosh"
  signatures:
    - "cosh(expr)"
  description: "Returns the hyperbolic cosine of expr, as if computed by java.lang.Math.cosh."
  examples: |
    > SELECT cosh(0);
     1.0
  since: "1.4.0"
- name: cot
  class_name: "org.apache.spark.sql.catalyst.expressions.Cot"
  signatures:
    - "cot(expr)"
  description: "Returns the cotangent of expr, as if computed by 1/java.lang.Math.tan."
  examples: |
    > SELECT cot(1);
