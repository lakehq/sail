- name: "try_add"
  scope: "sql_builtin"
  group: "math_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.TryAdd"
  signatures:
    - "try_add(expr1, expr2)"
  usage: "try_add(expr1, expr2) - Returns the sum of `expr1`and `expr2` and the result is null on overflow. The acceptable input types are the same with the `+` operator."
  examples: |2-
    
        Examples:
          > SELECT try_add(1, 2);
           3
          > SELECT try_add(2147483647, 1);
           NULL
          > SELECT try_add(date'2021-01-01', 1);
           2021-01-02
          > SELECT try_add(date'2021-01-01', interval 1 year);
           2022-01-01
          > SELECT try_add(timestamp'2021-01-01 00:00:00', interval 1 day);
           2021-01-02 00:00:00
          > SELECT try_add(interval 1 year, interval 2 year);
           3-0
      
  since: "3.2.0"

- name: "try_divide"
  scope: "sql_builtin"
  group: "math_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.TryDivide"
  signatures:
    - "try_divide(dividend, divisor)"
  usage: "try_divide(dividend, divisor) - Returns `dividend`/`divisor`. It always performs floating point division. Its result is always null if `expr2` is 0. `dividend` must be a numeric or an interval. `divisor` must be a numeric."
  examples: |2-
    
        Examples:
          > SELECT try_divide(3, 2);
           1.5
          > SELECT try_divide(2L, 2L);
           1.0
          > SELECT try_divide(1, 0);
           NULL
          > SELECT try_divide(interval 2 month, 2);
           0-1
          > SELECT try_divide(interval 2 month, 0);
           NULL
      
  since: "3.2.0"

- name: "try_mod"
  scope: "sql_builtin"
  group: "math_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.TryMod"
  signatures:
    - "try_mod(dividend, divisor)"
  usage: "try_mod(dividend, divisor) - Returns the remainder after `expr1`/`expr2`. `dividend` must be a numeric. `divisor` must be a numeric."
  examples: |2-
    
        Examples:
          > SELECT try_mod(3, 2);
           1
          > SELECT try_mod(2L, 2L);
           0
          > SELECT try_mod(3.0, 2.0);
           1.0
          > SELECT try_mod(1, 0);
           NULL
      
  since: "4.0.0"

- name: "try_multiply"
