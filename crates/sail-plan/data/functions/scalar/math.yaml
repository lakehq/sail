- name: div
  class_name: "org.apache.spark.sql.catalyst.expressions.IntegralDivide"
  signatures:
    - "expr1 div expr2"
  description: "Divide expr1 by expr2. It returns NULL if an operand is NULL or expr2 is 0. The result is casted to long."
  examples: |
    > SELECT 3 div 2;
     1
    > SELECT INTERVAL '1-1' YEAR TO MONTH div INTERVAL '-1' MONTH;
     -13
  since: "3.0.0"
- name: e
