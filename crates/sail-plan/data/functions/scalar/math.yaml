  description: "Returns hyperbolic sine of expr, as if computed by java.lang.Math.sinh."
  examples: |
    > SELECT sinh(0);
     0.0
  since: "1.4.0"
- name: sqrt
  class_name: "org.apache.spark.sql.catalyst.expressions.Sqrt"
  signatures:
    - "sqrt(expr)"
