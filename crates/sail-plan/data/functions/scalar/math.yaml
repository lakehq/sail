  signatures:
    - "rand([seed])"
  usage: "rand([seed]) - Returns a random value with independent and identically distributed (i.i.d.) uniformly distributed values in [0, 1)."
  examples: |2-
    
        Examples:
          > SELECT rand();
           0.9629742951434543
          > SELECT rand(0);
           0.7604953758285915
