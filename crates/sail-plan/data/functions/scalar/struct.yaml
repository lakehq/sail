- name: "named_struct"
  scope: "sql_builtin"
  group: "struct_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.CreateNamedStruct"
  signatures:
    - "named_struct(name1, val1, name2, val2, ...)"
  usage: "named_struct(name1, val1, name2, val2, ...) - Creates a struct with the given field names and values."
  examples: |2-
    
        Examples:
          > SELECT named_struct("a", 1, "b", 2, "c", 3);
           {"a":1,"b":2,"c":3}
      
  since: "1.5.0"

- name: "struct"
  scope: "sql_builtin"
  group: "struct_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.CreateNamedStruct"
  signatures:
    - "struct(col1, col2, col3, ...)"
  usage: "struct(col1, col2, col3, ...) - Creates a struct with the given field values."
  examples: |2-
    
        Examples:
          > SELECT struct(1, 2, 3);
           {"col1":1,"col2":2,"col3":3}
      
  since: "1.4.0"

