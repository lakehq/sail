- name: "case"
  scope: "sql_builtin"
  group: "conditional_funcs"
  source: "built-in"
  signatures:
    - "CASE expr1 WHEN expr2 THEN expr3 [WHEN expr4 THEN expr5]* [ELSE expr6] END"
  usage: "CASE expr1 WHEN expr2 THEN expr3 [WHEN expr4 THEN expr5]* [ELSE expr6] END - When `expr1` = `expr2`, returns `expr3`; when `expr1` = `expr4`, return `expr5`; else return `expr6`."
  arguments: |2-
    
        Arguments:
          * expr1 - the expression which is one operand of comparison.
          * expr2, expr4 - the expressions each of which is the other   operand of comparison.
          * expr3, expr5, expr6 - the branch value expressions and else value expression  should all be same type or coercible to a common type.
  examples: |2-
    
        Examples:
          > SELECT CASE col1 WHEN 1 THEN 'one' WHEN 2 THEN 'two' ELSE '?' END FROM VALUES 1, 2, 3;
           one
           two
           ?
          > SELECT CASE col1 WHEN 1 THEN 'one' WHEN 2 THEN 'two' END FROM VALUES 1, 2, 3;
           one
           two
           NULL
  since: "1.0.1"

- name: "coalesce"
  scope: "sql_builtin"
  group: "conditional_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Coalesce"
  signatures:
    - "coalesce(expr1, expr2, ...)"
  usage: "coalesce(expr1, expr2, ...) - Returns the first non-null argument if exists. Otherwise, null."
  examples: |2-
    
        Examples:
          > SELECT coalesce(NULL, 1, NULL);
           1
      
  since: "1.0.0"

- name: "if"
  scope: "sql_builtin"
  group: "conditional_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.If"
  signatures:
    - "if(expr1, expr2, expr3)"
  usage: "if(expr1, expr2, expr3) - If `expr1` evaluates to true, then returns `expr2`; otherwise returns `expr3`."
  examples: |2-
    
        Examples:
          > SELECT if(1 < 2, 'a', 'b');
           a
      
  since: "1.0.0"

- name: "ifnull"
  scope: "sql_builtin"
  group: "conditional_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Nvl"
  signatures:
    - "ifnull(expr1, expr2)"
  usage: "ifnull(expr1, expr2) - Returns `expr2` if `expr1` is null, or `expr1` otherwise."
  examples: |2-
    
        Examples:
          > SELECT ifnull(NULL, array('2'));
           ["2"]
      
  since: "2.0.0"

- name: "nanvl"
  scope: "sql_builtin"
  group: "conditional_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.NaNvl"
  signatures:
    - "nanvl(expr1, expr2)"
  usage: "nanvl(expr1, expr2) - Returns `expr1` if it's not NaN, or `expr2` otherwise."
  examples: |2-
    
        Examples:
          > SELECT nanvl(cast('NaN' as double), 123);
           123.0
      
  since: "1.5.0"

- name: "nullif"
  scope: "sql_builtin"
  group: "conditional_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.NullIf"
  signatures:
    - "nullif(expr1, expr2)"
  usage: "nullif(expr1, expr2) - Returns null if `expr1` equals to `expr2`, or `expr1` otherwise."
  examples: |2-
    
        Examples:
          > SELECT nullif(2, 2);
           NULL
      
  since: "2.0.0"

- name: "nullifzero"
  scope: "sql_builtin"
  group: "conditional_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.NullIfZero"
  signatures:
    - "nullifzero(expr)"
  usage: "nullifzero(expr) - Returns null if `expr` is equal to zero, or `expr` otherwise."
  examples: |2-
    
        Examples:
          > SELECT nullifzero(0);
           NULL
          > SELECT nullifzero(2);
           2
      
  since: "4.0.0"

