- name: "when"
  scope: "sql_builtin"
  group: "conditional_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.CaseWhen"
  signatures:
    - "CASE WHEN expr1 THEN expr2 [WHEN expr3 THEN expr4]* [ELSE expr5] END"
  usage: "CASE WHEN expr1 THEN expr2 [WHEN expr3 THEN expr4]* [ELSE expr5] END - When `expr1` = true, returns `expr2`; else when `expr3` = true, returns `expr4`; else returns `expr5`."
  arguments: |2-
    
        Arguments:
          * expr1, expr3 - the branch condition expressions should all be boolean type.
          * expr2, expr4, expr5 - the branch value expressions and else value expression should all be
              same type or coercible to a common type.
      
  examples: |2-
    
        Examples:
          > SELECT CASE WHEN 1 > 0 THEN 1 WHEN 2 > 0 THEN 2.0 ELSE 1.2 END;
           1.0
          > SELECT CASE WHEN 1 < 0 THEN 1 WHEN 2 > 0 THEN 2.0 ELSE 1.2 END;
           2.0
          > SELECT CASE WHEN 1 < 0 THEN 1 WHEN 2 < 0 THEN 2.0 END;
           NULL
      
  since: "1.0.1"

- name: "zeroifnull"
  scope: "sql_builtin"
  group: "conditional_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ZeroIfNull"
  signatures:
    - "zeroifnull(expr)"
  usage: "zeroifnull(expr) - Returns zero if `expr` is equal to null, or `expr` otherwise."
  examples: |2-
    
        Examples:
          > SELECT zeroifnull(NULL);
           0
          > SELECT zeroifnull(2);
           2
      
  since: "4.0.0"

