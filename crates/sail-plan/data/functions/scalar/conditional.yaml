  signatures:
    - "nvl(expr1, expr2)"
  usage: "nvl(expr1, expr2) - Returns `expr2` if `expr1` is null, or `expr1` otherwise."
  examples: |2-
    
        Examples:
          > SELECT nvl(NULL, array('2'));
