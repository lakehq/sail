- name: from_xml
  class_name: "org.apache.spark.sql.catalyst.expressions.XmlToStructs"
  signatures:
    - "from_xml(xmlStr, schema[, options])"
  description: "Returns a struct value with the given xmlStr and schema."
  examples: |
    > SELECT from_xml('<p><a>1</a><b>0.8</b></p>', 'a INT, b DOUBLE');
     {"a":1,"b":0.8}
    > SELECT from_xml('<p><time>26/08/2015</time></p>', 'time Timestamp', map('timestampFormat', 'dd/MM/yyyy'));
     {"time":2015-08-26 00:00:00}
    > SELECT from_xml('<p><teacher>Alice</teacher><student><name>Bob</name><rank>1</rank></student><student><name>Charlie</name><rank>2</rank></student></p>', 'STRUCT<teacher: STRING, student: ARRAY<STRUCT<name: STRING, rank: INT>>>');
     {"teacher":"Alice","student":[{"name":"Bob","rank":1},{"name":"Charlie","rank":2}]}
  since: "4.0.0"
- name: schema_of_xml
  class_name: "org.apache.spark.sql.catalyst.expressions.SchemaOfXml"
  signatures:
    - "schema_of_xml(xml[, options])"
  description: "Returns schema in the DDL format of XML string."
  examples: |
    > SELECT schema_of_xml('<p><a>1</a></p>');
     STRUCT<a: BIGINT>
    > SELECT schema_of_xml('<p><a attr="2">1</a><a>3</a></p>', map('excludeAttribute', 'true'));
     STRUCT<a: ARRAY<BIGINT>>
  since: "4.0.0"
- name: to_xml
  class_name: "org.apache.spark.sql.catalyst.expressions.StructsToXml"
  signatures:
    - "to_xml(expr[, options])"
  description: "Returns a XML string with a given struct value"
  examples: |
    > SELECT to_xml(named_struct('a', 1, 'b', 2));
     <ROW>
         <a>1</a>
         <b>2</b>
     </ROW>
    > SELECT to_xml(named_struct('time', to_timestamp('2015-08-26', 'yyyy-MM-dd')), map('timestampFormat', 'dd/MM/yyyy'));
     <ROW>
         <time>26/08/2015</time>
     </ROW>
  since: "4.0.0"
- name: xpath
  class_name: "org.apache.spark.sql.catalyst.expressions.xml.XPathList"
  signatures:
    - "xpath(xml, xpath)"
  description: "Returns a string array of values within the nodes of xml that match the XPath expression."
  examples: |
    > SELECT xpath('<a><b>b1</b><b>b2</b><b>b3</b><c>c1</c><c>c2</c></a>','a/b/text()');
     ["b1","b2","b3"]
    > SELECT xpath('<a><b>b1</b><b>b2</b><b>b3</b><c>c1</c><c>c2</c></a>','a/b');
     [null,null,null]
  since: "2.0.0"
- name: xpath_boolean
  class_name: "org.apache.spark.sql.catalyst.expressions.xml.XPathBoolean"
  signatures:
    - "xpath_boolean(xml, xpath)"
  description: "Returns true if the XPath expression evaluates to true, or if a matching node is found."
  examples: |
    > SELECT xpath_boolean('<a><b>1</b></a>','a/b');
     true
  since: "2.0.0"
- name: xpath_double
  class_name: "org.apache.spark.sql.catalyst.expressions.xml.XPathDouble"
  signatures:
    - "xpath_double(xml, xpath)"
  description: "Returns a double value, the value zero if no match is found, or NaN if a match is found but the value is non-numeric."
  examples: |
    > SELECT xpath_double('<a><b>1</b><b>2</b></a>', 'sum(a/b)');
     3.0
  since: "2.0.0"
