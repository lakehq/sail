- name: "st_asbinary"
  scope: "sql_builtin"
  group: "st_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_AsBinary"
  signatures:
    - "st_asbinary(geo)"
  usage: "st_asbinary(geo) - Returns the geospatial value (value of type GEOGRAPHY or GEOMETRY) in WKB format."
  arguments: |2-
    
        Arguments:
          * geo - A geospatial value, either a GEOGRAPHY or a GEOMETRY.
      
  examples: |2-
    
        Examples:
          > SELECT hex(st_asbinary(st_geogfromwkb(X'0101000000000000000000F03F0000000000000040')));
           0101000000000000000000F03F0000000000000040
          > SELECT hex(st_asbinary(st_geomfromwkb(X'0101000000000000000000F03F0000000000000040')));
           0101000000000000000000F03F0000000000000040
      
  since: "4.1.0"

- name: "st_geogfromwkb"
  scope: "sql_builtin"
  group: "st_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_GeogFromWKB"
  signatures:
    - "st_geogfromwkb(wkb)"
  usage: "st_geogfromwkb(wkb) - Parses the WKB description of a geography and returns the corresponding GEOGRAPHY value."
  arguments: |2-
    
        Arguments:
          * wkb - A BINARY value in WKB format, representing a GEOGRAPHY value.
      
  examples: |2-
    
        Examples:
          > SELECT hex(st_asbinary(st_geogfromwkb(X'0101000000000000000000F03F0000000000000040')));
           0101000000000000000000F03F0000000000000040
      
  since: "4.1.0"

- name: "st_geomfromwkb"
  scope: "sql_builtin"
  group: "st_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_GeomFromWKB"
  signatures:
    - "st_geomfromwkb(wkb)"
  usage: "st_geomfromwkb(wkb) - Parses the WKB description of a geometry and returns the corresponding GEOMETRY value."
  arguments: |2-
    
        Arguments:
          * wkb - A BINARY value in WKB format, representing a GEOMETRY value.
      
  examples: |2-
    
        Examples:
          > SELECT hex(st_asbinary(st_geomfromwkb(X'0101000000000000000000F03F0000000000000040')));
           0101000000000000000000F03F0000000000000040
      
  since: "4.1.0"

- name: "st_setsrid"
  scope: "sql_builtin"
  group: "st_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_SetSrid"
  signatures:
    - "st_setsrid(geo, srid)"
  usage: "st_setsrid(geo, srid) - Returns a new GEOGRAPHY or GEOMETRY value whose SRID is the specified SRID value."
  arguments: |2-
    
        Arguments:
          * geo - A GEOGRAPHY or GEOMETRY value.
          * srid - The new SRID value of the geography or geometry.
      
  examples: |2-
    
        Examples:
          > SELECT st_srid(st_setsrid(ST_GeogFromWKB(X'0101000000000000000000F03F0000000000000040'), 4326));
           4326
          > SELECT st_srid(st_setsrid(ST_GeomFromWKB(X'0101000000000000000000F03F0000000000000040'), 3857));
           3857
      
  since: "4.1.0"

- name: "st_srid"
  scope: "sql_builtin"
  group: "st_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.st.ST_Srid"
  signatures:
    - "st_srid(geo)"
  usage: "st_srid(geo) - Returns the SRID of the input GEOGRAPHY or GEOMETRY value."
  arguments: |2-
    
        Arguments:
          * geo - A GEOGRAPHY or GEOMETRY value.
      
  examples: |2-
    
        Examples:
          > SELECT st_srid(st_geogfromwkb(X'0101000000000000000000F03F0000000000000040'));
           4326
          > SELECT st_srid(st_geomfromwkb(X'0101000000000000000000F03F0000000000000040'));
           0
          > SELECT st_srid(NULL);
           NULL
      
  since: "4.1.0"

