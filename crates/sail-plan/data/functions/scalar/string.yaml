  usage: "concat_ws(sep[, str | array(str)]+) - Returns the concatenation of the strings separated by `sep`, skipping null values."
  examples: |2-
    
        Examples:
          > SELECT concat_ws(' ', 'Spark', 'SQL');
            Spark SQL
          > SELECT concat_ws('s');
    
          > SELECT concat_ws('/', 'foo', null, 'bar');
