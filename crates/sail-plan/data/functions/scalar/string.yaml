- name: "contains"
  scope: "sql_builtin"
  group: "string_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ContainsExpressionBuilder"
  signatures:
    - "contains(left, right)"
  usage: |2-
    
        contains(left, right) - Returns a boolean. The value is True if right is found inside left.
        Returns NULL if either input expression is NULL. Otherwise, returns False.
        Both left or right must be of STRING or BINARY type.
      
  examples: |2-
    
        Examples:
          > SELECT contains('Spark SQL', 'Spark');
           true
          > SELECT contains('Spark SQL', 'SPARK');
           false
          > SELECT contains('Spark SQL', null);
           NULL
          > SELECT contains(x'537061726b2053514c', x'537061726b');
           true
      
  since: "3.3.0"

- name: "decode"
  scope: "sql_builtin"
  group: "string_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Decode"
  signatures:
    - "decode(bin, charset)"
    - "decode(expr, search, result [, search, result ] ... [, default])"
  usage: |2-
    
        decode(bin, charset) - Decodes the first argument using the second argument character set. If either argument is null, the result will also be null.
    
        decode(expr, search, result [, search, result ] ... [, default]) - Compares expr
          to each search value in order. If expr is equal to a search value, decode returns
          the corresponding result. If no match is found, then it returns default. If default
          is omitted, it returns null.
      
  arguments: |2-
    
        Arguments:
          * bin - a binary expression to decode
          * charset - one of the charsets 'US-ASCII', 'ISO-8859-1', 'UTF-8', 'UTF-16BE', 'UTF-16LE', 'UTF-16', 'UTF-32' to decode `bin` into a STRING. It is case insensitive.
      
  examples: |2-
    
        Examples:
          > SELECT decode(encode('abc', 'utf-8'), 'utf-8');
           abc
          > SELECT decode(2, 1, 'Southlake', 2, 'San Francisco', 3, 'New Jersey', 4, 'Seattle', 'Non domestic');
           San Francisco
          > SELECT decode(6, 1, 'Southlake', 2, 'San Francisco', 3, 'New Jersey', 4, 'Seattle', 'Non domestic');
           Non domestic
          > SELECT decode(6, 1, 'Southlake', 2, 'San Francisco', 3, 'New Jersey', 4, 'Seattle');
           NULL
          > SELECT decode(null, 6, 'Spark', NULL, 'SQL', 4, 'rocks');
           SQL
      
  note: |2-
    
        decode(expr, search, result [, search, result ] ... [, default]) is supported since 3.2.0
      
  since: "1.5.0"

- name: "elt"
  scope: "sql_builtin"
  group: "string_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Elt"
  signatures:
    - "elt(n, input1, input2, ...)"
  usage: |2-
    
        elt(n, input1, input2, ...) - Returns the `n`-th input, e.g., returns `input2` when `n` is 2.
        The function returns NULL if the index exceeds the length of the array
        and `spark.sql.ansi.enabled` is set to false. If `spark.sql.ansi.enabled` is set to true,
        it throws ArrayIndexOutOfBoundsException for invalid indices.
      
  examples: |2-
    
        Examples:
          > SELECT elt(1, 'scala', 'java');
           scala
          > SELECT elt(2, 'a', 1);
           1
      
  since: "2.0.0"

- name: "encode"
  scope: "sql_builtin"
  group: "string_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Encode"
  signatures:
    - "encode(str, charset)"
  usage: "encode(str, charset) - Encodes the first argument using the second argument character set. If either argument is null, the result will also be null."
  arguments: |2-
    
        Arguments:
          * str - a string expression
          * charset - one of the charsets 'US-ASCII', 'ISO-8859-1', 'UTF-8', 'UTF-16BE', 'UTF-16LE', 'UTF-16', 'UTF-32' to encode `str` into a BINARY. It is case insensitive.
      
  examples: |2-
    
        Examples:
          > SELECT encode('abc', 'utf-8');
           abc
      
  since: "1.5.0"

- name: "endswith"
  scope: "sql_builtin"
  group: "string_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.EndsWithExpressionBuilder"
  signatures:
    - "endswith(left, right)"
  usage: |2-
    
        endswith(left, right) - Returns a boolean. The value is True if left ends with right.
        Returns NULL if either input expression is NULL. Otherwise, returns False.
        Both left or right must be of STRING or BINARY type.
      
  examples: |2-
    
        Examples:
          > SELECT endswith('Spark SQL', 'SQL');
           true
          > SELECT endswith('Spark SQL', 'Spark');
           false
          > SELECT endswith('Spark SQL', null);
           NULL
          > SELECT endswith(x'537061726b2053514c', x'537061726b');
           false
          > SELECT endswith(x'537061726b2053514c', x'53514c');
           true
      
  since: "3.3.0"

- name: "find_in_set"
  scope: "sql_builtin"
  group: "string_funcs"
