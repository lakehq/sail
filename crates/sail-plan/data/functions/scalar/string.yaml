  usage: "make_valid_utf8(str) - Returns the original string if `str` is a valid UTF-8 string, otherwise returns a new string whose invalid UTF8 byte sequences are replaced using the UNICODE replacement character U+FFFD."
  arguments: |2-
    
        Arguments:
          * str - a string expression
      
  examples: |2-
    
        Examples:
          > SELECT make_valid_utf8('Spark');
           Spark
          > SELECT make_valid_utf8(x'61');
