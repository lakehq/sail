- name: cast
  class_name: "org.apache.spark.sql.catalyst.expressions.Cast"
  signatures:
    - "cast(expr AS type)"
  description: "Casts the value expr to the target data type type. expr :: type alternative casting syntax is also supported."
  examples: |
    > SELECT cast('10' as int);
     10
    > SELECT '10' :: int;
     10
  since: "1.0.0"
