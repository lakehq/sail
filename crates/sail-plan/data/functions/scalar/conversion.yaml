- name: "cast"
  scope: "sql_builtin"
  group: "conversion_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Cast"
  signatures:
    - "cast(expr AS type)"
  usage: "cast(expr AS type) - Casts the value `expr` to the target data type `type`. `expr` :: `type` alternative casting syntax is also supported."
  examples: |2-
    
        Examples:
          > SELECT cast('10' as int);
           10
          > SELECT '10' :: int;
           10
      
  since: "1.0.0"

