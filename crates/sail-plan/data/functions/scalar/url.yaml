- name: "parse_url"
  scope: "sql_builtin"
  group: "url_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.ParseUrl"
  signatures:
    - "parse_url(url, partToExtract[, key])"
  usage: "parse_url(url, partToExtract[, key]) - Extracts a part from a URL."
  examples: |2-
    
        Examples:
          > SELECT parse_url('http://spark.apache.org/path?query=1', 'HOST');
           spark.apache.org
          > SELECT parse_url('http://spark.apache.org/path?query=1', 'QUERY');
           query=1
          > SELECT parse_url('http://spark.apache.org/path?query=1', 'QUERY', 'query');
           1
      
  since: "2.0.0"

- name: "try_parse_url"
  scope: "sql_builtin"
  group: "url_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.TryParseUrl"
  signatures:
    - "try_parse_url(url, partToExtract[, key])"
  usage: "try_parse_url(url, partToExtract[, key]) - This is a special version of `parse_url` that performs the same operation, but returns a NULL value instead of raising an error if the parsing cannot be performed."
  examples: |2-
    
        Examples:
          > SELECT try_parse_url('http://spark.apache.org/path?query=1', 'HOST');
           spark.apache.org
          > SELECT try_parse_url('http://spark.apache.org/path?query=1', 'QUERY');
           query=1
          > SELECT try_parse_url('inva lid://spark.apache.org/path?query=1', 'QUERY');
           NULL
          > SELECT try_parse_url('http://spark.apache.org/path?query=1', 'QUERY', 'query');
           1
      
  since: "4.0.0"

- name: "try_url_decode"
  scope: "sql_builtin"
  group: "url_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.TryUrlDecode"
  signatures:
    - "try_url_decode(str)"
  usage: |2-
    
        try_url_decode(str) - This is a special version of `url_decode` that performs the same operation, but returns a NULL value instead of raising an error if the decoding cannot be performed.
      
  arguments: |2-
    
        Arguments:
          * str - a string expression to decode
      
  examples: |2-
    
        Examples:
          > SELECT try_url_decode('https%3A%2F%2Fspark.apache.org');
           https://spark.apache.org
      
  since: "4.0.0"

- name: "url_decode"
  scope: "sql_builtin"
  group: "url_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.UrlDecode"
  signatures:
    - "url_decode(str)"
  usage: |2-
    
        url_decode(str) - Decodes a `str` in 'application/x-www-form-urlencoded' format using a specific encoding scheme.
      
  arguments: |2-
    
        Arguments:
          * str - a string expression to decode
      
  examples: |2-
    
        Examples:
          > SELECT url_decode('https%3A%2F%2Fspark.apache.org');
           https://spark.apache.org
      
  since: "3.4.0"

- name: "url_encode"
  scope: "sql_builtin"
  group: "url_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.UrlEncode"
  signatures:
    - "url_encode(str)"
  usage: |2-
    
        url_encode(str) - Translates a string into 'application/x-www-form-urlencoded' format using a specific encoding scheme.
      
  arguments: |2-
    
        Arguments:
          str - a string expression to be translated
      
  examples: |2-
    
        Examples:
          > SELECT url_encode('https://spark.apache.org');
           https%3A%2F%2Fspark.apache.org
      
  since: "3.4.0"

