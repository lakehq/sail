- name: "!"
  class_name: "org.apache.spark.sql.catalyst.expressions.Not"
  signatures:
    - "! expr"
  description: "Logical not."
  examples: |
    > SELECT ! true;
     false
    > SELECT ! false;
     true
    > SELECT ! NULL;
     NULL
  since: "1.0.0"
- name: "!="
  signatures:
    - "expr1 != expr2"
  description: "Returns true if expr1 is not equal to expr2, or false otherwise."
  examples: |
    > SELECT 1 != 2;
     true
    > SELECT 1 != '2';
     true
    > SELECT true != NULL;
     NULL
    > SELECT NULL != NULL;
     NULL
  since: "1.0.0"
- name: "<"
  class_name: "org.apache.spark.sql.catalyst.expressions.LessThan"
  signatures:
    - "expr1 < expr2"
  description: "Returns true if expr1 is less than expr2."
  examples: |
    > SELECT 1 < 2;
     true
    > SELECT 1.1 < '1';
     false
    > SELECT to_date('2009-07-30 04:17:52') < to_date('2009-07-30 04:17:52');
     false
    > SELECT to_date('2009-07-30 04:17:52') < to_date('2009-08-01 04:17:52');
     true
    > SELECT 1 < NULL;
     NULL
  since: "1.0.0"
- name: "<="
  class_name: "org.apache.spark.sql.catalyst.expressions.LessThanOrEqual"
  signatures:
    - "expr1 <= expr2"
  description: "Returns true if expr1 is less than or equal to expr2."
  examples: |
    > SELECT 2 <= 2;
     true
    > SELECT 1.0 <= '1';
     true
    > SELECT to_date('2009-07-30 04:17:52') <= to_date('2009-07-30 04:17:52');
     true
    > SELECT to_date('2009-07-30 04:17:52') <= to_date('2009-08-01 04:17:52');
     true
    > SELECT 1 <= NULL;
     NULL
  since: "1.0.0"
- name: "<=>"
  class_name: "org.apache.spark.sql.catalyst.expressions.EqualNullSafe"
  signatures:
    - "expr1 <=> expr2"
  description: "Returns same result as the EQUAL(=) operator for non-null operands, but returns true if both are null, false if one of the them is null."
  examples: |
    > SELECT 2 <=> 2;
     true
    > SELECT 1 <=> '1';
     true
    > SELECT true <=> NULL;
     false
    > SELECT NULL <=> NULL;
     true
  since: "1.1.0"
- name: "<>"
  signatures:
    - "expr1 != expr2"
  description: "Returns true if expr1 is not equal to expr2, or false otherwise."
  examples: |
    > SELECT 1 != 2;
     true
    > SELECT 1 != '2';
     true
    > SELECT true != NULL;
     NULL
    > SELECT NULL != NULL;
     NULL
  since: "1.0.0"
- name: "="
  class_name: "org.apache.spark.sql.catalyst.expressions.EqualTo"
  signatures:
    - "expr1 = expr2"
  description: "Returns true if expr1 equals expr2, or false otherwise."
  examples: |
    > SELECT 2 = 2;
     true
    > SELECT 1 = '1';
     true
    > SELECT true = NULL;
     NULL
    > SELECT NULL = NULL;
     NULL
  since: "1.0.0"
- name: "=="
  class_name: "org.apache.spark.sql.catalyst.expressions.EqualTo"
  signatures:
    - "expr1 == expr2"
  description: "Returns true if expr1 equals expr2, or false otherwise."
  examples: |
    > SELECT 2 == 2;
     true
    > SELECT 1 == '1';
     true
    > SELECT true == NULL;
     NULL
    > SELECT NULL == NULL;
     NULL
  since: "1.0.0"
- name: ">"
  class_name: "org.apache.spark.sql.catalyst.expressions.GreaterThan"
  signatures:
    - "expr1 > expr2"
  description: "Returns true if expr1 is greater than expr2."
  examples: |
    > SELECT 2 > 1;
     true
    > SELECT 2 > 1.1;
     true
    > SELECT to_date('2009-07-30 04:17:52') > to_date('2009-07-30 04:17:52');
     false
    > SELECT to_date('2009-07-30 04:17:52') > to_date('2009-08-01 04:17:52');
     false
    > SELECT 1 > NULL;
     NULL
  since: "1.0.0"
- name: ">="
  class_name: "org.apache.spark.sql.catalyst.expressions.GreaterThanOrEqual"
  signatures:
    - "expr1 >= expr2"
  description: "Returns true if expr1 is greater than or equal to expr2."
  examples: |
    > SELECT 2 >= 1;
     true
    > SELECT 2.0 >= '2.1';
     false
    > SELECT to_date('2009-07-30 04:17:52') >= to_date('2009-07-30 04:17:52');
     true
    > SELECT to_date('2009-07-30 04:17:52') >= to_date('2009-08-01 04:17:52');
     false
    > SELECT 1 >= NULL;
     NULL
  since: "1.0.0"
- name: and
  class_name: "org.apache.spark.sql.catalyst.expressions.And"
  signatures:
    - "expr1 and expr2"
  description: "Logical AND."
  examples: |
    > SELECT true and true;
     true
    > SELECT true and false;
     false
    > SELECT true and NULL;
     NULL
    > SELECT false and NULL;
     false
  since: "1.0.0"
- name: between
  class_name: "org.apache.spark.sql.catalyst.expressions.Between"
  signatures:
    - "input [NOT] between lower AND upper"
  description: "evaluate if input is [not] in between lower and upper"
  examples: |
    > SELECT 0.5 between 0.1 AND 1.0;
      true
  since: "1.0.0"
- name: equal_null
  class_name: "org.apache.spark.sql.catalyst.expressions.EqualNull"
  signatures:
    - "equal_null(expr1, expr2)"
  description: "Returns same result as the EQUAL(=) operator for non-null operands, but returns true if both are null, false if one of the them is null."
  examples: |
    > SELECT equal_null(3, 3);
     true
    > SELECT equal_null(1, '11');
     false
    > SELECT equal_null(true, NULL);
     false
    > SELECT equal_null(NULL, 'abc');
     false
    > SELECT equal_null(NULL, NULL);
     true
  since: "3.4.0"
- name: ilike
  class_name: "org.apache.spark.sql.catalyst.expressions.ILike"
  signatures:
    - "str ilike pattern[ ESCAPE escape]"
  description: "Returns true if str matches pattern with escape case-insensitively, null if any arguments are null, false otherwise."
  examples: |
    > SELECT ilike('Spark', '_Park');
    true
    > SELECT '\\abc' AS S, S ilike r'\\abc', S ilike '\\\\abc';
    \abc    true    true
    > SET spark.sql.parser.escapedStringLiterals=true;
    spark.sql.parser.escapedStringLiterals  true
    > SELECT '%SystemDrive%\Users\John' ilike '\%SystemDrive\%\\users%';
    true
    > SET spark.sql.parser.escapedStringLiterals=false;
    spark.sql.parser.escapedStringLiterals  false
    > SELECT '%SystemDrive%\\USERS\\John' ilike r'%SystemDrive%\\Users%';
    true
    > SELECT '%SystemDrive%/Users/John' ilike '/%SYSTEMDrive/%//Users%' ESCAPE '/';
    true
  note: "Use RLIKE to match with standard regular expressions."
  since: "3.3.0"
- name: in
  class_name: "org.apache.spark.sql.catalyst.expressions.In"
  signatures:
    - "expr1 in(expr2, expr3, ...)"
  description: "Returns true if expr equals to any valN."
  examples: |
    > SELECT 1 in(1, 2, 3);
     true
    > SELECT 1 in(2, 3, 4);
     false
    > SELECT named_struct('a', 1, 'b', 2) in(named_struct('a', 1, 'b', 1), named_struct('a', 1, 'b', 3));
     false
    > SELECT named_struct('a', 1, 'b', 2) in(named_struct('a', 1, 'b', 2), named_struct('a', 1, 'b', 3));
     true
  since: "1.0.0"
- name: isnan
  class_name: "org.apache.spark.sql.catalyst.expressions.IsNaN"
  signatures:
    - "isnan(expr)"
  description: "Returns true if expr is NaN, or false otherwise."
  examples: |
    > SELECT isnan(cast('NaN' as double));
     true
  since: "1.5.0"
- name: isnotnull
  class_name: "org.apache.spark.sql.catalyst.expressions.IsNotNull"
  signatures:
    - "isnotnull(expr)"
  description: "Returns true if expr is not null, or false otherwise."
  examples: |
    > SELECT isnotnull(1);
     true
  since: "1.0.0"
- name: isnull
  class_name: "org.apache.spark.sql.catalyst.expressions.IsNull"
  signatures:
    - "isnull(expr)"
  description: "Returns true if expr is null, or false otherwise."
  examples: |
    > SELECT isnull(1);
     false
  since: "1.0.0"
- name: like
  class_name: "org.apache.spark.sql.catalyst.expressions.Like"
  signatures:
    - "str like pattern[ ESCAPE escape]"
  description: "Returns true if str matches pattern with escape, null if any arguments are null, false otherwise."
  examples: |
    > SELECT like('Spark', '_park');
    true
    > SELECT '\\abc' AS S, S like r'\\abc', S like '\\\\abc';
    \abc    true    true
    > SET spark.sql.parser.escapedStringLiterals=true;
    spark.sql.parser.escapedStringLiterals  true
    > SELECT '%SystemDrive%\Users\John' like '\%SystemDrive\%\\Users%';
    true
    > SET spark.sql.parser.escapedStringLiterals=false;
    spark.sql.parser.escapedStringLiterals  false
    > SELECT '%SystemDrive%\\Users\\John' like r'%SystemDrive%\\Users%';
    true
    > SELECT '%SystemDrive%/Users/John' like '/%SystemDrive/%//Users%' ESCAPE '/';
    true
  note: "Use RLIKE to match with standard regular expressions."
  since: "1.0.0"
- name: not
  class_name: "org.apache.spark.sql.catalyst.expressions.Not"
  signatures:
    - "not expr"
  description: "Logical not."
  examples: |
    > SELECT not true;
     false
    > SELECT not false;
     true
    > SELECT not NULL;
     NULL
  since: "1.0.0"
- name: or
  class_name: "org.apache.spark.sql.catalyst.expressions.Or"
  signatures:
    - "expr1 or expr2"
  description: "Logical OR."
  examples: |
    > SELECT true or false;
     true
    > SELECT false or false;
     false
    > SELECT true or NULL;
     true
    > SELECT false or NULL;
     NULL
  since: "1.0.0"
- name: regexp
  class_name: "org.apache.spark.sql.catalyst.expressions.RLike"
  signatures:
    - "regexp(str, regexp)"
  description: "Returns true if str matches regexp, or false otherwise."
  examples: |
    > SET spark.sql.parser.escapedStringLiterals=true;
    spark.sql.parser.escapedStringLiterals  true
    > SELECT regexp('%SystemDrive%\Users\John', '%SystemDrive%\\Users.*');
    true
    > SET spark.sql.parser.escapedStringLiterals=false;
    spark.sql.parser.escapedStringLiterals  false
    > SELECT regexp('%SystemDrive%\\Users\\John', '%SystemDrive%\\\\Users.*');
    true
    > SELECT regexp('%SystemDrive%\\Users\\John', r'%SystemDrive%\\Users.*');
    true
  note: "Use LIKE to match with simple string pattern."
  since: "3.2.0"
- name: regexp_like
  class_name: "org.apache.spark.sql.catalyst.expressions.RLike"
  signatures:
    - "regexp_like(str, regexp)"
  description: "Returns true if str matches regexp, or false otherwise."
  examples: |
    > SET spark.sql.parser.escapedStringLiterals=true;
    spark.sql.parser.escapedStringLiterals  true
    > SELECT regexp_like('%SystemDrive%\Users\John', '%SystemDrive%\\Users.*');
    true
    > SET spark.sql.parser.escapedStringLiterals=false;
    spark.sql.parser.escapedStringLiterals  false
    > SELECT regexp_like('%SystemDrive%\\Users\\John', '%SystemDrive%\\\\Users.*');
    true
    > SELECT regexp_like('%SystemDrive%\\Users\\John', r'%SystemDrive%\\Users.*');
    true
  note: "Use LIKE to match with simple string pattern."
  since: "3.2.0"
- name: rlike
  class_name: "org.apache.spark.sql.catalyst.expressions.RLike"
  signatures:
    - "rlike(str, regexp)"
