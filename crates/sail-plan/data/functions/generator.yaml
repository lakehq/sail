- name: "variant_explode"
  scope: "sql_builtin"
  group: "variant_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.variant.VariantExplodeGeneratorBuilder"
  signatures:
    - "variant_explode(expr)"
  usage: "variant_explode(expr) - It separates a variant object/array into multiple rows containing its fields/elements. Its result schema is `struct<pos int, key string, value variant>`. `pos` is the position of the field/element in its parent object/array, and `value` is the field/element value. `key` is the field name when exploding a variant object, or is NULL when exploding a variant array. It ignores any input that is not a variant array/object, including SQL NULL, variant null, and any other variant values."
  examples: |2-
    
        Examples:
          > SELECT * from variant_explode(parse_json('["hello", "world"]'));
           0	NULL	"hello"
           1	NULL	"world"
          > SELECT * from variant_explode(input => parse_json('{"a": true, "b": 3.14}'));
           0	a	true
           1	b	3.14
      
  since: "4.0.0"

