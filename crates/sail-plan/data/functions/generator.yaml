- name: stack
  class_name: "org.apache.spark.sql.catalyst.expressions.Stack"
  signatures:
    - "stack(n, expr1, ..., exprk)"
  description: "Separates expr1, ..., exprk into n rows. Uses column names col0, col1, etc. by default unless specified otherwise."
  examples: |
    > SELECT stack(2, 1, 2, 3);
     1  2
     3  NULL
  since: "2.0.0"
- name: variant_explode
  signatures:
    - "variant_explode(expr)"
  description: "It separates a variant object/array into multiple rows containing its fields/elements. Its result schema is struct<pos int, key string, value variant>. pos is the position of the field/element in its parent object/array, and value is the field/element value. key is the field name when exploding a variant object, or is NULL when exploding a variant array. It ignores any input that is not a variant array/object, including SQL NULL, variant null, and any other variant values."
  examples: |
    > SELECT * from variant_explode(parse_json('["hello", "world"]'));
     0  NULL    "hello"
     1  NULL    "world"
    > SELECT * from variant_explode(input => parse_json('{"a": true, "b": 3.14}'));
     0  a   true
     1  b   3.14
  since: "4.0.0"
- name: variant_explode_outer
  signatures:
    - "variant_explode_outer(expr)"
  description: "It separates a variant object/array into multiple rows containing its fields/elements. Its result schema is struct<pos int, key string, value variant>. pos is the position of the field/element in its parent object/array, and value is the field/element value. key is the field name when exploding a variant object, or is NULL when exploding a variant array. It ignores any input that is not a variant array/object, including SQL NULL, variant null, and any other variant values."
  examples: |
    > SELECT * from variant_explode_outer(parse_json('["hello", "world"]'));
     0  NULL    "hello"
     1  NULL    "world"
    > SELECT * from variant_explode_outer(input => parse_json('{"a": true, "b": 3.14}'));
     0  a   true
     1  b   3.14
  since: "4.0.0"
