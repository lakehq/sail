- name: "inline"
  scope: "sql_builtin"
  group: "generator_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.InlineGeneratorBuilder"
  signatures:
    - "inline(expr)"
  usage: "inline(expr) - Explodes an array of structs into a table. Uses column names col1, col2, etc. by default unless specified otherwise."
  examples: |2-
    
        Examples:
          > SELECT * FROM inline(array(struct(1, 'a'), struct(2, 'b')));
           1	a
           2	b
          > SELECT * FROM inline(input => array(struct(1, 'a'), struct(2, 'b')));
           1	a
           2	b
      
  since: "3.4.0"

