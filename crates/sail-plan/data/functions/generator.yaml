- name: explode
  class_name: "org.apache.spark.sql.catalyst.expressions.ExplodeExpressionBuilder"
  signatures:
    - "explode(expr)"
  description: "Separates the elements of array expr into multiple rows, or the elements of map expr into multiple rows and columns. Unless specified otherwise, uses the default column name col for elements of the array or key and value for the elements of the map."
  examples: |
    > SELECT * FROM explode(array(10, 20));
     10
     20
    > SELECT * FROM explode(collection => array(10, 20));
     10
     20
  since: "3.4.0"
- name: explode_outer
  class_name: "org.apache.spark.sql.catalyst.expressions.ExplodeExpressionBuilder"
  signatures:
    - "explode_outer(expr)"
  description: "Separates the elements of array expr into multiple rows, or the elements of map expr into multiple rows and columns. Unless specified otherwise, uses the default column name col for elements of the array or key and value for the elements of the map."
  examples: |
    > SELECT * FROM explode_outer(array(10, 20));
     10
     20
    > SELECT * FROM explode_outer(collection => array(10, 20));
     10
     20
  since: "3.4.0"
- name: inline
  class_name: "org.apache.spark.sql.catalyst.expressions.InlineExpressionBuilder"
  signatures:
    - "inline(expr)"
  description: "Explodes an array of structs into a table. Uses column names col1, col2, etc. by default unless specified otherwise."
  examples: |
    > SELECT inline(array(struct(1, 'a'), struct(2, 'b')));
     1  a
     2  b
    > SELECT inline(input => array(struct(1, 'a'), struct(2, 'b')));
     1  a
     2  b
  since: "2.0.0"
- name: inline_outer
  class_name: "org.apache.spark.sql.catalyst.expressions.InlineExpressionBuilder"
  signatures:
    - "inline_outer(expr)"
  description: "Explodes an array of structs into a table. Uses column names col1, col2, etc. by default unless specified otherwise."
  examples: |
    > SELECT * FROM inline_outer(array(struct(1, 'a'), struct(2, 'b')));
     1  a
     2  b
    > SELECT * FROM inline_outer(input => array(struct(1, 'a'), struct(2, 'b')));
     1  a
     2  b
  since: "3.4.0"
- name: posexplode
  class_name: "org.apache.spark.sql.catalyst.expressions.PosExplodeExpressionBuilder"
  signatures:
    - "posexplode(expr)"
  description: "Separates the elements of array expr into multiple rows with positions, or the elements of map expr into multiple rows and columns with positions. Unless specified otherwise, uses the column name pos for position, col for elements of the array or key and value for elements of the map."
  examples: |
    > SELECT * FROM posexplode(array(10,20));
     0  10
     1  20
    > SELECT * FROM posexplode(collection => array(10,20));
     0  10
     1  20
  since: "3.5.0"
