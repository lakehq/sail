- name: "stack"
  scope: "sql_builtin"
  group: "generator_funcs"
  source: "built-in"
  class_name: "org.apache.spark.sql.catalyst.expressions.Stack"
  signatures:
    - "stack(n, expr1, ..., exprk)"
  usage: "stack(n, expr1, ..., exprk) - Separates `expr1`, ..., `exprk` into `n` rows. Uses column names col0, col1, etc. by default unless specified otherwise."
  examples: |2-
    
        Examples:
          > SELECT stack(2, 1, 2, 3);
           1	2
