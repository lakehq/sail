# References:
#   - [1] https://spark.apache.org/docs/4.0.0/sql-data-sources-json.html#data-source-option

- key: schema_infer_max_records
  description: |
    The maximum number of rows to read from JSON files for schema inference if needed.
  default:
    value: "1000"
    parser: crate::options::parsers::parse_usize
  supported: true
  rust_type: usize
  scopes:
    - read
  origins:
    - type: option
      keys:
        - schema_infer_max_records
        - schemaInferMaxRecords
      parser: crate::options::parsers::parse_usize
    - type: table_property
      keys:
        - option.schema_infer_max_records
        - option.schemaInferMaxRecords
      parser: crate::options::parsers::parse_usize

- key: compression
  description: |
    Specifies the file compression type. The following compression types are supported:
      - `GZIP` or `GZ`
      - `BZIP2` or `BZ2`
      - `XZ`
      - `ZSTD` or `ZST`
      - `UNCOMPRESSED` or ""
  default:
    value: "UNCOMPRESSED"
    parser: crate::options::parsers::parse_string
  supported: true
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - compression
        - codec
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.compression
        - option.codec
      parser: crate::options::parsers::parse_string

- key: compression
  description: |
    Specifies the compression codec to use when saving to file. The following compression types are supported:
      - `GZIP` or `GZ`
      - `BZIP2` or `BZ2`
      - `XZ`
      - `ZSTD` or `ZST`
      - `UNCOMPRESSED` or ""
  default:
    value: "UNCOMPRESSED"
    parser: crate::options::parsers::parse_string
  supported: true
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - compression
        - codec
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.compression
        - option.codec
      parser: crate::options::parsers::parse_string

- key: time_zone
  description: |
    Sets the string that indicates a time zone ID to be used to format timestamps in the JSON data sources or
    partition values. The following formats of timeZone are supported:
      - Region-based zone ID: It should have the form 'area/city', such as 'America/Los_Angeles'.
      - Zone offset: It should be in the format '(+|-)HH:mm', for example '-08:00' or '+01:00'.
        Also 'UTC' and 'Z' are supported as aliases of '+00:00'.
    Other short names like 'CST' are not recommended to use because they can be ambiguous.
    Defaults to the Sail configuration option `session.time_zone` (to be implemented).
  default:
    value: ""
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - time_zone
        - timeZone
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.time_zone
        - option.timeZone
      parser: crate::options::parsers::parse_string

- key: primitives_as_string
  description: |
    Infers all primitive values as a string type.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - primitives_as_string
        - primitivesAsString
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.primitives_as_string
        - option.primitivesAsString
      parser: crate::options::parsers::parse_bool

- key: prefers_decimal
  description: |
    Infers all floating-point values as a decimal type.
    If the values do not fit in decimal, then it infers them as doubles.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - prefers_decimal
        - prefersDecimal
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.prefers_decimal
        - option.prefersDecimal
      parser: crate::options::parsers::parse_bool

- key: allow_comments
  description: |
    Ignores Java/C++ style comment in JSON records.
  default:
