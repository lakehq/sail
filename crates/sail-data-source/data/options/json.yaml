- key: allow_unquoted_control_chars
  description: |
    Allows JSON Strings to contain unquoted control characters (ASCII characters with value less than 32,
    including tab and line feed characters) or not.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - allow_unquoted_control_chars
        - allowUnquotedControlChars
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.allow_unquoted_control_chars
        - option.allowUnquotedControlChars
      parser: crate::options::parsers::parse_bool

- key: mode
  description: |
    Allows a mode for dealing with corrupt records during parsing. It supports the following case-insensitive modes.
      - `PERMISSIVE`: When it meets a corrupted record, puts the malformed string into a field configured by
        `column_name_of_corrupt_record`, and sets malformed fields to null.
      - `DROPMALFORMED`: Ignores the whole corrupted records. This mode is unsupported in the JSON built-in functions.
      - `FAILFAST`: Throws an exception when it meets corrupted records.
  default:
    value: "PERMISSIVE"
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - mode
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.mode
      parser: crate::options::parsers::parse_string

- key: column_name_of_corrupt_record
  description: |
    Allows renaming the new field having malformed string created by `PERMISSIVE` mode.
    Defaults to the Sail configuration option `sql.column_name_of_corrupt_record` (to be implemented).
  default:
    value: ""
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - column_name_of_corrupt_record
        - columnNameOfCorruptRecord
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.column_name_of_corrupt_record
        - option.columnNameOfCorruptRecord
      parser: crate::options::parsers::parse_string

- key: date_format
  description: |
    Sets the string that indicates a date format. Custom date formats follow the formats at Datetime Patterns (https://spark.apache.org/docs/latest/sql-ref-datetime-pattern.html).
  default:
    value: "yyyy-MM-dd"
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - date_format
        - dateFormat
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.date_format
        - option.dateFormat
      parser: crate::options::parsers::parse_string

- key: timestamp_format
  description: |
    Sets the string that indicates a timestamp format. Custom date formats follow the formats at Datetime Patterns (https://spark.apache.org/docs/latest/sql-ref-datetime-pattern.html).
  default:
    value: "yyyy-MM-dd'T'HH:mm:ss[.SSS][XXX]"
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - timestamp_format
        - timestampFormat
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.timestamp_format
        - option.timestampFormat
      parser: crate::options::parsers::parse_string

- key: timestamp_ntz_format
  description: |
    Sets the string that indicates a timestamp without timezone format.
    Custom date formats follow the formats at Datetime Patterns (https://spark.apache.org/docs/latest/sql-ref-datetime-pattern.html).
  default:
    value: "yyyy-MM-dd'T'HH:mm:ss[.SSS]"
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - timestamp_ntz_format
        - timestampNTZFormat
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.timestamp_ntz_format
        - option.timestampNTZFormat
      parser: crate::options::parsers::parse_string

- key: enable_date_time_parsing_fallback
  description: |
    Allows falling back to the backward compatible behavior of parsing dates and timestamps if values do not match the
    set patterns. Defaults to being enabled if the time parser policy has legacy settings or if no custom date or
    timestamp pattern was provided.
  default:
    value: ""
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - enable_date_time_parsing_fallback
        - enableDateTimeParsingFallback
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.enable_date_time_parsing_fallback
        - option.enableDateTimeParsingFallback
      parser: crate::options::parsers::parse_string

- key: multi_line
  description: |
    Parse one record, which may span multiple lines, per file. JSON built-in functions ignore this option.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - multi_line
        - multiLine
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.multi_line
        - option.multiLine
      parser: crate::options::parsers::parse_bool

- key: encoding
  description: |
    For reading, allows to forcibly set one of standard basic or extended encoding for the JSON files.
    For example UTF-16BE, UTF-32LE. The default value is detected automatically when `multi_line` is set to true.
    JSON built-in functions ignore this option.
    For writing, specifies encoding (charset) of saved JSON files. JSON built-in functions ignore this option.
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - encoding
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.encoding
      parser: crate::options::parsers::parse_string

- key: line_sep
  description: |
    Sets the single character line separator that should be used for parsing.
    JSON built-in functions ignore this option. Supports \\r, \\r\\n and \\n.
    For reading, defaults to None (CRLF: \\r, \\r\\n and \\n).
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - line_sep
        - lineSep
        - terminator
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.line_sep
        - option.lineSep
        - option.terminator
      parser: crate::options::parsers::parse_string

- key: sampling_ratio
  description: |
    Defines fraction of input JSON objects used for schema inferring.
  default:
    value: "1.0"
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
