- key: allow_numeric_leading_zeros
  description: |
    Allows leading zeros in numbers (e.g. 00012).
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - allow_numeric_leading_zeros
