        - option.dropFieldIfAllNull
      parser: crate::options::parsers::parse_bool

- key: locale
  description: |
    Sets a locale as language tag in IETF BCP 47 format.
    For instance, locale is used while parsing dates and timestamps.
  default:
    value: "en-US"
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - locale
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.locale
      parser: crate::options::parsers::parse_string

- key: allow_non_numeric_numbers
  description: |
    Allows JSON parser to recognize set of "Not-a-Number" (NaN) tokens as legal floating number values.
      - `+INF`: For positive infinity, as well as alias of +Infinity and Infinity.
      - `-INF`: For negative infinity, alias -Infinity.
      - `NaN`: For other not-a-numbers, like result of division by zero.
  default:
    value: "true"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - allow_non_numeric_numbers
        - allowNonNumericNumbers
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.allow_non_numeric_numbers
        - option.allowNonNumericNumbers
      parser: crate::options::parsers::parse_bool

- key: ignore_null_fields
  description: |
    Whether to ignore null fields when generating JSON objects.
    Defaults to the Sail configuration option `json_generator.ignore_null_fields` (to be implemented).
  supported: false
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - ignore_null_fields
        - ignoreNullFields
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.ignore_null_fields
        - option.ignoreNullFields
      parser: crate::options::parsers::parse_bool

- key: use_unsafe_row
  description: |
    Whether to use UnsafeRow to represent struct result in the JSON parser.
    Defaults to the Sail configuration option `json.use_unsafe_row` (to be implemented).
  default:
