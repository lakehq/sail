# References:
#   TableProperties:    https://raw.githubusercontent.com/apache/iceberg/apache-iceberg-1.10.1/core/src/main/java/org/apache/iceberg/TableProperties.java
#   SparkReadOptions:   https://raw.githubusercontent.com/apache/iceberg/apache-iceberg-1.10.1/spark/v3.5/spark/src/main/java/org/apache/iceberg/spark/SparkReadOptions.java
#   SparkWriteOptions:  https://raw.githubusercontent.com/apache/iceberg/apache-iceberg-1.10.1/spark/v3.5/spark/src/main/java/org/apache/iceberg/spark/SparkWriteOptions.java

### Read-Only Options ###

- key: use_ref
  description: |
    Select a snapshot reference (tag or branch) to time-travel when reading.
    If unset, the current snapshot is used.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_string
  supported: true
  rust_type: "Option<String>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - use_ref
        - ref
        - branch
        - tag
        - iceberg.ref
      parser: crate::options::parsers::parse_optional_string

- key: snapshot_id
  description: |
    Select a specific snapshot id to time-travel when reading.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_i64
  supported: true
  rust_type: "Option<i64>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - snapshot_id
        - snapshot-id
        - snapshotId
        - version_as_of
        - versionAsOf
      parser: crate::options::parsers::parse_optional_i64

- key: timestamp_as_of
  description: |
    Select snapshot as of the given timestamp. Accepts RFC3339 or 'yyyy-MM-dd HH:mm:ss.SSS'.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_string
  supported: true
  rust_type: "Option<String>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - timestamp_as_of
        - timestampAsOf
      parser: crate::options::parsers::parse_optional_string

- key: metadata_as_data_read
  description: |
    Enable the metadata-as-data read path: avoid eagerly loading file metadata on the driver;
    use manifest scanning in the physical plan instead. When false (default), use the
    driver path with pre-loaded file list.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - metadata_as_data_read
        - metadataAsDataRead
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.metadata_as_data_read
        - option.metadataAsDataRead
      parser: crate::options::parsers::parse_bool

### Write-Only Options ###

- key: overwrite_schema
  description: |
    If `true`, allows overwriting the schema of the table when using overwrite mode.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - overwrite_schema
        - overwriteSchema
      parser: crate::options::parsers::parse_bool

- key: merge_schema
  description: |
    If `true`, allows automatic schema merging during an append or overwrite operation.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - merge_schema
        - merge-schema
        - mergeSchema
      parser: crate::options::parsers::parse_bool

