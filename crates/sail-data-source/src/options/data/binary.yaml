- key: path_glob_filter
  description: |
    A glob pattern is used to only include files with file names matching the pattern.
    For example, `*.pdf` will only include files with a `.pdf` extension.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_string
  supported: true
  rust_type: Option<String>
  scopes:
    - read
  origins:
    - type: option
      keys:
        - path_glob_filter
        - pathGlobFilter
      parser: crate::options::parsers::parse_optional_string
    - type: table_property
      keys:
        - path_glob_filter
        - pathGlobFilter
      parser: crate::options::parsers::parse_optional_string
