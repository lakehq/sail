# Options for Delta Lake tables.
# References:
#   - [1] https://github.com/delta-io/delta/blob/master/spark/src/main/scala/org/apache/spark/sql/delta/DeltaOptions.scala
#   - [2] https://docs.delta.io/latest/delta-batch.html
#   - [3] https://docs.delta.io/latest/delta-change-data-feed.html

### Read-Only Options ###

- key: version_as_of
  description: |
    Query an older snapshot of a table based on a version number.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_i64
  supported: true
  rust_type: "Option<i64>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - version_as_of
        - versionAsOf
      parser: crate::options::parsers::parse_optional_i64

- key: timestamp_as_of
  description: |
    Query an older snapshot of a table based on a timestamp.
    The timestamp can be a string in the format 'yyyy-MM-dd HH:mm:ss.SSS'.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_string
  supported: true
  rust_type: "Option<String>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - timestamp_as_of
        - timestampAsOf
      parser: crate::options::parsers::parse_optional_string

- key: read_change_feed
  description: |
    Enable reading the change data feed (CDF) from the Delta table.
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - read_change_feed
        - readChangeFeed
      parser: crate::options::parsers::parse_bool

- key: starting_version
  description: |
    The starting version for a streaming read or a CDF read.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - starting_version
        - startingVersion
      parser: crate::options::parsers::parse_string

- key: starting_timestamp
  description: |
    The starting timestamp for a streaming read or a CDF read.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - starting_timestamp
        - startingTimestamp
      parser: crate::options::parsers::parse_string

- key: ending_version
  description: |
    The ending version for a CDF read.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - ending_version
        - endingVersion
      parser: crate::options::parsers::parse_string

- key: ending_timestamp
  description: |
    The ending timestamp for a CDF read.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - ending_timestamp
        - endingTimestamp
      parser: crate::options::parsers::parse_string

- key: metadata_as_data_read
  description: |
    Enable the metadata-as-data read path: avoid eagerly loading file metadata on the driver;
    use log replay and discovery in the physical plan instead. When false (default), use the
    driver path with pre-loaded file list.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - metadata_as_data_read
        - metadataAsDataRead
      parser: crate::options::parsers::parse_bool
    # FIXME: We allow this option in table properties for testing purposes.
    #   We may remove this later since this is not tied to the table itself.
    #   We should eventually support read options via SQL hints.
    - type: table_property
      keys:
        - option.metadata_as_data_read
        - option.metadataAsDataRead
      parser: crate::options::parsers::parse_bool

- key: max_files_per_trigger
  description: |
    (Streaming) How many new files to be considered in every micro-batch.
  default:
    value: "1000"
    parser: crate::options::parsers::parse_usize
  supported: false
  rust_type: usize
  scopes:
    - read
  origins:
    - type: option
      keys:
        - max_files_per_trigger
        - maxFilesPerTrigger
      parser: crate::options::parsers::parse_usize

- key: max_bytes_per_trigger
  description: |
    (Streaming) How much data gets processed in each micro-batch.
    This option sets a "soft max", meaning that a batch processes approximately this amount of data.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - max_bytes_per_trigger
        - maxBytesPerTrigger
      parser: crate::options::parsers::parse_string

- key: ignore_deletes
  description: |
    (Streaming) Ignore transactions that delete data.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - ignore_deletes
        - ignoreDeletes
      parser: crate::options::parsers::parse_bool

- key: ignore_changes
  description: |
    (Streaming) Re-process updates if files had to be rewritten in the source table.
    Unchanged rows may still be emitted. Deletes are not propagated downstream.
    This option subsumes `ignoreDeletes`.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - ignore_changes
        - ignoreChanges
      parser: crate::options::parsers::parse_bool

- key: ignore_file_deletion
  description: |
    (Streaming) Ignore transactions that delete files at partition boundaries.
    This option is deprecated and has been replaced by `ignoreDeletes`.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - ignore_file_deletion
        - ignoreFileDeletion
      parser: crate::options::parsers::parse_bool

- key: fail_on_data_loss
  description: |
    (Streaming) Whether to fail the stream if it detects that data has been lost
    (e.g. files were deleted from the middle of the log).
  default:
    value: "true"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - fail_on_data_loss
        - failOnDataLoss
      parser: crate::options::parsers::parse_bool

- key: skip_change_commits
  description: |
    (Streaming) Whether to skip commits that are only rearranging data,
    i.e. have the `dataChange` property set to `false`.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - skip_change_commits
        - skipChangeCommits
      parser: crate::options::parsers::parse_bool

- key: exclude_regex
  description: |
    (Streaming) Regex to exclude files from being considered by the streaming source.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - exclude_regex
        - excludeRegex
      parser: crate::options::parsers::parse_string

- key: schema_tracking_location
  description: |
    (Streaming) The path to the location where the schema of the streaming source should be tracked.
    This is required for streams reading from Delta tables with column mapping and schema changes.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - schema_tracking_location
        - schemaTrackingLocation
        - schemaLocation
      parser: crate::options::parsers::parse_string

- key: streaming_source_tracking_id
  description: |
    (Streaming) An option to instruct DeltaSource to pick a customized subdirectory for schema log
    in case of rare conflicts.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - streaming_source_tracking_id
        - streamingSourceTrackingId
      parser: crate::options::parsers::parse_string

- key: allow_source_column_rename
  description: |
    (Streaming) Option to allow a stream to continue if a source column is renamed.
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - allow_source_column_rename
        - allowSourceColumnRename
      parser: crate::options::parsers::parse_bool

- key: allow_source_column_drop
  description: |
    (Streaming) Option to allow a stream to continue if a source column is dropped.
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - allow_source_column_drop
        - allowSourceColumnDrop
      parser: crate::options::parsers::parse_bool

- key: allow_source_column_type_change
  description: |
    (Streaming) Option to allow a stream to continue if the data type of a source column is changed.
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - allow_source_column_type_change
        - allowSourceColumnTypeChange
      parser: crate::options::parsers::parse_bool

### Write-Only Options ###

- key: replace_where
  description: |
    Condition for overwriting a specific subset of data.
    This is used in conjunction with the `overwrite` save mode.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_string
  supported: true
  rust_type: "Option<String>"
  scopes:
    - write
  origins:
    - type: option
      keys:
        - replace_where
        - replaceWhere
      parser: crate::options::parsers::parse_optional_string

- key: user_metadata
  description: |
    User-defined string stored in the `commitInfo.userMetadata` field of the
    next Delta commit produced by this write.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_string
  supported: true
  rust_type: "Option<String>"
  scopes:
    - write
  origins:
    - type: option
      keys:
        - user_metadata
        - userMetadata
      parser: crate::options::parsers::parse_optional_string

- key: optimize_write
  description: |
    Whether to optimize the write by breaking skew and coalescing data into chunkier files.
  supported: false
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - optimize_write
        - optimizeWrite
      parser: crate::options::parsers::parse_bool

- key: merge_schema
  description: |
    If `true`, allows automatic schema merging during an `append` or `overwrite` operation.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - merge_schema
        - mergeSchema
      parser: crate::options::parsers::parse_bool

- key: overwrite_schema
  description: |
    If `true`, allows overwriting the schema of the table when using `overwrite` mode.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - overwrite_schema
        - overwriteSchema
      parser: crate::options::parsers::parse_bool

- key: data_change
  description: |
    Set to `false` to indicate that the write operation only rearranges data.
  supported: false
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - data_change
        - dataChange
      parser: crate::options::parsers::parse_bool

- key: txn_version
  description: |
    A monotonically increasing number that acts as a transaction version for idempotent writes.
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - txn_version
        - txnVersion
      parser: crate::options::parsers::parse_string

- key: txn_app_id
  description: |
    A unique string used as an application ID for idempotent writes.
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - txn_app_id
        - txnAppId
      parser: crate::options::parsers::parse_string

- key: partition_overwrite_mode
  description: |
    Controls the partition overwrite behavior when `overwrite` mode is `true`.
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - partition_overwrite_mode
        - partitionOverwriteMode
      parser: crate::options::parsers::parse_string

- key: compression
  description: |
    Compression codec to use when writing data files.
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - compression
      parser: crate::options::parsers::parse_string

- key: max_records_per_file
  description: |
    Maximum number of records to write to a single file.
  supported: false
  rust_type: u64
  scopes:
    - write
  origins:
    - type: option
      keys:
        - max_records_per_file
        - maxRecordsPerFile
      parser: crate::options::parsers::parse_u64

- key: write_partition_columns
  description: |
    An option to control if delta will write partition columns to data files.
  supported: false
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - write_partition_columns
        - writePartitionColumns
      parser: crate::options::parsers::parse_bool

- key: target_file_size
  description: |
    Target size of files written by the Delta Lake writer.
    This is a hint and may not be strictly enforced.
  default:
    value: "104857600"
    parser: crate::options::parsers::parse_u64
  supported: true
  rust_type: u64
  scopes:
    - write
  origins:
    - type: option
      keys:
        - target_file_size
        - targetFileSize
      parser: crate::options::parsers::parse_u64
    - type: table_property
      keys:
        - option.target_file_size
        - option.targetFileSize
      parser: crate::options::parsers::parse_u64

- key: write_batch_size
  description: |
    The number of records to write in a single batch.
  default:
    value: "1024"
    parser: crate::options::parsers::parse_non_zero_usize
  supported: true
  rust_type: std::num::NonZeroUsize
  scopes:
    - write
  origins:
    - type: option
      keys:
        - write_batch_size
        - writeBatchSize
      parser: crate::options::parsers::parse_non_zero_usize
    - type: table_property
      keys:
        - option.write_batch_size
        - option.writeBatchSize
      parser: crate::options::parsers::parse_non_zero_usize

### Read and Write Options ###

- key: delta_log_replay_strategy
  description: |
    Strategy for Delta log replay in the metadata-as-data path. Values: "auto", "sort", "hash".
  default:
    value: "auto"
    parser: crate::options::types::delta::parse_delta_log_replay_strategy
  supported: true
  rust_type: crate::options::types::delta::DeltaLogReplayStrategy
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - delta_log_replay_strategy
        - deltaLogReplayStrategy
      parser: crate::options::types::delta::parse_delta_log_replay_strategy

- key: delta_log_replay_hash_threshold
  description: |
    Max commit JSON file count to use hash-no-sort replay when strategy is "auto".
  default:
    value: "100"
    parser: crate::options::parsers::parse_non_zero_usize
  supported: true
  rust_type: std::num::NonZeroUsize
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - delta_log_replay_hash_threshold
        - deltaLogReplayHashThreshold
      parser: crate::options::parsers::parse_non_zero_usize
