# Options for Delta Lake tables.
# References:
#   - [1] https://github.com/delta-io/delta/blob/master/spark/src/main/scala/org/apache/spark/sql/delta/DeltaOptions.scala
#   - [2] https://docs.delta.io/latest/delta-batch.html
#   - [3] https://docs.delta.io/latest/delta-change-data-feed.html

# ── Read-only options ─────────────────────────────────────────────────────────

- key: version_as_of
  description: |
    Query an older snapshot of a table based on a version number.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_i64
  supported: true
  rust_type: "Option<i64>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - version_as_of
        - versionAsOf
      parser: crate::options::parsers::parse_optional_i64
    - type: table_property
      keys:
        - option.version_as_of
        - option.versionAsOf
      parser: crate::options::parsers::parse_optional_i64

- key: timestamp_as_of
  description: |
    Query an older snapshot of a table based on a timestamp.
    The timestamp can be a string in the format 'yyyy-MM-dd HH:mm:ss.SSS'.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_string
  supported: true
  rust_type: "Option<String>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - timestamp_as_of
        - timestampAsOf
      parser: crate::options::parsers::parse_optional_string
    - type: table_property
      keys:
        - option.timestamp_as_of
        - option.timestampAsOf
      parser: crate::options::parsers::parse_optional_string

- key: read_change_feed
  description: |
    Enable reading the change data feed (CDF) from the Delta table.
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - read_change_feed
        - readChangeFeed
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.read_change_feed
        - option.readChangeFeed
      parser: crate::options::parsers::parse_bool

- key: starting_version
  description: |
    The starting version for a streaming read or a CDF read.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - starting_version
        - startingVersion
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.starting_version
        - option.startingVersion
      parser: crate::options::parsers::parse_string

- key: starting_timestamp
  description: |
    The starting timestamp for a streaming read or a CDF read.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - starting_timestamp
        - startingTimestamp
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.starting_timestamp
        - option.startingTimestamp
      parser: crate::options::parsers::parse_string

- key: ending_version
  description: |
    The ending version for a CDF read.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - ending_version
        - endingVersion
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.ending_version
        - option.endingVersion
      parser: crate::options::parsers::parse_string

- key: ending_timestamp
  description: |
    The ending timestamp for a CDF read.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - ending_timestamp
        - endingTimestamp
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.ending_timestamp
        - option.endingTimestamp
      parser: crate::options::parsers::parse_string

- key: metadata_as_data_read
  description: |
    Enable the metadata-as-data read path: avoid eagerly loading file metadata on the driver;
    use log replay and discovery in the physical plan instead. When false (default), use the
    driver path with pre-loaded file list.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - metadata_as_data_read
        - metadataAsDataRead
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.metadata_as_data_read
        - option.metadataAsDataRead
      parser: crate::options::parsers::parse_bool

# ── Write-only options ────────────────────────────────────────────────────────

- key: replace_where
  description: |
    Condition for overwriting a specific subset of data.
    This is used in conjunction with the `overwrite` save mode.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_string
  supported: true
  rust_type: "Option<String>"
  scopes:
    - write
  origins:
    - type: option
      keys:
        - replace_where
        - replaceWhere
      parser: crate::options::parsers::parse_optional_string
    - type: table_property
      keys:
        - option.replace_where
        - option.replaceWhere
      parser: crate::options::parsers::parse_optional_string

- key: user_metadata
  description: |
    User-defined metadata to be stored in the commit info.
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - user_metadata
        - userMetadata
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.user_metadata
        - option.userMetadata
      parser: crate::options::parsers::parse_string

- key: optimize_write
  description: |
    Whether to optimize the write by breaking skew and coalescing data into chunkier files.
  supported: false
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - optimize_write
        - optimizeWrite
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.optimize_write
        - option.optimizeWrite
      parser: crate::options::parsers::parse_bool

- key: merge_schema
  description: |
    If `true`, allows automatic schema merging during an `append` or `overwrite` operation.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - merge_schema
        - mergeSchema
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.merge_schema
        - option.mergeSchema
      parser: crate::options::parsers::parse_bool

- key: overwrite_schema
  description: |
    If `true`, allows overwriting the schema of the table when using `overwrite` mode.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - overwrite_schema
        - overwriteSchema
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.overwrite_schema
        - option.overwriteSchema
      parser: crate::options::parsers::parse_bool

- key: data_change
  description: |
    Set to `false` to indicate that the write operation only rearranges data.
  supported: false
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - data_change
        - dataChange
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.data_change
        - option.dataChange
      parser: crate::options::parsers::parse_bool

- key: txn_version
  description: |
    A monotonically increasing number that acts as a transaction version for idempotent writes.
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - txn_version
        - txnVersion
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.txn_version
        - option.txnVersion
      parser: crate::options::parsers::parse_string

- key: txn_app_id
  description: |
    A unique string used as an application ID for idempotent writes.
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - txn_app_id
        - txnAppId
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.txn_app_id
        - option.txnAppId
      parser: crate::options::parsers::parse_string

- key: partition_overwrite_mode
  description: |
    Controls the partition overwrite behavior when `overwrite` mode is `true`.
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - partition_overwrite_mode
        - partitionOverwriteMode
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.partition_overwrite_mode
        - option.partitionOverwriteMode
      parser: crate::options::parsers::parse_string

- key: compression
  description: |
    Compression codec to use when writing data files.
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - compression
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.compression
      parser: crate::options::parsers::parse_string

- key: max_records_per_file
  description: |
    Maximum number of records to write to a single file.
  supported: false
  rust_type: u64
  scopes:
    - write
  origins:
    - type: option
      keys:
        - max_records_per_file
        - maxRecordsPerFile
      parser: crate::options::parsers::parse_u64
    - type: table_property
      keys:
        - option.max_records_per_file
        - option.maxRecordsPerFile
      parser: crate::options::parsers::parse_u64

- key: write_partition_columns
  description: |
    An option to control if delta will write partition columns to data files.
  supported: false
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - write_partition_columns
        - writePartitionColumns
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.write_partition_columns
        - option.writePartitionColumns
      parser: crate::options::parsers::parse_bool

- key: target_file_size
  description: |
    Target size of files written by the Delta Lake writer.
    This is a hint and may not be strictly enforced.
  default:
    value: "104857600"
    parser: crate::options::parsers::parse_u64
  supported: true
  rust_type: u64
  scopes:
    - write
  origins:
    - type: option
      keys:
        - target_file_size
        - targetFileSize
      parser: crate::options::parsers::parse_u64
    - type: table_property
      keys:
        - option.target_file_size
        - option.targetFileSize
      parser: crate::options::parsers::parse_u64

- key: write_batch_size
  description: |
    The number of records to write in a single batch.
  default:
    value: "1024"
    parser: crate::options::parsers::parse_usize
  supported: true
  rust_type: usize
  scopes:
    - write
  origins:
    - type: option
      keys:
        - write_batch_size
        - writeBatchSize
      parser: crate::options::parsers::parse_usize
    - type: table_property
      keys:
        - option.write_batch_size
        - option.writeBatchSize
      parser: crate::options::parsers::parse_usize

# ── Read and write options ────────────────────────────────────────────────────

- key: delta_log_replay_strategy
  description: |
    Strategy for Delta log replay in the metadata-as-data path. Values: "auto", "sort", "hash".
  default:
    value: "auto"
    parser: crate::options::parsers::parse_string
  supported: true
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - delta_log_replay_strategy
        - deltaLogReplayStrategy
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.delta_log_replay_strategy
        - option.deltaLogReplayStrategy
      parser: crate::options::parsers::parse_string

- key: delta_log_replay_hash_threshold
  description: |
    Max commit JSON file count to use hash-no-sort replay when strategy is "auto".
  default:
    value: "100"
    parser: crate::options::parsers::parse_usize
  supported: true
  rust_type: usize
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - delta_log_replay_hash_threshold
        - deltaLogReplayHashThreshold
      parser: crate::options::parsers::parse_usize
    - type: table_property
      keys:
        - option.delta_log_replay_hash_threshold
        - option.deltaLogReplayHashThreshold
      parser: crate::options::parsers::parse_usize
