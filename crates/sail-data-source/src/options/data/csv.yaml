- key: enable_date_time_parsing_fallback
  description: |
    Allows falling back to the backward compatible behavior of parsing dates and timestamps if values do not match the
    set patterns. Defaults to being enabled if the time parser policy has legacy settings or if no custom date or
    timestamp pattern was provided.
  default:
    value: ""
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - enable_date_time_parsing_fallback
        - enableDateTimeParsingFallback
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.enable_date_time_parsing_fallback
        - option.enableDateTimeParsingFallback
      parser: crate::options::parsers::parse_string

- key: extension
  description: |
    Sets the file extension for the output files. Limited to letters. Length must equal 3.
  default:
    value: "csv"
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - extension
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.extension
      parser: crate::options::parsers::parse_string

- key: encoding
  description: |
    For writing, specifies encoding (charset) of saved CSV files. CSV built-in functions ignore this option.
  default:
    value: "UTF-8"
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - encoding
        - charset
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.encoding
        - option.charset
      parser: crate::options::parsers::parse_string

- key: line_sep
  description: |
    Sets the single character line separator that should be used for writing.
    CSV built-in functions ignore this option. Supports \\r, \\r\\n and \\n.
    For writing, defaults to \\n.
  default:
    value: "\n"
    parser: crate::options::parsers::parse_string
  supported: false
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - line_sep
        - lineSep
        - terminator
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.line_sep
        - option.lineSep
        - option.terminator
      parser: crate::options::parsers::parse_string

- key: ignore_leading_white_space
  description: |
    A flag indicating whether or not leading whitespaces from values being written should be skipped.
    Defaults to true for writing.
  default:
    value: "true"
    parser: crate::options::parsers::parse_bool
  supported: false
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - ignore_leading_white_space
        - ignoreLeadingWhiteSpace
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.ignore_leading_white_space
        - option.ignoreLeadingWhiteSpace
      parser: crate::options::parsers::parse_bool
