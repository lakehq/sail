# References:
#   - [1] https://spark.apache.org/docs/4.0.0/sql-data-sources-csv.html#data-source-option

# TODO: Delimiter can be one or more characters
- key: delimiter
  description: |
    Sets a single character separator for each field and value.
  default:
    value: ","
    parser: crate::options::parsers::parse_char
  supported: true
  rust_type: char
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - delimiter
        - sep
      parser: crate::options::parsers::parse_char
    - type: table_property
      keys:
        - option.delimiter
        - option.sep
      parser: crate::options::parsers::parse_char

- key: quote
  description: |
    Sets a single character used for escaping quoted values where the delimiter can be part of the value.
  default:
    value: "\""
    parser: crate::options::parsers::parse_optional_char
  supported: true
  rust_type: "Option<char>"
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - quote
      parser: crate::options::parsers::parse_optional_char
    - type: table_property
      keys:
        - option.quote
      parser: crate::options::parsers::parse_optional_char

- key: escape
  description: |
    Sets a single character used for escaping quotes inside an already quoted value.
  default:
    value: "\\"
    parser: crate::options::parsers::parse_optional_char
  supported: true
  rust_type: "Option<char>"
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - escape
      parser: crate::options::parsers::parse_optional_char
    - type: table_property
      keys:
        - option.escape
      parser: crate::options::parsers::parse_optional_char

- key: header
  description: |
    For reading, uses the first line as names of columns.
    For writing, writes the names of columns as the first line.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - header
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.header
      parser: crate::options::parsers::parse_bool

- key: null_value
  description: |
    Sets the string representation of a null value.
  default:
    value: ""
    parser: crate::options::parsers::parse_string
  supported: true
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - null_value
        - nullValue
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.null_value
        - option.nullValue
      parser: crate::options::parsers::parse_string

- key: comment
  description: |
    Sets a single character used for skipping lines beginning with this character. By default, disabled.
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_char
  supported: true
  rust_type: "Option<char>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - comment
      parser: crate::options::parsers::parse_optional_char
    - type: table_property
      keys:
        - option.comment
      parser: crate::options::parsers::parse_optional_char

- key: null_regex
  description: |
    Optional regex to match null values. Throws an exception if `null_value` is also set.
  default:
    value: ""
    parser: crate::options::parsers::parse_string
  supported: true
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - null_regex
        - nullRegex
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.null_regex
        - option.nullRegex
      parser: crate::options::parsers::parse_string

- key: line_sep
  description: |
    Sets the single character line separator for reading. Defaults to None (CRLF/LF/CR).
  default:
    value: ""
    parser: crate::options::parsers::parse_optional_char
  supported: true
  rust_type: "Option<char>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - line_sep
        - lineSep
        - terminator
      parser: crate::options::parsers::parse_optional_char
    - type: table_property
      keys:
        - option.line_sep
        - option.lineSep
        - option.terminator
      parser: crate::options::parsers::parse_optional_char

- key: infer_schema
  description: |
    Infers the input schema automatically from data.
  default:
    value: "true"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - infer_schema
        - inferSchema
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.infer_schema
        - option.inferSchema
      parser: crate::options::parsers::parse_bool

- key: schema_infer_max_records
  description: |
    The maximum number of rows to read from CSV files for schema inference if needed.
  default:
    value: "1000"
    parser: crate::options::parsers::parse_usize
  supported: true
  rust_type: usize
  scopes:
    - read
  origins:
    - type: option
      keys:
        - schema_infer_max_records
        - schemaInferMaxRecords
      parser: crate::options::parsers::parse_usize
    - type: table_property
      keys:
        - option.schema_infer_max_records
        - option.schemaInferMaxRecords
      parser: crate::options::parsers::parse_usize

- key: multi_line
  description: |
    Specifies whether newlines in quoted values are supported.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - multi_line
        - multiLine
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.multi_line
        - option.multiLine
      parser: crate::options::parsers::parse_bool

- key: compression
  description: |
    Specifies the file compression type for reading.
  default:
    value: "UNCOMPRESSED"
    parser: crate::options::parsers::parse_string
  supported: true
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - compression
        - codec
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.compression
        - option.codec
      parser: crate::options::parsers::parse_string

- key: allow_truncated_rows
  description: |
    Whether rows with fewer columns should be allowed.
  default:
    value: "false"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - allow_truncated_rows
        - allowTruncatedRows
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.allow_truncated_rows
        - option.allowTruncatedRows
      parser: crate::options::parsers::parse_bool

- key: escape_quotes
  description: |
    A flag indicating whether values containing quotes should always be enclosed in quotes.
  default:
    value: "true"
    parser: crate::options::parsers::parse_bool
  supported: true
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - escape_quotes
        - escapeQuotes
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.escape_quotes
        - option.escapeQuotes
      parser: crate::options::parsers::parse_bool

- key: compression
  description: |
    Specifies the file compression type for writing.
  default:
    value: "UNCOMPRESSED"
    parser: crate::options::parsers::parse_string
  supported: true
  rust_type: String
  scopes:
    - write
  origins:
    - type: option
      keys:
        - compression
        - codec
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.compression
        - option.codec
      parser: crate::options::parsers::parse_string

- key: positive_inf
  description: |
    Sets the string representation of a positive infinity value.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - positive_inf
        - positiveInf
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.positive_inf
        - option.positiveInf
      parser: crate::options::parsers::parse_string

- key: negative_inf
  description: |
    Sets the string representation of a negative infinity value.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - negative_inf
        - negativeInf
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.negative_inf
        - option.negativeInf
      parser: crate::options::parsers::parse_string

- key: date_format
  description: |
    Sets the string that indicates a date format. Custom date formats follow the formats at Datetime Patterns.
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - date_format
        - dateFormat
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.date_format
        - option.dateFormat
      parser: crate::options::parsers::parse_string

- key: timestamp_format
  description: |
    Sets the string that indicates a timestamp format. Custom date formats follow the formats at Datetime Patterns.
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - timestamp_format
        - timestampFormat
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.timestamp_format
        - option.timestampFormat
      parser: crate::options::parsers::parse_string

- key: timestamp_ntz_format
  description: |
    Sets the string that indicates a timestamp without timezone format.
    Custom date formats follow the formats at Datetime Patterns.
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - timestamp_ntz_format
        - timestampNTZFormat
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.timestamp_ntz_format
        - option.timestampNTZFormat
      parser: crate::options::parsers::parse_string

- key: ignore_leading_white_space
  description: |
    A flag indicating whether or not leading whitespaces from values being read should be skipped.
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - ignore_leading_white_space
        - ignoreLeadingWhiteSpace
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.ignore_leading_white_space
        - option.ignoreLeadingWhiteSpace
      parser: crate::options::parsers::parse_bool

- key: ignore_trailing_white_space
  description: |
    A flag indicating whether or not trailing whitespaces from values being read/written should be skipped.
  supported: false
  rust_type: bool
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - ignore_trailing_white_space
        - ignoreTrailingWhiteSpace
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.ignore_trailing_white_space
        - option.ignoreTrailingWhiteSpace
      parser: crate::options::parsers::parse_bool

- key: enforce_schema
  description: |
    If it is set to true, the specified or inferred schema will be forcibly applied to datasource files,
    and headers in CSV files will be ignored.
  supported: false
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - enforce_schema
        - enforceSchema
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.enforce_schema
        - option.enforceSchema
      parser: crate::options::parsers::parse_bool

- key: nan_value
  description: |
    Sets the string representation of a non-number value.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - nan_value
        - nanValue
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.nan_value
        - option.nanValue
      parser: crate::options::parsers::parse_string

- key: max_columns
  description: |
    Defines a hard limit of how many columns a record can have.
  supported: false
  rust_type: usize
  scopes:
    - read
  origins:
    - type: option
      keys:
        - max_columns
        - maxColumns
      parser: crate::options::parsers::parse_usize
    - type: table_property
      keys:
        - option.max_columns
        - option.maxColumns
      parser: crate::options::parsers::parse_usize

- key: max_chars_per_column
  description: |
    Defines the maximum number of characters allowed for any given value being read.
    Defaults to -1 meaning unlimited length.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - max_chars_per_column
        - maxCharsPerColumn
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.max_chars_per_column
        - option.maxCharsPerColumn
      parser: crate::options::parsers::parse_string

- key: mode
  description: |
    Allows a mode for dealing with corrupt records during parsing.
    Supported modes: PERMISSIVE, DROPMALFORMED, FAILFAST.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - mode
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.mode
      parser: crate::options::parsers::parse_string

- key: column_name_of_corrupt_record
  description: |
    Allows renaming the new field having malformed string created by PERMISSIVE mode.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - column_name_of_corrupt_record
        - columnNameOfCorruptRecord
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.column_name_of_corrupt_record
        - option.columnNameOfCorruptRecord
      parser: crate::options::parsers::parse_string

- key: char_to_escape_quote_escaping
  description: |
    Sets a single character used for escaping the escape for the quote character.
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - char_to_escape_quote_escaping
        - charToEscapeQuoteEscaping
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.char_to_escape_quote_escaping
        - option.charToEscapeQuoteEscaping
      parser: crate::options::parsers::parse_string

- key: sampling_ratio
  description: |
    Defines fraction of rows used for schema inferring.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - sampling_ratio
        - samplingRatio
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.sampling_ratio
        - option.samplingRatio
      parser: crate::options::parsers::parse_string

- key: empty_value
  description: |
    Sets the string representation of an empty value.
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - empty_value
        - emptyValue
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.empty_value
        - option.emptyValue
      parser: crate::options::parsers::parse_string

- key: locale
  description: |
    Sets a locale as language tag in IETF BCP 47 format.
    For instance, this is used while parsing dates and timestamps.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - locale
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.locale
      parser: crate::options::parsers::parse_string

- key: unescaped_quote_handling
  description: |
    Defines how the CSV Parser will handle values with unescaped quotes.
    Supported values: STOP_AT_CLOSING_QUOTE, BACK_TO_DELIMITER, STOP_AT_DELIMITER, SKIP_VALUE, RAISE_ERROR.
  supported: false
  rust_type: String
  scopes:
    - read
  origins:
    - type: option
      keys:
        - unescaped_quote_handling
        - unescapedQuoteHandling
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.unescaped_quote_handling
        - option.unescapedQuoteHandling
      parser: crate::options::parsers::parse_string

- key: time_zone
  description: |
    Sets the string that indicates a time zone ID to be used to format timestamps.
    Defaults to the Sail configuration option `session.time_zone`.
  supported: false
  rust_type: String
  scopes:
    - read
    - write
  origins:
    - type: option
      keys:
        - time_zone
        - timeZone
      parser: crate::options::parsers::parse_string
    - type: table_property
      keys:
        - option.time_zone
        - option.timeZone
      parser: crate::options::parsers::parse_string

- key: quote_all
  description: |
    A flag indicating whether all values should always be enclosed in quotes.
  supported: false
  rust_type: bool
  scopes:
    - write
  origins:
    - type: option
      keys:
        - quote_all
        - quoteAll
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.quote_all
        - option.quoteAll
      parser: crate::options::parsers::parse_bool
