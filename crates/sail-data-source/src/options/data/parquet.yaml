- key: metadata_size_hint
  description: |
    (Reading) If specified, the reader will try to fetch the last `size_hint` bytes of the parquet file optimistically.
    A value of `0` or an empty value means not set, reverting to the session configuration default.
    Defaults to the Sail configuration option `parquet.metadata_size_hint`.
  default:
    value: ""
    parser: crate::options::parsers::parse_non_zero_usize
  supported: true
  rust_type: Option<usize>
  scopes:
    - read
  origins:
