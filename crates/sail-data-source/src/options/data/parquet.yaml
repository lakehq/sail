- key: coerce_int96
  description: |
    (Reading) Controls how the parquet reader interprets columns with physical type int96.
    By default, int96 columns are treated as microsecond ("us") resolution timestamps.
    Set to empty to use the session configuration. Valid values: ns, us, ms, s.
  default:
    value: "us"
    parser: crate::options::parsers::parse_optional_string
  supported: true
  rust_type: "Option<String>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - coerce_int96
        - coerceInt96
      parser: crate::options::parsers::parse_optional_string
    - type: table_property
      keys:
        - option.coerce_int96
        - option.coerceInt96
      parser: crate::options::parsers::parse_optional_string

