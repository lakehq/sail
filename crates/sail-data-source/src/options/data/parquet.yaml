- key: enable_page_index
  description: |
    (Reading) Whether to enable page index when reading Parquet files.
    Defaults to the session configuration option `parquet.enable_page_index`.
  supported: true
  rust_type: bool
  scopes:
    - read
  origins:
    - type: option
      keys:
        - enable_page_index
        - enablePageIndex
      parser: crate::options::parsers::parse_bool
    - type: table_property
      keys:
        - option.enable_page_index
        - option.enablePageIndex
      parser: crate::options::parsers::parse_bool

- key: pruning
  description: |
    (Reading) Whether to prune row groups when reading Parquet files.
    Defaults to the session configuration option `parquet.pruning`.
  supported: true
  rust_type: bool
  scopes:
    - read
  origins:
