- key: metadata_size_hint
  description: |
    (Reading) If specified, the reader will try to fetch the last `size_hint` bytes of the parquet file optimistically.
    Setting to 0 or empty clears the hint. Defaults to the session configuration option `parquet.metadata_size_hint`.
  supported: true
  rust_type: "Option<usize>"
  scopes:
    - read
  origins:
    - type: option
      keys:
        - metadata_size_hint
        - metadataSizeHint
      parser: crate::options::parsers::parse_optional_non_zero_usize
    - type: table_property
      keys:
        - option.metadata_size_hint
        - option.metadataSizeHint
      parser: crate::options::parsers::parse_optional_non_zero_usize

